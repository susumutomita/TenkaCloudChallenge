AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (net-evo-02-dns). "History of the Internet" Ep02.
  ANS / SAA name-resolution lab on Route 53 private hosted zones. A bastion
  `relay` (public, SSM-reachable) reaches a private `core` by NAME --
  curl http://core.internal.tenka.test:8080 -- which serves a per-deploy flag.
  The SG and the network path are correct; the planted fault is DNS: the zone's
  A record for core points at a bogus RFC 5737 IP (192.0.2.10), so the name
  resolves but the connection hangs. The learner UPSERTs the A record to core's
  real private IP (settings change on the existing zone, no new resource) to
  restore resolution and read the flag. Cost ~= $0.02 for ~45 min; no NAT/EIP;
  delete-stack removes everything (no orphans).

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).
  FlagSeed:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: >
      Per-deploy random secret injected by the deploy chain (cfnParameters:
      FlagSeed = __RANDOM_PASSWORD__). Wrapped as TC{...} and served by `core`.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for both relay and core.

Resources:
  # ----- VPC + two subnets -----
  # EnableDnsSupport / EnableDnsHostnames are BOTH required for the VPC to consult
  # the Route 53 Resolver -- without them a private hosted zone is never consulted.
  # This is intentionally correct; DNS *resolution capability* is not the fault.
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.30.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.2.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-private-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRt
      SubnetId: !Ref PublicSubnet

  # Private route table: local route only (no NAT). `core` needs no internet --
  # it serves a static flag. Same-VPC traffic uses the local route, so the route
  # layer is intentionally correct; it is NOT the planted fault.
  PrivateRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-private-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PrivateRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRt
      SubnetId: !Ref PrivateSubnet

  # ----- Security Groups (CORRECT -- not the fault) -----
  RelaySg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-relay-sg"
      GroupDescription: Bastion relay. No inbound needed (SSM is outbound-only).
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # `core` SG allows 8080 from the relay SG. Being stateful, the reply is
  # auto-allowed -- so the Security Group layer is correct and is NOT the trap.
  # Once name resolution points at the right IP, this SG lets the request through.
  CoreSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-core-sg"
      GroupDescription: Core node. 8080 from relay SG (stateful, reply auto-allowed).
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref RelaySg
          Description: HTTP 8080 from the relay security group
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-core-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- Route 53 private hosted zone (THE PLANTED MISCONFIG lives in a record) -----
  # internal.tenka.test is associated with the VPC. Because EnableDnsSupport /
  # EnableDnsHostnames are on, the VPC's Route 53 Resolver answers queries for this
  # zone. The zone itself is correct -- the fault is one wrong record below.
  PrivateHostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: internal.tenka.test.
      HostedZoneConfig:
        Comment: !Sub "${NamePrefix} internal service registry (private)"
      VPCs:
        - VPCId: !Ref Vpc
          VPCRegion: !Ref AWS::Region
      HostedZoneTags:
        - Key: Name
          Value: !Sub "${NamePrefix}-internal-zone"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # THE PLANTED FAULT: the A record for core.internal.tenka.test points at a BOGUS
  # address (192.0.2.10 -- TEST-NET-1 / RFC 5737, guaranteed never to be a live host).
  # So from `relay`, `curl http://core.internal.tenka.test:8080` RESOLVES fine but
  # connects to nothing and hangs. The name exists; it just answers wrong. The learner
  # UPSERTs this record to core's real private IP -- a settings change on the existing
  # hosted zone, not a new resource. delete-stack still cleans the zone + record.
  CoreRecordBogus:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: core.internal.tenka.test.
      Type: A
      TTL: "60"
      ResourceRecords:
        - 192.0.2.10

  # A decoy "registry" record that resolves correctly. It exists so the learner sees
  # the zone is alive and serving answers -- proving DNS itself works, and that the
  # `core` record specifically is the one that is wrong. (relay.internal.tenka.test
  # -> relay's real private IP.)
  RelayRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref PrivateHostedZone
      Name: relay.internal.tenka.test.
      Type: A
      TTL: "60"
      ResourceRecords:
        - !GetAtt RelayInstance.PrivateIp

  # ----- IAM: participant viewer (read + scoped DNS record fix) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog).
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess;
      # do not remove (validated by scripts/validate-problems.ts).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudShell baseline -- 7-action allow-list, Resource:* unavoidable
              # (environments are per-identity). Do not remove (validated).
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # ec2:Describe* doesn't accept resource ARNs; scope by tag instead.
              # Lets the learner read SGs / route tables / subnets / instances /
              # network interfaces for THIS stack only.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              # Region / AZ / instance / NIC metadata that does not carry the
              # stack tag (needed for Console list views + IP discovery).
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                Resource: "*"
              # The flag is baked into core's UserData. Block reading it back via
              # DescribeInstanceAttribute so the only path to the flag is fixing the
              # DNS record and curling core. Explicit Deny overrides the allow above.
              - Sid: DenyUserDataReadback
                Effect: Deny
                Action:
                  - ec2:DescribeInstanceAttribute
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              # SSM Session Manager into the relay bastion (the vantage point from
              # which to resolve + reach core). Account-scoped session document.
              - Sid: StartSessionToRelay
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${RelayInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-StartSSHSession"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              # Hosted-zone discovery. route53:ListHostedZones does not accept a
              # resource ARN (it lists every zone in the account), so Resource:* is
              # unavoidable -- it is read-only and leaks only zone NAMES, never write
              # access. The fix grant below is pinned to THIS stack's zone ARN.
              - Sid: ListHostedZonesForDiscovery
                Effect: Allow
                Action:
                  - route53:ListHostedZones
                  - route53:ListHostedZonesByName
                Resource: "*"
              # THE FIX GRANT: read + UPSERT records, pinned to this stack's hosted
              # zone ARN (per-stack logical-id reference, not broad scope). This is
              # the "modify settings" action the learner uses to repoint the core
              # record -- not a new top-level resource. NO route53:CreateHostedZone.
              - Sid: FixOwnHostedZoneRecords
                Effect: Allow
                Action:
                  - route53:GetHostedZone
                  - route53:ListResourceRecordSets
                  - route53:ChangeResourceRecordSets
                Resource: !Sub "arn:aws:route53:::hostedzone/${PrivateHostedZone}"
              # route53:GetChange tracks the PENDING -> INSYNC propagation of a
              # ChangeResourceRecordSets call. Its ARN is /change/* and is not
              # zone-scoped, so Resource:* is required; it is read-only status.
              - Sid: TrackRecordChangeStatus
                Effect: Allow
                Action:
                  - route53:GetChange
                Resource: "*"
              # Deliberately NO cloudformation:DescribeStacks -- the AnswerFlag
              # Output must not be readable; the flag is earned by reaching core.

  # core needs no AWS API access; relay needs SSM core for Session Manager.
  RelayInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-relay-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  RelayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-relay-profile"
      Roles:
        - !Ref RelayInstanceRole

  # ----- EC2: relay (public, SSM bastion) -----
  RelayInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref RelayInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref RelaySg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay"
        - Key: TenkaCloud:Problem
          Value: net-evo-02-dns
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- EC2: core (private, serves the flag on :8080) -----
  CoreInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref CoreSg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-core"
        - Key: TenkaCloud:Problem
          Value: net-evo-02-dns
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          mkdir -p /opt/core
          printf 'TC{%s}\n' '${FlagSeed}' > /opt/core/flag.txt
          chmod 600 /opt/core/flag.txt
          cat > /opt/core/server.py <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer

          with open("/opt/core/flag.txt") as fh:
              FLAG = fh.read().strip()

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  body = (
                      "core management node -- TenkaCloud net-evo-02\n"
                      "name resolution restored. you found the right host.\n"
                      "flag: " + FLAG + "\n"
                  ).encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, *args):
                  return

          HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
          PY
          cat > /etc/systemd/system/core.service <<'UNIT'
          [Unit]
          Description=TenkaCloud net-evo-02 core node
          After=network-online.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/core/server.py
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable --now core.service

  # ----- Briefing -----
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        relay (public subnet, SSM-reachable) is wired to reach core BY NAME:
        `curl http://core.internal.tenka.test:8080`. The name resolves, but the
        connection hangs. The Security Group and the network path are correct.
        The private Route 53 hosted zone internal.tenka.test is answering -- but
        the A record for core points at the WRONG IP. Find core's real private IP,
        UPSERT the A record (no new resources), then curl the name again, read
        core's flag TC{...}, and submit it.
      Description: !Sub "TenkaCloud net-evo-02-dns briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  VpcId:
    Description: The VPC under repair.
    Value: !Ref Vpc
  RelayInstanceId:
    Description: Bastion instance ID -- connect with `aws ssm start-session --target <this>`.
    Value: !Ref RelayInstance
  CorePrivateIp:
    Description: Private IP of the core node (also discoverable via ec2:DescribeInstances).
    Value: !GetAtt CoreInstance.PrivateIp
  PrivateHostedZoneId:
    Description: The private hosted zone whose core A record must be repaired.
    Value: !Ref PrivateHostedZone
  CoreDnsName:
    Description: The name relay is wired to use (currently resolving to a bogus IP).
    Value: core.internal.tenka.test
  SsmStartSessionCommand:
    Description: Connect to relay via Session Manager.
    Value: !Sub "aws ssm start-session --target ${RelayInstance}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after reaching core via the repaired name.
    Value: !Sub "TC{${FlagSeed}}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
