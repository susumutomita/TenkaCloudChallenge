AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (saa-s3-storage-class-pick). SAA-C03 S3 cost-optimization drill.
  Deploys one SSM Parameter describing an access pattern: data accessed ~once per quarter,
  immediate retrieval required, kept >30 days. The player reads the pattern and selects
  the correct S3 storage class (STANDARD_IA). Decoys: Glacier (retrieval latency),
  Standard (too costly for infrequent access). The answer is stored only in the CFn
  Output AnswerFlag which the participant role cannot read.

  Cost: SSM Parameters are free. No S3 bucket, no EC2, no RDS. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads SSM parameters to learn the access-pattern requirements.
              # No cloudformation:DescribeStacks -- the answer lives only in the CFn Output.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The access-pattern description the player reads to derive the answer.
  # It describes WHAT the data needs, not WHAT the answer is.
  AccessPatternParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/access-pattern"
      Type: String
      Value: >-
        Data profile: quarterly financial reports (~50 GB total).
        Access frequency: approximately once every 90 days (four times per year).
        Retrieval SLA: immediate -- when accessed, objects must be available within
        milliseconds (no restore delay is acceptable). Minimum retention: 90 days.
        Current class: STANDARD (cost concern flagged by FinOps team).
        Task: identify the most cost-effective S3 storage class that satisfies
        ALL three constraints (infrequent access / immediate retrieval / >30-day min).
      Description: !Sub "Access-pattern description for ${NamePrefix} (saa-s3-storage-class-pick)."
      Tier: Standard

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Read /{NamePrefix}/access-pattern for the data profile. Identify the S3
        storage class that minimises cost while satisfying: (1) infrequent access
        (~quarterly), (2) immediate retrieval required, (3) retention > 30 days.
        Submit your answer as TC{<class-name>} e.g. TC{glacier-deep-archive}.
      Description: !Sub "Task briefing for ${NamePrefix} (saa-s3-storage-class-pick)."
      Tier: Standard

Outputs:
  AccessPatternParameterName:
    Description: SSM Parameter holding the access-pattern description.
    Value: !Ref AccessPatternParameter
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}&tab=Table"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks, so this Output is never readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct S3 storage class.
    Value: "TC{standard-ia}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
