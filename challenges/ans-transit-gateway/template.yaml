AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (ans-transit-gateway). ANS-C01 networking drill.
  Deploys an SSM Parameter holding a hub-and-spoke connectivity scenario
  for 20 VPCs + on-prem. The player reads the briefing and identifies
  AWS Transit Gateway as the correct service (vs VPC peering which is
  non-transitive and scales as O(N^2)).
  The answer is only in the CFn Output; the participant role cannot read it.

  Cost: SSM Parameter + IAM Role are free. No Transit Gateway deployed. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this
      value automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: Your company has 20 VPCs across multiple AWS accounts plus
        one on-premises data center. All VPCs and on-prem must communicate
        with each other. Centralized routing management is required.
        CONSTRAINT: VPC peering is non-transitive (if A<->B and B<->C are
        peered, A cannot reach C directly) and requires N*(N-1)/2 connections
        for full-mesh, which becomes unmanageable at scale.
        QUESTION: Which AWS managed service provides hub-and-spoke transitive
        routing for VPCs and on-prem with centralized control?
        Decoys: vpc-peering (non-transitive, O(N^2) connections).
        Submit: TC{<service-slug>}, e.g. TC{vpc-peering}.
      Description: !Sub "TenkaCloud ans-transit-gateway briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct service.
    Value: "TC{transit-gateway}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
