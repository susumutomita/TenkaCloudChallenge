AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-patch-manager). SOA-C02 Systems Manager Patch Manager
  knowledge drill. Deploys an SSM Parameter with a scenario describing the
  requirement: automatically patch an EC2 fleet on a schedule without SSH, using
  a patch baseline and maintenance window. The player identifies the Systems
  Manager capability (Patch Manager). The answer is mirrored only in a CFn
  Output the participant role cannot read.

  Cost: SSM Parameter (standard tier) is free. No EC2 instance, NAT Gateway,
  or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads the briefing SSM Parameter and applies domain knowledge.
              # Scoped to /{NamePrefix}/* only.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Scenario: You manage a fleet of 50 EC2 instances across three Auto
        Scaling groups. The security team requires all instances to be patched
        on the second Tuesday of every month during a 2-hour maintenance window,
        without opening SSH/RDP to any instance. A patch baseline defines which
        OS patches are approved. Which AWS Systems Manager capability combines
        the patch baseline with a scheduled maintenance window to auto-patch
        the fleet without SSH? Decoys to rule out: Run Command (one-shot
        execution, no built-in patching schedule), Automation (multi-step
        runbook, not patch-specific), State Manager (continual configuration
        enforcement). Submit as TC{capability-name-hyphenated-lowercase},
        e.g. TC{automation}.
      Description: !Sub "TenkaCloud soa-patch-manager briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the scenario briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to Systems Manager Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the SSM Patch Manager capability.
    Value: "TC{patch-manager}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
