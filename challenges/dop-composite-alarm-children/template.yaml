AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dop-composite-alarm-children). DOP-C02 CloudWatch drill.
  Deploys two CloudWatch metric alarms (CPU and NetworkIn) and one composite
  alarm whose AlarmRule ANDs exactly two child alarms. The learner reads the
  AlarmRule and counts the children. The answer (2) is mirrored only in a CFn
  Output the participant role cannot read.

  Cost: CloudWatch alarms (first 10 free) and SSM parameter are free.
  No EC2 instance. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # cloudwatch:DescribeAlarms does not accept resource-level ARNs,
              # so it is granted on Resource:"*". The answer must be derived
              # by counting ALARM() refs in the AlarmRule, not from CFn Outputs.
              - Sid: CloudWatchDescribeAlarms
                Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Child alarm 1: CPUUtilization > 80 for 1 period.
  # No EC2 instance, so this alarm will stay INSUFFICIENT_DATA -- that's fine,
  # the definition itself is what the learner inspects.
  AlarmCpu:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${NamePrefix}-cpu-high"
      AlarmDescription: "CPU utilization above 80% (child alarm for composite)."
      Namespace: AWS/EC2
      MetricName: CPUUtilization
      Statistic: Average
      Period: 300
      EvaluationPeriods: 1
      Threshold: 80
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing

  # Child alarm 2: NetworkIn > 10 MB for 1 period.
  AlarmNetworkIn:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${NamePrefix}-network-in-high"
      AlarmDescription: "Network inbound above 10 MB (child alarm for composite)."
      Namespace: AWS/EC2
      MetricName: NetworkIn
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: 10000000
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: missing

  # Composite alarm: ANDs exactly TWO child metric alarms.
  # The learner counts the ALARM() references in AlarmRule to get the answer.
  CompositeAlarm:
    Type: AWS::CloudWatch::CompositeAlarm
    DependsOn:
      - AlarmCpu
      - AlarmNetworkIn
    Properties:
      AlarmName: !Sub "${NamePrefix}-composite-high-load"
      AlarmDescription: "Composite: fires only when BOTH cpu-high AND network-in-high are in ALARM."
      AlarmRule: !Sub >-
        ALARM("${NamePrefix}-cpu-high") AND ALARM("${NamePrefix}-network-in-high")

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Inspect the CloudWatch composite alarm named ${NamePrefix}-composite-high-load.
        Read its AlarmRule and count how many child alarms (ALARM(...) references)
        are combined with AND. Submit the count N as TC{N}, e.g. TC{3}.
      Description: !Sub "TenkaCloud dop-composite-alarm-children briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  CompositeAlarmName:
    Description: Name of the composite alarm to inspect.
    Value: !Ref CompositeAlarm
  CloudWatchConsoleUrl:
    Description: AWS Console deep link to the CloudWatch Alarms list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#alarmsV2:"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks
  # granted to participant -- must count ALARM() refs in AlarmRule.
  AnswerFlag:
    Description: Flag the learner submits after counting composite alarm children.
    Value: "TC{2}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
