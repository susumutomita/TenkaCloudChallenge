AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (net-evo-03-egress). "History of the Internet" Ep03.
  ANS / SAA networking lab on private-subnet egress (IPv4 exhaustion -> NAT).

  A `nat` t3.micro (public subnet, SourceDestCheck disabled, iptables MASQUERADE
  in UserData) gives outbound egress without a NAT Gateway or EIP. A bastion
  `relay` is the vantage point. A `core` node (private subnet, no public IP)
  must phone home over the internet to fetch a per-deploy flag, then serve it on
  TCP 8080. The SGs and the NAT are correct -- but the PRIVATE ROUTE TABLE is
  the planted fault: it has only the `local` route and is MISSING the
  `0.0.0.0/0 -> nat` default route, so `core` has no egress and serves
  "NO EGRESS". The learner adds ONE default route to the NAT instance on the
  EXISTING private route table (a settings change, no new resource) to restore
  egress and read the flag off `core`.

  Cost: 3x t3.micro for ~1h ~= $0.04. No NAT Gateway, no EIP. delete-stack
  removes everything -- nothing is created outside CloudFormation, no orphans.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).
  FlagSeed:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: >
      Per-deploy random secret injected by the deploy chain (cfnParameters:
      FlagSeed = __RANDOM_PASSWORD__). Wrapped as TC{...}, served by `nat` to the
      internet-facing side and fetched back by `core` only once egress works.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
    Description: EC2 instance type for nat, relay and core (t3.micro only -- cost rule).

Resources:
  # ----- VPC + public / private subnets -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.30.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PrivateSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.30.2.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: false
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-private-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRt
      SubnetId: !Ref PublicSubnet

  # Private route table: the PLANTED FAULT. It carries only the implicit `local`
  # route (created automatically by AWS for the VPC CIDR) and DELIBERATELY OMITS
  # the `0.0.0.0/0 -> nat instance` default route. With no default route, `core`
  # in the private subnet has NO egress -- it cannot phone home, so it serves
  # "NO EGRESS". The learner restores egress by ADDING one default route to the
  # NAT instance's ENI on THIS table (a settings change on an existing resource,
  # not a new top-level resource). delete-stack still cleans everything.
  PrivateRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-private-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PrivateRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PrivateRt
      SubnetId: !Ref PrivateSubnet

  # ----- Security Groups (CORRECT -- not the fault) -----
  # `nat` SG: lets the whole VPC out through it (this is what a NAT box must do).
  # Inbound from the VPC CIDR on all protocols; egress open so MASQUERADE works.
  NatSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-nat-sg"
      GroupDescription: NAT instance. Accepts VPC-internal traffic to masquerade outbound.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: "-1"
          CidrIp: 10.30.0.0/16
          Description: All traffic from inside the VPC (so private hosts can egress via NAT)
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Outbound to the internet (MASQUERADE source)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-nat-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # `relay` SG: SSM bastion, no inbound needed (SSM is outbound-only). Open egress.
  RelaySg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-relay-sg"
      GroupDescription: Bastion relay. No inbound needed (SSM is outbound-only).
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Outbound (SSM + reaching core:8080)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # `core` SG: allows 8080 from the relay SG (stateful, reply auto-allowed), and
  # open egress so that ONCE the route exists it can reach the NAT and phone home.
  # The SG is correct -- it is NOT the trap. The missing route is.
  CoreSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-core-sg"
      GroupDescription: Core node. 8080 from relay SG; open egress (egress blocked by missing route, not SG).
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !Ref RelaySg
          Description: HTTP 8080 from the relay security group
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: 0.0.0.0/0
          Description: Outbound (to phone home via NAT once egress is restored)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-core-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- IAM: participant viewer (read + scoped route fix) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog).
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess;
      # do not remove (validated by scripts/validate-problems.ts).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudShell baseline -- 7-action allow-list, Resource:* unavoidable
              # (environments are per-identity). Do not remove (validated).
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # ec2:Describe* doesn't accept resource ARNs; scope by tag instead.
              # Lets the learner read SGs / route tables / subnets / instances /
              # network interfaces for THIS stack only.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              # Some ec2:Describe* calls the diagnosis needs (route tables,
              # instances, ENIs, AZs/regions) do not support tag conditions and
              # would be silently filtered out by the tag-scoped block above.
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeRouteTables
                  - ec2:DescribeInstances
                  - ec2:DescribeNetworkInterfaces
                Resource: "*"
              # The flag transits core's UserData. Block reading it back via
              # DescribeInstanceAttribute so the only path to the flag is fixing
              # the route and curling core. Explicit Deny overrides the allow.
              - Sid: DenyUserDataReadback
                Effect: Deny
                Action:
                  - ec2:DescribeInstanceAttribute
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              # SSM Session Manager into the relay bastion (the vantage point from
              # which to reach core). Account-scoped session document per #42.
              - Sid: StartSessionToRelay
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${RelayInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              # THE FIX GRANT: add / replace / delete a route on the EXISTING
              # private route table, tag-scoped to this stack. This is the
              # "modify settings" action the learner uses to restore egress --
              # not a new top-level resource. ec2:CreateRoute et al. authorize
              # against the route table resource, which carries the NamePrefix tag.
              - Sid: FixOwnPrivateRoute
                Effect: Allow
                Action:
                  - ec2:CreateRoute
                  - ec2:ReplaceRoute
                  - ec2:DeleteRoute
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:route-table/*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              # Deliberately NO cloudformation:DescribeStacks -- the AnswerFlag
              # Output must not be readable; the flag is earned by reaching core.

  # core needs no AWS API access; relay needs SSM for Session Manager.
  RelayInstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  RelayInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-relay-profile"
      Roles:
        - !Ref RelayInstanceRole

  # ----- EC2: nat (public, masquerading NAT -- no NAT Gateway, no EIP) -----
  # SourceDestCheck must be false so the instance can forward traffic that is not
  # addressed to itself. UserData enables IP forwarding + an iptables MASQUERADE
  # rule, then serves TC{FlagSeed} on :80 so that a host with working egress (via
  # this NAT, out the IGW, back to this NAT's public IP) can fetch it. This is a
  # plain t3.micro using its auto-assigned public IP -- not a NAT Gateway, no EIP.
  NatInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PublicSubnet
      SourceDestCheck: false
      SecurityGroupIds:
        - !Ref NatSg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-nat"
        - Key: TenkaCloud:Problem
          Value: net-evo-03-egress
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          # --- act as a NAT: forward + masquerade VPC traffic out the IGW ---
          sysctl -w net.ipv4.ip_forward=1
          echo 'net.ipv4.ip_forward = 1' > /etc/sysctl.d/99-nat.conf
          PRIMARY_IF=$(ip -o -4 route show to default | awk '{print $5}')
          iptables -t nat -A POSTROUTING -s 10.30.0.0/16 -o "$PRIMARY_IF" -j MASQUERADE
          iptables -A FORWARD -s 10.30.0.0/16 -j ACCEPT
          iptables -A FORWARD -d 10.30.0.0/16 -j ACCEPT
          # --- serve the flag on :80 so a host with working egress can fetch it ---
          mkdir -p /opt/nat
          printf 'TC{%s}\n' '${FlagSeed}' > /opt/nat/flag.txt
          chmod 600 /opt/nat/flag.txt
          cat > /opt/nat/server.py <<'PY'
          from http.server import BaseHTTPRequestHandler, HTTPServer

          with open("/opt/nat/flag.txt") as fh:
              FLAG = fh.read().strip()

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  body = (FLAG + "\n").encode()
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, *args):
                  return

          HTTPServer(("0.0.0.0", 80), Handler).serve_forever()
          PY
          cat > /etc/systemd/system/natflag.service <<'UNIT'
          [Unit]
          Description=TenkaCloud net-evo-03 NAT flag origin
          After=network-online.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/nat/server.py
          Restart=always
          User=root

          [Install]
          WantedBy=multi-user.target
          UNIT
          systemctl daemon-reload
          systemctl enable --now natflag.service

  # ----- EC2: relay (public, SSM bastion) -----
  RelayInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref RelayInstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref RelaySg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay"
        - Key: TenkaCloud:Problem
          Value: net-evo-03-egress
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- EC2: core (private, no public IP, serves the flag on :8080) -----
  # core has NO egress until the private route table gets a default route to the
  # NAT instance. Its UserData loops trying to fetch TC{...} from the NAT's
  # PUBLIC IP (i.e. out through the NAT, to the internet, and back). Until egress
  # works the fetch fails and core serves "NO EGRESS" on :8080. Once the learner
  # adds the route, core's next poll succeeds, caches the flag, and serves it.
  CoreInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      SubnetId: !Ref PrivateSubnet
      SecurityGroupIds:
        - !Ref CoreSg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-core"
        - Key: TenkaCloud:Problem
          Value: net-evo-03-egress
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub
          - |
            #!/bin/bash
            set -euxo pipefail
            mkdir -p /opt/core
            echo "NO EGRESS" > /opt/core/flag.txt
            chmod 600 /opt/core/flag.txt
            # Phone home: reach the NAT instance's PUBLIC IP. This only succeeds
            # when the private route table has a default route to the NAT (i.e.
            # egress is restored). The traffic leaves via the NAT, out the IGW,
            # and returns to the NAT's public IP -- a genuine egress round trip.
            cat > /opt/core/phonehome.sh <<PH
            #!/bin/bash
            ORIGIN="http://${NatPublicIp}/"
            while true; do
              if OUT=\$(curl -fsS --max-time 5 "\$ORIGIN" 2>/dev/null); then
                case "\$OUT" in
                  TC{*) printf '%s\n' "\$OUT" > /opt/core/flag.txt ;;
                esac
              fi
              sleep 15
            done
            PH
            chmod 700 /opt/core/phonehome.sh
            cat > /opt/core/server.py <<'PY'
            from http.server import BaseHTTPRequestHandler, HTTPServer

            class Handler(BaseHTTPRequestHandler):
                def do_GET(self):
                    with open("/opt/core/flag.txt") as fh:
                        flag = fh.read().strip()
                    if flag.startswith("TC{"):
                        body = (
                            "core management node -- TenkaCloud net-evo-03\n"
                            "egress restored. core phoned home through the NAT.\n"
                            "flag: " + flag + "\n"
                        ).encode()
                    else:
                        body = (
                            "core management node -- TenkaCloud net-evo-03\n"
                            "NO EGRESS: cannot phone home. the private subnet has\n"
                            "no default route to the NAT instance. fix the route.\n"
                        ).encode()
                    self.send_response(200)
                    self.send_header("Content-Type", "text/plain")
                    self.send_header("Content-Length", str(len(body)))
                    self.end_headers()
                    self.wfile.write(body)

                def log_message(self, *args):
                    return

            HTTPServer(("0.0.0.0", 8080), Handler).serve_forever()
            PY
            cat > /etc/systemd/system/core-phonehome.service <<'UNIT'
            [Unit]
            Description=TenkaCloud net-evo-03 core phone-home loop
            After=network-online.target

            [Service]
            ExecStart=/opt/core/phonehome.sh
            Restart=always
            User=root

            [Install]
            WantedBy=multi-user.target
            UNIT
            cat > /etc/systemd/system/core.service <<'UNIT'
            [Unit]
            Description=TenkaCloud net-evo-03 core node
            After=network-online.target

            [Service]
            ExecStart=/usr/bin/python3 /opt/core/server.py
            Restart=always
            User=root

            [Install]
            WantedBy=multi-user.target
            UNIT
            systemctl daemon-reload
            systemctl enable --now core.service
            systemctl enable --now core-phonehome.service
          - NatPublicIp: !GetAtt NatInstance.PublicIp

  # ----- Briefing -----
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        core (private subnet, no public IP) cannot phone home to fetch its flag
        -- it serves "NO EGRESS" on :8080. The nat instance and the Security
        Groups are correct. Diagnose why a private host has no egress, find the
        layer with the missing path (hint: the private route table has only the
        local route -- no default route to the NAT), add ONE route to fix it (no
        new resources), then read core's flag TC{...} from relay and submit it.
      Description: !Sub "TenkaCloud net-evo-03-egress briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  VpcId:
    Description: The VPC under repair.
    Value: !Ref Vpc
  RelayInstanceId:
    Description: Bastion instance ID -- connect with `aws ssm start-session --target <this>`.
    Value: !Ref RelayInstance
  NatInstanceId:
    Description: NAT instance ID (SourceDestCheck disabled). Its ENI is the default-route target.
    Value: !Ref NatInstance
  CorePrivateIp:
    Description: Private IP of the core node (also discoverable via ec2:DescribeInstances).
    Value: !GetAtt CoreInstance.PrivateIp
  PrivateRouteTableId:
    Description: The private subnet's route table (the layer to repair -- add a default route).
    Value: !Ref PrivateRt
  SsmStartSessionCommand:
    Description: Connect to relay via Session Manager.
    Value: !Sub "aws ssm start-session --target ${RelayInstance}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after core phones home over restored egress.
    Value: !Sub "TC{${FlagSeed}}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
