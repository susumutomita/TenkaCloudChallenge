AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dea-glue-job-bookmark). DEA-C01 Glue incremental ETL drill.
  Models a Glue incremental-processing scenario via an SSM Parameter. Glue jobs
  are NOT deployed (DPU charges at $0.44/DPU-hour). The player reads the scenario
  and identifies the Glue Job Bookmark as the feature that tracks processed data
  to enable incremental ETL without reprocessing already-handled records.

  Cost: SSM Parameter (Standard Tier) is free. No Glue job deployed. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A Glue ETL job scans an entire S3 bucket on every run, even
        though only new files are added daily. The job re-processes already
        processed files each time, wasting compute and time. The team wants to
        enable incremental ETL: each run should process only NEW, unprocessed
        data and skip files already handled in previous runs.
        QUESTION: Which AWS Glue feature tracks what data has already been
        processed so that subsequent job runs only handle new records?
        OPTIONS: (a) Glue Workflow -- orchestrates dependencies between jobs/crawlers
                 (b) Glue Crawler -- discovers schema and populates Data Catalog
                 (c) Glue Job Bookmark -- records processing state so future runs
                     skip already-processed data (incremental ETL)
        Submit the feature name (lowercase hyphenated) as TC{feature-name}.
      Description: !Sub "TenkaCloud dea-glue-job-bookmark briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Glue incremental ETL scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to this SSM Parameter.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/${NamePrefix}/briefing/description?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag for the Glue incremental ETL tracking feature.
    Value: "TC{job-bookmark}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
