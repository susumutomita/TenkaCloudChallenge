AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (sap-budget-actions). SAP-C02 cost governance drill.
  Stores a scenario in SSM: a dev account keeps exceeding budget; the player
  must identify Budget Actions (the AWS Budgets feature that automatically
  applies IAM policies or stops EC2/RDS instances when a threshold is crossed)
  as opposed to simple Budget Alerts (notification only). No actual Budgets
  resource is deployed (AWS::Budgets::Budget is not a free-tier item when
  configured with actions), so the scenario is modeled as data.

  Cost: SSM Parameters and IAM roles are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: TenkaCloud's dev AWS account repeatedly exceeds its monthly
        budget because developers leave EC2 instances running overnight.
        REQUIREMENT: when the cost budget threshold is exceeded, automatically
        (1) apply a restrictive IAM policy that prevents launching new instances,
        or (2) stop the running EC2 instances. Manual alert-based response is
        too slow and unreliable.
        OPTIONS: Budget Alerts = sends SNS/email notifications when thresholds
        are crossed, but requires a human to act; Budget Actions = automatically
        applies IAM policies, stops EC2 instances, or stops RDS instances when
        a budget threshold (actual or forecast) is crossed; SCP = preventive
        guardrails at the Organizations level, not reactive to spend;
        Cost Anomaly Detection = ML-based spend anomaly alerts, not automated
        enforcement.
        QUESTION: Which AWS Budgets feature automatically applies an IAM policy
        or stops resources when a budget is exceeded? Submit as TC{feature-name}
        e.g. TC{cost-anomaly-detection}.
      Description: !Sub "TenkaCloud sap-budget-actions briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the cost governance scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag identifying the AWS Budgets automated-action feature.
    Value: "TC{budget-actions}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
