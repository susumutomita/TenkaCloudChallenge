<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 260" role="img" aria-labelledby="title desc">
  <title id="title">AI RISC-V SoC Level 1 architecture</title>
  <desc id="desc">Firmware in instruction ROM drives an RV32I CPU connected to RAM, UART, GPIO, and a simulation status register.</desc>
  <style>.box{fill:#f7f8fc;stroke:#20263a;stroke-width:2}.cpu{fill:#dfe9ff}.io{fill:#e4f7eb}.t{font:16px system-ui;fill:#11182a}.s{font:13px system-ui;fill:#35405c}.line{stroke:#51617d;stroke-width:3;marker-end:url(#a)}</style>
  <defs><marker id="a" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M 0 0 L 10 5 L 0 10 z" fill="#51617d"/></marker></defs>
  <rect class="box" x="30" y="85" width="150" height="85" rx="12"/><text class="t" x="55" y="120">Firmware ROM</text><text class="s" x="65" y="147">reset @ 0x0</text>
  <rect class="box cpu" x="285" y="65" width="190" height="125" rx="14"/><text class="t" x="330" y="112">RV32I CPU</text><text class="s" x="316" y="141">single-cycle subset</text>
  <rect class="box" x="580" y="20" width="135" height="55" rx="10"/><text class="t" x="620" y="54">RAM</text>
  <rect class="box io" x="580" y="90" width="135" height="55" rx="10"/><text class="t" x="620" y="124">UART</text>
  <rect class="box io" x="735" y="90" width="135" height="55" rx="10"/><text class="t" x="780" y="124">GPIO</text>
  <rect class="box io" x="580" y="165" width="290" height="55" rx="10"/><text class="t" x="660" y="199">TOHOST verifier</text>
  <path class="line" d="M180 127 H285"/><path class="line" d="M475 95 L580 50"/><path class="line" d="M475 125 H580"/><path class="line" d="M475 135 L735 118"/><path class="line" d="M475 155 L580 190"/>
</svg>
