<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 620 240" font-family="Helvetica,Arial,sans-serif">
<defs><marker id="a" markerWidth="9" markerHeight="9" refX="7" refY="3" orient="auto"><path d="M0,0 L7,3 L0,6 Z" fill="#64748B"/></marker></defs>
<rect x="0" y="0" width="620" height="240" fill="#FFFFFF"/>
<text x="310" y="32" text-anchor="middle" font-size="18" font-weight="700" fill="#0F172A">QUERY: The Method Nobody Knows</text>
<text x="310" y="52" text-anchor="middle" font-size="11" fill="#475569">RFC 10008 QUERY /search through an internet-facing edge</text>

<!-- Client -->
<rect x="20" y="92" width="150" height="78" rx="8" fill="#F8FAFC" stroke="#16A34A" stroke-width="2"/>
<rect x="20" y="92" width="150" height="26" rx="8" fill="#16A34A"/>
<rect x="20" y="110" width="150" height="8" fill="#16A34A"/>
<text x="95" y="110" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">Client</text>
<text x="95" y="138" text-anchor="middle" font-size="10.5" fill="#334155">curl / browser fetch</text>
<text x="95" y="154" text-anchor="middle" font-size="10.5" fill="#334155">QUERY /search</text>

<!-- ALB -->
<rect x="235" y="80" width="170" height="102" rx="8" fill="#F8FAFC" stroke="#D97706" stroke-width="2"/>
<rect x="235" y="80" width="170" height="26" rx="8" fill="#D97706"/>
<rect x="235" y="98" width="170" height="8" fill="#D97706"/>
<text x="320" y="98" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">ALB (the edge)</text>
<text x="320" y="124" text-anchor="middle" font-size="10" fill="#334155">Listener :80 method allow-list</text>
<text x="320" y="140" text-anchor="middle" font-size="10" fill="#334155">GET / HEAD / POST / OPTIONS</text>
<text x="320" y="158" text-anchor="middle" font-size="10" font-weight="700" fill="#B91C1C">QUERY not allowed yet</text>
<text x="320" y="173" text-anchor="middle" font-size="9.5" fill="#64748B">default action: 405</text>

<!-- Lambda -->
<rect x="450" y="92" width="150" height="78" rx="8" fill="#F8FAFC" stroke="#759C3E" stroke-width="2"/>
<rect x="450" y="92" width="150" height="26" rx="8" fill="#759C3E"/>
<rect x="450" y="110" width="150" height="8" fill="#759C3E"/>
<text x="525" y="110" text-anchor="middle" font-size="12.5" font-weight="700" fill="#FFFFFF">Lambda search API</text>
<text x="525" y="138" text-anchor="middle" font-size="10.5" fill="#334155">implements RFC 10008</text>
<text x="525" y="154" text-anchor="middle" font-size="10.5" fill="#334155">the app is fine</text>

<!-- arrows -->
<line x1="170" y1="131" x2="232" y2="131" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
<line x1="405" y1="131" x2="447" y2="131" stroke="#64748B" stroke-width="2" marker-end="url(#a)"/>
<text x="427" y="123" text-anchor="middle" font-size="8.5" fill="#16A34A">forward</text>

<text x="310" y="214" text-anchor="middle" font-size="11" fill="#475569">Add QUERY to the listener rule's method allow-list, then send a spec-compliant QUERY.</text>
</svg>
