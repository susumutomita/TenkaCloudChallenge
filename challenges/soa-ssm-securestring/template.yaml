AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-ssm-securestring). SOA-C02 SSM Parameter Store drill.
  Deploys two SSM Parameters under the same NamePrefix: one String (plaintext) and
  one SecureString (KMS-encrypted with the account default key). The learner reads
  both parameter Types and identifies which Type encrypts the value at rest.
  The answer is mirrored only in a CFn Output the participant role cannot read.

  Cost: SSM Parameters (standard tier) are free. Default KMS key usage has no
  additional charge. No EC2 instance, NAT Gateway, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads parameter metadata (Type) to identify SecureString.
              # GetParameter is scoped to /{NamePrefix}/* to limit visibility.
              # Deliberately NO cloudformation:DescribeStacks -- the answer lives
              # in a CFn Output and must be derived from the parameter Type.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # String parameter -- plaintext, no KMS encryption.
  PlainParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/config-plain"
      Type: String
      Value: "app-config-value-plaintext"
      Description: !Sub "Plain String parameter for ${NamePrefix} drill."
      Tier: Standard

  # SecureString parameter -- KMS-encrypted at rest using the account default key.
  # The Type is the answer the player must identify.
  SecretParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/config-secret"
      Type: SecureString
      Value: "app-config-value-encrypted"
      Description: !Sub "SecureString parameter (KMS-encrypted) for ${NamePrefix} drill."
      Tier: Standard

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Two SSM Parameters exist under your NamePrefix: one String (plaintext)
        and one SecureString (KMS-encrypted at rest). Identify which Type
        encrypts the value with KMS. Submit the Type name in lowercase as
        TC{typename}, e.g. TC{string}. Do NOT use CloudFormation DescribeStacks.
      Description: !Sub "TenkaCloud soa-ssm-securestring briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  PlainParameterName:
    Description: The plaintext String parameter name.
    Value: !Ref PlainParameter
  SecretParameterName:
    Description: The KMS-encrypted SecureString parameter name.
    Value: !Ref SecretParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the KMS-encrypting parameter type.
    Value: "TC{securestring}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
