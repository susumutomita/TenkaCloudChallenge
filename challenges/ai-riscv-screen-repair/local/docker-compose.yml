# Local-only screen-controller repair lab. No host device, FPGA, or display is used.
# The lab network has no external egress; workshop-host exists only so Docker can
# publish the UI and verifier to host loopback without masquerading container traffic.
services:
  ai-riscv-screen-repair:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      # The controller wrapper is the only participant-owned live input.
      - "./solution:/workspace/solution:ro"
    tmpfs:
      - "/workspace/build:rw,exec,size=512m,uid=10001,gid=10001"
      - "/tmp:rw,noexec,nosuid,size=64m,uid=10001,gid=10001"
    ports:
      - "127.0.0.1:18200:8080"
      - "127.0.0.1:18201:8081"
    healthcheck:
      test:
        [
          "CMD",
          "python3",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8080/healthz', timeout=2)",
        ]
      interval: "3s"
      timeout: "3s"
      retries: 40
    cpus: "2.0"
    mem_limit: "2g"
    pids_limit: 256
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - "no-new-privileges:true"
    networks:
      - lab
      - workshop-host
    restart: "no"

networks:
  lab:
    internal: true
  workshop-host:
    driver: bridge
    driver_opts:
      com.docker.network.bridge.enable_ip_masquerade: "false"
      com.docker.network.bridge.host_binding_ipv4: "127.0.0.1"
