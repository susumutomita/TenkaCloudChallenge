AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (mla-sagemaker-serverless-endpoint). MLA-C01 SageMaker drill.
  Models a SageMaker endpoint type selection scenario via an SSM Parameter.
  SageMaker endpoints are NOT deployed (significant instance costs). The player
  reads the scenario and selects the Serverless endpoint type for intermittent
  traffic that scales to zero between bursts and charges per inference.

  Cost: SSM Parameter (Standard Tier) is free. No SageMaker endpoint. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A fraud detection model receives inference requests only during
        business hours (09:00-18:00 weekdays). During nights and weekends the
        request rate is zero. Keeping a real-time endpoint running 24/7 wastes
        money on idle instance hours.
        REQUIREMENTS: Scale to zero between traffic bursts. Pay only per
        inference, not per idle hour. Tolerate a small cold-start latency when
        traffic resumes. Latency SLA is under 2 seconds for individual requests.
        OPTIONS: (a) real-time -- always-on instance, low latency, always billed
                 (b) serverless -- scales to zero, pay-per-inference, cold start
                 (c) async -- queue-based, for long-running inferences (minutes)
                 (d) batch-transform -- offline bulk scoring, no live endpoint
        QUESTION: Which SageMaker endpoint type meets all requirements?
        Submit the type name (lowercase hyphenated) as TC{type-name}.
      Description: !Sub "TenkaCloud mla-sagemaker-serverless-endpoint briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the SageMaker endpoint type scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to this SSM Parameter.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/${NamePrefix}/briefing/description?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag for the SageMaker endpoint type for intermittent spiky traffic.
    Value: "TC{serverless}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
