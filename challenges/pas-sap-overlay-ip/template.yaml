AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (pas-sap-overlay-ip). PAS-C01 SAP HANA HA drill.
  Deploys a single SSM Parameter describing a 2-node HANA HSR setup across
  two AZs with a virtual IP (10.99.0.1) outside the VPC CIDR. Normal AWS VPC
  routing cannot span AZ boundaries for a secondary-subnet IP. The player
  identifies 'overlay IP routing' (custom VPC route + Pacemaker update) as
  the AWS SAP on AWS recommended solution. The answer lives only in a CFn
  Output the participant role cannot read.

  Cost: SSM Parameter and IAM Role are free. No EC2 or SAP workload. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # HA architecture with cross-AZ virtual IP routing problem and four candidate
  # techniques. The correct answer (overlay-ip) is NOT stated here; it lives
  # only in the AnswerFlag Output below.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: |
        === TenkaCloud PAS Challenge: SAP HANA Cross-AZ Virtual IP Failover ===

        HA ARCHITECTURE OVERVIEW
        -------------------------
        System           : SAP HANA 2.0 SPS07 + S/4HANA 2023
        Topology         : 2-node HANA System Replication (HSR), Tier-1 SYNC
        Failover manager : Linux Pacemaker 2.1.5 + SAPHanaSR resource agent

        NODE PLACEMENT
        ---------------
        Role       | Instance         | AZ              | Subnet
        -----------|------------------|-----------------|-------------------
        Primary    | u-12tb1.metal-1  | ap-northeast-1a | 10.0.1.0/24
        Secondary  | u-12tb1.metal-2  | ap-northeast-1c | 10.0.3.0/24

        VPC CIDR   : 10.0.0.0/16
        Virtual IP : 10.99.0.1       <-- NOTE: outside the VPC CIDR

        WHY IS THE VIRTUAL IP OUTSIDE THE VPC CIDR?
        ---------------------------------------------
        SAP application servers (ABAP stacks on r7i.48xlarge instances in both
        AZs) connect to the HANA DB using a single, stable virtual IP address:
        10.99.0.1:30013. They must not be reconfigured when HANA fails over.

        In a traditional on-premises environment, the virtual IP is moved from
        the failed node to the surviving node at layer 2 (same broadcast domain).
        In AWS VPC, each subnet is a separate L2 domain. You cannot move an IP
        address from one subnet to another within VPC routing rules.

        THE PROBLEM
        -----------
        Normal VPC route for 10.99.0.1:
          Route entry: NONE -- this IP is not in any VPC subnet CIDR.
          Result     : Packets to 10.99.0.1 are DROPPED by VPC router.

        After failover, if 10.99.0.1 is configured on the Secondary in AZ-1c,
        the SAP app servers in AZ-1a cannot reach it because standard VPC
        routing has no route for 10.99.0.1 to AZ-1c.

        CANDIDATE SOLUTIONS
        --------------------
        A. elastic-ip          : Elastic IP addresses are public IPv4 IPs.
                                 Can be re-associated between EC2 instances.
                                 BUT: SAP HANA DB traffic must stay PRIVATE
                                 (no public IP on the DB tier). EIPs do not
                                 help for private virtual IP failover.

        B. overlay-ip          : AWS SAP on AWS recommended technique.
                                 1. Choose a virtual IP outside all VPC CIDRs
                                    (e.g., 10.99.0.1/32 from a dedicated range).
                                 2. Add a custom route in the VPC route table:
                                    Destination: 10.99.0.1/32 → Target: eni-PRIMARY
                                 3. During failover, Pacemaker (via AWS CLI +
                                    IAM role) updates the route:
                                    Destination: 10.99.0.1/32 → Target: eni-SECONDARY
                                 4. SAP app servers keep connecting to 10.99.0.1;
                                    the VPC router silently redirects to the new node.
                                 Takeover: < 60 seconds. No SAP reconfiguration needed.

        C. route53-health-check: DNS failover using a Route 53 private hosted
                                 zone record. App servers use a DNS name.
                                 SAP HANA requires a STABLE IP in the configuration
                                 (db_host in hdbuserstore). DNS TTL-based failover
                                 is too slow (minutes) and SAP connections do not
                                 re-resolve DNS mid-session.

        D. transit-gateway     : AWS Transit Gateway routes traffic between VPCs
                                 and on-premises networks. Not used for intra-VPC
                                 virtual IP failover within a single VPC.

        QUESTION
        --------
        Which technique (A/B/C/D) enables SAP HANA cross-AZ virtual IP failover
        within a single AWS VPC by placing the IP outside all subnet CIDRs and
        updating a custom VPC route table entry via Pacemaker on takeover?

        Submit your answer as TC{<technique>}  e.g.  TC{elastic-ip}
      Description: !Sub "TenkaCloud pas-sap-overlay-ip briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks.
  AnswerFlag:
    Description: Flag the learner submits after identifying the cross-AZ virtual IP technique.
    Value: "TC{overlay-ip}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
