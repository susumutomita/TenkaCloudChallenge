# Local-play problem stack for wp-midnight-admin.
#
# A REAL WordPress + MariaDB, run in an isolated environment for teaching. The
# problem is NOT vulnerable code — it is an incident-response scenario: an
# administrator account nobody added appeared overnight, and the player
# reconstructs WHO, HOW, and WHAT they left behind from four externally observable
# signals (no login, no exploit). Everything is bound to 127.0.0.1 only and never
# leaves the box.
#
# Services:
#   db          real MariaDB (dummy data only)
#   wordpress   real WordPress (Apache). A wrapper entrypoint plants the two file
#               signals (a served access log, an abandoned plugin readme) and enables
#               the WordPress rewrite before Apache starts, so the investigation
#               surface exists the moment the site is reachable.
#   wpinit       one-shot WP-CLI: installs WordPress, seeds content, and plants the
#               two WordPress-content signals (the rogue admin and the spam post).
#   verify      loopback /verify the TenkaCloud scorer delegates to.
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root-not-secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: "5s"
      timeout: "5s"
      retries: 30
    restart: "no"

  wordpress:
    build:
      context: ./wordpress
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      # Per-deploy random secret injected by `make local`; the four checkpoint
      # flags are derived from it inside the container.
      FLAG_SEED: "${FLAG_SEED:-local-dev-seed}"
    volumes:
      - wp_data:/var/www/html
    ports:
      - "127.0.0.1:18080:80" # WordPress site (challenge surface)
    healthcheck:
      # Ready = Apache is serving AND the two file signals this problem plants are
      # reachable AND the REST root answers (routed into index.php by the rewrite;
      # before wpinit installs WordPress it redirects to the install page, which is
      # still a non-false read). The wpinit-created signals (the rogue admin's REST
      # entry and the spam post) appear after the one-shot wpinit finishes, so the
      # healthcheck deliberately does NOT depend on them.
      test:
        [
          "CMD",
          "php",
          "-r",
          "exit((@file_get_contents('http://127.0.0.1/server-logs/access.log')!==false&&@file_get_contents('http://127.0.0.1/wp-content/plugins/legacy-contact-form/readme.txt')!==false&&@file_get_contents('http://127.0.0.1/wp-json/')!==false)?0:1);",
        ]
      interval: "5s"
      timeout: "5s"
      retries: 40
    restart: "no"

  wpinit:
    image: wordpress:cli-php8.3
    # Match the debian WordPress image's www-data uid so WP-CLI can use the shared
    # docroot volume and its generated wp-config.php.
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    environment:
      # wp-config.php resolves these from the loading process's env (getenv_docker),
      # so WP-CLI needs the same DB settings as the wordpress service or it falls
      # back to host "mysql" and cannot connect.
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      FLAG_SEED: "${FLAG_SEED:-local-dev-seed}"
    volumes:
      - wp_data:/var/www/html
      - ./wpinit/init.sh:/usr/local/bin/init.sh:ro
    entrypoint: ["sh", "/usr/local/bin/init.sh"]
    restart: "no"

  verify:
    build:
      context: ./verify
      dockerfile: Dockerfile
    environment:
      FLAG_SEED: "${FLAG_SEED:-local-dev-seed}"
    ports:
      - "127.0.0.1:18081:8081" # loopback /verify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: "3s"
      timeout: "3s"
      retries: 20
    restart: "no"

volumes:
  db_data:
  wp_data:
