AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (scs-s3-deny-insecure-transport). SCS-C02 S3 bucket policy drill.
  Deploys one S3 bucket with a bucket policy that Denies all requests where the
  aws:SecureTransport condition is false (i.e., non-TLS / HTTP requests). The learner
  must read the bucket policy and identify the condition key that enforces TLS-only
  access. The answer is mirrored only in a CFn Output the participant role cannot read.

  Cost: S3 bucket (empty) and SSM Parameter are free. No objects uploaded. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allow reading the bucket policy. s3:GetBucketPolicy scoped to the
              # deployed bucket ARN. Also allow listing all buckets so the player
              # can find the bucket name.
              # No cloudformation:DescribeStacks -- the answer must be derived
              # from reading the policy JSON, not from the stack Output.
              - Sid: ReadBucketPolicy
                Effect: Allow
                Action:
                  - s3:GetBucketPolicy
                Resource: !Sub "arn:aws:s3:::${AuditBucket}"
              - Sid: ListAllBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # S3 bucket with no objects. PublicAccessBlock is fully enabled for safety.
  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${NamePrefix}-tls-audit"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Bucket policy with a Deny statement when aws:SecureTransport is false
  # (i.e., the request is over HTTP rather than HTTPS/TLS).
  # This is the S3 security best practice for enforcing encryption in transit.
  AuditBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref AuditBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: DenyInsecureTransport
            Effect: Deny
            Principal: "*"
            Action: "s3:*"
            Resource:
              - !Sub "arn:aws:s3:::${AuditBucket}"
              - !Sub "arn:aws:s3:::${AuditBucket}/*"
            Condition:
              Bool:
                aws:SecureTransport: "false"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Examine the bucket policy on the S3 bucket "${NamePrefix}-tls-audit".
        Find the Deny statement and read its Condition block. Which condition key
        is used to enforce TLS-only (HTTPS) access? Submit the condition key name
        exactly as it appears in the policy, as TC{<key>}.
        Example format: TC{<condition-key>}, e.g. TC{aws:SourceIp}.
      Description: !Sub "TenkaCloud scs-s3-deny-insecure-transport briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BucketName:
    Description: The S3 bucket whose policy enforces TLS.
    Value: !Ref AuditBucket
  S3ConsoleUrl:
    Description: AWS Console deep link to the S3 bucket permissions tab.
    Value: !Sub "https://s3.console.aws.amazon.com/s3/buckets/${AuditBucket}?tab=permissions"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after identifying the TLS-enforcing condition key.
    Value: "TC{aws:SecureTransport}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
