AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-ec2-recover-alarm). SOA-C02 EC2 recovery drill.
  Deploys one CloudWatch alarm on the StatusCheckFailed_System metric with an
  EC2 recover AlarmAction. No EC2 instance is deployed -- the alarm sits in
  INSUFFICIENT_DATA state, which is fine for a read-only analysis drill.
  The answer (the metric name) is mirrored only in a CFn Output the participant
  role cannot read; players derive it from the alarm configuration.

  Cost: CloudWatch alarm (standard resolution, free tier up to 10) and SSM
  Parameter are free. No EC2 instance, NAT Gateway, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # cloudwatch:DescribeAlarms does not support resource-level tag
              # scoping, so we grant on * -- player can enumerate the alarm.
              # Deliberately NO cloudformation:DescribeStacks.
              - Sid: ConsoleListAlarms
                Effect: Allow
                Action:
                  - cloudwatch:DescribeAlarms
                  - cloudwatch:DescribeAlarmsForMetric
                  - cloudwatch:ListMetrics
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # CloudWatch alarm on StatusCheckFailed_System with an EC2 recover action.
  # No instance is needed -- the alarm enters INSUFFICIENT_DATA (0 cost).
  # The ec2:recover-instance automate ARN is the AlarmAction that matters.
  RecoverAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${NamePrefix}-ec2-recover"
      AlarmDescription: !Sub "Auto-recover alarm for ${NamePrefix} -- which metric triggers this?"
      MetricName: StatusCheckFailed_System
      Namespace: AWS/EC2
      Statistic: Minimum
      Period: 60
      EvaluationPeriods: 2
      Threshold: 1
      ComparisonOperator: GreaterThanOrEqualToThreshold
      Dimensions:
        - Name: InstanceId
          Value: !Sub "${NamePrefix}-placeholder"
      TreatMissingData: notBreaching
      AlarmActions:
        - !Sub "arn:aws:automate:${AWS::Region}:ec2:recover"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        A CloudWatch alarm with an EC2 automatic recover action has been
        deployed. Find the alarm whose name starts with your NamePrefix and
        identify the MetricName it monitors. EC2 automatic recovery fires on
        a specific status-check metric -- which one? Submit the MetricName
        exactly as it appears (CamelCase with an underscore) as TC{<MetricName>},
        e.g. TC{StatusCheckFailed_Instance}.
      Description: !Sub "TenkaCloud soa-ec2-recover-alarm briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  AlarmName:
    Description: The CloudWatch alarm with the recover action.
    Value: !Ref RecoverAlarm
  AlarmConsoleUrl:
    Description: AWS Console deep link to the CloudWatch Alarms view.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/cloudwatch/home?region=${AWS::Region}#alarmsV2:"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, used by the scoring engine only. No DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the recovery trigger metric.
    Value: "TC{StatusCheckFailed_System}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
