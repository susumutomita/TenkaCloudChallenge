AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (saa-cloudfront-oac). SAA-C03 Origin Access Control
  identification drill. Deploys a private S3 bucket (PublicAccessBlock all
  true) with a bucket policy that grants s3:GetObject to the
  cloudfront.amazonaws.com service principal scoped by AWS:SourceArn. The
  learner inspects the bucket policy and names the modern CloudFront feature
  (OAC -- Origin Access Control) that replaces OAI. The answer lives only in
  a CFn Output the participant role cannot read.

  Cost: S3 bucket (empty) and bucket policy are free. No CloudFront
  distribution (which would cost) is deployed -- only the bucket-policy
  pattern is demonstrated. No objects uploaded. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # S3 bucket-policy and public-access-block inspection, scoped to
              # this team's bucket by name prefix. s3:GetBucketPolicy and
              # s3:GetBucketPublicAccessBlock let the player read the policy.
              - Sid: ReadBucketPolicy
                Effect: Allow
                Action:
                  - s3:GetBucketPolicy
                  - s3:GetBucketPublicAccessBlock
                Resource: !Sub "arn:aws:s3:::${NamePrefix}-content"
              # s3:ListAllMyBuckets does not accept resource-level ARNs.
              - Sid: ListBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Private content bucket. All public access blocked.
  # No objects are uploaded -- the bucket itself costs nothing.
  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${NamePrefix}-content"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  # Bucket policy: allows only the CloudFront service principal to call
  # s3:GetObject, conditioned on a specific distribution ARN (placeholder).
  # This is the canonical OAC bucket-policy pattern introduced in 2022 to
  # replace OAI. The learner reads this policy and names the feature.
  # NOTE: The distribution ARN is a placeholder (no real distribution is
  # deployed in this free-tier drill). The policy itself is the evidence.
  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ContentBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontServicePrincipal
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${NamePrefix}-content/*"
            Condition:
              ArnLike:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/PLACEHOLDER_DISTRIBUTION_ID"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Kato-san's S3 bucket was left publicly accessible. It has now been
        locked down: bucket name ${NamePrefix}-content, PublicAccessBlock all
        true, and a bucket policy that allows s3:GetObject only to the
        cloudfront.amazonaws.com service principal with an AWS:SourceArn
        condition scoped to a specific CloudFront distribution ARN. Inspect
        the bucket policy (aws s3api get-bucket-policy --bucket
        ${NamePrefix}-content) and identify the modern CloudFront feature
        (successor to OAI -- Origin Access Identity) that this policy pattern
        implements. Submit as TC{<feature-name>}, e.g.
        TC{origin-access-identity}.
      Description: !Sub "TenkaCloud saa-cloudfront-oac briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  ContentBucketName:
    Description: The private S3 bucket whose policy the player inspects.
    Value: !Ref ContentBucket
  S3ConsoleUrl:
    Description: AWS Console deep link to the S3 bucket permissions tab.
    Value: !Sub "https://s3.console.aws.amazon.com/s3/buckets/${NamePrefix}-content?region=${AWS::Region}&tab=permissions"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. The participant role has no
  # cloudformation:DescribeStacks, so this output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying OAC from the bucket policy.
    Value: "TC{origin-access-control}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
