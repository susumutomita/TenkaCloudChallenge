AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (ans-peering-nontransitive). ANS-C01 peering drill.
  Deploys three VPCs (10.40.0.0/16, 10.41.0.0/16, 10.42.0.0/16) and two
  same-account VPC peering connections (VPC-A<->VPC-B and VPC-B<->VPC-C).
  No EC2 instances, NAT Gateways, or EIPs are created (free resources only).
  The learner inspects the peering topology and determines that VPC-A cannot
  reach VPC-C because VPC peering is non-transitive.
  The answer (TC{no}) lives only in the CFn Output -- the participant role
  has no cloudformation:DescribeStacks.

  Cost: VPC / peering connections / SSM Parameter are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this
      value automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ec2:Describe* does not accept resource-level ARNs; tag-scoped
              # so only this team's tagged VPCs / peering connections are shown.
              # Deliberately NO cloudformation:DescribeStacks.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # VPC-A: 10.40.0.0/16
  VpcA:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.40.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc-a"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # VPC-B: 10.41.0.0/16 (the hub -- peered to both A and C)
  VpcB:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.41.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc-b"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # VPC-C: 10.42.0.0/16
  VpcC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.42.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc-c"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Peering: VPC-A <-> VPC-B (same account, auto-accepted)
  PeeringAB:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref VpcA
      PeerVpcId: !Ref VpcB
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-peering-a-b"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Peering: VPC-B <-> VPC-C (same account, auto-accepted)
  PeeringBC:
    Type: AWS::EC2::VPCPeeringConnection
    Properties:
      VpcId: !Ref VpcB
      PeerVpcId: !Ref VpcC
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-peering-b-c"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
  # NOTE: There is NO direct peering between VPC-A and VPC-C.
  # VPC peering is non-transitive: A<->B and B<->C does NOT give A<->C.

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: Three VPCs are deployed in this account:
        VPC-A (10.40.0.0/16), VPC-B (10.41.0.0/16), VPC-C (10.42.0.0/16).
        Two VPC peering connections exist: VPC-A<->VPC-B and VPC-B<->VPC-C.
        QUESTION: Can VPC-A communicate directly with VPC-C?
        Use the Console (VPC > Peering connections) or
        `aws ec2 describe-vpc-peering-connections` to inspect the topology.
        Remember: VPC peering is NON-TRANSITIVE. A<->B and B<->C do NOT
        imply A<->C unless a direct A<->C peering exists.
        Submit TC{yes} if A can reach C, or TC{no} if it cannot.
      Description: !Sub "TenkaCloud ans-peering-nontransitive briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  VpcAId:
    Description: VPC-A identifier.
    Value: !Ref VpcA
  VpcBId:
    Description: VPC-B identifier.
    Value: !Ref VpcB
  VpcCId:
    Description: VPC-C identifier.
    Value: !Ref VpcC
  PeeringConsoleUrl:
    Description: AWS Console deep link to the VPC Peering Connections view.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/vpcconsole/home?region=${AWS::Region}#PeeringConnections:"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer: VPC peering is non-transitive, so A cannot reach C.
  # The participant role has no cloudformation:DescribeStacks.
  AnswerFlag:
    Description: Flag the learner submits after analyzing the peering topology.
    Value: "TC{no}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
