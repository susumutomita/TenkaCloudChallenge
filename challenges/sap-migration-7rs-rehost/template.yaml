AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (sap-migration-7rs-rehost). SAP-C02 migration strategy
  (7 Rs) drill. Stores a scenario in SSM describing a Java app that must be
  moved to EC2 with no code changes (lift-and-shift). The player reads the
  scenario and the 7 Rs definitions, then identifies "Rehost" as the correct
  strategy. No billable AWS resources are deployed.

  Cost: SSM Parameters and IAM roles are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: TenkaCloud's core Java application runs on on-premises VMs.
        REQUIREMENTS: zero code changes; carry the OS, middleware, and
        application binary as-is onto Amazon EC2; minimize migration time;
        managed service adoption is deferred to a later phase.
        7 Rs REFERENCE: Retire=decommission; Retain=keep on-prem;
        Rehost=move to EC2 as-is (lift-and-shift, no code change);
        Replatform=minor optimization e.g. move DB to RDS without code change;
        Repurchase=switch to SaaS; Refactor/Re-architect=redesign for cloud-native;
        Relocate=move VMware VMs to VMware Cloud on AWS.
        DECOYS: Replatform involves some optimization; Refactor requires
        code changes; Relocate is VMware-specific.
        QUESTION: Which of the 7 Rs describes moving the app to EC2 with no
        code changes? Submit as TC{strategy-name} e.g. TC{replatform}.
      Description: !Sub "TenkaCloud sap-migration-7rs-rehost briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the migration scenario and 7 Rs definitions.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag identifying the correct migration strategy (Rehost).
    Value: "TC{rehost}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
