AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (sap-control-tower-guardrails). SAP-C02 multi-account
  governance drill. Stores a scenario in SSM: TenkaCloud needs to create 100+
  accounts with a security-baseline landing zone, preventive guardrails (SCP),
  detective guardrails (Config rules), and Account Factory. The player
  identifies AWS Control Tower as the service that integrates all of these.
  Control Tower incurs costs and is NOT deployed; scenario is data.

  Cost: SSM Parameters and IAM roles are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: TenkaCloud is creating 100+ AWS accounts for new business
        units. REQUIREMENTS: (1) landing zone -- every new account gets a
        security-baseline environment (CloudTrail, GuardDuty, Config, IAM
        Password Policy) provisioned automatically on creation; (2) preventive
        guardrails -- use SCPs to block actions like disabling CloudTrail or
        creating IAM users without MFA; (3) detective guardrails -- use AWS
        Config rules to detect non-compliant resources and alert; (4) Account
        Factory -- provision new accounts from a standard template without
        manual steps.
        OPTIONS: AWS Organizations alone = account management + SCPs, but no
        landing zone automation or Account Factory; AWS Config = detective
        compliance rules but no account provisioning; AWS Service Catalog =
        product catalog but no multi-account guardrail framework;
        AWS Control Tower = opinionated governance layer on top of Organizations
        that provisions a landing zone, applies preventive guardrails (SCP) and
        detective guardrails (Config rules), and includes an Account Factory for
        standardized account vending.
        QUESTION: Which AWS service provides a multi-account landing zone with
        preventive and detective guardrails and an Account Factory in a single
        managed service? Submit as TC{service-name} e.g. TC{organizations}.
      Description: !Sub "TenkaCloud sap-control-tower-guardrails briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Control Tower scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag identifying the multi-account governance service with guardrails.
    Value: "TC{control-tower}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
