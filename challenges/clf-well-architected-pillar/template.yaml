AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clf-well-architected-pillar). CLF-C02 Well-Architected
  Framework pillar identification drill. Deploys one SSM String parameter
  describing a design decision (right-sizing instances and deleting idle
  resources) with four candidate pillars as decoys. The player must identify
  the Cost Optimization pillar. The answer is stored only in a CFn Output the
  participant role cannot read; players derive it from the framework knowledge.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: AWS Well-Architected Framework Pillar Identification.
        Read the design decision below and identify which Well-Architected pillar
        it primarily aligns with. Submit TC{pillar-name} in lowercase with hyphens.
        Example: TC{reliability}

        DESIGN DECISION UNDER REVIEW:
        During the quarterly infrastructure review, the team decided to:
        - Analyze CloudWatch metrics for all running EC2 instances
        - Right-size overprovisioned instances (e.g., move m5.2xlarge to m5.large
          where CPU utilization consistently stays below 10%)
        - Identify and terminate EC2 instances that have had zero CPU utilization
          for 30+ days (idle resources consuming budget with no business value)
        - Schedule non-production environments to shut down automatically outside
          business hours to avoid paying for unused capacity overnight

        PRIMARY MOTIVATION: Reduce monthly AWS spend by eliminating waste and
        ensuring each resource is sized to actual demand.

        CANDIDATE PILLARS (pick the ONE that best fits):
        A) reliability          -- fault tolerance, recovery, availability
        B) security             -- protecting data, IAM, encryption, compliance
        C) performance-efficiency -- optimizing for speed, throughput, latency
        D) cost-optimization    -- eliminating waste, right-sizing, spend reduction

        Submit the pillar name as TC{pillar-name}, e.g. TC{reliability}.
      Description: !Sub "TenkaCloud clf-well-architected-pillar briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the design decision briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct pillar.
    Value: "TC{cost-optimization}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
