AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dop-eventbridge-event-source). DOP-C02 event-driven CI/CD drill.
  Deploys an EventBridge rule whose EventPattern matches source "aws.codecommit"
  targeting an SNS topic. The learner reads the EventPattern source field and
  reports the event source. The answer is mirrored only in a CFn Output the
  participant role cannot read.

  Cost: EventBridge rule, SNS topic, and SSM parameter are all free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # events:DescribeRule and ListRules do not accept resource ARNs,
              # so they are granted on Resource:"*". Answer derived from
              # EventPattern.source, not from CFn Outputs.
              - Sid: EventBridgeReadRules
                Effect: Allow
                Action:
                  - events:DescribeRule
                  - events:ListRules
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # SNS topic used as the EventBridge rule target.
  NotificationTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${NamePrefix}-codecommit-notify"
      DisplayName: !Sub "TenkaCloud ${NamePrefix} CodeCommit event notifications"

  # EventBridge rule: fires on all CodeCommit events.
  # The learner must read EventPattern.source to find "aws.codecommit".
  CodeCommitEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${NamePrefix}-codecommit-events"
      Description: !Sub "TenkaCloud drill: fires on aws.codecommit events for ${NamePrefix}."
      EventPattern:
        source:
          - "aws.codecommit"
        detail-type:
          - "CodeCommit Repository State Change"
      State: ENABLED
      Targets:
        - Id: NotifyTopic
          Arn: !Ref NotificationTopic

  # Allow EventBridge to publish to the SNS topic.
  TopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref NotificationTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref NotificationTopic

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Inspect the EventBridge rule named ${NamePrefix}-codecommit-events.
        Run: aws events describe-rule --name ${NamePrefix}-codecommit-events
        Look at the EventPattern. What is the value in the "source" array?
        Replace dots with hyphens and submit as TC{aws-<service>}.
        Example: if source were ["aws.s3"] submit TC{aws-s3}.
      Description: !Sub "TenkaCloud dop-eventbridge-event-source briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  EventRuleName:
    Description: Name of the EventBridge rule to inspect.
    Value: !Ref CodeCommitEventRule
  EventBridgeConsoleUrl:
    Description: AWS Console deep link to the EventBridge Rules list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/events/home?region=${AWS::Region}#/rules"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks
  # granted to participant -- must be derived from EventPattern.source.
  AnswerFlag:
    Description: Flag the learner submits after reading the EventBridge event source.
    Value: "TC{aws-codecommit}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
