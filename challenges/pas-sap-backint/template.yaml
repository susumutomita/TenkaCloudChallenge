AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (pas-sap-backint). PAS-C01 SAP HANA backup drill.
  Deploys a single SSM Parameter with a BACKINT failure log and backup
  architecture comparison. The player identifies the 'AWS Backint Agent for
  SAP HANA' as the certified component that streams HANA backups to S3 via
  the BACKINT interface. The answer lives only in a CFn Output the participant
  role cannot read.

  Cost: SSM Parameter and IAM Role are free. No EC2 or SAP workload. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # BACKINT failure log and SAP HANA backup architecture options. The correct
  # answer (backint) is NOT stated here; it lives only in the AnswerFlag Output.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: |
        === TenkaCloud PAS Challenge: SAP HANA Backup to Amazon S3 ===

        ENVIRONMENT OVERVIEW
        ---------------------
        System           : SAP S/4HANA 2023 FPS02 (Production)
        HANA version     : SAP HANA 2.0 SPS07
        Instance type    : u-12tb1.metal  (448 vCPU, 12,288 GB RAM)
        OS               : SUSE Linux Enterprise Server 15 SP4
        Region           : ap-northeast-1 (Tokyo)
        Backup target    : s3://tenkacloud-hana-backup/prod/ (S3 Standard)
        Recovery time    : RPO <= 1h (hourly log backup), RTO <= 4h (full restore)

        BACKUP FAILURE LOG (from SAP HANA Studio)
        ------------------------------------------
        Execution context: BACKUP DATA USING BACKINT
        Timestamp        : 2025-11-14 03:12:44 JST

        2025-11-14 03:12:44.117 [INFO ] hdbbackint: Starting SAP HANA backup
        2025-11-14 03:12:44.182 [INFO ] BACKINT: Protocol version = 2
        2025-11-14 03:12:44.201 [INFO ] BACKINT: Agent version 1.2.24 loaded
        2025-11-14 03:12:44.215 [INFO ] BACKINT: Backup type = COMPLETE DATA BACKUP
        2025-11-14 03:12:44.280 [INFO ] BACKINT: Target URI = s3://tenkacloud-hana-backup/prod/
        2025-11-14 03:12:45.004 [ERROR] BACKINT: Agent configuration file not found:
                                         /hana/shared/HDB/global/hdb/opt/backintConfig.yaml
        2025-11-14 03:12:45.011 [ERROR] BACKINT: Backup aborted. Return code = 1.

        WHAT IS THE BACKINT INTERFACE?
        -------------------------------
        SAP HANA exposes a standardized backup API called the BACKINT Interface.
        Any certified third-party tool can register as a BACKINT agent. When a
        DBA runs "BACKUP DATA USING BACKINT", HANA pipes backup data to the
        registered agent, which is responsible for writing it to the external
        target (object storage, tape library, etc.).

        AWS SAP HANA BACKUP OPTIONS
        ----------------------------
        A. aws-backup          : AWS-native service that orchestrates backups via
                                 lifecycle policies. Supports EC2/RDS/DynamoDB/EFS/S3.
                                 For SAP HANA: does NOT natively understand HANA
                                 BACKINT protocol; can schedule EBS snapshots but
                                 cannot do application-consistent HANA backups at
                                 the database level.

        B. backint             : AWS Backint Agent for SAP HANA.
                                 A purpose-built, SAP-and-AWS co-certified agent that
                                 implements the BACKINT Interface v2.
                                 - Installed on the HANA host at /hana/shared/.../
                                 - Configured via backintConfig.yaml (AWS credentials,
                                   S3 bucket, parallelism, encryption)
                                 - Streams HANA data/log/catalog backups directly to S3
                                 - Supports multipart upload, SSE-KMS, lifecycle rules
                                 - Available as a free download from AWS

        C. storage-gateway     : AWS Storage Gateway (File Gateway mode).
                                 Presents an NFS mount point backed by S3.
                                 HANA can write files to the NFS mount; they are
                                 asynchronously uploaded to S3.
                                 NOT SAP-certified as a BACKINT agent; HANA sees it
                                 as a local filesystem, not as a BACKINT channel.

        D. data-provider-for-sap : Amazon Data Provider for SAP.
                                 A performance monitoring connector that feeds HANA
                                 and NetWeaver metrics into CloudWatch.
                                 Used for observability, NOT backup.

        QUESTION
        --------
        Which AWS component (A/B/C/D) is the SAP-and-AWS co-certified agent that
        implements the BACKINT Interface and streams SAP HANA backups directly
        to Amazon S3?

        Submit your answer as TC{<component>}  e.g.  TC{aws-backup}
      Description: !Sub "TenkaCloud pas-sap-backint briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks.
  AnswerFlag:
    Description: Flag the learner submits after identifying the SAP HANA backup component.
    Value: "TC{backint}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
