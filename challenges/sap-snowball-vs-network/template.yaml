AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (sap-snowball-vs-network). SAP-C02 data migration drill.
  Stores a scenario in SSM: 500 TB must be moved to AWS within days using a
  1 Gbps link. The player calculates the network transfer time (~47 days) and
  concludes that offline physical transfer (AWS Snowball) is necessary. The
  Snow family (Snowball / Snowcone / Snowmobile) concept is modeled as data;
  no actual Snowball order is placed (which would incur real cost).

  Cost: SSM Parameters and IAM roles are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: TenkaCloud must move 500 TB of data to AWS to close its
        data center. CONSTRAINTS: dedicated WAN bandwidth = 1 Gbps; deadline
        = within a few days. CALCULATION HINT: 500 TB = 500 x 1024 x 8 Gbit
        = 4,096,000 Gbit. At 1 Gbps that takes 4,096,000 seconds = approx
        47 days. The deadline cannot be met over the network.
        SERVICE OPTIONS: Direct Connect (10 Gbps dedicated link but still
        ~4.7 days minimum and requires provisioning time); AWS DataSync
        (accelerates network transfer but cannot beat physics);
        AWS Snowball Edge (80 TB per device, multiple devices in parallel,
        ship back to AWS -- delivers within days); AWS Snowmobile
        (100 PB truck, overkill for 500 TB); AWS Snowcone (14 TB, too small).
        DECOY: Direct Connect provisioning takes weeks, not days, even at
        higher bandwidth.
        QUESTION: Which AWS offline physical transfer service is the right
        choice to move 500 TB within the deadline? Submit as TC{service-name}
        e.g. TC{datasync}.
      Description: !Sub "TenkaCloud sap-snowball-vs-network briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the data migration scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag identifying the correct offline data transfer service.
    Value: "TC{snowball}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
