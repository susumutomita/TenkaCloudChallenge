AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (net-evo-04-tls). "History of the Internet" Ep04. The SSL
  to TLS 1.3 moment: making a transport-secure HTTPS handshake complete.

  The SSM-driven `app` reads a desired TLS server name from an SSM config
  parameter, generates a self-signed leaf cert with that name as the SAN at boot
  and on a 30s refresh loop, and serves TC{...} over HTTPS :443 at /flag. `relay`
  (SSM bastion) connects pinned to the FIXED hostname core.tenka.internal. Planted
  fault: the parameter holds the WRONG name, so the cert SAN mismatches and the
  handshake fails hostname verification. Every resource exists and the endpoint is
  up; only the TLS config is wrong. The learner corrects ONE SSM parameter with
  ssm:PutParameter (a settings change on an existing resource), the refresh loop
  re-issues the cert, the handshake succeeds, and the flag comes back. No new
  resources, no NAT, no EIP, no ACM cert; delete-stack removes everything.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).
  FlagSeed:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: >
      Per-deploy random secret injected by the deploy chain (cfnParameters:
      FlagSeed = __RANDOM_PASSWORD__). Wrapped as TC{...} and served by `app`
      over a valid TLS connection only.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for both relay and app.

Resources:
  # ----- VPC + single public subnet + IGW -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.40.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.40.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRt
      SubnetId: !Ref PublicSubnet

  # ----- Security Groups (CORRECT -- not the fault) -----
  RelaySg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-relay-sg"
      GroupDescription: Bastion relay. No inbound needed (SSM is outbound-only).
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Outbound to AWS APIs (SSM) and to app:443
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # `app` SG allows 443 from the relay SG. The transport reaches the listener;
  # the failure is purely in the TLS handshake, not in network reachability.
  AppSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-app-sg"
      GroupDescription: App node. HTTPS 443 from the relay security group.
      VpcId: !Ref Vpc
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          SourceSecurityGroupId: !Ref RelaySg
          Description: HTTPS 443 from the relay security group
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Outbound to AWS APIs (SSM Parameter Store, package mirror)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- SSM config parameters (THE PLANTED MISCONFIG lives in tls_server_name) --
  # `app` watches /${NamePrefix}/config/* and rebuilds its TLS endpoint from it.
  # tls_server_name ships WRONG (legacy.kato.example) -- it does not match the
  # name the relay verifies (core.tenka.internal), so the cert SAN is wrong and
  # the handshake fails hostname verification. The fix is ssm:PutParameter to the
  # correct value -- a settings change on this EXISTING parameter, not a new
  # top-level resource. delete-stack still cleans everything up.
  TlsServerNameParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/config/tls_server_name"
      Type: String
      Value: legacy.kato.example
      Description: !Sub "Desired TLS server name (cert SAN) the app issues for ${NamePrefix}."
      Tier: Standard

  # tls_min_version is a plausible-looking decoy knob. The app honours it, and the
  # shipped value (TLSv1.3) is already correct -- it is NOT the fault. Provided so
  # the learner exercises reading config before concluding the SAN is the problem.
  TlsMinVersionParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/config/tls_min_version"
      Type: String
      Value: TLSv1.3
      Description: !Sub "Minimum TLS protocol version the app enforces for ${NamePrefix}."
      Tier: Standard

  # ----- IAM: participant viewer (read + scoped SSM-parameter fix) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog).
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess;
      # do not remove (validated by scripts/validate-problems.ts).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # CloudShell baseline -- 7-action allow-list, Resource:* unavoidable
              # (environments are per-identity). Do not remove (validated).
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # ec2:Describe* doesn't accept resource ARNs; scope by tag instead.
              # Lets the learner read instances / SGs / subnets for THIS stack only.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeInstances
                Resource: "*"
              # The flag is baked into app's UserData. Block reading it back via
              # DescribeInstanceAttribute so the only path to the flag is fixing
              # the TLS config and curling app. Explicit Deny overrides any allow.
              - Sid: DenyUserDataReadback
                Effect: Deny
                Action:
                  - ec2:DescribeInstanceAttribute
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # THE FIX GRANT: read AND write the stack's own config parameters.
              # ssm:PutParameter on /${NamePrefix}/config/* is the "modify settings"
              # action the learner uses to correct tls_server_name -- not a new
              # top-level resource. delete-stack still owns and removes these
              # parameters, so PutParameter only mutates an existing value.
              - Sid: ReadFixOwnConfigParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                  - ssm:PutParameter
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/config/*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              # SSM Session Manager into the relay bastion (the vantage point from
              # which the TLS client connects). Account-scoped session document.
              - Sid: StartSessionToRelay
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${RelayInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              # Deliberately NO cloudformation:DescribeStacks -- the AnswerFlag
              # Output must not be readable; the flag is earned over valid TLS.

  # app and relay both need SSM core for Session Manager and Parameter Store reads.
  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: ReadOwnConfigParameters
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadConfig
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/${NamePrefix}/config/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- EC2: relay (public, SSM bastion + TLS client) -----
  RelayInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref RelaySg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-relay"
        - Key: TenkaCloud:Problem
          Value: net-evo-04-tls
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      # No CFn references in this UserData, so no Fn::Sub -- shell variables stay
      # literal and need no ${!var} escaping.
      UserData:
        Fn::Base64: |
          #!/bin/bash
          set -euxo pipefail
          dnf install -y openssl curl-minimal jq || dnf install -y openssl curl jq || true

          # The relay always verifies the FIXED expected hostname. This is the name
          # the cert SAN must match; it is documented in the README as the value to
          # write into the SSM tls_server_name parameter.
          mkdir -p /opt/relay
          echo "core.tenka.internal" > /opt/relay/expected_name.txt

          # Helper the learner runs from inside relay. It resolves app's private IP,
          # pins the connection to EXPECTED_NAME, and trusts only the stack CA that
          # app publishes. --fail means a SAN mismatch yields no flag.
          cat > /opt/relay/check_tls.sh <<'SH'
          #!/usr/bin/env bash
          set -uo pipefail
          EXPECTED_NAME="$(cat /opt/relay/expected_name.txt)"
          APP_IP="${1:-}"
          if [ -z "$APP_IP" ]; then
            echo "usage: check_tls.sh <app-private-ip>" >&2
            echo "find it with: aws ec2 describe-instances ... (look for the -app host)" >&2
            exit 2
          fi
          # Fetch the app's published CA so we verify its self-signed leaf properly.
          if ! curl -fsS --max-time 5 "http://$APP_IP:8080/ca.pem" -o /opt/relay/app-ca.pem; then
            echo "could not fetch the app CA over the plaintext bootstrap port" >&2
            exit 3
          fi
          echo "== TLS handshake to https://$EXPECTED_NAME/flag (resolving to $APP_IP) =="
          curl -v --fail --max-time 8 \
            --cacert /opt/relay/app-ca.pem \
            --resolve "$EXPECTED_NAME:443:$APP_IP" \
            "https://$EXPECTED_NAME/flag"
          SH
          chmod +x /opt/relay/check_tls.sh

          cat > /etc/motd <<'MOTD'
          TenkaCloud net-evo-04-tls -- relay bastion
          You verify the FIXED hostname: core.tenka.internal
          Try:  /opt/relay/check_tls.sh <app-private-ip>
          It will FAIL hostname verification until the cert SAN matches.
          MOTD

  # ----- EC2: app (private, SSM-driven self-signed TLS endpoint serving the flag) -
  AppInstance:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref AppSg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:Problem
          Value: net-evo-04-tls
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf install -y openssl awscli jq || dnf install -y openssl aws-cli jq || true

          mkdir -p /opt/app/tls
          printf 'TC{%s}\n' '${FlagSeed}' > /opt/app/flag.txt
          chmod 600 /opt/app/flag.txt

          cat > /opt/app/runtime.env <<ENV
          AWS_REGION=${AWS::Region}
          PARAM_SERVER_NAME=/${NamePrefix}/config/tls_server_name
          PARAM_MIN_VERSION=/${NamePrefix}/config/tls_min_version
          ENV

          # Stable self-signed CA for the stack. The relay trusts it via /ca.pem, so
          # only the leaf's SAN (driven by SSM) decides whether the handshake passes.
          if [ ! -f /opt/app/tls/ca.pem ]; then
            openssl req -x509 -newkey rsa:2048 -nodes \
              -keyout /opt/app/tls/ca.key -out /opt/app/tls/ca.pem \
              -days 3650 -subj "/CN=TenkaCloud net-evo-04 Stack CA"
          fi

          # The TLS server: re-reads the desired SAN from SSM on every refresh tick,
          # re-issues the leaf cert if the SAN changed, and serves /flag over HTTPS.
          cat > /opt/app/tls_server.py <<'PY'
          import http.server
          import os
          import ssl
          import subprocess
          import threading
          import time

          RUNTIME_ENV = "/opt/app/runtime.env"
          TLS_DIR = "/opt/app/tls"
          CA_CERT = os.path.join(TLS_DIR, "ca.pem")
          CA_KEY = os.path.join(TLS_DIR, "ca.key")
          LEAF_CERT = os.path.join(TLS_DIR, "leaf.pem")
          LEAF_KEY = os.path.join(TLS_DIR, "leaf.key")
          STATE_FILE = os.path.join(TLS_DIR, "issued_for.txt")

          with open("/opt/app/flag.txt") as fh:
              FLAG = fh.read().strip()

          MIN_VERSION_MAP = {
              "TLSv1.2": ssl.TLSVersion.TLSv1_2,
              "TLSv1.3": ssl.TLSVersion.TLSv1_3,
          }

          def load_env():
              env = {}
              with open(RUNTIME_ENV) as fh:
                  for line in fh:
                      line = line.strip()
                      if "=" in line and not line.startswith("#"):
                          key, value = line.split("=", 1)
                          env[key] = value
              return env

          ENV = load_env()
          REGION = ENV.get("AWS_REGION", "")
          PARAM_SERVER_NAME = ENV.get("PARAM_SERVER_NAME", "")
          PARAM_MIN_VERSION = ENV.get("PARAM_MIN_VERSION", "")

          def ssm_get(name, default=""):
              if not name:
                  return default
              result = subprocess.run(
                  ["aws", "ssm", "get-parameter", "--name", name,
                   "--region", REGION, "--query", "Parameter.Value", "--output", "text"],
                  stdout=subprocess.PIPE, stderr=subprocess.PIPE, text=True, timeout=8,
              )
              if result.returncode != 0:
                  return default
              return result.stdout.strip()

          def issue_leaf(server_name):
              # Re-issue the leaf cert with the requested name as CN + SAN, signed by
              # the stack CA. The SAN is exactly what the relay's hostname check uses.
              ext = os.path.join(TLS_DIR, "leaf.ext")
              with open(ext, "w") as fh:
                  fh.write(
                      "subjectAltName=DNS:%s\n"
                      "basicConstraints=CA:FALSE\n"
                      "keyUsage=digitalSignature,keyEncipherment\n"
                      "extendedKeyUsage=serverAuth\n" % server_name
                  )
              subprocess.run(
                  ["openssl", "req", "-newkey", "rsa:2048", "-nodes",
                   "-keyout", LEAF_KEY, "-out", os.path.join(TLS_DIR, "leaf.csr"),
                   "-subj", "/CN=%s" % server_name],
                  check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL,
              )
              subprocess.run(
                  ["openssl", "x509", "-req", "-in", os.path.join(TLS_DIR, "leaf.csr"),
                   "-CA", CA_CERT, "-CAkey", CA_KEY, "-CAcreateserial",
                   "-out", LEAF_CERT, "-days", "825", "-extfile", ext],
                  check=True, stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL,
              )
              with open(STATE_FILE, "w") as fh:
                  fh.write(server_name)

          def current_issued_for():
              try:
                  with open(STATE_FILE) as fh:
                      return fh.read().strip()
              except FileNotFoundError:
                  return None

          def reconcile():
              desired = ssm_get(PARAM_SERVER_NAME) or "invalid.local"
              if desired != current_issued_for():
                  issue_leaf(desired)
                  HTTPSState.reload = True

          class HTTPSState:
              reload = False
              context = None
              min_version = ssl.TLSVersion.TLSv1_3

          def build_context():
              min_ver_name = ssm_get(PARAM_MIN_VERSION, "TLSv1.3")
              min_ver = MIN_VERSION_MAP.get(min_ver_name, ssl.TLSVersion.TLSv1_3)
              ctx = ssl.SSLContext(ssl.PROTOCOL_TLS_SERVER)
              ctx.minimum_version = min_ver
              ctx.load_cert_chain(certfile=LEAF_CERT, keyfile=LEAF_KEY)
              HTTPSState.min_version = min_ver
              return ctx

          class FlagHandler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/flag":
                      body = (
                          "app node -- TenkaCloud net-evo-04\n"
                          "your TLS handshake completed and the SAN matched. nice.\n"
                          "flag: " + FLAG + "\n"
                      ).encode()
                  elif self.path == "/healthz":
                      body = b"ok\n"
                  else:
                      body = b"net-evo-04 app: try /flag over a valid TLS connection\n"
                  self.send_response(200)
                  self.send_header("Content-Type", "text/plain")
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, *args):
                  return

          # Plaintext bootstrap server (:8080): publishes the stack CA so the relay
          # can verify the leaf. It NEVER serves the flag -- the flag is HTTPS-only.
          class BootstrapHandler(http.server.BaseHTTPRequestHandler):
              def do_GET(self):
                  if self.path == "/ca.pem":
                      with open(CA_CERT, "rb") as fh:
                          body = fh.read()
                      ctype = "application/x-pem-file"
                  else:
                      body = b"net-evo-04 bootstrap: GET /ca.pem for the stack CA\n"
                      ctype = "text/plain"
                  self.send_response(200)
                  self.send_header("Content-Type", ctype)
                  self.send_header("Content-Length", str(len(body)))
                  self.end_headers()
                  self.wfile.write(body)

              def log_message(self, *args):
                  return

          def serve_bootstrap():
              http.server.HTTPServer(("0.0.0.0", 8080), BootstrapHandler).serve_forever()

          def refresh_loop():
              while True:
                  try:
                      reconcile()
                  except Exception:
                      pass
                  time.sleep(30)

          def main():
              reconcile()
              HTTPSState.context = build_context()
              threading.Thread(target=serve_bootstrap, daemon=True).start()
              threading.Thread(target=refresh_loop, daemon=True).start()
              while True:
                  httpd = http.server.HTTPServer(("0.0.0.0", 443), FlagHandler)
                  httpd.socket = HTTPSState.context.wrap_socket(httpd.socket, server_side=True)
                  HTTPSState.reload = False
                  # Serve until the refresh loop re-issues the cert, then rebuild the
                  # context and re-wrap the socket so the new SAN takes effect.
                  httpd.timeout = 5
                  while not HTTPSState.reload:
                      httpd.handle_request()
                  httpd.server_close()
                  HTTPSState.context = build_context()

          if __name__ == "__main__":
              main()
          PY

          cat > /etc/systemd/system/net-evo-04-app.service <<'UNIT'
          [Unit]
          Description=TenkaCloud net-evo-04 SSM-driven TLS app
          After=network-online.target
          Wants=network-online.target

          [Service]
          ExecStart=/usr/bin/python3 /opt/app/tls_server.py
          Restart=always
          RestartSec=3
          User=root

          [Install]
          WantedBy=multi-user.target
          UNIT

          systemctl daemon-reload
          systemctl enable --now net-evo-04-app.service

  # ----- Briefing -----
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        relay (public, SSM-reachable) connects to app over HTTPS :443 verifying the
        FIXED hostname core.tenka.internal, but the TLS handshake FAILS. The app
        builds its certificate from the SSM parameter
        /${NamePrefix}/config/tls_server_name, which currently holds the WRONG name
        -- so the cert SAN does not match and hostname verification fails. Read the
        config, correct tls_server_name with ssm:PutParameter (no new resources),
        wait for the app's 30s refresh to re-issue the cert, then run
        /opt/relay/check_tls.sh from relay to read the flag TC{...} over a valid TLS
        connection and submit it.
      Description: !Sub "TenkaCloud net-evo-04-tls briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  VpcId:
    Description: The VPC under repair.
    Value: !Ref Vpc
  RelayInstanceId:
    Description: Bastion instance ID -- connect with `aws ssm start-session --target <this>`.
    Value: !Ref RelayInstance
  AppPrivateIp:
    Description: Private IP of the app node (also discoverable via ec2:DescribeInstances).
    Value: !GetAtt AppInstance.PrivateIp
  TlsServerNameParameterName:
    Description: SSM parameter holding the desired cert SAN (the value to correct).
    Value: !Ref TlsServerNameParameter
  ExpectedTlsServerName:
    Description: The fixed hostname the relay verifies -- write THIS into tls_server_name.
    Value: core.tenka.internal
  SsmStartSessionCommand:
    Description: Connect to relay via Session Manager.
    Value: !Sub "aws ssm start-session --target ${RelayInstance}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after a valid TLS handshake returns it.
    Value: !Sub "TC{${FlagSeed}}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
