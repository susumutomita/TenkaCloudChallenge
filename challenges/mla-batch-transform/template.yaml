AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (mla-batch-transform). MLA-C01 Batch Transform drill.
  Models a SageMaker inference mode selection scenario via an SSM Parameter.
  SageMaker is NOT deployed. The player reads the scenario and selects Batch
  Transform as the mode for scoring 10M records nightly with no latency
  requirement and no persistent endpoint (vs real-time endpoint).

  Cost: SSM Parameter (Standard Tier) is free. No SageMaker resources. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A customer churn prediction model must score 10 million
        customer records every night (22:00-04:00). Requirements: no real-time
        latency SLA (batch window of up to 6 hours is fine), results stored in
        S3 for the CRM team to read the next morning, no need for a 24/7
        persistent endpoint, minimize cost by only paying during the scoring job.
        OPTIONS: (a) real-time-endpoint -- always-on HTTPS endpoint, low latency
                     for live requests, billed 24/7 regardless of traffic
                 (b) batch-transform -- one-off job reads input CSV from S3,
                     runs inference at scale, writes output CSV to S3, no
                     persistent endpoint, billed only for job duration
        QUESTION: Which SageMaker inference mode is designed for large-scale
        offline scoring with no latency requirement?
        Submit the mode name (lowercase hyphenated) as TC{mode-name}.
      Description: !Sub "TenkaCloud mla-batch-transform briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Batch Transform inference mode scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to this SSM Parameter.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/${NamePrefix}/briefing/description?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag for the SageMaker offline bulk inference mode.
    Value: "TC{batch-transform}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
