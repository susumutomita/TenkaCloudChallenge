AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (mla-feature-store-online). MLA-C01 Feature Store drill.
  Models a SageMaker Feature Store mode selection scenario via an SSM Parameter.
  Feature Store is NOT deployed (incurs charges). The player reads the scenario
  and selects the online store as the mode providing single-digit-millisecond
  feature retrieval for real-time inference (vs offline store for training).

  Cost: SSM Parameter (Standard Tier) is free. No Feature Store deployed. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A real-time fraud detection system calls a SageMaker endpoint
        for every payment transaction. Before each inference call the system must
        look up the customer's latest behavioral features (e.g., transaction
        velocity in the past 10 minutes). The SLA requires feature retrieval to
        complete in single-digit milliseconds so the overall inference stays
        under 20 ms.
        SAGEMAKER FEATURE STORE MODES:
        (a) offline store -- S3-based, stores the full history of all feature
            values, queried with Athena for training dataset generation. Latency
            is minutes-scale. Not suitable for real-time serving.
        (b) online store -- in-memory key-value backend, stores only the latest
            feature record per entity, supports get_record() API calls with
            single-digit-ms latency. Designed for real-time inference serving.
        QUESTION: Which Feature Store mode provides single-digit-ms retrieval
        for use at inference time?
        Submit the mode name (lowercase) as TC{mode-name}.
      Description: !Sub "TenkaCloud mla-feature-store-online briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Feature Store mode scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to this SSM Parameter.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/${NamePrefix}/briefing/description?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag for the Feature Store mode providing single-digit-ms retrieval.
    Value: "TC{online}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
