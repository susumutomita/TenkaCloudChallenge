AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (scs-secrets-manager-rotation). SCS-C02 secrets rotation drill.
  Stores a scenario briefing in an SSM Parameter: RDS credentials are in SSM Parameter
  Store and need automatic 30-day rotation, which SSM does not support natively. The
  learner must identify AWS Secrets Manager as the correct service. No real RDS or
  Secrets Manager resource is deployed -- pure scenario analysis.

  Cost: SSM Parameter (String) is free. No RDS, no Secrets Manager. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # The player only needs to read the briefing SSM parameter.
              # No cloudformation:DescribeStacks -- the answer must be derived
              # from understanding the service difference, not from the Output.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Scenario briefing: RDS credentials in SSM Parameter Store, need auto-rotation.
  # SSM Parameter Store has no native auto-rotation for RDS credentials.
  # AWS Secrets Manager provides built-in rotation Lambda functions for RDS.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Scenario: Your team currently stores RDS database credentials in AWS SSM
        Parameter Store (SecureString). A new compliance requirement mandates
        automatic credential rotation every 30 days without manual intervention.
        SSM Parameter Store does not natively support automatic rotation for RDS
        credentials. Which AWS service provides built-in automatic rotation for
        RDS (and Redshift, DocumentDB) credentials, allowing you to configure
        rotation without writing custom Lambda code? Decoys: SSM Parameter Store,
        IAM, AWS Certificate Manager. Submit as TC{<service-name>}.
      Description: !Sub "TenkaCloud scs-secrets-manager-rotation briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the secrets rotation scenario briefing.
    Value: !Ref BriefingParameter
  SecretsManagerConsoleUrl:
    Description: AWS Console deep link to Secrets Manager (reference).
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/secretsmanager/home?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct rotation service.
    Value: "TC{secrets-manager}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
