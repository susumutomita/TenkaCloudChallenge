AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (aif-bedrock-guardrails). AIF-C01 Amazon Bedrock
  Guardrails feature selection drill. Deploys one SSM String parameter
  describing a requirement to block PII and harmful content in LLM input
  and output, with three decoy features (knowledge-bases, agents, fine-tuning).
  The player must identify Guardrails. The answer is stored only in a CFn
  Output the participant role cannot read.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: Amazon Bedrock Safety Feature Selection.
        Read the requirement below and identify the correct Amazon Bedrock feature.
        Submit TC{feature-name} in lowercase with hyphens.
        Example: TC{agents}

        REQUIREMENT:
        TenkaCloud's internal LLM chatbot has two compliance problems:
        1. INPUT problem: users sometimes type personal data (PII) like names,
           email addresses, phone numbers, and credit card numbers into the chat
           interface. This data must NOT be passed to the LLM or stored in logs.
        2. OUTPUT problem: the LLM occasionally generates text that contains
           violent, hateful, or sexually explicit content, or discusses topics
           that are off-limits for a corporate tool (competitor bashing, illegal
           advice, etc.). This output must be blocked before it reaches the user.

        The solution must intercept and filter BOTH the user's input (before it
        reaches the LLM) AND the LLM's output (before it reaches the user),
        without requiring any changes to the underlying model itself.

        CANDIDATE BEDROCK FEATURES:
        A) knowledge-bases  -- ingest documents into a vector store for RAG retrieval
        B) agents           -- orchestrate multi-step tasks by calling APIs and tools
        C) fine-tuning      -- adapt model weights on a labeled dataset to change behavior
        D) guardrails       -- configure PII detection/masking and harmful-content filters
                              on both model input and output; restrict off-topic conversations

        Which feature (A/B/C/D) satisfies BOTH the input and output filtering requirements?
        Submit: TC{knowledge-bases}, TC{agents}, TC{fine-tuning}, or TC{guardrails}
      Description: !Sub "TenkaCloud aif-bedrock-guardrails briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Bedrock safety feature briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the Bedrock safety feature.
    Value: "TC{guardrails}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
