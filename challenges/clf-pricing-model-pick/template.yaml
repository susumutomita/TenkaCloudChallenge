AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clf-pricing-model-pick). CLF-C02 EC2 pricing model
  drill. Deploys one SSM String parameter describing a fault-tolerant batch
  workload with no deadline. The player must identify the cheapest EC2
  purchasing option (Spot). The answer is stored only in a CFn Output the
  participant role cannot read; players derive it from the workload analysis.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Scenario data lives in SSM; the answer lives only in the CFn
              # Output. No cloudformation:DescribeStacks granted.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: EC2 Purchasing Option Selection.
        Analyze the workload below and identify the CHEAPEST EC2 purchasing option.
        Submit your answer as TC{option-name}, e.g. TC{on-demand}.

        WORKLOAD DESCRIPTION:
        - A nightly data transformation pipeline processes logs from the previous day.
        - The job is stateless and fault-tolerant: if an instance is interrupted,
          the job checkpoints to S3 and a new instance continues from where it left off.
        - There is no hard deadline: finishing at 3 AM or 6 AM makes no difference.
        - The team wants to minimize EC2 compute cost as much as possible.

        PURCHASING OPTIONS TO CONSIDER:
        A) On-Demand   -- pay by the second, no commitment, full price
        B) Reserved    -- 1-year or 3-year commitment, up to 72% savings vs on-demand
        C) Savings Plans -- flexible commitment (spend/hour), up to 66% savings
        D) Spot        -- spare EC2 capacity, up to 90% savings, can be interrupted with 2-min notice

        Which option (A/B/C/D) gives the lowest cost for this specific workload?
        Submit the option name (not the letter): TC{on-demand}, TC{reserved}, TC{savings-plan}, or TC{spot}.
      Description: !Sub "TenkaCloud clf-pricing-model-pick briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the workload briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the cheapest purchasing option.
    Value: "TC{spot}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
