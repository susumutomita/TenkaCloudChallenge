AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dva-codedeploy-canary). DVA-C02 CodeDeploy traffic-shift
  knowledge drill. Deploys only an SSM Parameter holding the scenario. No
  CodeDeploy deployment group or Lambda is deployed (cost avoidance). The player
  reads the scenario and identifies the deployment style as TC{canary}.

  Cost: SSM parameter only. No CodeDeploy, no Lambda, no EC2. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Scenario: The team wants to release a new Lambda function version using
        CodeDeploy. The deployment should: (1) shift 10% of traffic to the new
        version immediately, (2) keep it there for 5 minutes while CloudWatch
        alarms are monitored, (3) if no alarms fire, shift the remaining 90%
        (total 100%) to the new version. If an alarm fires during the 5-minute
        window, roll back automatically. Which CodeDeploy deployment configuration
        style matches this behavior?
        Decoy options: linear (shifts traffic in equal increments at regular
        intervals), all-at-once (shifts 100% immediately).
        Submit as TC{style-name} using hyphens, e.g. TC{linear}.
      Description: !Sub "TenkaCloud dva-codedeploy-canary briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: The CodeDeploy deployment style for 10% first then 100%.
    Value: "TC{canary}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
