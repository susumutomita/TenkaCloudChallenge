AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (sap-cross-account-externalid). SAP-C02 cross-account
  IAM / Confused Deputy drill. Deploys a REAL IAM role whose trust policy
  allows arn:aws:iam::111122223333:root to assume it, gated by a
  sts:ExternalId StringEquals condition. The player reads the trust policy via
  iam:GetRole / iam:ListRoles and names the condition key that prevents the
  Confused Deputy problem. The answer is mirrored only in a CFn Output the
  participant role cannot read; players derive it from the trust policy.

  Cost: IAM roles and SSM parameters are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # iam:GetRole / iam:ListRoles do not support resource-level
              # conditions; granted on * but scoped to the dedicated competitor
              # account (per-team isolation model).
              - Sid: ReadCrossAccountRole
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:ListRoles
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # THE CROSS-ACCOUNT ROLE TO AUDIT.
  # Trust policy: arn:aws:iam::111122223333:root can assume it, but ONLY when
  # the caller supplies the correct sts:ExternalId. This is the standard defense
  # against the Confused Deputy attack. The player reads this via iam:GetRole.
  CrossAccountRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-cross-account-role"
      Description: >-
        Cross-account role (created by Kato-san). Allows account 111122223333
        to assume it for read-only operations, with sts:ExternalId protection
        against the Confused Deputy problem.
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: "arn:aws:iam::111122223333:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: "tenkacloud-audit-external-id-2024"
      MaxSessionDuration: 3600
      Policies:
        - PolicyName: ReadOnlyAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOnlyS3
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        A cross-account IAM role named {NamePrefix}-cross-account-role was
        created by a former engineer. It allows account 111122223333 to assume
        it. Inspect the trust policy using iam:GetRole and identify the
        condition key that prevents the Confused Deputy problem. Submit the
        condition key as TC{condition-key} (e.g. TC{aws:PrincipalOrgID}).
      Description: !Sub "TenkaCloud sap-cross-account-externalid briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  CrossAccountRoleArn:
    Description: ARN of the cross-account role to audit.
    Value: !GetAtt CrossAccountRole.Arn
  CrossAccountRoleName:
    Description: Name of the cross-account role to audit.
    Value: !Ref CrossAccountRole
  IamConsoleUrl:
    Description: AWS Console deep link to the IAM Roles list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/iam/home?region=${AWS::Region}#/roles"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag derived by naming the condition key in the trust policy.
    Value: "TC{sts:ExternalId}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
