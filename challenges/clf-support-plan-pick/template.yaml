AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clf-support-plan-pick). CLF-C02 AWS Support plan
  selection drill. Deploys one SSM String parameter with requirements
  (production workloads, sub-1-hour impaired-system response, no TAM, no
  Infrastructure Event Management) and a comparison of all four plans. The
  player must identify Business as the cheapest qualifying plan. The answer
  is stored only in a CFn Output the participant role cannot read.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: AWS Support Plan Selection.
        Read the requirements below and identify the CHEAPEST AWS Support plan
        that satisfies ALL of them. Submit TC{plan-name} in lowercase.
        Example: TC{developer}

        REQUIREMENTS:
        - The team runs production workloads 24/7 in AWS
        - When a production system is impaired, AWS Support must respond in UNDER 1 HOUR
        - Infrastructure Event Management (extra guidance for launches/migrations) is NOT needed
        - A dedicated Technical Account Manager (TAM) is NOT required
        - Minimize the monthly support cost while meeting the above constraints

        PLAN COMPARISON:
        | Plan        | Production use | Impaired-system response | Dedicated TAM | IEM  | Monthly cost base |
        |-------------|---------------|--------------------------|---------------|------|-------------------|
        | basic       | No            | No phone/chat support    | No            | No   | $0                |
        | developer   | No            | 12 hours (business hours)| No            | No   | $29+              |
        | business    | Yes           | < 1 hour                 | No            | Paid add-on | $100+        |
        | enterprise  | Yes           | < 15 minutes             | Yes           | Included | $15,000+    |

        Submit the CHEAPEST plan that meets ALL requirements as TC{plan-name}.
        Valid answers: TC{basic}, TC{developer}, TC{business}, TC{enterprise}
      Description: !Sub "TenkaCloud clf-support-plan-pick briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the support plan briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after selecting the cheapest qualifying support plan.
    Value: "TC{business}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
