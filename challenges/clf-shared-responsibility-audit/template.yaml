AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clf-shared-responsibility-audit). CLF-C02 shared
  responsibility model drill. Deploys a single SSM String parameter listing
  six security tasks the player must classify as AWS-vs-customer responsibility,
  then count the customer-responsibility tasks. The answer is stored only in a
  CFn Output the participant role cannot read; players derive it from the model.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # The scenario/task list lives in SSM; the answer (flag) lives
              # only in the CFn Output. No cloudformation:DescribeStacks is
              # granted, so the player cannot read the Output directly.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The briefing parameter holds the scenario and the six tasks to classify.
  # It intentionally contains ONLY the question/data, never the answer.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: AWS Shared Responsibility Model audit.
        The following 6 security tasks were found in Kato-san's notes.
        Classify each as AWS responsibility or CUSTOMER responsibility,
        then count the number of CUSTOMER-responsibility tasks.
        Submit your answer as TC{N-customer-tasks}, e.g. TC{3-customer-tasks}.

        TASK LIST:
        1. Patch the guest operating system on EC2 instances
        2. Configure security group inbound rules for application servers
        3. Manage the underlying hypervisor (hardware virtualization layer)
        4. Encrypt data on the client side before uploading to S3
        5. Ensure physical security of AWS data center facilities
        6. Write and attach IAM user policies for developers

        HINT: AWS is responsible FOR the cloud (hypervisor, physical facilities).
        Customers are responsible IN the cloud (guest OS, network rules, encryption, IAM).
      Description: !Sub "TenkaCloud clf-shared-responsibility-audit briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after counting customer-responsibility tasks.
    Value: "TC{4-customer-tasks}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
