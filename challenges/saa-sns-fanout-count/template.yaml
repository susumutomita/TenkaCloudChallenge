AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (saa-sns-fanout-count). SAA-C03 SNS fanout drill.
  Deploys one SNS topic with exactly TWO SQS queue subscriptions (fan-out pattern).
  The player lists the subscriptions and counts them. The answer is stored only in
  the CFn Output AnswerFlag which the participant role cannot read.

  Cost: SNS and SQS are within the free tier (1M requests/month each). No messages
  are published. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player lists SNS topics and their subscriptions to count the fanout.
              # No cloudformation:DescribeStacks -- the answer lives in the CFn Output only.
              - Sid: SnsReadTopics
                Effect: Allow
                Action:
                  - sns:ListTopics
                  - sns:ListSubscriptions
                  - sns:ListSubscriptionsByTopic
                  - sns:GetTopicAttributes
                  - sns:GetSubscriptionAttributes
                Resource: "*"
              - Sid: SqsReadQueues
                Effect: Allow
                Action:
                  - sqs:ListQueues
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                  - sqs:ListQueueTags
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # SNS topic -- the fanout source.
  OrderEventsTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${NamePrefix}-order-events"
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-order-events"

  # Subscriber 1: inventory service queue.
  InventoryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${NamePrefix}-inventory"
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-inventory"

  # Subscriber 2: billing service queue.
  BillingQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${NamePrefix}-billing"
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-billing"

  # Allow the SNS topic to send messages to each SQS queue.
  InventoryQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref InventoryQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt InventoryQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref OrderEventsTopic

  BillingQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref BillingQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt BillingQueue.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !Ref OrderEventsTopic

  # Subscription 1: SNS -> inventory queue (SQS type).
  InventorySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt InventoryQueue.Arn
      RawMessageDelivery: true

  # Subscription 2: SNS -> billing queue (SQS type).
  BillingSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderEventsTopic
      Protocol: sqs
      Endpoint: !GetAtt BillingQueue.Arn
      RawMessageDelivery: true

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        An SNS topic and two SQS queues have been deployed using the fanout pattern.
        List the subscriptions on the SNS topic and count the number of SQS-type
        subscriptions. Submit the count as TC{N-subscriptions} e.g. TC{1-subscriptions}.
      Description: !Sub "Task briefing for ${NamePrefix} (saa-sns-fanout-count)."
      Tier: Standard

Outputs:
  OrderEventsTopicArn:
    Description: ARN of the SNS topic to inspect.
    Value: !Ref OrderEventsTopic
  InventoryQueueUrl:
    Description: URL of the inventory subscriber queue.
    Value: !Ref InventoryQueue
  BillingQueueUrl:
    Description: URL of the billing subscriber queue.
    Value: !Ref BillingQueue
  SnsConsoleUrl:
    Description: AWS Console deep link to the SNS topic list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/sns/v3/home?region=${AWS::Region}#/topics"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks, so this Output is never readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after counting the SNS topic subscriptions.
    Value: "TC{2-subscriptions}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
