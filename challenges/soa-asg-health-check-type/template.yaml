AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-asg-health-check-type). SOA-C02 Auto Scaling Group
  health check drill. Deploys one Launch Template and one ASG with DesiredCapacity=0
  (no instances launch), HealthCheckType=ELB, and HealthCheckGracePeriod=300.
  The learner reads the ASG configuration and identifies the HealthCheckType.
  The answer is mirrored only in a CFn Output the participant role cannot read.

  Cost: Launch Template and ASG definitions are free. DesiredCapacity=0 means
  no EC2 instances are started. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # autoscaling:Describe* does not support tag-scoped resource ARNs;
              # grant on * read-only. No cloudformation:DescribeStacks.
              - Sid: AsgRead
                Effect: Allow
                Action:
                  - autoscaling:DescribeAutoScalingGroups
                  - autoscaling:DescribeAutoScalingInstances
                  - autoscaling:DescribeLaunchConfigurations
                  - autoscaling:DescribePolicies
                  - autoscaling:DescribeScheduledActions
                  - autoscaling:DescribeTags
                Resource: "*"
              - Sid: Ec2DescribeLaunchTemplates
                Effect: Allow
                Action:
                  - ec2:DescribeLaunchTemplates
                  - ec2:DescribeLaunchTemplateVersions
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Launch Template -- no instance type that costs money will launch because
  # the ASG DesiredCapacity is set to 0.
  LaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${NamePrefix}-lt"
      LaunchTemplateData:
        ImageId: "ami-0abcdef1234567890"
        InstanceType: t3.micro
        TagSpecifications:
          - ResourceType: instance
            Tags:
              - Key: Name
                Value: !Sub "${NamePrefix}-instance"
              - Key: TenkaCloud:NamePrefix
                Value: !Ref NamePrefix
          - ResourceType: volume
            Tags:
              - Key: TenkaCloud:NamePrefix
                Value: !Ref NamePrefix

  # Auto Scaling Group with DesiredCapacity=0 (no instances), HealthCheckType=ELB,
  # and HealthCheckGracePeriod=300. The ASG is the artifact the player reads.
  AppAsg:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${NamePrefix}-asg"
      MinSize: "0"
      MaxSize: "2"
      DesiredCapacity: "0"
      HealthCheckType: ELB
      HealthCheckGracePeriod: 300
      LaunchTemplate:
        LaunchTemplateId: !Ref LaunchTemplate
        Version: !GetAtt LaunchTemplate.LatestVersionNumber
      AvailabilityZones: !GetAZs ""
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-asg"
          PropagateAtLaunch: false
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
          PropagateAtLaunch: true

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        An Auto Scaling Group has been deployed with DesiredCapacity=0 (no
        instances run). Find the ASG whose name starts with your NamePrefix
        and read its HealthCheckType value. This setting controls whether the
        ASG also replaces instances that fail the load-balancer health check
        (not just the EC2 status check). Submit the HealthCheckType in lowercase
        as TC{typename}, e.g. TC{ec2}. Do NOT use CloudFormation DescribeStacks.
      Description: !Sub "TenkaCloud soa-asg-health-check-type briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  AsgName:
    Description: The Auto Scaling Group to inspect.
    Value: !Ref AppAsg
  AsgConsoleUrl:
    Description: AWS Console deep link to Auto Scaling Groups.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ec2/home?region=${AWS::Region}#AutoScalingGroups:"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after reading the ASG health check type.
    Value: "TC{elb}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
