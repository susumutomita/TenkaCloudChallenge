AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (mls-overfitting-regularization). MLS-C01 bias-variance
  trade-off drill. Deploys a single SSM Parameter containing a detailed training
  log (loss and accuracy at epochs 10/30/60/100) showing classic overfitting:
  train accuracy 99.1% vs validation 72.3%. The player identifies that the fix
  is regularization (L1/L2/Dropout/early stopping), not adding more layers.
  The answer lives only in a CFn Output the participant role cannot read.

  Cost: SSM Parameter and IAM Role are free. No compute or SageMaker endpoint.
  $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Training log showing diverging train vs validation loss/accuracy -- the
  # canonical overfitting (high-variance) pattern. Four remedy families are
  # listed; the player must identify which family reduces variance.
  # The correct answer (regularization) is NOT stated here; it is only in the
  # AnswerFlag Output below.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: |
        === TenkaCloud MLS Challenge: Overfitting Diagnosis ===

        MODEL SPECIFICATION
        -------------------
        Architecture : Multilayer Perceptron (MLP)
        Layers       : Input → Dense(2048, ReLU) → Dense(1024, ReLU)
                       → Dense(512, ReLU) → Dense(1, Sigmoid)
        Parameters   : ~4.3 million trainable weights
        Optimizer    : Adam  lr=0.001
        Loss fn      : Binary cross-entropy
        Dataset      : 50,000 training / 6,250 validation / 6,250 test
        Epochs       : 100  (batch size 256)

        TRAINING LOG (sampled checkpoints)
        -----------------------------------
        Epoch |  Train Loss | Val Loss  | Train Acc | Val Acc
        ------|-------------|-----------|-----------|----------
           10 |    0.421    |   0.438   |   84.2 %  |  83.9 %
           20 |    0.289    |   0.301   |   89.7 %  |  88.2 %
           30 |    0.198    |   0.272   |   93.5 %  |  89.1 %   <-- divergence begins
           40 |    0.131    |   0.348   |   95.8 %  |  82.7 %
           50 |    0.087    |   0.441   |   97.1 %  |  77.4 %
           60 |    0.071    |   0.521   |   97.8 %  |  74.6 %
           80 |    0.033    |   0.712   |   98.6 %  |  73.1 %
          100 |    0.018    |   0.893   |   99.1 %  |  72.3 %

        OBSERVATION
        -----------
        - Training loss decreases monotonically to near-zero.
        - Validation loss INCREASES after epoch ~30, while training loss
          continues to fall.
        - Training accuracy (99.1%) >> Validation accuracy (72.3%).
        - Gap between train and validation widens with each epoch.

        QUESTION
        --------
        This pattern is the hallmark of which training problem?
        Which FAMILY of remedies is the standard fix?

        CANDIDATE REMEDIES
        ------------------
        A. add-more-layers   : Add 2-3 more Dense layers to increase model
                               capacity. Gives the model more expressive power.
        B. regularization    : Constrain model complexity. Techniques include
                               L1 (Lasso), L2 (Ridge/weight decay), Dropout,
                               and early stopping. Penalizes large weights or
                               drops neurons at random during training.
        C. increase-lr       : Raise the Adam learning rate from 0.001 to 0.01
                               so the optimizer converges faster.
        D. add-more-data-labels : Switch from supervised to semi-supervised
                               learning by labeling additional data.

        Submit your answer as TC{<remedy-family>}  e.g.  TC{add-more-layers}
      Description: !Sub "TenkaCloud mls-overfitting-regularization briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after diagnosing the overfitting remedy.
    Value: "TC{regularization}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
