AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-cost-allocation-tag-count). SOA-C02 cost allocation
  tagging drill. Deploys three SSM Parameters: two tagged with CostCenter (one
  frontend, one backend) and one without. The player counts the parameters that
  carry the CostCenter tag. The answer is mirrored only in a CFn Output the
  participant role cannot read; players derive it from the parameter tags.

  Cost: SSM Parameters (standard tier) are free. No EC2 instance, NAT Gateway,
  or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads parameter metadata and tags to count CostCenter-tagged ones.
              # GetParameter is scoped to /{NamePrefix}/* to limit visibility.
              # Deliberately NO cloudformation:DescribeStacks.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                  - ssm:ListTagsForResource
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Parameter with CostCenter=frontend tag.
  ParamAppA:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/app-a"
      Type: String
      Value: "frontend-config"
      Description: !Sub "App-A parameter for ${NamePrefix} drill."
      Tier: Standard
      Tags:
        CostCenter: frontend

  # Parameter with CostCenter=backend tag.
  ParamAppB:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/app-b"
      Type: String
      Value: "backend-config"
      Description: !Sub "App-B parameter for ${NamePrefix} drill."
      Tier: Standard
      Tags:
        CostCenter: backend

  # Parameter WITHOUT a CostCenter tag. This is the intentional gap.
  ParamAppC:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/app-c"
      Type: String
      Value: "shared-config"
      Description: !Sub "App-C parameter for ${NamePrefix} drill (no CostCenter tag)."
      Tier: Standard

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Three SSM Parameters exist under your NamePrefix (app-a, app-b, app-c).
        Check the tags on each parameter and count how many carry a CostCenter
        tag key. Submit the count as TC{N}, e.g. TC{1}. Do NOT use
        CloudFormation DescribeStacks -- derive the answer from the parameter tags.
      Description: !Sub "TenkaCloud soa-cost-allocation-tag-count briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  ParamAppAName:
    Description: SSM Parameter app-a (CostCenter=frontend).
    Value: !Ref ParamAppA
  ParamAppBName:
    Description: SSM Parameter app-b (CostCenter=backend).
    Value: !Ref ParamAppB
  ParamAppCName:
    Description: SSM Parameter app-c (no CostCenter tag).
    Value: !Ref ParamAppC
  SsmConsoleUrl:
    Description: AWS Console deep link to Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after counting CostCenter-tagged parameters.
    Value: "TC{2}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
