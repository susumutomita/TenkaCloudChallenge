AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (saa-rds-multi-az-vs-read-replica). SAA-C03 RDS HA drill.
  Deploys one SSM Parameter describing a requirement: synchronous standby in another AZ
  with automatic failover (NOT read scaling). The player reads the requirement and
  identifies Multi-AZ (not Read Replica) as the correct RDS feature. The answer is stored
  only in the CFn Output AnswerFlag which the participant role cannot read.

  Cost: SSM Parameter is free. No RDS, no EC2. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads the SSM parameter to understand the HA requirement.
              # No cloudformation:DescribeStacks -- the answer lives in the CFn Output only.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The requirement description the player reads to derive the correct RDS feature.
  # Describes WHAT is needed (automatic failover to standby), NOT which feature to use.
  RdsRequirementParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/rds-requirement"
      Type: String
      Value: >-
        Production RDS requirement: the database must maintain a synchronous standby
        instance in a DIFFERENT Availability Zone at all times. When the primary instance
        or its AZ becomes unavailable, the system must automatically promote the standby
        and redirect traffic with no manual intervention. Objective: high availability /
        automatic failover. This is NOT a read-scaling requirement -- the standby is NOT
        used for read traffic during normal operation. Identify the RDS feature that
        satisfies this requirement.
      Description: !Sub "RDS HA requirement for ${NamePrefix} (saa-rds-multi-az-vs-read-replica)."
      Tier: Standard

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Read /{NamePrefix}/rds-requirement. Identify the RDS feature that provides
        a synchronous standby in another AZ with automatic failover (NOT read scaling).
        Submit your answer as TC{<feature-name>} e.g. TC{read-replica}.
      Description: !Sub "Task briefing for ${NamePrefix} (saa-rds-multi-az-vs-read-replica)."
      Tier: Standard

Outputs:
  RdsRequirementParameterName:
    Description: SSM Parameter holding the RDS HA requirement.
    Value: !Ref RdsRequirementParameter
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}&tab=Table"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks, so this Output is never readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct RDS HA feature.
    Value: "TC{multi-az}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
