AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (scs-waf-rate-based). SCS-C02 AWS WAF rate-based rule drill.
  Stores a scenario briefing in an SSM Parameter: a web app is receiving more than
  1000 requests per 5 minutes from a specific IP and needs auto-blocking. The learner
  must identify AWS WAF rate-based rules as the correct mechanism. No real WAF WebACL
  is deployed -- pure scenario analysis.

  Cost: SSM Parameter (String) is free. No WAF WebACL. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # The player only needs to read the briefing SSM parameter.
              # No cloudformation:DescribeStacks -- the answer must be derived
              # from the scenario, not from the stack Output.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Scenario briefing: web app receiving >1000 req/5min from one IP, needs WAF auto-block.
  # AWS WAF rate-based rules track per-source-IP request counts over 5-minute windows
  # and automatically block IPs exceeding the configured threshold.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Scenario: A web application behind an Application Load Balancer is receiving
        a flood of requests from a single source IP address -- more than 1000 requests
        per 5 minutes -- causing degraded performance for legitimate users. You want
        to configure AWS WAF so that any source IP exceeding 1000 requests in a
        5-minute evaluation window is automatically blocked. Which AWS WAF rule TYPE
        tracks per-source-IP request counts over a time window and auto-blocks on
        threshold breach? Decoys: managed-rule-group, regex-match-rule, ip-set-match-rule.
        Submit as TC{<rule-type>}.
      Description: !Sub "TenkaCloud scs-waf-rate-based briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the WAF rate-based rule scenario briefing.
    Value: !Ref BriefingParameter
  WafConsoleUrl:
    Description: AWS Console deep link to AWS WAF (reference).
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/wafv2/homev2/web-acls?region=${AWS::Region}"
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after identifying the WAF rate-based rule type.
    Value: "TC{rate-based-rule}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
