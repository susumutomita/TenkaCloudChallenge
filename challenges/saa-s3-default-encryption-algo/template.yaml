AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (saa-s3-default-encryption-algo). SAA-C03 S3 default
  encryption identification drill. Deploys an S3 bucket with default
  encryption SSE-S3 (AES256) -- free, no SSE-KMS API cost. The learner runs
  aws s3api get-bucket-encryption and reports the SSEAlgorithm value. The
  answer lives only in a CFn Output the participant role cannot read.

  Cost: S3 bucket (empty) is free. No objects uploaded. SSE-S3 has no KMS API
  cost. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # Read the bucket encryption configuration scoped to this
              # team's bucket. This is the key API the player uses to derive
              # the flag. s3:ListAllMyBuckets has no resource-level scope.
              - Sid: ReadBucketEncryption
                Effect: Allow
                Action:
                  - s3:GetEncryptionConfiguration
                Resource: !Sub "arn:aws:s3:::${NamePrefix}-data"
              - Sid: ListBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The data bucket with SSE-S3 (AES256) default encryption.
  # SSE-S3 is free (no KMS API calls). No objects are uploaded.
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${NamePrefix}-data"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Kato-san configured an S3 bucket with default encryption. A compliance
        audit requires you to report the SSEAlgorithm value. Bucket name:
        ${NamePrefix}-data. Run: aws s3api get-bucket-encryption --bucket
        ${NamePrefix}-data and find the SSEAlgorithm value inside
        ServerSideEncryptionConfiguration.Rules[0].ApplyServerSideEncryptionByDefault.
        The value will be either AES256 (SSE-S3, free) or aws:kms (SSE-KMS,
        KMS API costs). Submit the value in lowercase as TC{<value>},
        e.g. TC{aws:kms}.
      Description: !Sub "TenkaCloud saa-s3-default-encryption-algo briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  DataBucketName:
    Description: The S3 bucket whose encryption configuration the player inspects.
    Value: !Ref DataBucket
  S3ConsoleUrl:
    Description: AWS Console deep link to the S3 bucket properties tab.
    Value: !Sub "https://s3.console.aws.amazon.com/s3/buckets/${NamePrefix}-data?region=${AWS::Region}&tab=properties"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. The participant role has no
  # cloudformation:DescribeStacks, so this output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after reading the SSEAlgorithm value.
    Value: "TC{aes256}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
