AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dea-glue-table-format). DEA-C01 Glue Data Catalog drill.
  Deploys one Glue database and one table whose StorageDescriptor declares the
  Parquet SerDe (ParquetHiveSerDe). The learner must read the SerdeInfo to
  identify the data format. The answer is mirrored only in a CFn Output the
  participant role cannot read; players derive it from the catalog metadata.

  Cost: Glue Data Catalog databases and tables are free (first 1M objects/month
  free tier). No Glue job, crawler, or S3 data upload. $0 for the drill lifetime.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Glue Data Catalog APIs do not accept resource-level ARN conditions
              # on GetTable/GetDatabase for tag-based scoping. Sid ConsoleListGlue
              # is account-wide metadata-only; GetTable/GetDatabase are scoped
              # to the specific database/table ARNs this team owns.
              # Deliberately NO cloudformation:DescribeStacks -- the answer lives
              # in a CFn Output and must be derived from the catalog, not read.
              - Sid: GetOwnGlueTable
                Effect: Allow
                Action:
                  - glue:GetTable
                  - glue:GetDatabase
                Resource:
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:catalog"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:database/${NamePrefix}-db"
                  - !Sub "arn:aws:glue:${AWS::Region}:${AWS::AccountId}:table/${NamePrefix}-db/*"
              - Sid: ConsoleListGlue
                Effect: Allow
                Action:
                  - glue:GetTables
                  - glue:GetDatabases
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The Glue Data Catalog database that contains the table under audit.
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${NamePrefix}-db"
        Description: !Sub "TenkaCloud dea-glue-table-format database for ${NamePrefix}."

  # The table with Parquet SerDe declared in its StorageDescriptor.
  # The learner must inspect SerdeInfo.SerializationLibrary to find the format.
  GlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: !Sub "${NamePrefix}-events"
        Description: Clickstream events table (format intentionally unlabeled in description).
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: "unknown"
          EXTERNAL: "TRUE"
        StorageDescriptor:
          Location: !Sub "s3://placeholder-bucket-${AWS::AccountId}/${NamePrefix}/events/"
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
            Parameters:
              serialization.format: "1"
          Columns:
            - Name: event_id
              Type: string
            - Name: user_id
              Type: string
            - Name: event_type
              Type: string
            - Name: event_ts
              Type: bigint
          Compressed: false
          StoredAsSubDirectories: false

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Glue Data Catalog audit for database ${NamePrefix}-db. Identify the
        data format of the table by inspecting its StorageDescriptor.SerdeInfo.
        Run: aws glue get-table --catalog-id ${AWS::AccountId}
        --database-name ${NamePrefix}-db --name ${NamePrefix}-events
        Look at SerdeInfo.SerializationLibrary. Submit the format name as
        TC{format-name}, e.g. TC{csv}.
      Description: !Sub "TenkaCloud dea-glue-table-format briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  GlueDatabaseName:
    Description: Glue Data Catalog database to inspect.
    Value: !Ref GlueDatabase
  GlueTableName:
    Description: Glue Data Catalog table whose SerDe format must be identified.
    Value: !Sub "${NamePrefix}-events"
  GlueConsoleUrl:
    Description: AWS Console deep link to the Glue Data Catalog databases view.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/glue/home?region=${AWS::Region}#/data-catalog/databases"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, used by the scoring engine only. The participant role has
  # no cloudformation:DescribeStacks, so this is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the Glue table data format.
    Value: "TC{parquet}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
