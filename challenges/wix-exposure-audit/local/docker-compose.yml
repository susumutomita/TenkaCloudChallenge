# Local-play problem container for wix-exposure-audit.
# Bound to 127.0.0.1 only: the site and /verify never leave the box.
services:
  wix-exposure-audit:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      # Per-deploy random secret injected by `make local`; the flag and the stale
      # share token are derived from it inside the container.
      FLAG_SEED: "${FLAG_SEED:-local-dev-seed}"
    ports:
      - "127.0.0.1:18080:8080" # published business site (challenge surface)
      - "127.0.0.1:18081:8081" # loopback /verify
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8080/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: "2s"
      timeout: "3s"
      retries: 20
    restart: "no"
