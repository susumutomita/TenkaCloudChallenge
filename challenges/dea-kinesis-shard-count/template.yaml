AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dea-kinesis-shard-count). DEA-C01 Kinesis shard math drill.
  Models a Kinesis capacity planning scenario via an SSM Parameter. Kinesis Data
  Streams itself is NOT deployed (costs $0.015/shard-hour). The player reads the
  scenario from the briefing parameter, applies the formula
  (required shards = CEIL(ingest rate / 1 MB/s per shard)), and submits the count.
  Ingest rate = 2 MB/s; per-shard limit = 1 MB/s; answer = 2 shards.

  Cost: SSM Parameter (Standard Tier, <=1 KB) is free. No Kinesis stream. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: Your team plans to ingest a stream of clickstream events at a
        sustained rate of 2 MB/s into Amazon Kinesis Data Streams.
        Each Kinesis shard supports a maximum ingest throughput of 1 MB/s.
        QUESTION: What is the MINIMUM number of shards required to handle this
        throughput without throttling?
        FORMULA: required_shards = CEIL(ingest_rate_MBps / 1 MB/s per shard)
        CALCULATION: CEIL(2 / 1) = ?
        Submit the answer as TC{N-shards}, e.g. TC{1-shards}.
      Description: !Sub "TenkaCloud dea-kinesis-shard-count briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the Kinesis shard capacity scenario.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to this SSM Parameter.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/${NamePrefix}/briefing/description?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag for the minimum Kinesis shard count to handle 2 MB/s ingest.
    Value: "TC{2-shards}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
