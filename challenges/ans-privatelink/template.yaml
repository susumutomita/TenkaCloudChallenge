AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (ans-privatelink). ANS-C01 private connectivity drill.
  Deploys an SSM Parameter describing an endpoint-service scenario where a
  provider VPC exposes a service to consumer VPCs without VPC peering or
  internet traversal. The player identifies AWS PrivateLink as the answer.
  No Interface VPC endpoints (billable) are deployed.

  Cost: SSM Parameter + IAM Role are free. No Interface endpoints. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this
      value automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A SaaS provider has an internal API in its VPC. Multiple
        customer (consumer) VPCs need to call this API privately. Requirements:
        (1) no VPC peering, (2) no Internet Gateway, (3) traffic must never
        traverse the public internet, (4) CIDR overlap between provider and
        consumer VPCs must be tolerated. The provider places the API behind
        a Network Load Balancer and registers it as an endpoint service.
        Consumers connect via an interface endpoint in their own VPC.
        QUESTION: Which AWS technology enables this endpoint-service
        based private connectivity model?
        Decoys: vpc-peering (bidirectional, CIDR overlap not allowed),
        transit-gateway (transitive routing hub, different use case).
        Submit: TC{<technology-name>}, e.g. TC{vpc-peering}.
      Description: !Sub "TenkaCloud ans-privatelink briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct technology.
    Value: "TC{privatelink}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
