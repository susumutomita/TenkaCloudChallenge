AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dva-sqs-visibility-timeout). DVA-C02 SQS drill.
  Deploys one SQS queue with VisibilityTimeout=30 seconds. The player reads
  the queue attributes and reports the Visibility Timeout value as TC{30}.
  Teaches: SQS Visibility Timeout and its role in preventing double-processing.

  Cost: SQS queue definition is within the free tier. No messages, no EC2,
  no Lambda. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # The SQS queue with VisibilityTimeout=30. The player must read this value.
  # No messages are sent -- the queue is never actually used during the drill.
  WorkQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${NamePrefix}-work-queue"
      VisibilityTimeout: 30
      MessageRetentionPeriod: 345600

  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read SQS queue attributes scoped to this team's queue ARN.
              - Sid: ReadQueueAttributes
                Effect: Allow
                Action:
                  - sqs:GetQueueAttributes
                  - sqs:GetQueueUrl
                Resource: !GetAtt WorkQueue.Arn
              # sqs:ListQueues does not support resource-level ARNs.
              - Sid: ConsoleListSqs
                Effect: Allow
                Action:
                  - sqs:ListQueues
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Kato-san's SQS queue is causing double-processing because its
        VisibilityTimeout is too short. Read the queue attributes for the queue
        named ${NamePrefix}-work-queue and report the VisibilityTimeout value
        (in seconds). Submit as TC{seconds}, e.g. TC{60}.
      Description: !Sub "TenkaCloud dva-sqs-visibility-timeout briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  QueueUrl:
    Description: The SQS queue to inspect.
    Value: !Ref WorkQueue
  QueueArn:
    Description: ARN of the SQS queue.
    Value: !GetAtt WorkQueue.Arn
  SqsConsoleUrl:
    Description: AWS Console deep link to the SQS queue list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/sqs/v3/home?region=${AWS::Region}#/queues"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: The VisibilityTimeout in seconds of the deployed SQS queue.
    Value: "TC{30}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
