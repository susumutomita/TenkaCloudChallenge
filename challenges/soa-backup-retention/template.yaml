AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-backup-retention). SOA-C02 AWS Backup drill.
  Deploys one AWS Backup Vault and one Backup Plan with a daily schedule and
  DeleteAfterDays=35. No backup jobs actually run -- the plan is defined only.
  The answer (retention days) is mirrored only in a CFn Output the participant
  role cannot read; players derive it from the backup plan configuration.

  Cost: AWS Backup Vault and Plan definitions are free. No backup jobs run,
  so there is no storage or transfer cost. SSM Parameter is free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # AWS Backup read APIs do not support resource-tag scoping on
              # List/Get calls; grant on * scoped to read-only actions only.
              # No cloudformation:DescribeStacks -- answer must come from plan.
              - Sid: BackupRead
                Effect: Allow
                Action:
                  - backup:GetBackupPlan
                  - backup:ListBackupPlans
                  - backup:GetBackupPlanFromJSON
                  - backup:ListBackupPlanVersions
                  - backup:ListBackupVaults
                  - backup:DescribeBackupVault
                  - backup:ListBackupJobs
                  - backup:GetBackupVaultAccessPolicy
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub "${NamePrefix}-vault"

  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "${NamePrefix}-daily-plan"
        BackupPlanRule:
          - RuleName: DailyRule
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: "cron(0 5 * * ? *)"
            Lifecycle:
              DeleteAfterDays: 35

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        An AWS Backup Plan has been deployed with a daily schedule. Read the
        plan's Rule and find the DeleteAfterDays value (the retention period).
        Submit the number of days as TC{N}, e.g. TC{30}. Do NOT use
        CloudFormation DescribeStacks -- derive the answer from the Backup Plan.
      Description: !Sub "TenkaCloud soa-backup-retention briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BackupVaultName:
    Description: The AWS Backup vault name.
    Value: !Ref BackupVault
  BackupPlanId:
    Description: The AWS Backup plan ID.
    Value: !Ref BackupPlan
  BackupConsoleUrl:
    Description: AWS Console deep link to the Backup plans list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/backup/home?region=${AWS::Region}#/backupplans"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after reading the backup retention days.
    Value: "TC{35}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
