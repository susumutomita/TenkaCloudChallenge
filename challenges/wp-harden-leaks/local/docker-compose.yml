# Local-play problem stack for wp-harden-leaks (remediation companion to wp-exposed-backup).
#
# A REAL WordPress + MariaDB, run isolated for teaching REMEDIATION. The site starts
# already-leaky (the previous operator left four things in the public web root); the
# player enters the container and CLOSES each hole. Judging is STATE-BASED: the verify
# container HTTP-probes the running WordPress over the compose network (http://wordpress/,
# the internal :80 — NOT the host-published :18080) and passes a checkpoint only when that
# surface is genuinely no longer reachable. One hole (the debug log) regenerates unless the
# player also turns WP_DEBUG off — fix the cause, not the symptom. Everything is bound to
# 127.0.0.1 only and never leaves the box.
#
# Services:
#   db          real MariaDB (dummy data only)
#   wordpress   real WordPress (Apache). A wrapper entrypoint plants the four leftovers
#               (and a mu-plugin that regenerates debug.log) before Apache starts.
#   wpinit      one-shot WP-CLI: installs WordPress and seeds content so it is a working site.
#   verify      loopback /verify = the "external scanner": probes http://wordpress/ and
#               judges each hole CLOSED by the live response.
services:
  db:
    image: mariadb:11
    environment:
      MARIADB_DATABASE: wordpress
      MARIADB_USER: wordpress
      MARIADB_PASSWORD: wordpress
      MARIADB_ROOT_PASSWORD: root-not-secret
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: "5s"
      timeout: "5s"
      retries: 30
    restart: "no"

  wordpress:
    build:
      context: ./wordpress
      dockerfile: Dockerfile
    depends_on:
      db:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      # The classic production mistake: debug logging left ON. WP_DEBUG writes PHP
      # notices to wp-content/debug.log while WP_DEBUG_LOG is true; display is off so
      # the site still looks clean. WP_DEBUG_LOG is applied via eval (not a literal line),
      # so the player turns off the literal WP_DEBUG line in wp-config.php to stop the log
      # regenerating — deleting the file alone loses.
      WORDPRESS_DEBUG: "1"
      WORDPRESS_CONFIG_EXTRA: |
        define( 'WP_DEBUG_LOG', true );
        define( 'WP_DEBUG_DISPLAY', false );
        @ini_set( 'display_errors', 0 );
    volumes:
      - wp_data:/var/www/html
    ports:
      - "127.0.0.1:18080:80" # WordPress site (challenge surface)
    healthcheck:
      # Ready = Apache is accepting on :80. Deliberately NOT gated on the leaks being
      # open (the player closes them), so the stack stays healthy through hardening.
      test: ["CMD", "php", "-r", "exit(@fsockopen('127.0.0.1', 80) ? 0 : 1);"]
      interval: "5s"
      timeout: "5s"
      retries: 40
    restart: "no"

  wpinit:
    image: wordpress:cli-php8.3
    # Match the debian WordPress image's www-data uid so WP-CLI can use the shared
    # docroot volume and its generated wp-config.php.
    user: "33:33"
    depends_on:
      db:
        condition: service_healthy
      wordpress:
        condition: service_healthy
    environment:
      WORDPRESS_DB_HOST: db:3306
      WORDPRESS_DB_USER: wordpress
      WORDPRESS_DB_PASSWORD: wordpress
      WORDPRESS_DB_NAME: wordpress
      FLAG_SEED: "${FLAG_SEED:-local-dev-seed}"
    volumes:
      - wp_data:/var/www/html
      - ./wpinit/init.sh:/usr/local/bin/init.sh:ro
    entrypoint: ["sh", "/usr/local/bin/init.sh"]
    restart: "no"

  verify:
    build:
      context: ./verify
      dockerfile: Dockerfile
    depends_on:
      wordpress:
        condition: service_healthy
    ports:
      - "127.0.0.1:18081:8081" # loopback /verify (the external scanner)
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:8081/healthz').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: "3s"
      timeout: "3s"
      retries: 20
    restart: "no"

volumes:
  db_data:
  wp_data:
