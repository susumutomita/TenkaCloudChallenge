AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (soa-trusted-advisor-category). SOA-C02 Trusted Advisor
  knowledge drill. Deploys an SSM Parameter with a scenario describing the five
  Trusted Advisor categories and asking which one contains the Low Utilization
  Amazon EC2 Instances check (Cost Optimization). The answer is mirrored only
  in a CFn Output the participant role cannot read.

  Cost: SSM Parameter (standard tier) is free. No EC2 instance, NAT Gateway,
  or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Player reads the briefing SSM Parameter and applies domain knowledge.
              # Scoped to /{NamePrefix}/* only.
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        AWS Trusted Advisor organizes its checks into five categories:
        1. Cost Optimization -- identifies idle/underutilized resources and
           suggests savings (e.g. low-utilization EC2 instances, idle load
           balancers, unattached EBS volumes).
        2. Performance -- flags opportunities to improve throughput or response
           time (e.g. high-utilization instances, CloudFront optimization).
        3. Security -- detects misconfigurations that expose risk (e.g. open
           security groups, MFA not enabled on root, S3 public buckets).
        4. Fault Tolerance -- highlights single points of failure and resilience
           gaps (e.g. single-AZ deployments, RDS without Multi-AZ).
        5. Service Limits -- warns when usage approaches AWS service quotas.
        Question: The "Low Utilization Amazon EC2 Instances" check identifies
        EC2 instances with persistently low CPU/network and recommends stopping
        or downsizing them to save money. Which Trusted Advisor category does
        this check belong to? Submit as TC{category-name-hyphenated-lowercase},
        e.g. TC{security}.
      Description: !Sub "TenkaCloud soa-trusted-advisor-category briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the scenario briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to Systems Manager Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks for player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the Trusted Advisor category.
    Value: "TC{cost-optimization}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
