<svg xmlns="http://www.w3.org/2000/svg" width="960" height="430" viewBox="0 0 960 430" role="img" aria-labelledby="title desc">
  <title id="title">Northstar secure OTA training topology</title>
  <desc id="desc">A Signing service supplies packages to an OTA Workshop, which sends a campaign through one TCU and a user-space Bus to ECU A and ECU B. ECU B depends on ECU A.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#325a77"/>
    </marker>
    <style>
      .box { fill: #f7fafc; stroke: #325a77; stroke-width: 2; rx: 12; }
      .vehicle { fill: #fff9e8; stroke: #a16207; stroke-width: 2; rx: 18; }
      .flow { fill: none; stroke: #325a77; stroke-width: 3; marker-end: url(#arrow); }
      .dependency { fill: none; stroke: #a16207; stroke-width: 2; stroke-dasharray: 7 5; marker-end: url(#arrow); }
      .label { font: 600 18px system-ui, sans-serif; fill: #172033; text-anchor: middle; }
      .small { font: 14px system-ui, sans-serif; fill: #334155; text-anchor: middle; }
    </style>
  </defs>
  <rect x="20" y="20" width="920" height="390" class="vehicle"/>
  <text x="480" y="52" class="label">One virtual vehicle · Docker-internal network</text>
  <rect x="55" y="92" width="160" height="80" class="box"/>
  <text x="135" y="126" class="label">Signing</text>
  <text x="135" y="150" class="small">private key owner</text>
  <rect x="275" y="92" width="180" height="80" class="box"/>
  <text x="365" y="126" class="label">OTA / Workshop</text>
  <text x="365" y="150" class="small">campaign + verify</text>
  <rect x="515" y="92" width="150" height="80" class="box"/>
  <text x="590" y="126" class="label">TCU</text>
  <text x="590" y="150" class="small">order + resume</text>
  <rect x="725" y="92" width="170" height="80" class="box"/>
  <text x="810" y="126" class="label">User-space Bus</text>
  <text x="810" y="150" class="small">delivery + fault</text>
  <rect x="610" y="270" width="150" height="90" class="box"/>
  <text x="685" y="307" class="label">ECU A</text>
  <text x="685" y="332" class="small">A/B slots</text>
  <rect x="790" y="270" width="150" height="90" class="box"/>
  <text x="865" y="307" class="label">ECU B</text>
  <text x="865" y="332" class="small">depends on ECU A</text>
  <path d="M215 132 H275" class="flow"/>
  <path d="M455 132 H515" class="flow"/>
  <path d="M665 132 H725" class="flow"/>
  <path d="M790 172 C760 220 700 220 685 270" class="flow"/>
  <path d="M830 172 C850 215 865 225 865 270" class="flow"/>
  <path d="M760 315 H790" class="dependency"/>
  <text x="775" y="300" class="small">version dependency</text>
</svg>
