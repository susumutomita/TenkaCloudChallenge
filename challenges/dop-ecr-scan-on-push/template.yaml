AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dop-ecr-scan-on-push). DOP-C02 container security drill.
  Deploys an ECR repository with ImageScanningConfiguration ScanOnPush=true.
  The learner reads the repository configuration and reports the scan setting.
  The answer is mirrored only in a CFn Output the participant role cannot read.

  Cost: ECR repository (no images pushed) and SSM parameter are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ecr:DescribeRepositories scoped to this team's repository.
              # No cloudformation:DescribeStacks -- answer derived from repo config.
              - Sid: EcrDescribeRepo
                Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${NamePrefix}-*"
              - Sid: EcrListRepositories
                Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                Resource: "*"
              - Sid: EcrDescribeScanFindings
                Effect: Allow
                Action:
                  - ecr:DescribeImageScanFindings
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${NamePrefix}-*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # ECR repository with ScanOnPush=true. No images are pushed in this drill.
  # The learner inspects imageScanningConfiguration.scanOnPush via console or CLI.
  EcrRepository:
    Type: AWS::ECR::Repository
    Properties:
      RepositoryName: !Sub "${NamePrefix}-app"
      ImageScanningConfiguration:
        ScanOnPush: true
      ImageTagMutability: MUTABLE

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Inspect the ECR repository named ${NamePrefix}-app.
        Run: aws ecr describe-repositories --repository-names ${NamePrefix}-app
        Look at imageScanningConfiguration. What is the name of the setting
        that automatically scans images for CVEs when they are pushed?
        Submit the setting name as TC{<setting>} (lower-case, hyphenated), e.g. TC{enhanced-scanning}.
      Description: !Sub "TenkaCloud dop-ecr-scan-on-push briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  EcrRepositoryName:
    Description: Name of the ECR repository to inspect.
    Value: !Ref EcrRepository
  EcrConsoleUrl:
    Description: AWS Console deep link to the ECR repository.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/ecr/repositories/private/${AWS::AccountId}/${NamePrefix}-app"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks
  # granted to participant -- must be derived from repository config.
  AnswerFlag:
    Description: Flag the learner submits after identifying the scan-on-push setting.
    Value: "TC{scan-on-push}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
