AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dva-lambda-env-plaintext-secret). DVA-C02 Lambda security drill.
  Deploys a Lambda function (never invoked) whose environment variable SECRET_CONFIG
  holds a base64-encoded string. The player reads the function configuration,
  base64-decodes the value, and submits the decoded TC{...} flag.
  Teaches: never store secrets plaintext/encoded in Lambda env vars -- use Secrets Manager.

  Cost: Lambda function definition, IAM role, SSM parameter are all free. No invocations,
  no EC2, no NAT. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # Minimal execution role -- CloudWatch Logs only. No permissions that could be
  # abused if someone did manage to invoke the function.
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-lambda-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BasicLogging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:*:*:log-group:/aws/lambda/${NamePrefix}-secret-fn:*"

  # The Lambda function with SECRET_CONFIG env var holding base64(TC{use-secrets-manager}).
  # No event source mapping, no schedule -- NEVER invoked during the drill.
  SecretFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${NamePrefix}-secret-fn"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Kato-san left a secret in an env var. This function is NEVER invoked."
      Environment:
        Variables:
          # base64("TC{use-secrets-manager}") = VEN7dXNlLXNlY3JldHMtbWFuYWdlcn0=
          SECRET_CONFIG: "VEN7dXNlLXNlY3JldHMtbWFuYWdlcn0="
      Code:
        ZipFile: |
          exports.handler = async () => {
            // This function is never invoked during the challenge.
            // Reading config is the task -- not running the code.
            return { statusCode: 200, body: "ok" };
          };
      Timeout: 3
      MemorySize: 128

  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read Lambda function config (env vars) scoped to this team's prefix.
              - Sid: ReadLambdaConfig
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                Resource: !Sub "arn:aws:lambda:*:*:function:${NamePrefix}*"
              # lambda:ListFunctions does not accept resource-level ARNs.
              - Sid: ConsoleListLambda
                Effect: Allow
                Action:
                  - lambda:ListFunctions
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        A Lambda function named ${NamePrefix}-secret-fn has an environment variable
        SECRET_CONFIG that holds a base64-encoded string. Read the function
        configuration (aws lambda get-function-configuration) and base64-decode
        the SECRET_CONFIG value to find the flag. Submit the decoded TC{...} string.
      Description: !Sub "TenkaCloud dva-lambda-env-plaintext-secret briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  FunctionName:
    Description: The Lambda function to inspect.
    Value: !Ref SecretFunction
  LambdaConsoleUrl:
    Description: AWS Console deep link to the Lambda function.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/${NamePrefix}-secret-fn"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: Flag obtained by base64-decoding the SECRET_CONFIG environment variable.
    Value: "TC{use-secrets-manager}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
