AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (ans-nacl-ephemeral). ANS-C01 NACL stateless drill.
  Deploys a VPC (10.50.0.0/16), a Network ACL with inbound rule allowing
  TCP 443 from 0.0.0.0/0, but outbound rules that do NOT include the
  ephemeral port range (1024-65535). The learner inspects the NACL rules,
  identifies the missing outbound ephemeral range, and submits TC{1024-65535}.
  No EC2 instances, NAT Gateways, or EIPs. The answer is only in the CFn
  Output; the participant role cannot read it.

  Cost: VPC / NACL / subnet / SSM Parameter are free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this
      value automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ec2:Describe* is tag-scoped (returns only this team's VPC / NACL).
              # Deliberately NO cloudformation:DescribeStacks.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.50.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Subnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.50.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Network ACL: inbound 443 allowed, but outbound MISSING the ephemeral
  # range (1024-65535) that is needed for TCP return traffic.
  # NACL is stateless -- unlike Security Groups it does NOT auto-allow
  # return traffic, so responses from the server are dropped outbound.
  NaclWithMissingEphemeral:
    Type: AWS::EC2::NetworkAcl
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-nacl"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Inbound rule 100: allow TCP 443 from anywhere (HTTPS requests in)
  NaclInboundHttps:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NaclWithMissingEphemeral
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: false
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  # Inbound rule 32766: deny everything else
  NaclInboundDenyAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NaclWithMissingEphemeral
      RuleNumber: 32766
      Protocol: -1
      RuleAction: deny
      Egress: false
      CidrBlock: 0.0.0.0/0

  # Outbound rule 100: allow TCP 443 outbound (but this is NOT what return
  # traffic uses -- responses go back to the CLIENT's ephemeral port, NOT 443)
  NaclOutboundHttps:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NaclWithMissingEphemeral
      RuleNumber: 100
      Protocol: 6
      RuleAction: allow
      Egress: true
      CidrBlock: 0.0.0.0/0
      PortRange:
        From: 443
        To: 443

  # Outbound rule 32766: deny everything else.
  # THE MISCONFIGURATION: ephemeral ports 1024-65535 are NOT allowed outbound.
  # TCP return packets to clients hit this deny rule and are dropped.
  NaclOutboundDenyAll:
    Type: AWS::EC2::NetworkAclEntry
    Properties:
      NetworkAclId: !Ref NaclWithMissingEphemeral
      RuleNumber: 32766
      Protocol: -1
      RuleAction: deny
      Egress: true
      CidrBlock: 0.0.0.0/0

  # Associate the NACL with the subnet
  NaclSubnetAssociation:
    Type: AWS::EC2::SubnetNetworkAclAssociation
    Properties:
      SubnetId: !Ref Subnet
      NetworkAclId: !Ref NaclWithMissingEphemeral

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A Network ACL is attached to a subnet. Inbound TCP 443 is
        allowed from 0.0.0.0/0. However, HTTPS responses are not reaching
        clients. Use the Console (VPC > Network ACLs) or
        `aws ec2 describe-network-acls` to inspect the outbound rules.
        KEY CONCEPT: NACLs are STATELESS. Unlike Security Groups, NACLs do
        not automatically allow return traffic. For a server to send TCP
        responses back to a client, the NACL must explicitly allow outbound
        traffic to the client's ephemeral (source) port range.
        QUESTION: What is the TCP port range that must be allowed OUTBOUND
        in the NACL so that response packets can reach clients?
        Submit: TC{<from>-<to>}, e.g. TC{32768-60999}.
      Description: !Sub "TenkaCloud ans-nacl-ephemeral briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  VpcId:
    Description: The VPC under analysis.
    Value: !Ref Vpc
  NaclConsoleUrl:
    Description: AWS Console deep link to the Network ACLs view.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/vpcconsole/home?region=${AWS::Region}#NetworkAcls:"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # The ephemeral port range for TCP return traffic. Scoring engine only.
  # Participant role has no cloudformation:DescribeStacks.
  AnswerFlag:
    Description: Flag the learner submits after identifying the missing outbound ephemeral port range.
    Value: "TC{1024-65535}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
