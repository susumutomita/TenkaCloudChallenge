AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (ans-cidr-subnet-sizing). ANS-C01 / SAA CIDR math drill.
  Deploys an SSM Parameter with a subnet sizing scenario: from a /16 VPC,
  carve the smallest subnet (largest prefix) that still yields >= 500 usable
  IPs. AWS reserves 5 IPs per subnet; /23 gives 507 usable (ok), /24 gives
  251 (too small). The answer TC{/23} is only in the CFn Output.

  Cost: SSM Parameter + IAM Role are free. No VPC or subnet deployed. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this
      value automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: VPC CIDR is 10.60.0.0/16. You need to carve a single subnet
        with AT LEAST 500 usable IP addresses for an application tier.
        IMPORTANT: AWS reserves 5 IP addresses per subnet:
          - .0  Network address
          - .1  VPC router
          - .2  DNS server
          - .3  Future use
          - .255 Broadcast address (last address)
        Therefore: usable IPs = 2^(32-prefix) - 5
        CALCULATION:
          /22 -> 1024 - 5 = 1019 usable (satisfies >=500, but larger than needed)
          /23 -> 512  - 5 = 507  usable (satisfies >=500)
          /24 -> 256  - 5 = 251  usable (does NOT satisfy >=500)
          /25 -> 128  - 5 = 123  usable (does NOT satisfy >=500)
        QUESTION: What is the LARGEST prefix length (= smallest subnet) that
        still provides at least 500 usable IPs?
        Submit: TC{/<prefix>}, e.g. TC{/25}.
      Description: !Sub "TenkaCloud ans-cidr-subnet-sizing briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # /23 gives 512-5=507 usable IPs (>= 500); /24 gives only 251. Scoring engine only.
  AnswerFlag:
    Description: Flag the learner submits after computing the correct prefix length.
    Value: "TC{/23}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
