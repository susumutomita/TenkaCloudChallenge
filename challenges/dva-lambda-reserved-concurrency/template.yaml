AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dva-lambda-reserved-concurrency). DVA-C02 Lambda
  concurrency drill. Deploys a Lambda function (never invoked) with
  ReservedConcurrentExecutions=10. The player reads the concurrency setting
  and submits TC{10}. Teaches: ReservedConcurrentExecutions as a throttle
  guard protecting other functions in the account.

  Cost: Lambda function definition, IAM role, SSM parameter are free. No
  invocations, no EC2, no NAT. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-concurrency-exec"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: BasicLogging
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:*:*:log-group:/aws/lambda/${NamePrefix}-concurrency-fn:*"

  # The Lambda function with ReservedConcurrentExecutions=10.
  # No event source mapping, no schedule -- NEVER invoked during the drill.
  ConcurrencyFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${NamePrefix}-concurrency-fn"
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt LambdaExecutionRole.Arn
      Description: "Reserved concurrency drill function -- never invoked."
      ReservedConcurrentExecutions: 10
      Code:
        ZipFile: |
          exports.handler = async () => {
            // This function is never invoked during the challenge.
            return { statusCode: 200 };
          };
      Timeout: 3
      MemorySize: 128

  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read Lambda concurrency config scoped to this team's functions.
              - Sid: ReadLambdaConfig
                Effect: Allow
                Action:
                  - lambda:GetFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetFunctionConcurrency
                Resource: !Sub "arn:aws:lambda:*:*:function:${NamePrefix}*"
              - Sid: ConsoleListLambda
                Effect: Allow
                Action:
                  - lambda:ListFunctions
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        The Lambda function ${NamePrefix}-concurrency-fn has a
        ReservedConcurrentExecutions limit. Read the concurrency configuration
        (aws lambda get-function-concurrency) and report the
        ReservedConcurrentExecutions value. Submit as TC{number}, e.g. TC{5}.
      Description: !Sub "TenkaCloud dva-lambda-reserved-concurrency briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  FunctionName:
    Description: The Lambda function to inspect.
    Value: !Ref ConcurrencyFunction
  LambdaConsoleUrl:
    Description: AWS Console deep link to the Lambda function concurrency settings.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/lambda/home?region=${AWS::Region}#/functions/${NamePrefix}-concurrency-fn/edit/concurrency"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks granted.
  AnswerFlag:
    Description: The ReservedConcurrentExecutions value of the deployed Lambda function.
    Value: "TC{10}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
