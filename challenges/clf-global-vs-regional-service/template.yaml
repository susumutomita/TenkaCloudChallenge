AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (clf-global-vs-regional-service). CLF-C02 global vs
  regional service classification drill. Deploys one SSM String parameter
  listing four AWS services (IAM, CloudFront, Route 53, DynamoDB). The player
  must identify the single regional service (DynamoDB; the other three are
  global). The answer is stored only in a CFn Output the participant role
  cannot read; players derive it from the service characteristics.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: Global vs Regional AWS Service Classification.
        Four AWS services are listed below. Three are GLOBAL services (no region
        selection required in the AWS Console). ONE is a REGIONAL service
        (resources are created in and scoped to a specific AWS region).
        Identify the single REGIONAL service and submit TC{service-name} in lowercase.
        Example submission format: TC{cloudfront}

        SERVICES TO CLASSIFY:
        1. IAM (Identity and Access Management)
           - Used to manage users, roles, and permissions
           - When you log in to the console, you do not pick a region for IAM
        2. CloudFront
           - Content delivery network with edge locations worldwide
           - Distributions are configured globally, not per-region
        3. Route 53
           - AWS managed DNS service
           - Hosted zones and records exist at a global level
        4. DynamoDB
           - Fully managed NoSQL database
           - Tables are created in a specific AWS region

        Question: Which ONE of these four services is REGIONAL (not global)?
        Submit as TC{service-name} where service-name is all lowercase.
      Description: !Sub "TenkaCloud clf-global-vs-regional-service briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the service classification briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the regional service.
    Value: "TC{dynamodb}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
