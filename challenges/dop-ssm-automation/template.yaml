AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dop-ssm-automation). DOP-C02 operational runbook drill.
  Deploys an SSM Parameter holding a scenario about codifying a multi-step
  EC2 operational runbook (patch, verify, reboot) as a repeatable document.
  The learner identifies SSM Automation as the Systems Manager capability for
  multi-step runbooks (vs Run Command for single commands / Patch Manager for
  patch baselines). The answer is mirrored only in a CFn Output.

  Cost: SSM parameter is free. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        SCENARIO: A team manually SSH-patches EC2 instances with no documented
        procedure. The requirement is to codify a multi-step operational runbook
        (Step 1: apply patch, Step 2: verify patch, Step 3: reboot instance)
        as a repeatable, auditable document that can be run on demand, on a
        schedule, or via EventBridge -- without using SSH.
        Which AWS Systems Manager capability lets you define this kind of
        multi-step operational runbook as a document and execute it repeatedly?
        Note: Run Command sends a single command to a fleet; Patch Manager
        manages patch baselines and maintenance windows; the answer here is a
        different, more general-purpose runbook capability.
        Submit as TC{<capability>}, e.g. TC{run-command}.
      Description: !Sub "TenkaCloud dop-ssm-automation briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only. No cloudformation:DescribeStacks
  # granted to participant -- must be derived from scenario analysis.
  AnswerFlag:
    Description: Flag the learner submits after identifying the SSM capability.
    Value: "TC{automation}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
