AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud DRAFT problem (public-s3-remediation). Educational example for the
  most common S3 misconfiguration: a bucket left with Public Access Block off
  and a Bucket Policy allowing `Principal: "*"` `s3:GetObject`. Co-deploys an
  SSM Parameter holding the audit-complete flag the player submits.

  Cost: S3 Standard pennies/month (no public objects uploaded by this stack),
  SSM Standard tier free. Within Free Tier for the lifetime of one drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Used to keep per-team stacks
      from colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow returns HTTP 400 unless the assumed
      # role can call signin:* on its own oauth2/public-client/{localhost,remote}
      # resources. SignInLocalDevelopmentAccess is the AWS-managed policy that
      # scopes those permissions narrowly (= the minimal set AWS endorses).
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Read this team's own bucket. Resource ARN is NamePrefix-scoped
              # so cross-team visibility is impossible even though we are
              # sharing the participant role pattern.
              - Sid: ReadOwnBucket
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:GetBucketPolicy
                  - s3:GetBucketPolicyStatus
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketAcl
                  - s3:GetBucketLocation
                  - s3:GetBucketOwnershipControls
                Resource:
                  - !Sub "arn:aws:s3:::${NamePrefix}-kato-onboarding"
                  - !Sub "arn:aws:s3:::${NamePrefix}-kato-onboarding/*"
              # Practice the remediation flow (these actions are not required to
              # earn the flag, but they exist so a learner can actually close
              # the bucket end-to-end and observe the audit-side state change).
              - Sid: RemediateOwnBucket
                Effect: Allow
                Action:
                  - s3:PutBucketPolicy
                  - s3:DeleteBucketPolicy
                  - s3:PutBucketPublicAccessBlock
                  - s3:PutBucketOwnershipControls
                Resource:
                  - !Sub "arn:aws:s3:::${NamePrefix}-kato-onboarding"
              # Console-UX list view (ADR-021 carve-out): the S3 Console opens
              # on the bucket list page. Without this Sid the bucket list shows
              # empty and players cannot navigate to their bucket. Per-team
              # write access stays scoped by the ARN-locked Sids above.
              # Note: only `s3:ListAllMyBuckets` is in this Statement because
              # check-template-security.ts requires every Action paired with
              # Resource: "*" to be in RESOURCE_STAR_OK_ACTIONS. Adding e.g.
              # `s3:GetAccountPublicAccessBlock` would need that entry added
              # (= separate scope change, not blocking the drill flow).
              - Sid: ConsoleListBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              # See hello-world template for the rationale: ssm:DescribeParameters
              # is a metadata-only API AWS IAM does not accept resource-scope on.
              # Safe under per-team dedicated AWS account assumption.
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              # CloudShell session lifecycle. Same allowlist as hello-world.
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Intentionally misconfigured bucket. Public Access Block is OFF, and a
  # `Principal: "*"` GetObject Statement is attached below. This is the
  # educational initial state the player practices remediating.
  KatoOnboardingBucket:
    Type: AWS::S3::Bucket
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      BucketName: !Sub "${NamePrefix}-kato-onboarding"
      # Public Access Block deliberately permissive (this is the misconfig the
      # learner remediates). The platform deploys this into the participant's
      # own dedicated AWS account, so cross-tenant exposure is impossible.
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      OwnershipControls:
        Rules:
          - ObjectOwnership: BucketOwnerEnforced
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  KatoOnboardingBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref KatoOnboardingBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # Deliberately-broad policy attached at deploy. Player learns to
          # detect + remove this Statement. No real objects are uploaded by
          # the template, so no actual data leak occurs even pre-remediation.
          - Sid: LegacyPublicRead
            Effect: Allow
            Principal: "*"
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${NamePrefix}-kato-onboarding/*"

  AuditFlagParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/audit-flag"
      Type: String
      Value: !Sub "Hello from ${NamePrefix}"
      Description: !Sub "TenkaCloud public-s3-remediation audit-complete marker for ${NamePrefix}."
      Tier: Standard

Outputs:
  BucketName:
    Description: S3 bucket the learner is auditing.
    Value: !Ref KatoOnboardingBucket
  BucketConsoleUrl:
    Description: AWS Console deep link to the bucket's Permissions tab.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/s3/buckets/${NamePrefix}-kato-onboarding?region=${AWS::Region}&tab=permissions"
  AuditParameterName:
    Description: SSM Parameter holding the audit-complete flag the learner submits.
    Value: !Ref AuditFlagParameter
  AuditFlag:
    Description: Flag value the learner submits in the Portal.
    Value: !Sub "Hello from ${NamePrefix}"
  NamePrefix:
    Description: Common resource prefix that this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
