AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (mls-feature-scaling). MLS-C01 preprocessing drill.
  Deploys a single SSM Parameter with a mortgage-approval feature table:
  loan_amount (max 1,200,000 USD) vs age (max 75), a ~16,000x scale gap that
  breaks gradient descent convergence. The player names the preprocessing
  technique that rescales features to comparable ranges (= normalization /
  MinMax / Z-score standardization). One-hot encoding is the planted decoy.
  The answer lives only in a CFn Output the participant role cannot read.

  Cost: SSM Parameter and IAM Role are free. No compute. $0 for the lifetime.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Feature table with ~16,000x scale gap between age and loan_amount,
  # convergence log showing oscillating loss, and four preprocessing options.
  # The correct answer (normalization) is NOT stated here; lives in AnswerFlag.
  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: |
        === TenkaCloud MLS Challenge: Feature Scaling for Gradient Descent ===

        MODEL SPECIFICATION
        -------------------
        Task         : Binary classification -- mortgage approval (approve/deny)
        Algorithm    : Logistic Regression + 2-layer Neural Network (ensemble)
        Optimizer    : Stochastic Gradient Descent (SGD)  lr=0.01
        Training set : 120,000 loan applications (2019–2023)

        FEATURE SCHEMA
        --------------
        Feature           | Type  | Min       | Max         | Mean      | Unit
        ------------------|-------|-----------|-------------|-----------|--------
        age               | INT   |        22 |          75 |      42.3 | years
        annual_income     | FLOAT |    18,000 |     490,000 |    68,400 | USD/yr
        credit_score      | INT   |       300 |         850 |       680 | FICO pts
        loan_amount       | FLOAT |    10,000 |   1,200,000 |    95,000 | USD
        employment_years  | FLOAT |         0 |          42 |       8.1 | years
        debt_to_income    | FLOAT |      0.02 |        0.95 |      0.32 | ratio
        num_credit_lines  | INT   |         0 |          28 |       6.2 | count
        contract_type     | ENUM  | --        | --          | --        | fixed/variable

        SCALE GAP ANALYSIS
        -------------------
        Largest feature range  : loan_amount     max = 1,200,000
        Smallest feature range : age             max =        75
        Ratio                  : ~16,000x

        When SGD computes the gradient of the loss with respect to weights,
        the component for loan_amount is ~16,000x larger than for age.
        This causes the optimizer to oscillate or diverge.

        TRAINING CONVERGENCE LOG (raw features, no preprocessing)
        -----------------------------------------------------------
        Epoch |   Loss    | Gradient norm  | Status
        ------|-----------|----------------|-------
            1 |   2.841   |    48,231      | oscillating
            5 |   4.102   |    91,450      | DIVERGING
           10 |   9.871   |   182,700      | DIVERGING
           20 |  38.214   |   712,000      | STOPPED (NaN weights)

        CANDIDATE PREPROCESSING TECHNIQUES
        ------------------------------------
        A. one-hot-encoding    : Convert categorical features to binary vectors.
                                 e.g., contract_type → [is_fixed, is_variable]
                                 Addresses cardinality, NOT scale differences
                                 between numeric features.

        B. normalization       : Rescale numeric features to comparable ranges.
                                 Strategies:
                                   MinMax scaling  : x' = (x-min)/(max-min) → [0,1]
                                   Z-score (standard): x' = (x-mean)/std → mean=0, sd=1
                                   Robust scaling  : uses median & IQR (outlier-resistant)
                                 All gradient-descent methods (LR, NN, SVM) benefit.

        C. pca-dimensionality-reduction : Principal Component Analysis.
                                 Reduces feature count by projecting to top
                                 variance components. Addresses dimensionality,
                                 not raw scale differences.

        D. log-transform       : Apply log(x) to skewed distributions.
                                 Reduces right-skew; does NOT equalize scales
                                 between features on entirely different units.

        QUESTION
        --------
        Which preprocessing technique (A/B/C/D) is the DIRECT fix for features
        on very different numeric scales that cause gradient descent to diverge?

        Submit your answer as TC{<technique>}  e.g.  TC{one-hot-encoding}
      Description: !Sub "TenkaCloud mls-feature-scaling briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to the SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters/?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. Participant role has no
  # cloudformation:DescribeStacks.
  AnswerFlag:
    Description: Flag the learner submits after identifying the correct scaling technique.
    Value: "TC{normalization}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
