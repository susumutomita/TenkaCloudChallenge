AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (scs-permissions-boundary). SCS-C02 IAM Permissions Boundary drill.
  Deploys one IAM role with a PermissionsBoundary attached (AWS managed policy
  ReadOnlyAccess). The inline policy broadly allows s3:* but the boundary caps the
  effective permissions to read-only. The learner must run aws iam get-role and identify
  the IAM feature (PermissionsBoundary) from the role configuration. The answer is
  mirrored only in a CFn Output the participant role cannot read.

  Cost: IAM role and SSM Parameter are free. No EC2. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Allow reading the target role configuration. Scoped to
              # ${NamePrefix}* roles to avoid listing unrelated roles.
              # No cloudformation:DescribeStacks -- the answer must be derived
              # from the role configuration, not from the stack Output.
              - Sid: ReadTargetRole
                Effect: Allow
                Action:
                  - iam:GetRole
                  - iam:ListRolePolicies
                  - iam:GetRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${NamePrefix}*"
              - Sid: ListRoles
                Effect: Allow
                Action:
                  - iam:ListRoles
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # The target role with a PermissionsBoundary attached.
  # The boundary policy (ReadOnlyAccess) caps the maximum effective permissions,
  # even though the inline policy allows s3:*. The effective permissions are
  # the intersection: read-only S3 only.
  BoundedRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-bounded-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Description: !Sub "TenkaCloud scs-permissions-boundary target role for ${NamePrefix}."
      # The Permissions Boundary caps maximum permissions to ReadOnlyAccess.
      # The inline policy below grants s3:* but the boundary is more restrictive.
      PermissionsBoundary: arn:aws:iam::aws:policy/ReadOnlyAccess
      Policies:
        - PolicyName: AllowS3Full
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: AllowAllS3
                Effect: Allow
                Action: "s3:*"
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        Examine the IAM role named "${NamePrefix}-bounded-role". It has an inline
        policy that broadly allows s3:* but there is a special IAM configuration
        that caps its maximum effective permissions to read-only. Run
        "aws iam get-role --role-name ${NamePrefix}-bounded-role" and look for
        the special field. What IAM feature (in kebab-case) caps the maximum
        permissions an IAM identity can be granted? Submit as TC{<feature-name>}.
      Description: !Sub "TenkaCloud scs-permissions-boundary briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BoundedRoleName:
    Description: The IAM role with a PermissionsBoundary to analyze.
    Value: !Ref BoundedRole
  IamConsoleUrl:
    Description: AWS Console deep link to the IAM Roles list.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/iamv2/home?region=${AWS::Region}#/roles"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, scoring engine only (no DescribeStacks granted to player).
  AnswerFlag:
    Description: Flag the learner submits after identifying the IAM Permissions Boundary feature.
    Value: "TC{permissions-boundary}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
