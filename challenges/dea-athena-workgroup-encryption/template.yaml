AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dea-athena-workgroup-encryption). DEA-C01 Athena drill.
  Deploys one S3 bucket (Athena results output) and one Athena WorkGroup whose
  ResultConfiguration declares EncryptionOption SSE_S3. The learner must read the
  WorkGroup configuration to identify the encryption option. The answer is
  mirrored only in a CFn Output the participant role cannot read; players derive
  it from the WorkGroup metadata.

  Cost: Athena WorkGroup definition and empty S3 bucket are free. No query
  execution. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Deliberately NO cloudformation:DescribeStacks -- the answer lives
              # in a CFn Output and must be derived from the WorkGroup config.
              - Sid: GetOwnWorkGroup
                Effect: Allow
                Action:
                  - athena:GetWorkGroup
                Resource: !Sub "arn:aws:athena:${AWS::Region}:${AWS::AccountId}:workgroup/${NamePrefix}-wg"
              - Sid: ConsoleListWorkGroups
                Effect: Allow
                Action:
                  - athena:ListWorkGroups
                Resource: "*"
              - Sid: ListOwnResultsBucket
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetLifecycleConfiguration
                Resource: !GetAtt AthenaResultsBucket.Arn
              - Sid: ConsoleListBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # S3 bucket for Athena query results output. Empty -- no objects uploaded.
  AthenaResultsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${NamePrefix}-athena-results"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireQueryResults
            Status: Enabled
            ExpirationInDays: 30

  # Athena WorkGroup with SSE_S3 encryption on query results.
  # The learner must inspect ResultConfiguration.EncryptionConfiguration.EncryptionOption.
  AthenaWorkGroup:
    Type: AWS::Athena::WorkGroup
    Properties:
      Name: !Sub "${NamePrefix}-wg"
      Description: >-
        TenkaCloud audit workgroup. Encryption option intentionally unlabeled
        in the description -- read the ResultConfiguration to find it.
      State: ENABLED
      WorkGroupConfiguration:
        EnforceWorkGroupConfiguration: true
        ResultConfiguration:
          OutputLocation: !Sub "s3://${AthenaResultsBucket}/results/"
          EncryptionConfiguration:
            EncryptionOption: SSE_S3

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        Athena WorkGroup audit. Identify the EncryptionOption configured on
        WorkGroup ${NamePrefix}-wg. Run:
        aws athena get-work-group --work-group ${NamePrefix}-wg
        Look at Configuration.ResultConfiguration.EncryptionConfiguration.
        EncryptionOption. Convert to lowercase hyphen format and submit as
        TC{option}, e.g. TC{sse-kms}.
      Description: !Sub "TenkaCloud dea-athena-workgroup-encryption briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  WorkGroupName:
    Description: Athena WorkGroup whose encryption option must be identified.
    Value: !Ref AthenaWorkGroup
  ResultsBucketName:
    Description: S3 bucket used for Athena query results output.
    Value: !Ref AthenaResultsBucket
  AthenaConsoleUrl:
    Description: AWS Console deep link to the Athena WorkGroups administration view.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/athena/home?region=${AWS::Region}#/workgroups"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, used by the scoring engine only. The participant role has
  # no cloudformation:DescribeStacks, so this is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the WorkGroup encryption option.
    Value: "TC{sse-s3}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
