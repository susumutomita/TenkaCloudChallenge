AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (aif-inference-temperature). AIF-C01 LLM inference
  parameter drill. Deploys one SSM String parameter describing a need for
  deterministic, reproducible LLM output with three candidate parameters
  (temperature, top-p, max-tokens). The player must identify temperature as
  the parameter to lower toward 0. The answer is stored only in a CFn Output
  the participant role cannot read.

  Cost: SSM parameters and IAM roles are free. No EC2, NAT, or EIP. $0.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: >-
        TASK: LLM Inference Parameter Selection for Deterministic Output.
        Read the requirement below and identify the inference parameter to lower
        toward 0. Submit TC{parameter-name} in lowercase with hyphens.
        Example: TC{max-tokens}

        REQUIREMENT:
        TenkaCloud's AI team has built a contract review tool using an LLM via
        Amazon Bedrock. The QA team is trying to write regression tests, but they
        have run into a problem: when they feed the same contract to the tool twice,
        they get different conclusions each time. For example:
        - Run 1: "Clause 7.3 may expose the company to liability -- REVIEW"
        - Run 2: "Clause 7.3 appears standard -- APPROVE"
        - Run 3: "Clause 7.3 requires legal consultation -- ESCALATE"

        The outputs are non-deterministic. To write automated tests, the tool must
        produce the SAME output given the SAME input, every single time.

        The engineering team wants to know: which inference parameter, when set
        as close to 0 as possible, makes LLM outputs deterministic and repeatable?

        CANDIDATE INFERENCE PARAMETERS:
        A) top-p       -- nucleus sampling threshold: sample next token only from the
                          top P fraction of the probability distribution (0 < P <= 1)
        B) max-tokens  -- maximum number of tokens in the output; controls LENGTH only;
                          does not affect which tokens are chosen or their order
        C) temperature -- scales the probability distribution before sampling: near 0
                          makes the highest-probability token overwhelmingly likely
                          (greedy/deterministic); near 1 preserves the raw distribution
                          (random/creative); above 1 amplifies randomness further

        Which parameter (A/B/C) most directly controls output randomness?
        Submit: TC{top-p}, TC{max-tokens}, or TC{temperature}
      Description: !Sub "TenkaCloud aif-inference-temperature briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  BriefingParameterName:
    Description: SSM Parameter holding the inference parameter briefing.
    Value: !Ref BriefingParameter
  SsmConsoleUrl:
    Description: AWS Console deep link to SSM Parameter Store.
    Value: !Sub "https://${AWS::Region}.console.aws.amazon.com/systems-manager/parameters?region=${AWS::Region}"
  # Canonical answer -- scoring engine only. No cloudformation:DescribeStacks
  # is granted to the participant role, so this Output is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the temperature parameter.
    Value: "TC{temperature}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
