AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Challenge (dea-s3-lifecycle-transition-day). DEA-C01 S3 lifecycle drill.
  Deploys one empty S3 bucket with a lifecycle rule that transitions objects to
  GLACIER after 90 days and expires them after 365 days. No objects are uploaded.
  The learner must read GetBucketLifecycleConfiguration to find the transition day.
  The answer is mirrored only in a CFn Output the participant role cannot read.

  Cost: S3 bucket (empty) and lifecycle configuration are free. No data storage
  charges. $0 for the lifetime of the drill.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format. The deploy chain injects this value
      automatically -- you do not set it manually.
    Description: >
      Common prefix attached to all resource names. Keeps per-team stacks from
      colliding in the same account / region.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # `aws login` (2025-11) OAuth2 flow needs SignInLocalDevelopmentAccess.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # Deliberately NO cloudformation:DescribeStacks -- the answer lives
              # in a CFn Output and must be derived from the lifecycle config.
              - Sid: InspectOwnBucket
                Effect: Allow
                Action:
                  - s3:GetLifecycleConfiguration
                  - s3:GetBucketLocation
                Resource: !GetAtt DataBucket.Arn
              - Sid: ConsoleListBuckets
                Effect: Allow
                Action:
                  - s3:ListAllMyBuckets
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: ReadOwnSsmParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:*:*:parameter/${NamePrefix}/*"
              - Sid: DescribeOwnParameters
                Effect: Allow
                Action: ssm:DescribeParameters
                Resource: "*"
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"

  # Empty S3 bucket with a lifecycle rule. No objects are uploaded.
  # The lifecycle rule is the only artifact the player inspects.
  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${NamePrefix}-data"
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveAndExpire
            Status: Enabled
            Transitions:
              # THE KEY DATA POINT: transition to GLACIER 90 days after object creation.
              # Learner must read this Transitions[].Days value.
              - StorageClass: GLACIER
                TransitionInDays: 90
            ExpirationInDays: 365

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/briefing"
      Type: String
      Value: !Sub >-
        S3 lifecycle audit for bucket ${NamePrefix}-data. Identify the number
        of days after which objects transition to GLACIER. Run:
        aws s3api get-bucket-lifecycle-configuration --bucket ${NamePrefix}-data
        Find Transitions[].Days where StorageClass is GLACIER. Submit as
        TC{N}, e.g. TC{30}.
      Description: !Sub "TenkaCloud dea-s3-lifecycle-transition-day briefing for ${NamePrefix}."
      Tier: Standard

Outputs:
  DataBucketName:
    Description: S3 bucket whose lifecycle rule must be inspected.
    Value: !Ref DataBucket
  S3ConsoleUrl:
    Description: AWS Console deep link to this bucket's lifecycle rules view.
    Value: !Sub "https://s3.console.aws.amazon.com/s3/management/${NamePrefix}-data/lifecycle?region=${AWS::Region}"
  BriefingParameterName:
    Description: SSM Parameter holding the task briefing.
    Value: !Ref BriefingParameter
  # Canonical answer, used by the scoring engine only. The participant role has
  # no cloudformation:DescribeStacks, so this is not readable by the player.
  AnswerFlag:
    Description: Flag the learner submits after identifying the GLACIER transition day.
    Value: "TC{90}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
