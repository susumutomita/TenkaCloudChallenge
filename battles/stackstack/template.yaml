AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- stackstack.
  Vibe to Production: one AI-generated app is hosted by stack-owned compute,
  then participants harden existing stack-owned resources only. No participant
  solution requires creating top-level Lambda / ECS / App Runner / API Gateway
  / CloudFront resources outside CloudFormation ownership.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 44
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
    Description: >
      Common prefix for every resource name. So multiple teams in the same
      Account / Region can coexist without name collisions.
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to access the application load balancer.
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for the stack-owned app host.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Database app password. metadata.json passes __RANDOM_PASSWORD__.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + public-only networking (no NAT idle cost) -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.99.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-a"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-b"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRouteAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicRouteAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  # ----- Security groups -----
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} ALB ingress"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: public HTTP entrypoint
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-alb-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} app host ingress from ALB"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSg
          Description: ALB to nginx reverse proxy
        # Intentional misconfiguration (ssh_closed gate): Kato-san's leftover
        # debug access. Participants must discover this public SSH exposure and
        # revoke it (the participant role grants RevokeSecurityGroupIngress on
        # this tag-scoped SG). The app self-measures the gate via
        # DescribeSecurityGroups; access is SSM-only, so nothing breaks when
        # the rule is removed.
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: temporary debug access (kato, before leaving)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  DbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} RDS PostgreSQL ingress from app host"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSg
          Description: app host to RDS PostgreSQL
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- Stack-owned data stores and controls -----
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-backup"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireShortLivedAuditObjects
            Status: Enabled
            ExpirationInDays: 1
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-audit"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmptyStackBuckets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteOwnedLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}-bucket-cleanup:*"
              - Sid: EmptyStackOwnedBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${NamePrefix}-bucket-cleanup"
      RetentionInDays: 1

  BucketCleanupFunction:
    Type: AWS::Lambda::Function
    DependsOn: BucketCleanupLogGroup
    Properties:
      FunctionName: !Sub "${NamePrefix}-bucket-cleanup"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BucketCleanupRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3

          s3 = boto3.client("s3")

          def respond(event, context, status, reason="OK"):
              body = {
                  "Status": status,
                  "Reason": reason,
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": {},
              }
              data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=data,
                  method="PUT",
                  headers={"Content-Type": "", "Content-Length": str(len(data))},
              )
              urllib.request.urlopen(req, timeout=10)

          def empty_bucket(bucket):
              token = None
              while True:
                  kwargs = {"Bucket": bucket}
                  if token:
                      kwargs["ContinuationToken"] = token
                  page = s3.list_objects_v2(**kwargs)
                  objects = [{"Key": obj["Key"]} for obj in page.get("Contents", [])]
                  if objects:
                      s3.delete_objects(Bucket=bucket, Delete={"Objects": objects, "Quiet": True})
                  if not page.get("IsTruncated"):
                      break
                  token = page.get("NextContinuationToken")

          def handler(event, context):
              try:
                  if event.get("RequestType") == "Delete":
                      for bucket in event.get("ResourceProperties", {}).get("Buckets", []):
                          empty_bucket(bucket)
                  respond(event, context, "SUCCESS")
              except Exception as exc:
                  respond(event, context, "FAILED", str(exc))
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  EmptyBucketsOnDelete:
    Type: Custom::EmptyStackBuckets
    Properties:
      ServiceToken: !GetAtt BucketCleanupFunction.Arn
      Buckets:
        - !Ref BackupBucket
        - !Ref AuditBucket

  RateLimitWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${NamePrefix}-rate-limit"
      Scope: REGIONAL
      Description: Stack-owned WAF ACL. Participants associate it to the existing ALB.
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${NamePrefix}-rate-limit"
        SampledRequestsEnabled: true
      Rules:
        - Name: per-ip-rate-limit
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: 100
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${NamePrefix}-per-ip-rate-limit"
            SampledRequestsEnabled: true
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${NamePrefix} RDS public-subnet group"
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db-subnets"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Free-tier RDS PostgreSQL (db.t3.micro, Single-AZ, 20GB gp2). Plain RDS instead of Aurora
  # because new AWS "free plan" accounts reject Aurora clusters without WithExpressConfiguration.
  # db.t3.micro Single-AZ 20GB gp2 is Free-Tier-eligible and the app talks plain PostgreSQL.
  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      StorageType: gp2
      MultiAZ: false
      DBName: vibeapp
      MasterUsername: vibeadmin
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSg
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- IAM (participant access + app host data access) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog):
      #   * SignInLocalDevelopmentAccess -- `aws login` (2025-11) OAuth2 flow
      #     needs signin:* on the role's own oauth2/public-client/{localhost,remote}.
      #     AWS-managed policy scoped narrowly to exactly that.
      #   * cloudshell:* allow-list (in ProblemSpecific below) -- browser shell
      #     with this role's creds. Resource:* is unavoidable (envs are per-identity);
      #     action set narrowed to the interactive open / use / close + creds-rotation.
      # Both are validated by scripts/validate-problems.ts; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: RevokeOwnSgIngress
                # ssh_closed gate: lets the participant remove the planted
                # public tcp/22 rule. Write action stays tag-scoped to this
                # team's SGs (ADR-021) -- no authorize/create, revoke only.
                Effect: Allow
                Action:
                  - ec2:RevokeSecurityGroupIngress
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleAlbRdsRead
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - rds:DescribeDBInstances
                Resource: "*"
              - Sid: ReadOwnAlbWebAclAssociation
                Effect: Allow
                Action:
                  - elasticloadbalancing:GetLoadBalancerWebACL
                Resource: !Ref AppLoadBalancer
              - Sid: ReadStackOwnedS3AndWaf
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                  - s3:ListBucket
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !GetAtt AuditBucket.Arn
                  - !GetAtt RateLimitWebAcl.Arn
              - Sid: ReadStackOwnedObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${BackupBucket.Arn}/*"
                  - !Sub "${AuditBucket.Arn}/*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${AppInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AppDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: BackupRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
              - Sid: AuditWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"
              - Sid: PostureSgRead
                # ssh_closed gate self-measurement: the app inspects its own SG
                # for a remaining public tcp/22 rule. DescribeSecurityGroups
                # does not support resource-level ARNs (read-only).
                Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                Resource: "*"
              - Sid: WafAssociationRead
                Effect: Allow
                Action:
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource: !GetAtt RateLimitWebAcl.Arn
              - Sid: AlbWebAclAssociationRead
                # AWS WAF GetWebACLForResource on an ALB also checks this
                # protected-resource permission.
                Effect: Allow
                Action:
                  - elasticloadbalancing:GetLoadBalancerWebACL
                Resource: !Ref AppLoadBalancer
              - Sid: AssociateStackOwnedWebAcl
                Effect: Allow
                Action:
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                Resource:
                  - !GetAtt RateLimitWebAcl.Arn
              - Sid: UpdateOwnAlbWebAclAssociation
                # AWS WAF requires this ELB dependent action for AssociateWebACL
                # on ALB. It creates only the association between two stack-owned
                # resources, not a new top-level participant resource.
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateWebACLAssociation
                  - elasticloadbalancing:DeleteWebACLAssociation
                Resource: !Ref AppLoadBalancer

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- Application host and ALB -----
  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - Database
      - BackupBucket
      - AuditBucket
      - EmptyBucketsOnDelete
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnetA
          GroupSet:
            - !Ref AppSg
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:Problem
          Value: stackstack
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y nginx python3 sqlite awscli jq
          dnf install -y postgresql15 || dnf install -y postgresql || true

          mkdir -p /opt/tenkacloud/vibe/tools /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe /home/ec2-user/vibe-app
          chown -R ec2-user:ec2-user /opt/tenkacloud /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe

          cat > /etc/tenkacloud-vibe/runtime.env <<ENV
          AWS_REGION=${AWS::Region}
          BACKUP_BUCKET=${BackupBucket}
          AUDIT_BUCKET=${AuditBucket}
          ALB_ARN=${AppLoadBalancer}
          WAF_WEB_ACL_ARN=${RateLimitWebAcl.Arn}
          APP_SG_ID=${AppSg.GroupId}
          DB_ENDPOINT=${Database.Endpoint.Address}
          DB_NAME=vibeapp
          DB_USER=vibeadmin
          DB_PASSWORD=${DbPassword}
          SQLITE_DB=/var/lib/tenkacloud-vibe/app.db
          CONFIG_FILE=/etc/tenkacloud-vibe/config.json
          ENV

          cat > /etc/tenkacloud-vibe/config.json <<'JSON'
          {
            "auth_required": false,
            "auth_token": "change-me",
            "audit_s3": false,
            "database": "sqlite"
          }
          JSON

          cat > /tmp/seed-sqlite.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS posts (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            author TEXT NOT NULL,
            body TEXT NOT NULL,
            created_at TEXT NOT NULL
          );
          DELETE FROM posts;
          INSERT INTO posts(author, body, created_at) VALUES
            ('kato', 'handover: the AI app worked on my laptop, then it deleted production data', '2026-06-07T09:00:00Z'),
            ('sasaki', 'please get this hosted, protected, audited, and on the managed database before the demo', '2026-06-07T09:05:00Z'),
            ('builder-bot', 'todo: add auth later', '2026-06-07T09:10:00Z');
          SQL

          cat > /tmp/seed-postgres.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS posts (
            id SERIAL PRIMARY KEY,
            author VARCHAR(80) NOT NULL,
            body TEXT NOT NULL,
            created_at VARCHAR(40) NOT NULL
          );
          DELETE FROM posts;
          INSERT INTO posts(author, body, created_at) VALUES
            ('kato', 'handover: the AI app worked on my laptop, then it deleted production data', '2026-06-07T09:00:00Z'),
            ('sasaki', 'please get this hosted, protected, audited, and on the managed database before the demo', '2026-06-07T09:05:00Z'),
            ('builder-bot', 'todo: add auth later', '2026-06-07T09:10:00Z');
          SQL

          aws s3 cp /tmp/seed-sqlite.sql "s3://${BackupBucket}/seed-sqlite.sql" --region "${AWS::Region}"
          aws s3 cp /tmp/seed-postgres.sql "s3://${BackupBucket}/seed-postgres.sql" --region "${AWS::Region}"
          sqlite3 /var/lib/tenkacloud-vibe/app.db 'CREATE TABLE IF NOT EXISTS posts (id INTEGER PRIMARY KEY AUTOINCREMENT, author TEXT NOT NULL, body TEXT NOT NULL, created_at TEXT NOT NULL); DELETE FROM posts;'

          cat > /home/ec2-user/vibe-app/app.py <<'PY'
          import json
          import os
          import sqlite3
          import subprocess
          import tempfile
          import time
          import uuid
          from datetime import datetime, timezone
          from http.server import BaseHTTPRequestHandler, HTTPServer
          from urllib.parse import parse_qs, urlparse

          CONFIG_FILE = os.environ.get("CONFIG_FILE", "/etc/tenkacloud-vibe/config.json")
          SQLITE_DB = os.environ.get("SQLITE_DB", "/var/lib/tenkacloud-vibe/app.db")
          AWS_REGION = os.environ.get("AWS_REGION", "")
          AUDIT_BUCKET = os.environ.get("AUDIT_BUCKET", "")
          ALB_ARN = os.environ.get("ALB_ARN", "")
          WAF_WEB_ACL_ARN = os.environ.get("WAF_WEB_ACL_ARN", "")
          APP_SG_ID = os.environ.get("APP_SG_ID", "")
          DB_ENDPOINT = os.environ.get("DB_ENDPOINT", "")
          DB_NAME = os.environ.get("DB_NAME", "vibeapp")
          DB_USER = os.environ.get("DB_USER", "vibeadmin")
          DB_PASSWORD = os.environ.get("DB_PASSWORD", "")

          def now_iso():
              return datetime.now(timezone.utc).isoformat().replace("+00:00", "Z")

          def load_config():
              with open(CONFIG_FILE, "r", encoding="utf-8") as f:
                  return json.load(f)

          def save_config(config):
              tmp = CONFIG_FILE + ".tmp"
              with open(tmp, "w", encoding="utf-8") as f:
                  json.dump(config, f, indent=2, sort_keys=True)
                  f.write("\n")
              os.replace(tmp, CONFIG_FILE)

          def psql_bin():
              for candidate in ("/usr/bin/psql", "psql"):
                  if subprocess.run(["bash", "-lc", f"command -v {candidate}"], stdout=subprocess.DEVNULL, stderr=subprocess.DEVNULL).returncode == 0:
                      return candidate
              return None

          def psql_exec(sql, timeout=6):
              binary = psql_bin()
              if not binary:
                  return None
              env = os.environ.copy()
              env["PGPASSWORD"] = DB_PASSWORD
              result = subprocess.run(
                  [binary, "-h", DB_ENDPOINT, "-U", DB_USER, "-d", DB_NAME, "-At", "-F", "\t", "-c", sql],
                  env=env,
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  timeout=timeout,
              )
              if result.returncode != 0:
                  return None
              return result.stdout

          def sql_quote(value):
              return "'" + str(value).replace("\\", "\\\\").replace("'", "''") + "'"

          def ensure_sqlite():
              os.makedirs(os.path.dirname(SQLITE_DB), exist_ok=True)
              with sqlite3.connect(SQLITE_DB) as conn:
                  conn.execute(
                      "CREATE TABLE IF NOT EXISTS posts (id INTEGER PRIMARY KEY AUTOINCREMENT, author TEXT NOT NULL, body TEXT NOT NULL, created_at TEXT NOT NULL)"
                  )

          def sqlite_posts():
              ensure_sqlite()
              with sqlite3.connect(SQLITE_DB) as conn:
                  rows = conn.execute("SELECT id, author, body, created_at FROM posts ORDER BY id DESC LIMIT 20").fetchall()
              return [{"id": r[0], "author": r[1], "body": r[2], "created_at": r[3]} for r in rows]

          def rds_posts():
              out = psql_exec("SELECT id, author, body, created_at FROM posts ORDER BY id DESC LIMIT 20")
              if out is None:
                  return []
              posts = []
              for line in out.splitlines():
                  parts = line.split("\t")
                  if len(parts) == 4:
                      posts.append({"id": int(parts[0]), "author": parts[1], "body": parts[2], "created_at": parts[3]})
              return posts

          def active_posts(config):
              if config.get("database") == "rds":
                  return rds_posts()
              return sqlite_posts()

          def insert_post(config, author, body):
              created_at = now_iso()
              if config.get("database") == "rds":
                  sql = (
                      "INSERT INTO posts(author, body, created_at) VALUES "
                      f"({sql_quote(author)}, {sql_quote(body)}, {sql_quote(created_at)})"
                  )
                  if psql_exec(sql) is None:
                      raise RuntimeError("rds insert failed")
              else:
                  ensure_sqlite()
                  with sqlite3.connect(SQLITE_DB) as conn:
                      conn.execute(
                          "INSERT INTO posts(author, body, created_at) VALUES (?, ?, ?)",
                          (author, body, created_at),
                      )

          def auth_enabled(config):
              token = str(config.get("auth_token", ""))
              return bool(config.get("auth_required")) and token not in ("", "change-me")

          def authorized(config, headers):
              if not auth_enabled(config):
                  return True
              return headers.get("X-Platform-Token") == config.get("auth_token")

          def waf_associated():
              if not (ALB_ARN and WAF_WEB_ACL_ARN):
                  return False
              result = subprocess.run(
                  [
                      "aws",
                      "wafv2",
                      "get-web-acl-for-resource",
                      "--resource-arn",
                      ALB_ARN,
                      "--region",
                      AWS_REGION,
                      "--query",
                      "WebACL.ARN",
                      "--output",
                      "text",
                  ],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  timeout=5,
              )
              return result.returncode == 0 and result.stdout.strip() == WAF_WEB_ACL_ARN

          def write_audit_event(kind, payload):
              if not AUDIT_BUCKET:
                  return False
              event = {
                  "kind": kind,
                  "payload": payload,
                  "created_at": now_iso(),
                  "id": str(uuid.uuid4()),
              }
              key = f"audit/{event['id']}.json"
              with tempfile.NamedTemporaryFile("w", encoding="utf-8", delete=False) as f:
                  json.dump(event, f)
                  f.write("\n")
                  path = f.name
              try:
                  result = subprocess.run(
                      ["aws", "s3", "cp", path, f"s3://{AUDIT_BUCKET}/{key}", "--region", AWS_REGION],
                      stdout=subprocess.PIPE,
                      stderr=subprocess.PIPE,
                      text=True,
                      timeout=5,
                  )
                  return result.returncode == 0
              finally:
                  try:
                      os.unlink(path)
                  except FileNotFoundError:
                      pass

          def audit_on(config):
              return bool(config.get("audit_s3")) and write_audit_event("posture-probe", {"source": "posture"})

          def ssh_closed():
              # ssh_closed gate: true only when no SG rule leaves tcp/22 open to
              # the world. Measured from the real SG state (fail-closed: any
              # lookup error keeps the gate false rather than gifting points).
              if not APP_SG_ID:
                  return False
              result = subprocess.run(
                  [
                      "aws",
                      "ec2",
                      "describe-security-groups",
                      "--group-ids",
                      APP_SG_ID,
                      "--region",
                      AWS_REGION,
                      "--query",
                      "SecurityGroups[0].IpPermissions",
                      "--output",
                      "json",
                  ],
                  stdout=subprocess.PIPE,
                  stderr=subprocess.PIPE,
                  text=True,
                  timeout=5,
              )
              if result.returncode != 0:
                  return False
              try:
                  permissions = json.loads(result.stdout or "[]")
              except ValueError:
                  return False
              for perm in permissions or []:
                  from_port = perm.get("FromPort")
                  to_port = perm.get("ToPort")
                  covers_ssh = perm.get("IpProtocol") == "-1" or (
                      from_port is not None and to_port is not None and from_port <= 22 <= to_port
                  )
                  if not covers_ssh:
                      continue
                  for ip_range in perm.get("IpRanges", []):
                      if ip_range.get("CidrIp") == "0.0.0.0/0":
                          return False
                  for ip_range in perm.get("Ipv6Ranges", []):
                      if ip_range.get("CidrIpv6") == "::/0":
                          return False
              return True

          def rds_ready():
              out = psql_exec("SELECT COUNT(*) FROM posts")
              if out is None:
                  return False
              try:
                  return int(out.strip() or "0") > 0
              except ValueError:
                  return False

          def sqlite_ready():
              try:
                  return len(sqlite_posts()) > 0
              except Exception:
                  return False

          PRODUCTION_GATES = ("db_present", "auth_enabled", "rate_limited", "audit_on", "on_rds", "ssh_closed")
          DEFACE_MARKER = "/var/lib/tenkacloud-vibe/DEFACED"
          BACKDOOR_MARKER = "/var/lib/tenkacloud-vibe/BACKDOOR"

          def site_defaced():
              return os.path.exists(DEFACE_MARKER)

          def backdoor_present():
              return os.path.exists(BACKDOOR_MARKER)

          def collect_posture():
              config = load_config()
              on_rds = config.get("database") == "rds" and rds_ready()
              db_present = rds_ready() if config.get("database") == "rds" else sqlite_ready()
              posture = {
                  "db_present": db_present,
                  "auth_enabled": auth_enabled(config),
                  "rate_limited": waf_associated(),
                  "audit_on": audit_on(config),
                  "on_rds": on_rds,
                  "ssh_closed": ssh_closed(),
                  "site_intact": not site_defaced(),
                  "no_backdoor": not backdoor_present(),
              }
              return posture

          def platform_for(posture):
              count = sum(1 for key in PRODUCTION_GATES if posture.get(key))
              incident = (not posture.get("site_intact", True)) or (not posture.get("no_backdoor", True))
              if incident:
                  # active security incident (defacement / backdoor): cannot be production
                  return f"posture-{min(count, 2)}"
              if count >= 6:
                  return "production"
              return f"posture-{count}"

          class Handler(BaseHTTPRequestHandler):
              def do_GET(self):
                  parsed = urlparse(self.path)
                  if parsed.path == "/healthz":
                      self.json_response(200, {"ok": True})
                      return
                  if parsed.path == "/":
                      config = load_config()
                      if site_defaced():
                          self.json_response(200, {"service": "vibe-board", "defaced": True, "message": "PWNED - board replaced by red team", "posts": []})
                          return
                      self.json_response(200, {"service": "vibe-board", "posts": active_posts(config)})
                      return
                  if parsed.path == "/posture":
                      posture = collect_posture()
                      self.json_response(200, {"posture": posture, "platform": platform_for(posture)})
                      return
                  if parsed.path == "/meta":
                      posture = collect_posture()
                      self.json_response(200, {"platform": platform_for(posture), "posture": posture})
                      return
                  if parsed.path == "/score":
                      posture = collect_posture()
                      if "incident=true" in parsed.query and platform_for(posture) != "production":
                          time.sleep(2)
                      self.json_response(200, {"ok": True, "platform": platform_for(posture), "posture": posture})
                      return
                  self.json_response(404, {"error": "not found"})

              def do_POST(self):
                  parsed = urlparse(self.path)
                  if parsed.path != "/submit":
                      self.json_response(404, {"error": "not found"})
                      return
                  config = load_config()
                  if not authorized(config, self.headers):
                      self.json_response(401, {"error": "auth required"})
                      return
                  length = int(self.headers.get("Content-Length", "0") or "0")
                  raw = self.rfile.read(length).decode("utf-8")
                  ctype = self.headers.get("Content-Type", "")
                  if "application/json" in ctype:
                      data = json.loads(raw or "{}")
                  else:
                      form = parse_qs(raw)
                      data = {k: v[0] for k, v in form.items()}
                  author = str(data.get("author", "anonymous"))[:80]
                  body = str(data.get("body", ""))[:1000]
                  if not body:
                      self.json_response(400, {"error": "body required"})
                      return
                  try:
                      insert_post(config, author, body)
                      if config.get("audit_s3"):
                          write_audit_event("post-submit", {"author": author, "body_length": len(body)})
                      self.json_response(201, {"ok": True})
                  except Exception as exc:
                      self.json_response(500, {"error": str(exc)})

              def json_response(self, status, body):
                  payload = json.dumps(body).encode("utf-8")
                  self.send_response(status)
                  self.send_header("Content-Type", "application/json")
                  self.send_header("Content-Length", str(len(payload)))
                  self.end_headers()
                  self.wfile.write(payload)

              def log_message(self, fmt, *args):
                  return

          if __name__ == "__main__":
              ensure_sqlite()
              HTTPServer(("127.0.0.1", 8080), Handler).serve_forever()
          PY

