          #!/usr/bin/env bash
          set -euo pipefail
          source /etc/tenkacloud-vibe/runtime.env
          sqlite3 "$SQLITE_DB" 'CREATE TABLE IF NOT EXISTS posts (id INTEGER PRIMARY KEY AUTOINCREMENT, author TEXT NOT NULL, body TEXT NOT NULL, created_at TEXT NOT NULL); DELETE FROM posts;'
          if command -v psql >/dev/null 2>&1; then
            PGPASSWORD="$DB_PASSWORD" psql -h "$DB_ENDPOINT" -U "$DB_USER" -d "$DB_NAME" -c 'DELETE FROM posts;' || true
          fi
          systemctl restart tenkacloud-vibe
          SH
          chmod +x /opt/tenkacloud/vibe/wipe_database.sh

          cat > /opt/tenkacloud/vibe/deface_site.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          # Red-team: simulated defacement. App serves a PWNED banner and posture
          # drops out of production until the marker is removed.
          touch /var/lib/tenkacloud-vibe/DEFACED
          SH
          chmod +x /opt/tenkacloud/vibe/deface_site.sh

          cat > /opt/tenkacloud/vibe/restore_site.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          rm -f /var/lib/tenkacloud-vibe/DEFACED
          SH
          chmod +x /opt/tenkacloud/vibe/restore_site.sh

          cat > /opt/tenkacloud/vibe/install_backdoor.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          # Red-team: simulated supply-chain backdoor artifact dropped on the host.
          # posture drops out of production until the artifact is removed.
          touch /var/lib/tenkacloud-vibe/BACKDOOR
          SH
          chmod +x /opt/tenkacloud/vibe/install_backdoor.sh

          cat > /opt/tenkacloud/vibe/remove_backdoor.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          rm -f /var/lib/tenkacloud-vibe/BACKDOOR
          SH
          chmod +x /opt/tenkacloud/vibe/remove_backdoor.sh

          cat > /opt/tenkacloud/vibe/deploy_app.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          # Deploy the locally-built app onto the cloud host: install the build to the
          # runtime path and bring the service up behind the ALB.
          install -m 0644 -D /home/ec2-user/vibe-app/app.py /opt/tenkacloud/vibe/app.py
          systemctl enable --now tenkacloud-vibe
          systemctl restart nginx
          echo "deployed: app is live on this host"
          SH
          chmod +x /opt/tenkacloud/vibe/deploy_app.sh

          # On-box guidance: fetch the live-status tool from SSM (kept out of UserData
          # to respect the 16 KB limit) and add a one-line login banner pointing to it.
          aws ssm get-parameter --name "/${NamePrefix}/vibe-status-tool" --query Parameter.Value --output text --region ${AWS::Region} > /usr/local/bin/vibe-status 2>/dev/null && chmod +x /usr/local/bin/vibe-status || true
          cat > /etc/profile.d/stackstack-guide.sh <<'SH'
          echo "StackStack app host. First: /opt/tenkacloud/vibe/deploy_app.sh then register Stack Output AppUrlHint in the Portal. Then run 'vibe-status' for the production gates + the exact fix command for each."
          SH

          chown -R ec2-user:ec2-user /opt/tenkacloud /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe /home/ec2-user/vibe-app

          cat > /etc/systemd/system/tenkacloud-vibe.service <<'UNIT'
          [Unit]
          Description=TenkaCloud StackStack vibe app
          After=network-online.target
          Wants=network-online.target

          [Service]
          EnvironmentFile=/etc/tenkacloud-vibe/runtime.env
          ExecStart=/usr/bin/python3 /opt/tenkacloud/vibe/app.py
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat > /etc/nginx/conf.d/stackstack.conf <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              location / {
                  proxy_set_header Host $host;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_set_header X-Forwarded-Proto $scheme;
                  proxy_pass http://127.0.0.1:8080;
              }
          }
          NGINX
          rm -f /etc/nginx/conf.d/default.conf || true

          systemctl daemon-reload
          # NOTE: tenkacloud-vibe is intentionally NOT started here. The app ships as a
          # local build in ~/vibe-app; the participant deploys it with deploy_app.sh.
          systemctl enable --now nginx

  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /healthz
      Matcher:
        HttpCode: "200"
      Targets:
        - Id: !Ref AppInstance
          Port: 80
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-tg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSg
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

Outputs:
  RegisteredUrl:
    Description: Empty by design. Competitors must register AppUrlHint in the portal before scoring starts.
    Value: ""
  AppUrlHint:
    Description: Paste this URL into the StackStack app endpoint override to start scoring.
    Value: !Sub "http://${AppLoadBalancer.DNSName}"
  BackupBucketName:
    Description: Stack-owned S3 bucket containing seed-sqlite.sql and seed-postgres.sql restore dumps.
    Value: !Ref BackupBucket
  AuditBucketName:
    Description: Stack-owned S3 bucket used by the app audit trail.
    Value: !Ref AuditBucket
  DbEndpoint:
    Description: Free-tier RDS PostgreSQL (db.t3.micro) endpoint for the production migration.
    Value: !GetAtt Database.Endpoint.Address
  DbDatabaseName:
    Description: Application database name.
    Value: vibeapp
  DbUser:
    Description: Application database username.
    Value: vibeadmin
  WebAclArn:
    Description: Existing WAFv2 WebACL ARN. Associate it with LoadBalancerArn to enable rate limiting.
    Value: !GetAtt RateLimitWebAcl.Arn
  LoadBalancerArn:
    Description: Existing ALB ARN used by the WAF association step.
    Value: !Ref AppLoadBalancer
  InstanceId:
    Description: EC2 InstanceId for connecting via SSM Session Manager (no SSH required).
    Value: !Ref AppInstance
  SsmStartSessionCommand:
    Description: aws cli command for ops debug and participant remediation.
    Value: !Sub "aws ssm start-session --target ${AppInstance}"
  NamePrefix:
    Description: Common stack prefix (value passed in by the deploy script).
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
