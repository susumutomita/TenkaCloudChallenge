          import os
          import sqlite3

          sqlite_db = os.environ.get("SQLITE_DB", "/var/lib/tenkacloud-vibe/app.db")

          def q(value):
              return "'" + str(value).replace("\\", "\\\\").replace("'", "''") + "'"

          print(
              "CREATE TABLE IF NOT EXISTS posts ("
              "id SERIAL PRIMARY KEY, "
              "author VARCHAR(80) NOT NULL, "
              "body TEXT NOT NULL, "
              "created_at VARCHAR(40) NOT NULL"
              ");"
          )
          print("DELETE FROM posts;")
          with sqlite3.connect(sqlite_db) as conn:
              rows = conn.execute("SELECT author, body, created_at FROM posts ORDER BY id").fetchall()
          for author, body, created_at in rows:
              print(f"INSERT INTO posts(author, body, created_at) VALUES ({q(author)}, {q(body)}, {q(created_at)});")
