AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- stackstack.
  Vibe to Production: one AI-generated app is hosted by stack-owned compute,
  then participants harden existing stack-owned resources only. No participant
  solution requires creating top-level Lambda / ECS / App Runner / API Gateway
  / CloudFront resources outside CloudFormation ownership.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 44
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
    Description: >
      Common prefix for every resource name. So multiple teams in the same
      Account / Region can coexist without name collisions.
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to access the application load balancer.
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for the stack-owned app host.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: Database app password. metadata.json passes __RANDOM_PASSWORD__.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + public-only networking (no NAT idle cost) -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.99.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-a"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnetB:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-b"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRouteAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  PublicRouteAssocB:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetB

  # ----- Security groups -----
  AlbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} ALB ingress"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: public HTTP entrypoint
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-alb-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} app host ingress from ALB"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          SourceSecurityGroupId: !Ref AlbSg
          Description: ALB to nginx reverse proxy
        # Intentional misconfiguration (ssh_closed gate): Kato-san's leftover
        # debug access. Participants must discover this public SSH exposure and
        # revoke it (the participant role grants RevokeSecurityGroupIngress on
        # this tag-scoped SG). The app self-measures the gate via
        # DescribeSecurityGroups; access is SSM-only, so nothing breaks when
        # the rule is removed.
        - IpProtocol: tcp
          FromPort: 22
          ToPort: 22
          CidrIp: 0.0.0.0/0
          Description: temporary debug access (kato, before leaving)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  DbSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} RDS PostgreSQL ingress from app host"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5432
          ToPort: 5432
          SourceSecurityGroupId: !Ref AppSg
          Description: app host to RDS PostgreSQL
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- Stack-owned data stores and controls -----
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-backup"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      LifecycleConfiguration:
        Rules:
          - Id: ExpireShortLivedAuditObjects
            Status: Enabled
            ExpirationInDays: 1
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-audit"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmptyStackBuckets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteOwnedLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}-bucket-cleanup:*"
              - Sid: EmptyStackOwnedBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${NamePrefix}-bucket-cleanup"
      RetentionInDays: 1

  BucketCleanupFunction:
    Type: AWS::Lambda::Function
    DependsOn: BucketCleanupLogGroup
    Properties:
      # No explicit FunctionName: ${NamePrefix}-bucket-cleanup would overflow the
      # 64-char Lambda FunctionName limit for long team names (#1812). CloudFormation
      # auto-generates a <=64 name; LoggingConfig keeps logs in the stack-managed
      # BucketCleanupLogGroup (so retention + teardown cleanup + the logs IAM policy,
      # which references that log group by name, all stay unchanged).
      LoggingConfig:
        LogGroup: !Ref BucketCleanupLogGroup
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BucketCleanupRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3

          s3 = boto3.client("s3")

          def respond(event, context, status, reason="OK"):
              body = {
                  "Status": status,
                  "Reason": reason,
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": {},
              }
              data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=data,
                  method="PUT",
                  headers={"Content-Type": "", "Content-Length": str(len(data))},
              )
              urllib.request.urlopen(req, timeout=10)

          def empty_bucket(bucket):
              token = None
              while True:
                  kwargs = {"Bucket": bucket}
                  if token:
                      kwargs["ContinuationToken"] = token
                  page = s3.list_objects_v2(**kwargs)
                  objects = [{"Key": obj["Key"]} for obj in page.get("Contents", [])]
                  if objects:
                      s3.delete_objects(Bucket=bucket, Delete={"Objects": objects, "Quiet": True})
                  if not page.get("IsTruncated"):
                      break
                  token = page.get("NextContinuationToken")

          def handler(event, context):
              try:
                  if event.get("RequestType") == "Delete":
                      for bucket in event.get("ResourceProperties", {}).get("Buckets", []):
                          empty_bucket(bucket)
                  respond(event, context, "SUCCESS")
              except Exception as exc:
                  respond(event, context, "FAILED", str(exc))
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  EmptyBucketsOnDelete:
    Type: Custom::EmptyStackBuckets
    Properties:
      ServiceToken: !GetAtt BucketCleanupFunction.Arn
      Buckets:
        - !Ref BackupBucket
        - !Ref AuditBucket

  RateLimitWebAcl:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${NamePrefix}-rate-limit"
      Scope: REGIONAL
      Description: Stack-owned WAF ACL. Participants associate it to the existing ALB.
      DefaultAction:
        Allow: {}
      VisibilityConfig:
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${NamePrefix}-rate-limit"
        SampledRequestsEnabled: true
      Rules:
        - Name: per-ip-rate-limit
          Priority: 0
          Action:
            Block: {}
          Statement:
            RateBasedStatement:
              AggregateKeyType: IP
              Limit: 100
          VisibilityConfig:
            CloudWatchMetricsEnabled: true
            MetricName: !Sub "${NamePrefix}-per-ip-rate-limit"
            SampledRequestsEnabled: true
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  DbSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: !Sub "${NamePrefix} RDS public-subnet group"
      SubnetIds:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db-subnets"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # Free-tier RDS PostgreSQL (db.t3.micro, Single-AZ, 20GB gp2). Plain RDS instead of Aurora
  # because new AWS "free plan" accounts reject Aurora clusters without WithExpressConfiguration.
  # db.t3.micro Single-AZ 20GB gp2 is Free-Tier-eligible and the app talks plain PostgreSQL.
  Database:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    UpdateReplacePolicy: Delete
    Properties:
      Engine: postgres
      DBInstanceClass: db.t3.micro
      AllocatedStorage: "20"
      StorageType: gp2
      MultiAZ: false
      DBName: vibeapp
      MasterUsername: vibeadmin
      MasterUserPassword: !Ref DbPassword
      DBSubnetGroupName: !Ref DbSubnetGroup
      VPCSecurityGroups:
        - !Ref DbSg
      PubliclyAccessible: false
      BackupRetentionPeriod: 0
      DeletionProtection: false
      StorageEncrypted: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-db"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- IAM (participant access + app host data access) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog):
      #   * SignInLocalDevelopmentAccess -- `aws login` (2025-11) OAuth2 flow
      #     needs signin:* on the role's own oauth2/public-client/{localhost,remote}.
      #     AWS-managed policy scoped narrowly to exactly that.
      #   * cloudshell:* allow-list (in ProblemSpecific below) -- browser shell
      #     with this role's creds. Resource:* is unavoidable (envs are per-identity);
      #     action set narrowed to the interactive open / use / close + creds-rotation.
      # Both are validated by scripts/validate-problems.ts; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: RevokeOwnSgIngress
                # ssh_closed gate: lets the participant remove the planted
                # public tcp/22 rule. Write action stays tag-scoped to this
                # team's SGs (ADR-021) -- no authorize/create, revoke only.
                Effect: Allow
                Action:
                  - ec2:RevokeSecurityGroupIngress
                Resource: !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleAlbRdsRead
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - rds:DescribeDBInstances
                Resource: "*"
              - Sid: ReadOwnAlbWebAclAssociation
                Effect: Allow
                Action:
                  - elasticloadbalancing:GetLoadBalancerWebACL
                Resource: !Ref AppLoadBalancer
              - Sid: ReadStackOwnedS3AndWaf
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:GetBucketPublicAccessBlock
                  - s3:GetBucketPolicy
                  - s3:ListBucket
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !GetAtt AuditBucket.Arn
                  - !GetAtt RateLimitWebAcl.Arn
              - Sid: ReadStackOwnedObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${BackupBucket.Arn}/*"
                  - !Sub "${AuditBucket.Arn}/*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${AppInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AppDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: BackupRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
              - Sid: AuditWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"
              - Sid: PostureSgRead
                # ssh_closed gate self-measurement: the app inspects its own SG
                # for a remaining public tcp/22 rule. DescribeSecurityGroups
                # does not support resource-level ARNs (read-only).
                Effect: Allow
                Action:
                  - ec2:DescribeSecurityGroups
                Resource: "*"
              - Sid: WafAssociationRead
                Effect: Allow
                Action:
                  - wafv2:GetWebACL
                  - wafv2:GetWebACLForResource
                Resource: !GetAtt RateLimitWebAcl.Arn
              - Sid: AlbWebAclAssociationRead
                # AWS WAF GetWebACLForResource on an ALB also checks this
                # protected-resource permission.
                Effect: Allow
                Action:
                  - elasticloadbalancing:GetLoadBalancerWebACL
                Resource: !Ref AppLoadBalancer
              - Sid: AssociateStackOwnedWebAcl
                Effect: Allow
                Action:
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                Resource:
                  - !GetAtt RateLimitWebAcl.Arn
              - Sid: UpdateOwnAlbWebAclAssociation
                # AWS WAF requires this ELB dependent action for AssociateWebACL
                # on ALB. It creates only the association between two stack-owned
                # resources, not a new top-level participant resource.
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateWebACLAssociation
                  - elasticloadbalancing:DeleteWebACLAssociation
                Resource: !Ref AppLoadBalancer

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- Application host and ALB -----
  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - Database
      - BackupBucket
      - AuditBucket
      - EmptyBucketsOnDelete
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnetA
          GroupSet:
            - !Ref AppSg
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:Problem
          Value: stackstack
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y nginx python3 sqlite awscli jq
          dnf install -y postgresql15 || dnf install -y postgresql || true

          mkdir -p /opt/tenkacloud/vibe/tools /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe /home/ec2-user/vibe-app
          chown -R ec2-user:ec2-user /opt/tenkacloud /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe

          cat > /etc/tenkacloud-vibe/runtime.env <<ENV
          AWS_REGION=${AWS::Region}
          BACKUP_BUCKET=${BackupBucket}
          AUDIT_BUCKET=${AuditBucket}
          ALB_ARN=${AppLoadBalancer}
          WAF_WEB_ACL_ARN=${RateLimitWebAcl.Arn}
          APP_SG_ID=${AppSg.GroupId}
          DB_ENDPOINT=${Database.Endpoint.Address}
          DB_NAME=vibeapp
          DB_USER=vibeadmin
          DB_PASSWORD=${DbPassword}
          SQLITE_DB=/var/lib/tenkacloud-vibe/app.db
          CONFIG_FILE=/etc/tenkacloud-vibe/config.json
          ENV

          cat > /etc/tenkacloud-vibe/config.json <<'JSON'
          {
            "auth_required": false,
            "auth_token": "change-me",
            "audit_s3": false,
            "database": "sqlite"
          }
          JSON

          cat > /tmp/seed-sqlite.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS posts (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            author TEXT NOT NULL,
            body TEXT NOT NULL,
            created_at TEXT NOT NULL
          );
          DELETE FROM posts;
          INSERT INTO posts(author, body, created_at) VALUES
            ('kato', 'handover: the AI app worked on my laptop, then it deleted production data', '2026-06-07T09:00:00Z'),
            ('sasaki', 'please get this hosted, protected, audited, and on the managed database before the demo', '2026-06-07T09:05:00Z'),
            ('builder-bot', 'todo: add auth later', '2026-06-07T09:10:00Z');
          SQL

          cat > /tmp/seed-postgres.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS posts (
            id SERIAL PRIMARY KEY,
            author VARCHAR(80) NOT NULL,
            body TEXT NOT NULL,
            created_at VARCHAR(40) NOT NULL
          );
          DELETE FROM posts;
          INSERT INTO posts(author, body, created_at) VALUES
            ('kato', 'handover: the AI app worked on my laptop, then it deleted production data', '2026-06-07T09:00:00Z'),
            ('sasaki', 'please get this hosted, protected, audited, and on the managed database before the demo', '2026-06-07T09:05:00Z'),
            ('builder-bot', 'todo: add auth later', '2026-06-07T09:10:00Z');
          SQL

          aws s3 cp /tmp/seed-sqlite.sql "s3://${BackupBucket}/seed-sqlite.sql" --region "${AWS::Region}"
          aws s3 cp /tmp/seed-postgres.sql "s3://${BackupBucket}/seed-postgres.sql" --region "${AWS::Region}"
          sqlite3 /var/lib/tenkacloud-vibe/app.db 'CREATE TABLE IF NOT EXISTS posts (id INTEGER PRIMARY KEY AUTOINCREMENT, author TEXT NOT NULL, body TEXT NOT NULL, created_at TEXT NOT NULL); DELETE FROM posts;'

          # vibe app (app.py) is gzip+base64 embedded to keep EC2 UserData under the
          # 16384-byte limit (Service: Ec2 InvalidRequest on oversized user data).
          # To edit: pipe the blob below through (base64 decode | gunzip) to recover
          # app.py, modify, then re-encode with: gzip -9 < app.py | base64
          base64 -d <<'APPB64' | gunzip > /home/ec2-user/vibe-app/app.py
