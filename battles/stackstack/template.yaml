  AppTargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      VpcId: !Ref Vpc
      Port: 80
      Protocol: HTTP
      TargetType: instance
      HealthCheckPath: /healthz
      Matcher:
        HttpCode: "200"
      Targets:
        - Id: !Ref AppInstance
          Port: 80
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-tg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppLoadBalancer:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Scheme: internet-facing
      Type: application
      SecurityGroups:
        - !Ref AlbSg
      Subnets:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetB
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AppListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref AppLoadBalancer
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref AppTargetGroup

Outputs:
  RegisteredUrl:
    Description: Empty by design. Competitors must register AppUrlHint in the portal before scoring starts.
    Value: ""
  AppUrlHint:
    Description: Paste this URL into the StackStack app endpoint override to start scoring.
    Value: !Sub "http://${AppLoadBalancer.DNSName}"
  BackupBucketName:
    Description: Stack-owned S3 bucket containing seed-sqlite.sql and seed-postgres.sql restore dumps.
    Value: !Ref BackupBucket
  AuditBucketName:
    Description: Stack-owned S3 bucket used by the app audit trail.
    Value: !Ref AuditBucket
  DbEndpoint:
    Description: Free-tier RDS PostgreSQL (db.t3.micro) endpoint for the production migration.
    Value: !GetAtt Database.Endpoint.Address
  DbDatabaseName:
    Description: Application database name.
    Value: vibeapp
  DbUser:
    Description: Application database username.
    Value: vibeadmin
  WebAclArn:
    Description: Existing WAFv2 WebACL ARN. Associate it with LoadBalancerArn to enable rate limiting.
    Value: !GetAtt RateLimitWebAcl.Arn
  LoadBalancerArn:
    Description: Existing ALB ARN used by the WAF association step.
    Value: !Ref AppLoadBalancer
  InstanceId:
    Description: EC2 InstanceId for connecting via SSM Session Manager (no SSH required).
    Value: !Ref AppInstance
  SsmStartSessionCommand:
    Description: aws cli command for ops debug and participant remediation.
    Value: !Sub "aws ssm start-session --target ${AppInstance}"
  NamePrefix:
    Description: Common stack prefix (value passed in by the deploy script).
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
