AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- waf-classic-kuyo (WAF Classic kuyo / WAF v2 migration).
  Deploys a DEFENSELESS legacy profile API (Lambda + API Gateway REST, regional) plus the
  attack-detection scoring coordinates (SSM Parameter). The competitor must create a WAFv2
  WebACL and associate it with the REST stage -- WAF Classic (v1) reached end of support on
  2025-09-30 and cannot attach to API Gateway, so the migration to WAF v2 IS the problem.

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
      Pass the prefix generated by the application-admin-console DeployForm.
    Description: Common prefix for every resource name so teams in one Account/Region don't collide.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # --- The legacy "profile API" WAF Classic used to guard (now defenseless) ---
  ProfileFnRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ProfileFn:
    Type: AWS::Lambda::Function
    Properties:
      Runtime: nodejs20.x
      Handler: index.handler
      Role: !GetAtt ProfileFnRole.Arn
      Timeout: 10
      Code:
        ZipFile: |
          // Legacy profile API. Intentionally naive -- WAF Classic used to filter the
          // hostile input before it reached here. Your job is to put WAF v2 back in front.
          exports.handler = async (event) => {
            const path = event.path || (event.requestContext && event.requestContext.path) || "/";
            const q = (event.queryStringParameters || {});
            return {
              statusCode: 200,
              headers: { "content-type": "application/json" },
              body: JSON.stringify({
                service: "legacy-profile-api",
                guardedBy: "AWS WAF Classic (v1) -- EOL 2025-09-30",
                migrateTo: "AWS WAF v2 (WAFv2 WebACL)",
                path,
                echo: q,
              }),
            };
          }

  # --- API Gateway REST API (regional): a WAFv2 REGIONAL WebACL can associate with this stage ---
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${NamePrefix}-waf-kuyo"
      Description: Defenseless legacy profile API awaiting a WAF v2 WebACL.
      EndpointConfiguration:
        Types: [REGIONAL]

  ProxyResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: "{proxy+}"

  ProxyMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProxyResource
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProfileFn.Arn}/invocations"

  RootMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !GetAtt RestApi.RootResourceId
      HttpMethod: ANY
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ProfileFn.Arn}/invocations"

  Deployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: [ProxyMethod, RootMethod]
    Properties:
      RestApiId: !Ref RestApi

  ProdStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref Deployment
      StageName: prod

  InvokePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ProfileFn
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*/*/*"

  # --- The legacy relic: the discontinued WAF Classic ACL the competitor must reproduce on v2 ---
  LegacyWafClassicAclParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/tenkacloud/${NamePrefix}/legacy-waf-classic-acl"
      Type: String
      Description: WAF Classic (v1, EOL 2025-09-30) WebACL export. Reproduce these 3 rules on WAF v2.
      Value: |
        {"WebACL":{"Name":"tenkacloud-profile-classic","DefaultAction":{"Type":"ALLOW"}},
         "Rules":[
           {"Priority":1,"Name":"block-bad-ips","Action":{"Type":"BLOCK"},"Type":"REGULAR","Predicates":[{"Type":"IPMatch","DataId":"bad-ipset"}],"migrateTo":"WAFv2 IPSet + IPSetReferenceStatement (Block)"},
           {"Priority":2,"Name":"block-sqli","Action":{"Type":"BLOCK"},"Type":"REGULAR","Predicates":[{"Type":"SqlInjectionMatch","DataId":"sqli-body-qs"}],"migrateTo":"WAFv2 SqliMatchStatement (BODY+QUERY_STRING)"},
           {"Priority":3,"Name":"rate-limit-2000","Action":{"Type":"BLOCK"},"Type":"RATE_BASED","RateKey":"IP","RateLimit":2000,"migrateTo":"WAFv2 RateBasedStatement {Limit:2000,AggregateKeyType:IP}"}
         ],
         "Conditions":{
           "IPSet:bad-ipset":{"IPSetDescriptors":[{"Type":"IPV4","Value":"203.0.113.0/24"},{"Type":"IPV4","Value":"198.51.100.7/32"}]},
           "SqlInjectionMatchSet:sqli-body-qs":{"SqlInjectionMatchTuples":[{"FieldToMatch":{"Type":"BODY"},"TextTransformation":"URL_DECODE"},{"FieldToMatch":{"Type":"QUERY_STRING"},"TextTransformation":"HTML_ENTITY_DECODE"}]}
         }}

  BriefingParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/tenkacloud/${NamePrefix}/briefing"
      Type: String
      Value: >
        WAF Classic (v1) reached end of support on 2025-09-30. The legacy WebACL that guarded
        this profile API is exported at SSM /tenkacloud/<NamePrefix>/legacy-waf-classic-acl
        (3 rules: IP blocklist 203.0.113.0/24 + 198.51.100.7/32, SQLi on BODY+QUERY_STRING,
        rate-limit 2000/IP). Reproduce the SAME 3 rules on a Scope=REGIONAL AWS::WAFv2::WebACL and
        associate it with the REST stage (ResourceArn = RestApiStageArn). The scorer probes GET /
        (keep it 200) and fires SQLi (must be blocked); score = legit uptime minus un-blocked SQLi.

  # --- Participant access (platform convention; validated by validate-problems.ts) ---
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Baseline shared by every problem: SignInLocalDevelopmentAccess (`aws login` OAuth2)
      # + the CloudShell interactive allow-list. Both are validated; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              # The migration work: create a WAFv2 WebACL and associate it with the REST stage.
              - Sid: WafV2Migration
                Effect: Allow
                Action:
                  - wafv2:CreateWebACL
                  - wafv2:GetWebACL
                  - wafv2:UpdateWebACL
                  - wafv2:DeleteWebACL
                  - wafv2:ListWebACLs
                  - wafv2:ListResourcesForWebACL
                  - wafv2:GetWebACLForResource
                  - wafv2:AssociateWebACL
                  - wafv2:DisassociateWebACL
                  - wafv2:TagResource
                  - wafv2:UntagResource
                  - wafv2:ListTagsForResource
                Resource: "*"
              # See the defense working: BlockedRequests on AWS/WAFV2.
              - Sid: ReadWafMetrics
                Effect: Allow
                Action:
                  - cloudwatch:GetMetricData
                  - cloudwatch:GetMetricStatistics
                  - cloudwatch:ListMetrics
                Resource: "*"
              # Inspect the REST API / stage to associate the WebACL.
              - Sid: ReadApiGateway
                Effect: Allow
                Action:
                  - apigateway:GET
                Resource: "*"
              # Briefing + scoring coordinates handed out by this stack.
              - Sid: ReadOwnParameters
                Effect: Allow
                Action:
                  - ssm:GetParameter
                  - ssm:GetParameters
                  - ssm:GetParametersByPath
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:parameter/tenkacloud/${NamePrefix}/*"

Outputs:
  ParticipantViewerRoleArn:
    Description: Role the participant assumes (passed back to the portal).
    Value: !GetAtt ParticipantViewerRole.Arn
  ApiUrl:
    Description: Invoke URL of the defenseless legacy API (attach WAF v2 to defend it).
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/"
  RestApiStageArn:
    Description: WAFv2 WebACLAssociation ResourceArn -- associate your WebACL here.
    Value: !Sub "arn:aws:apigateway:${AWS::Region}::/restapis/${RestApi}/stages/prod"
  LegacyWafClassicAclParameterName:
    Description: SSM Parameter holding the discontinued WAF Classic ACL to reproduce on WAF v2.
    Value: !Ref LegacyWafClassicAclParameter
