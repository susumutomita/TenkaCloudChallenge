AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- microservice-migration-battle (Phase 1).
  Single EC2 (Amazon Linux 2023, t3.small) running 3 Node.js + Hono services
  (users / orders / catalog) behind an nginx reverse proxy on port 80. Competitors
  split this monolith into Lambda + API Gateway / ECS Fargate / App Runner
  during a timed Battle. Phase 1 ships only the EC2 monolith; Phase 2 adds the
  score engine + EC2 degradation + legacy switch, and Phase 3 adds the
  endpoint registration UI.

  So multiple teams' problem stacks can coexist in the same (Account, Region),
  every resource name is prefixed with ${NamePrefix} (= "tc-{problemSlug}-{teamSlug}",
  matches the UI's buildStackPrefix).

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
      Pass the prefix generated by the application-admin-console DeployForm.
    Description: >
      Common prefix for every resource name. So multiple teams in the same Account / Region can
      coexist without name collisions.
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to access nginx (port 80).
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
    Description: EC2 instance type. t3.small recommended because 3 Node.js processes + nginx run side by side.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  RepoUrl:
    Type: String
    Default: https://github.com/susumutomita/TenkaCloud.git
    Description: Problem source origin (assumes a public GitHub repository).
  RepoRef:
    Type: String
    Default: main
    Description: branch / tag / commit to check out.
  DegradedAfterMinutes:
    Type: Number
    Default: 60
    MinValue: 1
    MaxValue: 720
    Description: >
      [ADR-012 Phase 4 Disruption] Firing time of the self-triggered Scheduler that, N
      minutes after deploy, injects `tc qdisc` network latency (200ms) on the EC2.
      Assumed to match `phases[0].afterMinutes` in metadata.json (= the score engine
      switches ec2 platform points to degradedPoints at the same time).
      Operator can override at deploy time.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + Networking -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.99.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-subnet"

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Rt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-rt"

  RtRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref Rt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref Rt
      SubnetId: !Ref PublicSubnet

  # ----- Security Group -----
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} microservice-migration-battle access"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: nginx reverse proxy (users / orders / catalog)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-sg"

  # ----- IAM (SSM Session Manager only) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-participant-viewer"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog):
      #   * SignInLocalDevelopmentAccess -- `aws login` (2025-11) OAuth2 flow
      #     needs signin:* on the role's own oauth2/public-client/{localhost,remote}.
      #     AWS-managed policy scoped narrowly to exactly that.
      #   * cloudshell:* allow-list (in ProblemSpecific below) -- browser shell
      #     with this role's creds. Resource:* is unavoidable (envs are per-identity);
      #     action set narrowed to the interactive open / use / close + creds-rotation.
      # Both are validated by scripts/validate-problems.ts; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # Issue #1038 P2 #10: ec2:Describe* APIs do NOT accept resource-level ARN
              # permissions per AWS IAM (= "Amazon EC2 Describe API actions don't support
              # resource-level permissions"). Scoping by ARN makes IAM deny with AccessDenied
              # even though the role has the permission (user-observed bug:
              # "is not authorized to perform: ec2:DescribeInstances").
              #
              # ADR-021 (#820 retraction) "do not leak other tenants' resources" is preserved
              # via tag-based IAM Condition: aws:ResourceTag/TenkaCloud:NamePrefix must
              # match this team's prefix. The Describe call returns ONLY resources whose
              # tag matches, even though the IAM Resource is "*".
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              # ec2 metadata APIs (= DescribeRegions / DescribeAvailabilityZones) don't carry
              # tags. Per-team dedicated AWS account makes account-wide read of these
              # metadata-only APIs safe (= no resource leakage; these return generic AWS
              # info, not customer resources).
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              # Self-identity (= competitors often run `aws sts get-caller-identity` to
              # confirm which account they're in).
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Ec2}"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              - Sid: InspectOwnLambdaFunctions
                Effect: Allow
                Action:
                  - lambda:GetFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${NamePrefix}*"
              - Sid: InspectOwnSchedule
                Effect: Allow
                Action:
                  - scheduler:GetSchedule
                Resource: !Sub "arn:aws:scheduler:${AWS::Region}:${AWS::AccountId}:schedule/default/${NamePrefix}*"
              - Sid: FilterOwnLambdaLogs
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*:*"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-instance-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- EC2 -----
  Ec2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref Sg
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-ec2"
        - Key: TenkaCloud:Problem
          Value: microservice-migration-battle
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker git
          systemctl enable --now docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          mkdir -p /opt/tenkacloud
          cd /opt/tenkacloud
          # shallow fetch + checkout pattern so branch / tag / commit can all be targeted
          git clone "${RepoUrl}" repo
          cd repo
          git fetch origin "${RepoRef}" || git fetch --all
          git checkout "${RepoRef}" || git checkout FETCH_HEAD

          PROBLEM_ROOT=/opt/tenkacloud/repo/problems/battles/microservice-migration-battle
          cd "$PROBLEM_ROOT/services"

          cat > .env <<ENVEOF
          NAME_PREFIX=${NamePrefix}
          REGION=${AWS::Region}
          ENVEOF

          docker compose up -d --build

  # ----- Disruption pattern (ADR-012 Phase 4) -----
  # Self-triggered Scheduler aligned with phases[0] (degraded). DegradedAfterMinutes
  # after deploy it issues an SSM RunCommand, injecting 200ms of network latency on
  # the EC2's eth0 via `tc qdisc`. At the same moment the platform-side score engine
  # switches ec2 points to degradedPoints (= 10) (= driven separately from
  # metadata.phases). The portal displays a countdown from metadata.disruptions[]
  # (= predict).
  #
  # Design choice: passing `rate(N minutes)` to Scheduler fires N minutes after deploy
  # for the first time, and every N minutes thereafter. `tc qdisc add` fails with EEXIST
  # so subsequent runs are no-op (= idempotent). For an exactly-once firing you would
  # need a CustomResource that constructs an `at()` expression from deploy time + offset,
  # but the Phase 1 reference impl prioritizes simplicity and uses rate() + an idempotent
  # Lambda.
  DisruptionFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-disruption-fn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: lambda.amazonaws.com }
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SendCommandToOwnInstance
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: ssm:SendCommand
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Ec2}"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/AWS-RunShellScript"

  DegradedDisruptionFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${NamePrefix}-degraded-disruption"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DisruptionFunctionRole.Arn
      Timeout: 30
      Environment:
        Variables:
          INSTANCE_ID: !Ref Ec2
      Code:
        ZipFile: |
          import os
          import boto3

          # On phases[0]=degraded fire, inject network latency into the EC2.
          # `tc qdisc add` fails with EEXIST after the first run so `|| true` swallows it.
          # Scheduler re-fires every N minutes via rate(N min), but it is a no-op after the first fire.
          def handler(event, context):
              ssm = boto3.client("ssm")
              ssm.send_command(
                  InstanceIds=[os.environ["INSTANCE_ID"]],
                  DocumentName="AWS-RunShellScript",
                  Comment="TenkaCloud microservice-migration: phases[0] degraded fire",
                  Parameters={
                      "commands": [
                          "tc qdisc add dev eth0 root netem delay 200ms || true",
                      ],
                  },
              )
              return {"ok": True}

  SchedulerInvokeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${NamePrefix}-scheduler-invoke-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: { Service: scheduler.amazonaws.com }
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeDisruptionFunction
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource: !GetAtt DegradedDisruptionFunction.Arn

  DegradedDisruptionSchedule:
    Type: AWS::Scheduler::Schedule
    Properties:
      Name: !Sub "${NamePrefix}-degraded-disruption"
      Description: >
        TenkaCloud microservice-migration-battle phases[0]=degraded disruption schedule.
        DegradedAfterMinutes after deploy, injects network latency on the EC2.
      FlexibleTimeWindow: { Mode: "OFF" }
      ScheduleExpression: !Sub "rate(${DegradedAfterMinutes} minutes)"
      Target:
        Arn: !GetAtt DegradedDisruptionFunction.Arn
        RoleArn: !GetAtt SchedulerInvokeRole.Arn

Outputs:
  BaseUrl:
    Description: Participant-facing nginx reverse proxy URL. The Score Engine probes `/users/score` / `/orders/score` / `/catalog/score`.
    Value: !Sub "http://${Ec2.PublicDnsName}"
  UsersScoreUrl:
    Description: Initial endpoint of the users service (on EC2).
    Value: !Sub "http://${Ec2.PublicDnsName}/users/score"
  OrdersScoreUrl:
    Description: Initial endpoint of the orders service (on EC2).
    Value: !Sub "http://${Ec2.PublicDnsName}/orders/score"
  CatalogScoreUrl:
    Description: Initial endpoint of the catalog service (on EC2).
    Value: !Sub "http://${Ec2.PublicDnsName}/catalog/score"
  InstanceId:
    Description: EC2 instance ID (used by operators to connect via SSM Session Manager).
    Value: !Ref Ec2
  SsmStartSessionCommand:
    Description: Command for operators to connect to the instance via Session Manager.
    Value: !Sub "aws ssm start-session --target ${Ec2}"
  NamePrefix:
    Description: Common resource prefix used by this stack.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
