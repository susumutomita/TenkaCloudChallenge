AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- microservice-migration-battle.
  Single EC2 (Amazon Linux 2023, t3.small) running 3 Node.js + Hono services
  (users / orders / catalog) behind an nginx reverse proxy on port 80. Competitors
  peel each service off the box and re-host it onto Lambda + API Gateway,
  ECS Fargate, or App Runner during a 90-120 min Battle. The score engine,
  phase progression, and the EC2 degradation disruption are all driven by
  metadata.json + this template (no follow-up PR required).

  So multiple teams' problem stacks can coexist in the same (Account, Region),
  every resource name is prefixed with ${NamePrefix} (= "tc-{problemSlug}-{teamSlug}",
  matches the UI's buildStackPrefix).

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
      Pass the prefix generated by the application-admin-console DeployForm.
    Description: >
      Common prefix for every resource name. So multiple teams in the same Account / Region can
      coexist without name collisions.
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to access nginx (port 80).
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.small
      - t3.medium
    Description: EC2 instance type. t3.small recommended because 3 Node.js processes + nginx run side by side.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  RepoUrl:
    Type: String
    Default: https://github.com/susumutomita/TenkaCloudChallenge.git
    Description: >
      OSS catalog repo (this repo) that ships the per-service Dockerfiles and
      docker-compose.yml. The default points at the public catalog so a fresh
      deploy works without submodule init / private credentials.
  RepoRef:
    Type: String
    Default: main
    Description: branch / tag / commit to check out from RepoUrl.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + Networking -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.99.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Rt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  RtRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref Rt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref Rt
      SubnetId: !Ref PublicSubnet

  # ----- Security Group -----
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} microservice-migration-battle access"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: nginx reverse proxy (users / orders / catalog)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- IAM (SSM Session Manager only) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog):
      #   * SignInLocalDevelopmentAccess -- `aws login` (2025-11) OAuth2 flow
      #     needs signin:* on the role's own oauth2/public-client/{localhost,remote}.
      #     AWS-managed policy scoped narrowly to exactly that.
      #   * cloudshell:* allow-list (in ProblemSpecific below) -- browser shell
      #     with this role's creds. Resource:* is unavoidable (envs are per-identity);
      #     action set narrowed to the interactive open / use / close + creds-rotation.
      # Both are validated by scripts/validate-problems.ts; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # Issue #1038 P2 #10: ec2:Describe* APIs do NOT accept resource-level ARN
              # permissions per AWS IAM (= "Amazon EC2 Describe API actions don't support
              # resource-level permissions"). Scoping by ARN makes IAM deny with AccessDenied
              # even though the role has the permission (user-observed bug:
              # "is not authorized to perform: ec2:DescribeInstances").
              #
              # ADR-021 (#820 retraction) "do not leak other tenants' resources" is preserved
              # via tag-based IAM Condition: aws:ResourceTag/TenkaCloud:NamePrefix must
              # match this team's prefix. The Describe call returns ONLY resources whose
              # tag matches, even though the IAM Resource is "*".
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              # ec2 metadata APIs (= DescribeRegions / DescribeAvailabilityZones) don't carry
              # tags. Per-team dedicated AWS account makes account-wide read of these
              # metadata-only APIs safe (= no resource leakage; these return generic AWS
              # info, not customer resources).
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              # Self-identity (= competitors often run `aws sts get-caller-identity` to
              # confirm which account they're in).
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Ec2}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                  - ssm:ResumeSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/*"
                Condition:
                  # Session Manager names each session after the caller's
                  # role-session-name (set by the credential-vending chain),
                  # never after NamePrefix, so scoping the ARN by ${NamePrefix}
                  # can never match - it always denied Terminate/ResumeSession
                  # on exit. Match the aws:ssmmessages:session-id tag SSM applies
                  # to every session (value = role-id:role-session-name =
                  # ${aws:userid}) - AWS's documented federated/assumed-role
                  # pattern, restricting each caller to their own sessions.
                  StringLike:
                    ssm:resourceTag/aws:ssmmessages:session-id:
                      - "${aws:userid}"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              - Sid: InspectOwnLambdaFunctions
                Effect: Allow
                Action:
                  - lambda:GetFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${NamePrefix}*"
              - Sid: FilterOwnLambdaLogs
                Effect: Allow
                Action:
                  - logs:FilterLogEvents
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*:*"
              # ----- Migration deploy permissions -----
              # The problem statement is "peel services off EC2 and re-host them on Lambda /
              # ECS Fargate / App Runner." That requires the participant role to actually
              # deploy onto those services. Every resource ARN below is scoped to
              # ${NamePrefix}* so per-team isolation under ADR-021 holds.
              #
              # List-style API calls (lambda:ListFunctions, ecs:ListClusters etc.) that
              # don't accept resource ARNs are intentionally NOT granted -- they would
              # leak other teams' resource names. Players use the AWS Console deep links
              # / `aws cli get-<x>` against their own ${NamePrefix}* ARNs.
              - Sid: DeployOwnLambdaFunctions
                Effect: Allow
                Action:
                  - lambda:CreateFunction
                  - lambda:UpdateFunctionCode
                  - lambda:UpdateFunctionConfiguration
                  - lambda:DeleteFunction
                  - lambda:GetFunctionConfiguration
                  - lambda:GetPolicy
                  - lambda:AddPermission
                  - lambda:RemovePermission
                  - lambda:TagResource
                  - lambda:UntagResource
                  - lambda:CreateFunctionUrlConfig
                  - lambda:UpdateFunctionUrlConfig
                  - lambda:DeleteFunctionUrlConfig
                  - lambda:GetFunctionUrlConfig
                  - lambda:InvokeFunction
                Resource: !Sub "arn:aws:lambda:${AWS::Region}:${AWS::AccountId}:function:${NamePrefix}*"
              - Sid: ManageOwnExecutionRoles
                Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:GetRole
                  - iam:UpdateRoleDescription
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRolePolicy
                  - iam:ListRolePolicies
                  - iam:ListAttachedRolePolicies
                  - iam:TagRole
                  - iam:UntagRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${NamePrefix}*"
              - Sid: AttachOnlySafeManagedPolicies
                Effect: Allow
                Action:
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${NamePrefix}*"
                Condition:
                  ArnEquals:
                    iam:PolicyARN:
                      - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
                      - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy
                      - arn:aws:iam::aws:policy/service-role/AWSAppRunnerServicePolicyForECRAccess
              - Sid: PassExecutionRoleToServiceSelf
                Effect: Allow
                Action: iam:PassRole
                Resource: !Sub "arn:aws:iam::${AWS::AccountId}:role/${NamePrefix}*"
                Condition:
                  StringEquals:
                    iam:PassedToService:
                      - lambda.amazonaws.com
                      - ecs-tasks.amazonaws.com
                      - tasks.apprunner.amazonaws.com
                      - build.apprunner.amazonaws.com
              - Sid: DeployOwnEcsCluster
                Effect: Allow
                Action:
                  - ecs:CreateCluster
                  - ecs:DeleteCluster
                  - ecs:DescribeClusters
                  - ecs:CreateService
                  - ecs:UpdateService
                  - ecs:DeleteService
                  - ecs:DescribeServices
                  - ecs:RunTask
                  - ecs:StopTask
                  - ecs:DescribeTasks
                  - ecs:TagResource
                  - ecs:UntagResource
                Resource:
                  - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:cluster/${NamePrefix}*"
                  - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:service/${NamePrefix}*/${NamePrefix}*"
                  - !Sub "arn:aws:ecs:${AWS::Region}:${AWS::AccountId}:task/${NamePrefix}*/*"
              - Sid: ManageOwnTaskDefinitions
                # ecs:RegisterTaskDefinition has no resource scoping per the AWS docs
                # ("Actions that don't support resource-level permissions"); resource MUST
                # be "*". Per-team isolation rests on the role's other ARN-scoped grants
                # (= other teams' clusters / services are still unreachable).
                Effect: Allow
                Action:
                  - ecs:RegisterTaskDefinition
                  - ecs:DeregisterTaskDefinition
                  - ecs:DescribeTaskDefinition
                Resource: "*"
              - Sid: DeployOwnAppRunnerService
                Effect: Allow
                Action:
                  - apprunner:CreateService
                  - apprunner:UpdateService
                  - apprunner:DeleteService
                  - apprunner:DescribeService
                  - apprunner:PauseService
                  - apprunner:ResumeService
                  - apprunner:StartDeployment
                  - apprunner:TagResource
                  - apprunner:UntagResource
                Resource: !Sub "arn:aws:apprunner:${AWS::Region}:${AWS::AccountId}:service/${NamePrefix}*/*"
              - Sid: ManageOwnApiGatewayHttpApis
                # API Gateway resource ARNs use auto-generated IDs, so name-prefix scoping
                # doesn't apply. Tag-based scoping (= require the player to tag their API
                # with TenkaCloud:NamePrefix at create time) is enforced via the request
                # tag condition below. Players who skip tagging won't be able to manage
                # the API afterwards -- which surfaces the missing tag fast.
                Effect: Allow
                Action:
                  - apigateway:GET
                  - apigateway:POST
                  - apigateway:PUT
                  - apigateway:PATCH
                  - apigateway:DELETE
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/apis*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/v2/apis*"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/tags*"
              - Sid: PushOwnContainerImagesToEcr
                Effect: Allow
                Action:
                  - ecr:CreateRepository
                  - ecr:DeleteRepository
                  - ecr:DescribeRepositories
                  - ecr:PutImage
                  - ecr:InitiateLayerUpload
                  - ecr:UploadLayerPart
                  - ecr:CompleteLayerUpload
                  - ecr:BatchCheckLayerAvailability
                  - ecr:BatchGetImage
                  - ecr:GetDownloadUrlForLayer
                  - ecr:TagResource
                  - ecr:UntagResource
                Resource: !Sub "arn:aws:ecr:${AWS::Region}:${AWS::AccountId}:repository/${NamePrefix}*"
              - Sid: EcrAuthForOwnPush
                # ecr:GetAuthorizationToken returns a 12-hour token tied to the calling
                # principal. It's account-scoped and doesn't accept a resource ARN, so
                # Resource:* is required. The token itself only grants access to
                # repositories the calling role already has ARN-level permission for.
                Effect: Allow
                Action: ecr:GetAuthorizationToken
                Resource: "*"
              - Sid: CreateOwnRuntimeLogGroups
                Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutRetentionPolicy
                  - logs:PutLogEvents
                  - logs:DeleteLogGroup
                  - logs:DescribeLogStreams
                Resource:
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}*:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apprunner/${NamePrefix}*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/apprunner/${NamePrefix}*:*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${NamePrefix}*"
                  - !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/ecs/${NamePrefix}*:*"
              # ===== ECS Fargate path completion =====
              # The problem advertises Lambda + API GW / ECS Fargate / App Runner
              # as the three hosting tiers. ECS Fargate needs a security group
              # that opens the container port and (typically) an ALB to expose a
              # stable URL. The grants below close that path.
              - Sid: CreateOwnSecurityGroup
                Effect: Allow
                Action: ec2:CreateSecurityGroup
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:security-group/*"
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:vpc/*"
                Condition:
                  StringEquals:
                    aws:RequestTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ModifyOwnSecurityGroups
                Effect: Allow
                Action:
                  - ec2:AuthorizeSecurityGroupIngress
                  - ec2:RevokeSecurityGroupIngress
                  - ec2:AuthorizeSecurityGroupEgress
                  - ec2:RevokeSecurityGroupEgress
                  - ec2:DeleteSecurityGroup
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: TagOwnEc2Resources
                Effect: Allow
                Action: ec2:CreateTags
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:RequestTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ManageOwnLoadBalancers
                Effect: Allow
                Action:
                  - elasticloadbalancing:CreateLoadBalancer
                  - elasticloadbalancing:DeleteLoadBalancer
                  - elasticloadbalancing:ModifyLoadBalancerAttributes
                  - elasticloadbalancing:CreateTargetGroup
                  - elasticloadbalancing:DeleteTargetGroup
                  - elasticloadbalancing:ModifyTargetGroup
                  - elasticloadbalancing:ModifyTargetGroupAttributes
                  - elasticloadbalancing:RegisterTargets
                  - elasticloadbalancing:DeregisterTargets
                  - elasticloadbalancing:CreateListener
                  - elasticloadbalancing:DeleteListener
                  - elasticloadbalancing:ModifyListener
                  - elasticloadbalancing:CreateRule
                  - elasticloadbalancing:DeleteRule
                  - elasticloadbalancing:ModifyRule
                  - elasticloadbalancing:AddTags
                  - elasticloadbalancing:RemoveTags
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ReadLoadBalancerState
                Effect: Allow
                Action:
                  - elasticloadbalancing:DescribeLoadBalancers
                  - elasticloadbalancing:DescribeTargetGroups
                  - elasticloadbalancing:DescribeListeners
                  - elasticloadbalancing:DescribeRules
                  - elasticloadbalancing:DescribeTargetHealth
                  - elasticloadbalancing:DescribeTags
                  - elasticloadbalancing:DescribeLoadBalancerAttributes
                  - elasticloadbalancing:DescribeTargetGroupAttributes
                  - elasticloadbalancing:DescribeAccountLimits
                Resource: "*"
              # ===== Console-navigation list permissions =====
              # ADR-021 originally forbade list-style actions on Resource:* to keep
              # cross-tenant resource names private inside a shared account. That
              # breaks the Console workflow players use during a 90-min Battle
              # (Lambda / ECS / App Runner consoles all open by listing). For
              # this problem we accept name visibility as a tradeoff for Console
              # UX; ACCESS to cross-tenant resources remains blocked by the
              # ARN-scoped grants above.
              - Sid: ConsoleListLambda
                Effect: Allow
                Action:
                  - lambda:ListFunctions
                  - lambda:ListLayers
                  - lambda:ListFunctionUrlConfigs
                  - lambda:ListTags
                Resource: "*"
              - Sid: ConsoleListEcs
                Effect: Allow
                Action:
                  - ecs:ListClusters
                  - ecs:ListServices
                  - ecs:ListTasks
                  - ecs:ListTaskDefinitions
                  - ecs:ListTaskDefinitionFamilies
                  - ecs:ListAccountSettings
                Resource: "*"
              - Sid: ConsoleListAppRunner
                Effect: Allow
                Action:
                  - apprunner:ListServices
                  - apprunner:ListOperations
                  - apprunner:ListTagsForResource
                Resource: "*"
              - Sid: ConsoleListEcr
                Effect: Allow
                Action:
                  - ecr:DescribeRepositories
                  - ecr:DescribeImages
                  - ecr:ListImages
                  - ecr:ListTagsForResource
                Resource: "*"
              - Sid: ConsoleListLogs
                Effect: Allow
                Action:
                  - logs:DescribeLogGroups
                Resource: "*"
              - Sid: ConsoleListIamRoles
                # Console role-picker (Lambda / ECS / App Runner) needs ListRoles
                # to populate.
                Effect: Allow
                Action:
                  - iam:ListRoles
                  - iam:ListAttachedRolePolicies
                  - iam:ListRolePolicies
                  - iam:ListPolicies
                Resource: "*"
              - Sid: ConsoleListApiGatewayAccount
                Effect: Allow
                Action:
                  - apigateway:GET
                Resource:
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/account"
                  - !Sub "arn:aws:apigateway:${AWS::Region}::/usage"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- EC2 -----
  Ec2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref Sg
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-ec2"
        - Key: TenkaCloud:Problem
          Value: microservice-migration-battle
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker git
          systemctl enable --now docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          mkdir -p /opt/tenkacloud
          cd /opt/tenkacloud
          # shallow fetch + checkout pattern so branch / tag / commit can all be targeted
          git clone "${RepoUrl}" repo
          cd repo
          git fetch origin "${RepoRef}" || git fetch --all
          git checkout "${RepoRef}" || git checkout FETCH_HEAD

          # Locate the problem services dir. When RepoUrl points at the OSS catalog
          # (= the default), assets live at `battles/microservice-migration-battle/`.
          # When RepoUrl points at the TenkaCloud platform repo (catalog mounted as a
          # git submodule under `problems/`), the path is one level deeper. Try both.
          if [ -d "/opt/tenkacloud/repo/battles/microservice-migration-battle/services" ]; then
            PROBLEM_ROOT=/opt/tenkacloud/repo/battles/microservice-migration-battle
          else
            PROBLEM_ROOT=/opt/tenkacloud/repo/problems/battles/microservice-migration-battle
          fi
          cd "$PROBLEM_ROOT/services"

          cat > .env <<ENVEOF
          NAME_PREFIX=${NamePrefix}
          REGION=${AWS::Region}
          ENVEOF

          docker compose up -d --build

  # ----- Disruption delivery (ADR-031) -----
  # The EC2 network-latency fault is delivered solely by the platform executor via
  # metadata.json disruptions[].action (ssm-run-command on InstanceId, with a mandatory
  # revert per ADR-029), matching the battles/hello-world-battle reference. No in-template
  # self-firing Scheduler/Lambda -- that duplicated the delivery, never reverted, and
  # re-fired on rate(). The action discovers the default NIC (ens5 on AL2023 nitro) at
  # runtime, so it lands on the real interface.

Outputs:
  # BaseUrl is intentionally EMPTY (invariant #9 in AGENT.md: a Battle uptime
  # problem must not start awarding points the instant the deploy completes).
  # Scoring engine resolves effective URL per slot as `override ?? default`;
  # with default="" and no override registered, the probe gets an empty URL
  # and produces no points. Competitors paste their EC2 host (= Ec2HostHint
  # below) into the Participant Portal Endpoint Override panel to start the
  # Battle. Once a service is peeled off onto Lambda / ECS / App Runner, the
  # competitor swaps the override to the new managed URL.
  BaseUrl:
    Description: Empty by default; competitors register their EC2 host (or per-service managed URL) via the Participant Portal Endpoint Override to start scoring.
    Value: ""
  Ec2HostHint:
    Description: EC2 public DNS for this stack. Paste the per-service path URL into each slot override -- http://<host>/users into users, http://<host>/orders into orders, http://<host>/catalog into catalog -- to start the Battle on EC2. nginx only routes /users /orders /catalog, so a bare http://<host> override 404s the /meta probe (-100/slot).
    Value: !GetAtt Ec2.PublicDnsName
  InstanceId:
    Description: EC2 instance ID (used by operators to connect via SSM Session Manager).
    Value: !Ref Ec2
  SsmStartSessionCommand:
    Description: Command for operators to connect to the instance via Session Manager.
    Value: !Sub "aws ssm start-session --target ${Ec2}"
  NamePrefix:
    Description: Common resource prefix used by this stack.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
