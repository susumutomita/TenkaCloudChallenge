AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- security-battle-royale.
  Single-EC2 docker-compose deploy (mysql + flask api + nginx frontend) with
  intentional SQLi / RCE / SSRF / IMDS-exposure vulnerabilities for participants
  to attack and defend.

# So multiple teams' problem stacks can coexist in the same (Account, Region),
# every resource name is prefixed with ${NamePrefix} (= "tc-{problemSlug}-{teamSlug}",
# matches the UI-side buildStackPrefix).

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 80
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
      Pass the prefix generated by the application-admin-console DeployForm.
    Description: >
      Common prefix for every resource name. So multiple teams in the same Account / Region can
      coexist without name collisions.
  DbPassword:
    Type: String
    NoEcho: true
    MinLength: 8
    MaxLength: 64
    AllowedPattern: "^[A-Za-z0-9!@#$%^&*()_+\\-=]+$"
    ConstraintDescription: 8 to 64 alphanumerics + limited symbols.
    Description: root / admin password for the embedded MySQL.
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to access frontend (80) / api (8080).
  InstanceType:
    Type: String
    Default: t3.small
    AllowedValues:
      - t3.micro
      - t3.small
      - t3.medium
    Description: EC2 instance type.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  RepoUrl:
    Type: String
    Default: https://github.com/susumutomita/TenkaCloudChallenge.git
    Description: >
      OSS catalog repo (this repo) that ships api/api.py, frontend/, local/
      docker-compose.yaml, and mysql-init.sql. The default points at the
      public catalog so a fresh deploy works without submodule init.
  RepoRef:
    Type: String
    Default: main
    Description: branch / tag / commit to check out from RepoUrl.
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + Networking -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.99.0.0/16
      EnableDnsHostnames: true
      EnableDnsSupport: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.99.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-subnet"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  Rt:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  RtRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref Rt
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  RtAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref Rt
      SubnetId: !Ref PublicSubnet

  # ----- Security Group -----
  Sg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} problem instance access"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: frontend (nginx)
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          CidrIp: !Ref AllowedCidr
          Description: api (Flask)
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- IAM (SSM Session Manager only) -----
  # api.py is designed to hit IMDS (= intentional exposure). So the role only carries Session Manager.
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (same across every problem in this catalog):
      #   * SignInLocalDevelopmentAccess -- `aws login` (2025-11) OAuth2 flow
      #     needs signin:* on the role's own oauth2/public-client/{localhost,remote}.
      #     AWS-managed policy scoped narrowly to exactly that.
      #   * cloudshell:* allow-list (in ProblemSpecific below) -- browser shell
      #     with this role's creds. Resource:* is unavoidable (envs are per-identity);
      #     action set narrowed to the interactive open / use / close + creds-rotation.
      # Both are validated by scripts/validate-problems.ts; do not remove.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              # Issue #1038 P2 #10: see microservice-migration-battle for full rationale.
              # ec2:Describe* doesn't accept resource ARNs; scope by tag instead.
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${Ec2}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/${NamePrefix}*"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              # This problem deploys no Lambda functions; dead Lambda / Lambda-log
              # grants were removed during the ready promotion. Re-introduce only
              # if the stack actually creates a Lambda whose logs participants
              # need to inspect.

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # ----- EC2 -----
  Ec2:
    Type: AWS::EC2::Instance
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      SubnetId: !Ref PublicSubnet
      SecurityGroupIds:
        - !Ref Sg
      # IMDSv2 enforced. The Flask api intentionally has SSRF-style helpers
      # (proxying arbitrary URLs is part of the inherited code), so leaving
      # IMDSv1 reachable would let any leaked SSRF exfiltrate the instance-role
      # credentials. HttpTokens=required forces a token-puts handshake;
      # HttpPutResponseHopLimit=1 blocks containers/HTTP libraries that don't
      # propagate the token from reaching IMDS at all. Defenders who want to
      # toggle this off during the Battle can edit the live instance with
      # `aws ec2 modify-instance-metadata-options`; it's a containment baseline,
      # not part of the puzzle.
      MetadataOptions:
        HttpTokens: required
        HttpPutResponseHopLimit: 1
        HttpEndpoint: enabled
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-ec2"
        - Key: TenkaCloud:Problem
          Value: security-battle-royale
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail
          dnf update -y
          dnf install -y docker git
          systemctl enable --now docker
          mkdir -p /usr/local/lib/docker/cli-plugins
          curl -fsSL "https://github.com/docker/compose/releases/download/v2.27.0/docker-compose-linux-x86_64" \
            -o /usr/local/lib/docker/cli-plugins/docker-compose
          chmod +x /usr/local/lib/docker/cli-plugins/docker-compose

          mkdir -p /opt/tenkacloud
          cd /opt/tenkacloud
          # shallow fetch + checkout pattern so branch / tag / commit can all be targeted
          git clone "${RepoUrl}" repo
          cd repo
          git fetch origin "${RepoRef}" || git fetch --all
          git checkout "${RepoRef}" || git checkout FETCH_HEAD

          # Locate the problem root. When RepoUrl points at the OSS catalog
          # (= the default), assets live at `battles/security-battle-royale/`.
          # When RepoUrl points at the TenkaCloud platform repo (catalog mounted
          # as a git submodule under `problems/`), the path is one level deeper.
          if [ -d "/opt/tenkacloud/repo/battles/security-battle-royale/local" ]; then
            PROBLEM_ROOT=/opt/tenkacloud/repo/battles/security-battle-royale
          else
            PROBLEM_ROOT=/opt/tenkacloud/repo/problems/battles/security-battle-royale
          fi
          cd "$PROBLEM_ROOT/local"

          cat > .env <<ENVEOF
          PROBLEM_ROOT=$PROBLEM_ROOT
          DB_PASSWORD=${DbPassword}
          DB_EXPOSE_PORT=3306
          API_PORT=8080
          FRONTEND_PORT=80
          REGION=${AWS::Region}
          ENVEOF

          docker compose up -d

Outputs:
  # FrontendUrl / ApiUrl are intentionally EMPTY by default (AGENT.md invariant
  # #9 -- a Battle uptime problem must not start awarding points the instant
  # the deploy completes). Scoring engine resolves effective URL per slot as
  # `override ?? default`; with default="" and no override registered, the
  # probe gets an empty URL and produces no points. Competitors paste their
  # EC2 host (= Ec2HostHint below) into the Participant Portal Endpoint
  # Override panel to start scoring.
  FrontendUrl:
    Description: Empty by default; competitors register `http://<Ec2HostHint>` via the Participant Portal Endpoint Override to start scoring.
    Value: ""
  ApiUrl:
    Description: Empty by default; competitors register `http://<Ec2HostHint>:8080` via the Participant Portal Endpoint Override to start scoring.
    Value: ""
  Ec2HostHint:
    Description: EC2 public DNS for this stack. Paste `http://<host>` into the frontend slot and `http://<host>:8080` into the api slot in the Participant Portal to begin.
    Value: !GetAtt Ec2.PublicDnsName
  InstanceId:
    Description: EC2 instance ID (used by operators to connect via SSM Session Manager).
    Value: !Ref Ec2
  SsmStartSessionCommand:
    Description: Command for operators to connect to the instance via Session Manager.
    Value: !Sub "aws ssm start-session --target ${Ec2}"
  NamePrefix:
    Description: Common resource prefix used by this stack.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN that competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
