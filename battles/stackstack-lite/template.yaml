          APPB64

          cat > /opt/tenkacloud/vibe/deploy_app.sh <<'SH'
          #!/bin/bash
          set -euo pipefail
          install -m 0644 -D /home/ec2-user/vibe-app/app.py /opt/tenkacloud/vibe/app.py
          systemctl enable --now tenkacloud-vibe
          systemctl restart nginx
          echo "deployed: app is live on this host"
          SH
          chmod +x /opt/tenkacloud/vibe/deploy_app.sh

          # On-box guidance fetched from SSM (kept out of UserData).
          aws ssm get-parameter --name "/${NamePrefix}/vibe-status-tool" --query Parameter.Value --output text --region ${AWS::Region} > /usr/local/bin/vibe-status 2>/dev/null && chmod +x /usr/local/bin/vibe-status || true
          cat > /etc/profile.d/stackstack-lite-guide.sh <<'SH'
          echo "StackStack Lite app host. First: /opt/tenkacloud/vibe/deploy_app.sh then register Stack Output AppUrlHint in the Portal. Then run 'vibe-status' for the 3 production gates + what each needs."
          SH

          chown -R ec2-user:ec2-user /opt/tenkacloud /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe /home/ec2-user/vibe-app

          cat > /etc/systemd/system/tenkacloud-vibe.service <<'UNIT'
          [Unit]
          Description=TenkaCloud StackStack Lite vibe app
          After=network-online.target
          Wants=network-online.target

          [Service]
          EnvironmentFile=/etc/tenkacloud-vibe/runtime.env
          ExecStart=/usr/bin/python3 /opt/tenkacloud/vibe/app.py
          Restart=always
          RestartSec=3

          [Install]
          WantedBy=multi-user.target
          UNIT

          cat > /etc/nginx/conf.d/stackstack-lite.conf <<'NGINX'
          server {
              listen 80 default_server;
              server_name _;
              location / {
                  proxy_set_header Host $host;
                  proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                  proxy_pass http://127.0.0.1:8080;
              }
          }
          NGINX
          rm -f /etc/nginx/conf.d/default.conf || true

          systemctl daemon-reload
          # The app ships as a local build; the participant deploys it with deploy_app.sh.
          systemctl enable --now nginx

Outputs:
  RegisteredUrl:
    Description: Empty by default; register AppUrlHint in the Participant Portal to start scoring.
    Value: ""
  AppUrlHint:
    Description: Public app URL to paste into the `app` endpoint override (after deploy_app.sh).
    Value: !Sub "http://${AppInstance.PublicDnsName}"
  BackupBucketName:
    Description: Stack-owned S3 bucket holding the seed dump for the DB restore.
    Value: !Ref BackupBucket
  AuditBucketName:
    Description: Stack-owned S3 bucket the app writes audit events to.
    Value: !Ref AuditBucket
  InstanceId:
    Description: App host instance id -- connect with `aws ssm start-session --target <this>`.
    Value: !Ref AppInstance
  SsmStartSessionCommand:
    Description: Connect to the app host via SSM Session Manager.
    Value: !Sub "aws ssm start-session --target ${AppInstance}"
  NamePrefix:
    Description: Common resource prefix this stack used.
    Value: !Ref NamePrefix
  ParticipantViewerRoleArn:
    Description: Role ARN competitors AssumeRole to access their own stack via AWS Console.
    Value: !GetAtt ParticipantViewerRole.Arn
