AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud problem -- stackstack-lite. The entry-level "Vibe to Production":
  one AI-generated app is hosted on a single stack-owned EC2 host, then players
  harden three existing controls (restore the data, enable auth, turn on audit).
  No participant solution creates top-level resources; no ALB / RDS / WAF.

Metadata:
  tenkacloud:
    allowIntentionallyVulnerable: true

Parameters:
  NamePrefix:
    Type: String
    MinLength: 5
    MaxLength: 44
    AllowedPattern: "^tc-[a-z0-9]+(-[a-z0-9]+)+$"
    ConstraintDescription: >
      `tc-{problemSlug}-{teamSlug}` format (lowercase letters / digits / hyphens).
    Description: Common prefix for every resource name (per-team isolation).
  AllowedCidr:
    Type: String
    Default: 0.0.0.0/0
    AllowedPattern: "^([0-9]{1,3}\\.){3}[0-9]{1,3}/[0-9]{1,2}$"
    Description: CIDR allowed to reach the public app host (port 80).
  InstanceType:
    Type: String
    Default: t3.micro
    AllowedValues:
      - t3.micro
      - t3.small
    Description: EC2 instance type for the stack-owned app host.
  AmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-6.1-x86_64
    Description: SSM-backed Amazon Linux 2023 AMI (auto-resolved).
  TenkaCloudAccountId:
    Type: String
    AllowedPattern: "^[0-9]{12}$"
    Description: TenkaCloud operator AWS account ID (passed by deploy chain).
  ExternalId:
    Type: String
    NoEcho: true
    MinLength: 16
    Description: ExternalId for ParticipantViewerRole trust (passed by deploy chain).

Resources:
  # ----- VPC + single public subnet (no NAT / ALB idle cost) -----
  Vpc:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.60.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-vpc"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref Vpc
      CidrBlock: 10.60.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-a"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  Igw:
    Type: AWS::EC2::InternetGateway
    Properties:
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-igw"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  IgwAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref Vpc
      InternetGatewayId: !Ref Igw

  PublicRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref Vpc
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-public-rt"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  PublicDefaultRoute:
    Type: AWS::EC2::Route
    DependsOn: IgwAttach
    Properties:
      RouteTableId: !Ref PublicRouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref Igw

  PublicRouteAssocA:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      RouteTableId: !Ref PublicRouteTable
      SubnetId: !Ref PublicSubnetA

  # The board is a public web app; the scoring engine probes it over HTTP :80.
  # Public ingress on 80 is intentional (allowIntentionallyVulnerable). All shell
  # access is via SSM Session Manager (no inbound SSH).
  AppSg:
    Type: AWS::EC2::SecurityGroup
    Properties:
      VpcId: !Ref Vpc
      GroupDescription: !Sub "${NamePrefix} public app host (HTTP 80)"
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: !Ref AllowedCidr
          Description: public HTTP to the vibe board (via nginx)
      SecurityGroupEgress:
        - IpProtocol: -1
          CidrIp: 0.0.0.0/0
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app-sg"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  # ----- Stack-owned data stores -----
  BackupBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-backup"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  AuditBucket:
    Type: AWS::S3::Bucket
    Properties:
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ExpireShortLivedAuditObjects
            Status: Enabled
            ExpirationInDays: 1
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-audit"
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: EmptyStackBuckets
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: WriteOwnedLogs
                Effect: Allow
                Action:
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                Resource: !Sub "arn:aws:logs:${AWS::Region}:${AWS::AccountId}:log-group:/aws/lambda/${NamePrefix}-bucket-cleanup:*"
              - Sid: EmptyStackOwnedBuckets
                Effect: Allow
                Action:
                  - s3:ListBucket
                  - s3:DeleteObject
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  BucketCleanupLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${NamePrefix}-bucket-cleanup"
      RetentionInDays: 1

  BucketCleanupFunction:
    Type: AWS::Lambda::Function
    DependsOn: BucketCleanupLogGroup
    Properties:
      LoggingConfig:
        LogGroup: !Ref BucketCleanupLogGroup
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt BucketCleanupRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import urllib.request
          import boto3

          s3 = boto3.client("s3")

          def respond(event, context, status, reason="OK"):
              body = {
                  "Status": status,
                  "Reason": reason,
                  "PhysicalResourceId": event.get("PhysicalResourceId") or context.log_stream_name,
                  "StackId": event["StackId"],
                  "RequestId": event["RequestId"],
                  "LogicalResourceId": event["LogicalResourceId"],
                  "Data": {},
              }
              data = json.dumps(body).encode("utf-8")
              req = urllib.request.Request(
                  event["ResponseURL"],
                  data=data,
                  method="PUT",
                  headers={"Content-Type": "", "Content-Length": str(len(data))},
              )
              urllib.request.urlopen(req, timeout=10)

          def empty_bucket(bucket):
              token = None
              while True:
                  kwargs = {"Bucket": bucket}
                  if token:
                      kwargs["ContinuationToken"] = token
                  page = s3.list_objects_v2(**kwargs)
                  objects = [{"Key": obj["Key"]} for obj in page.get("Contents", [])]
                  if objects:
                      s3.delete_objects(Bucket=bucket, Delete={"Objects": objects, "Quiet": True})
                  if not page.get("IsTruncated"):
                      break
                  token = page.get("NextContinuationToken")

          def handler(event, context):
              try:
                  if event.get("RequestType") == "Delete":
                      for bucket in event.get("ResourceProperties", {}).get("Buckets", []):
                          empty_bucket(bucket)
                  respond(event, context, "SUCCESS")
              except Exception as exc:
                  respond(event, context, "FAILED", str(exc))
      Tags:
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix

  EmptyBucketsOnDelete:
    Type: Custom::EmptyStackBuckets
    Properties:
      ServiceToken: !GetAtt BucketCleanupFunction.Arn
      Buckets:
        - !Ref BackupBucket
        - !Ref AuditBucket

  # ----- IAM (participant access + app host data access) -----
  ParticipantViewerRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${TenkaCloudAccountId}:root"
            Action: sts:AssumeRole
            Condition:
              StringEquals:
                sts:ExternalId: !Ref ExternalId
      MaxSessionDuration: 3600
      # Participant access baseline (validated): SignInLocalDevelopmentAccess for
      # the `aws login` OAuth2 flow + the 7-action CloudShell allow-list below.
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/SignInLocalDevelopmentAccess
      Policies:
        - PolicyName: ProblemSpecific
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: OpenCloudShellSession
                Effect: Allow
                Action:
                  - cloudshell:CreateEnvironment
                  - cloudshell:CreateSession
                  - cloudshell:GetEnvironmentStatus
                  - cloudshell:StartEnvironment
                  - cloudshell:StopEnvironment
                  - cloudshell:DeleteEnvironment
                  - cloudshell:PutCredentials
                Resource: "*"
              - Sid: ConsoleSelfIdentity
                Effect: Allow
                Action:
                  - sts:GetCallerIdentity
                Resource: "*"
              - Sid: DescribeOwnStack
                Effect: Allow
                Action:
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackResources
                  - cloudformation:ListStackResources
                Resource: !Sub "arn:aws:cloudformation:${AWS::Region}:${AWS::AccountId}:stack/${NamePrefix}/*"
              - Sid: ConsoleEc2Describe
                Effect: Allow
                Action:
                  - ec2:Describe*
                Resource: "*"
                Condition:
                  StringEquals:
                    aws:ResourceTag/TenkaCloud:NamePrefix: !Ref NamePrefix
              - Sid: ConsoleEc2Metadata
                Effect: Allow
                Action:
                  - ec2:DescribeRegions
                  - ec2:DescribeAvailabilityZones
                  - ec2:DescribeAccountAttributes
                Resource: "*"
              - Sid: ReadStackOwnedBuckets
                Effect: Allow
                Action:
                  - s3:GetBucketLocation
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !GetAtt AuditBucket.Arn
              - Sid: ReadStackOwnedObjects
                Effect: Allow
                Action:
                  - s3:GetObject
                Resource:
                  - !Sub "${BackupBucket.Arn}/*"
                  - !Sub "${AuditBucket.Arn}/*"
              - Sid: StartSessionToOwnInstance
                Effect: Allow
                Action:
                  - ssm:StartSession
                Resource:
                  - !Sub "arn:aws:ec2:${AWS::Region}:${AWS::AccountId}:instance/${AppInstance}"
                  - !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:document/SSM-SessionManagerRunShell"
                  - !Sub "arn:aws:ssm:${AWS::Region}::document/SSM-SessionManagerRunShell"
              - Sid: TerminateOwnSession
                Effect: Allow
                Action:
                  - ssm:TerminateSession
                  - ssm:ResumeSession
                Resource: !Sub "arn:aws:ssm:${AWS::Region}:${AWS::AccountId}:session/*"
                Condition:
                  # Session Manager names each session after the CALLER's
                  # role-session-name (set by the credential-vending chain,
                  # e.g. `stackstack-lite-<ULID>`), never after NamePrefix, so
                  # scoping the ARN by ${NamePrefix} can never match and always
                  # denies TerminateSession/ResumeSession. Instead match the
                  # `aws:ssmmessages:session-id` tag SSM applies to every
                  # session (value = role-id:role-session-name = ${aws:userid}),
                  # which is AWS's documented pattern for federated/assumed-role
                  # callers and restricts each caller to their own sessions.
                  StringLike:
                    ssm:resourceTag/aws:ssmmessages:session-id:
                      - "${aws:userid}"

  InstanceRole:
    Type: AWS::IAM::Role
    Properties:
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMManagedInstanceCore
      Policies:
        - PolicyName: AppDataAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Sid: BackupRead
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt BackupBucket.Arn
                  - !Sub "${BackupBucket.Arn}/*"
              - Sid: AuditWrite
                Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:PutObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt AuditBucket.Arn
                  - !Sub "${AuditBucket.Arn}/*"

  InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${NamePrefix}-instance-profile"
      Roles:
        - !Ref InstanceRole

  # Live-status guide, stored in SSM (not UserData) and fetched at boot. The
  # instance role's AmazonSSMManagedInstanceCore grants ssm:GetParameter.
  VibeStatusToolParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/${NamePrefix}/vibe-status-tool"
      Type: String
      Description: !Sub "vibe-status helper for ${NamePrefix} (fetched by the app host at boot)."
      Tier: Standard
      Value: |
        #!/usr/bin/env bash
        # vibe-status -- live production-gate posture + the objective for each gap.
        set -uo pipefail
        ENVF=/etc/tenkacloud-vibe/runtime.env
        [ -f "$ENVF" ] && . "$ENVF"
        P=$(curl -fsS --max-time 4 http://127.0.0.1:8080/posture 2>/dev/null || true)
        if [ -z "$P" ]; then
          echo "the app is not up yet. Deploy the local build first:"
          echo "    /opt/tenkacloud/vibe/deploy_app.sh"
          echo "then paste Stack Output 'AppUrlHint' into the Portal (app endpoint) to start scoring."
          exit 0
        fi
        echo "platform: $(echo "$P" | jq -r '.platform')   (all 3 gates -> production)"
        val(){ echo "$P" | jq -r ".posture.$1"; }
        gate(){
          if [ "$(val "$1")" = "true" ]; then printf '  [x] %s\n' "$1"
          else printf '  [ ] %s\n      need: %s\n' "$1" "$2"; fi
        }
        gate db_present   "restore the seed dump from s3://$BACKUP_BUCKET into the app DB ($SQLITE_DB), then restart the service. (aws s3 cp + sqlite3)"
        gate auth_enabled "in $CONFIG_FILE set auth_required=true and a non-default auth_token, then restart."
        gate audit_on     "in $CONFIG_FILE set audit_s3=true, then restart. (the app writes audit events to $AUDIT_BUCKET)"
        echo "exact commands are in the portal hints. re-run 'vibe-status' after each change (gates are measured from real state)."

  AppInstance:
    Type: AWS::EC2::Instance
    DependsOn:
      - BackupBucket
      - AuditBucket
      - EmptyBucketsOnDelete
      - VibeStatusToolParameter
    Properties:
      ImageId: !Ref AmiId
      InstanceType: !Ref InstanceType
      IamInstanceProfile: !Ref InstanceProfile
      NetworkInterfaces:
        - AssociatePublicIpAddress: true
          DeviceIndex: 0
          SubnetId: !Ref PublicSubnetA
          GroupSet:
            - !Ref AppSg
      Tags:
        - Key: Name
          Value: !Sub "${NamePrefix}-app"
        - Key: TenkaCloud:Problem
          Value: stackstack-lite
        - Key: TenkaCloud:NamePrefix
          Value: !Ref NamePrefix
      UserData:
        Fn::Base64: !Sub |
          #!/bin/bash
          set -euxo pipefail

          dnf update -y
          dnf install -y nginx python3 sqlite awscli jq

          mkdir -p /opt/tenkacloud/vibe /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe /home/ec2-user/vibe-app
          chown -R ec2-user:ec2-user /opt/tenkacloud /etc/tenkacloud-vibe /var/lib/tenkacloud-vibe

          cat > /etc/tenkacloud-vibe/runtime.env <<ENV
          AWS_REGION=${AWS::Region}
          BACKUP_BUCKET=${BackupBucket}
          AUDIT_BUCKET=${AuditBucket}
          SQLITE_DB=/var/lib/tenkacloud-vibe/app.db
          CONFIG_FILE=/etc/tenkacloud-vibe/config.json
          ENV

          cat > /etc/tenkacloud-vibe/config.json <<'JSON'
          {
            "auth_required": false,
            "auth_token": "change-me",
            "audit_s3": false
          }
          JSON

          cat > /tmp/seed-sqlite.sql <<'SQL'
          CREATE TABLE IF NOT EXISTS posts (
            id INTEGER PRIMARY KEY AUTOINCREMENT,
            author TEXT NOT NULL,
            body TEXT NOT NULL,
            created_at TEXT NOT NULL
          );
          DELETE FROM posts;
          INSERT INTO posts(author, body, created_at) VALUES
            ('kato', 'handover: the AI app worked on my laptop, then it deleted production data', '2026-06-07T09:00:00Z'),
            ('sasaki', 'please get this hosted, with auth and an audit trail before the demo', '2026-06-07T09:05:00Z'),
            ('builder-bot', 'todo: add auth later', '2026-06-07T09:10:00Z');
          SQL
          aws s3 cp /tmp/seed-sqlite.sql "s3://${BackupBucket}/seed-sqlite.sql" --region "${AWS::Region}"

          # vibe app (app.py) is gzip+base64 embedded to keep UserData small.
          base64 -d <<'APPB64' | gunzip > /home/ec2-user/vibe-app/app.py
          H4sIAAAAAAAC/71Z/VLbSBL/308xq61USbe2LJNsjnKAKyAm61oCHBZ7yRFKJVsjPGtZo8yMMISi
