# Microservice Migration Battle (Phase 1) -- docker compose layout that runs on EC2.
#
# 3 Node.js + Hono services + nginx reverse proxy.
# Competitors take this monolith deployed as-is on EC2 and split it into Lambda /
# ECS Fargate / App Runner during the match (= each service's code is directly reusable).
#
# The Score Engine (Phase 2) polls `/{service}/score` behind nginx every 1 minute.
# `NAME_PREFIX` is injected via .env from the UserData on the CFn template side.

services:
  users:
    build:
      context: ./users
    container_name: users
    environment:
      - PORT=3001
      - PLATFORM=ec2
    expose:
      - "3001"
    restart: unless-stopped

  orders:
    build:
      context: ./orders
    container_name: orders
    environment:
      - PORT=3002
      - PLATFORM=ec2
    expose:
      - "3002"
    restart: unless-stopped

  catalog:
    build:
      context: ./catalog
    container_name: catalog
    environment:
      - PORT=3003
      - PLATFORM=ec2
    expose:
      - "3003"
    restart: unless-stopped

  nginx:
    image: nginx:1.27-alpine
    container_name: nginx
    depends_on:
      - users
      - orders
      - catalog
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    restart: unless-stopped
