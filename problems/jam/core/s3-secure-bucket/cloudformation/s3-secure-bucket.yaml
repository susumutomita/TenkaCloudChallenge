AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: S3 バケットのセキュア構築（正解テンプレート）
  暗号化、パブリックアクセスブロック、バージョニング、アクセスログを設定した S3 バケット。

Parameters:
  BucketNamePrefix:
    Type: String
    Default: tenka-secure
    Description: S3 バケット名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # アクセスログ格納用バケット
  LogBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-logs-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  # ログバケットのバケットポリシー（S3 ログ配信を許可）
  LogBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref LogBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: S3ServerAccessLogsPolicy
            Effect: Allow
            Principal:
              Service: logging.s3.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${LogBucket.Arn}/*"
            Condition:
              ArnLike:
                "aws:SourceArn": !GetAtt SecureBucket.Arn
              StringEquals:
                "aws:SourceAccount": !Ref "AWS::AccountId"

  # メインバケット（セキュリティ要件をすべて満たす）
  SecureBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-${AWS::AccountId}"
      # 要件1: サーバーサイド暗号化（SSE-S3）
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      # 要件2: パブリックアクセスブロック（4項目すべて有効）
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      # 要件3: バージョニング有効
      VersioningConfiguration:
        Status: Enabled
      # 要件4: アクセスログ設定
      LoggingConfiguration:
        DestinationBucketName: !Ref LogBucket
        LogFilePrefix: access-logs/

Outputs:
  SecureBucketName:
    Description: セキュア S3 バケット名
    Value: !Ref SecureBucket

  SecureBucketArn:
    Description: セキュア S3 バケット ARN
    Value: !GetAtt SecureBucket.Arn

  LogBucketName:
    Description: アクセスログバケット名
    Value: !Ref LogBucket
