# TenkaCloud 統一問題フォーマット
# 問題ID: s3-secure-bucket
# タイプ: GAMEDAY（構築型）

id: s3-secure-bucket
title: S3 バケットのセキュア構築
type: gameday
category: security
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-09"
  updatedAt: "2026-02-09"
  tags:
    - s3
    - security
    - encryption
    - versioning
    - logging
    - public-access-block
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、新しいプロジェクト用の S3 バケットを
    セキュリティ要件に準拠した形で構築する任務を与えられました。

    ## 背景
    社内のセキュリティチームが定めた S3 バケットの構築基準があります。
    すべての S3 バケットは以下のセキュリティ要件を満たす必要があります。

    ## あなたのミッション
    S3 バケットを新規作成し、以下のセキュリティ要件をすべて満たしてください。

    ### 要件
    1. **サーバーサイド暗号化**: SSE-S3（AES-256）によるデフォルト暗号化を有効にする
    2. **パブリックアクセスブロック**: 4 つのブロック設定をすべて有効にする
    3. **バージョニング**: バケットのバージョニングを有効にする
    4. **アクセスログ**: サーバーアクセスログを別バケットに出力する設定を行う

  objectives:
    - S3 バケットを作成し、SSE-S3 でデフォルト暗号化を設定する
    - パブリックアクセスブロックの 4 項目をすべて有効にする
    - バケットのバージョニングを有効化する
    - アクセスログ用バケットを作成し、ログ出力を設定する

  hints:
    - "CloudFormation の AWS::S3::Bucket リソースを確認してください"
    - "BucketEncryption プロパティで SSE-S3 を設定できます"
    - "PublicAccessBlockConfiguration で 4 つの設定があります"
    - "LoggingConfiguration でアクセスログの出力先を指定します"

  prerequisites:
    - AWS の基本的な知識
    - S3 の基本的な知識
    - CloudFormation の基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/s3-secure-bucket.yaml
      parameters:
        BucketNamePrefix: tenka-secure

    local:
      type: cloudformation
      path: ./templates/aws/s3-secure-bucket.yaml
      parameters:
        BucketNamePrefix: tenka-secure-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: lambda
  path: ./scoring/s3-secure-bucket-scorer
  criteria:
    - name: サーバーサイド暗号化
      description: SSE-S3（AES-256）によるデフォルト暗号化が有効化されている
      weight: 30
      maxPoints: 30

    - name: パブリックアクセスブロック
      description: BlockPublicAcls, IgnorePublicAcls, BlockPublicPolicy, RestrictPublicBuckets がすべて有効
      weight: 30
      maxPoints: 30

    - name: バージョニング
      description: バケットのバージョニングが有効化されている
      weight: 20
      maxPoints: 20

    - name: アクセスログ
      description: サーバーアクセスログが別バケットに出力されるよう設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
