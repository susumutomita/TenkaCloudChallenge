# TenkaCloud 統一問題フォーマット
# 問題ID: iam-least-privilege
# タイプ: GAMEDAY（構築型）

id: iam-least-privilege
title: IAM 最小権限設計
type: gameday
category: security
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - iam
    - security
    - least-privilege
    - mfa
    - policy-condition
    - resource-level-permission
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティエンジニアとして、社内の IAM 設計をゼロから見直す
    プロジェクトにアサインされました。

    ## 背景
    監査で「過剰な権限付与」と「MFA 未設定のユーザーが存在する」という
    指摘を受けました。最小権限の原則に基づいた IAM 設計と、
    MFA を強制する仕組みの構築が急務です。

    ## あなたのミッション
    以下の要件を満たす IAM リソースを構築してください。

    ### 要件
    1. **アプリケーションロール**: EC2 用の IAM ロールを作成し、特定の S3 バケットへの読み書きのみを許可する（リソースレベル権限）
    2. **ポリシー条件**: 暗号化されていないオブジェクトのアップロードを拒否する条件付きポリシーを設定する
    3. **管理者ロール**: MFA 認証済みのユーザーのみが引き受けられる管理者ロールを作成する
    4. **MFA 強制**: MFA 未設定のユーザーに対して、MFA セットアップ以外のすべての操作を拒否するポリシーを作成する

  objectives:
    - S3 の特定バケットのみにアクセスできるアプリケーションロールを作成する
    - 暗号化必須の条件付きポリシーを設定する
    - MFA 必須の管理者ロールを作成する
    - MFA 強制ポリシーを IAM グループに適用する

  hints:
    - "IAM ポリシーの Resource で特定の S3 バケット ARN を指定してください"
    - "Condition の s3:x-amz-server-side-encryption で暗号化を強制できます"
    - "AssumeRolePolicyDocument の Condition で aws:MultiFactorAuthPresent を使います"
    - "NotAction と BoolIfExists を組み合わせて MFA 強制ポリシーを作成できます"

  prerequisites:
    - IAM の基本概念（ユーザー、ロール、ポリシー）
    - IAM ポリシーの JSON 構文
    - MFA の基本概念
    - CloudFormation の基本的な知識

  estimatedTime: 45

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/iam-least-privilege.yaml
      parameters:
        EnvironmentName: tenka-iam

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: アプリケーションロール + リソースレベル権限
      description: EC2 用 IAM ロールが作成され、特定の S3 バケットのみへのアクセスが許可されている
      weight: 25
      maxPoints: 25

    - name: ポリシー条件（暗号化強制）
      description: 暗号化されていないオブジェクトのアップロードを拒否する Deny ステートメントが存在する
      weight: 25
      maxPoints: 25

    - name: MFA 必須の管理者ロール
      description: AssumeRole に MFA 条件が設定され、セッション期間が適切に制限されている
      weight: 25
      maxPoints: 25

    - name: MFA 強制ポリシー
      description: MFA 未設定ユーザーに対して MFA セットアップ以外の操作を拒否するポリシーが存在する
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
