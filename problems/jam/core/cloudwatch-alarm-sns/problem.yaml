# TenkaCloud 統一問題フォーマット
# 問題ID: cloudwatch-alarm-sns
# タイプ: GAMEDAY（構築型）

id: cloudwatch-alarm-sns
title: CloudWatch アラームと SNS 通知の構築
type: gameday
category: operations
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - cloudwatch
    - alarm
    - sns
    - monitoring
    - dashboard
    - notification
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、本番環境のモニタリングと
    アラート通知の仕組みを構築する任務を与えられました。

    ## 背景
    運用チームが障害をいち早く検知し対応できるよう、
    主要メトリクスの監視とアラート通知の自動化が求められています。
    CPU 使用率やメモリ使用率の異常値を検知し、即座にチームへ通知する仕組みが必要です。

    ## あなたのミッション
    CloudWatch アラームと SNS 通知を構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **SNS トピック**: アラート通知用の SNS トピックを作成し、メールサブスクリプションを設定する
    2. **CPU アラーム**: EC2 インスタンスの CPU 使用率が 80% を超えた場合のアラームを作成する
    3. **ステータスチェックアラーム**: EC2 インスタンスのステータスチェック失敗アラームを作成する
    4. **ダッシュボード**: 主要メトリクスを表示する CloudWatch ダッシュボードを作成する

  objectives:
    - SNS トピックとメールサブスクリプションを作成する
    - CPU 使用率の CloudWatch アラームを構成する
    - ステータスチェック失敗の CloudWatch アラームを構成する
    - 主要メトリクスの CloudWatch ダッシュボードを作成する

  hints:
    - "AWS::SNS::Topic と AWS::SNS::Subscription でトピックとサブスクリプションを作成できます"
    - "AWS::CloudWatch::Alarm で CPUUtilization メトリクスを監視できます"
    - "StatusCheckFailed メトリクスでインスタンスの状態を監視できます"
    - "AWS::CloudWatch::Dashboard で JSON 形式のダッシュボードボディを定義します"

  prerequisites:
    - AWS の基本的な知識
    - CloudWatch の基本的な知識
    - SNS の基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cloudwatch-alarm-sns.yaml
      parameters:
        EnvironmentPrefix: tenka-monitoring
        NotificationEmail: admin@example.com

    local:
      type: cloudformation
      path: ./templates/aws/cloudwatch-alarm-sns.yaml
      parameters:
        EnvironmentPrefix: tenka-monitoring-local
        NotificationEmail: admin@example.com

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: SNS トピック
      description: アラート通知用の SNS トピックが作成され、メールサブスクリプションが設定されている
      weight: 25
      maxPoints: 25

    - name: CPU アラーム
      description: CPU 使用率 80% 超過のアラームが作成され、SNS トピックにアクションが設定されている
      weight: 30
      maxPoints: 30

    - name: ステータスチェックアラーム
      description: ステータスチェック失敗のアラームが作成され、SNS トピックにアクションが設定されている
      weight: 20
      maxPoints: 20

    - name: ダッシュボード
      description: 主要メトリクスを表示する CloudWatch ダッシュボードが作成されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
