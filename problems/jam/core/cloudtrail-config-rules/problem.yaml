# TenkaCloud 統一問題フォーマット
# 問題ID: cloudtrail-config-rules
# タイプ: GAMEDAY（構築型）

id: cloudtrail-config-rules
title: CloudTrail と Config ルールによるコンプライアンス構築
type: gameday
category: operations
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - cloudtrail
    - aws-config
    - compliance
    - remediation
    - audit
    - governance
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、組織の AWS 環境に対する
    監査証跡とコンプライアンス自動チェックの仕組みを構築する任務を与えられました。

    ## 背景
    セキュリティ監査への対応として、すべての API 操作の記録と、
    リソース設定のコンプライアンスチェックを自動化する必要があります。
    違反が検出された場合は自動修復も行える体制が求められています。

    ## あなたのミッション
    CloudTrail と AWS Config を構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **CloudTrail 証跡**: マルチリージョン対応の CloudTrail 証跡を作成し、S3 バケットにログを保存する
    2. **Config レコーダー**: AWS Config レコーダーを有効化し、リソース変更の記録を開始する
    3. **Config ルール**: S3 バケットのパブリックアクセスをチェックする Config ルールを作成する
    4. **修復アクション**: Config ルール違反時の自動修復アクション（SSM Automation）を設定する

  objectives:
    - マルチリージョン CloudTrail 証跡を S3 バケットへ出力する設定を構築する
    - AWS Config レコーダーとデリバリーチャンネルを設定する
    - S3 パブリックアクセスチェック用の Config ルールを作成する
    - ルール違反時の自動修復を SSM Automation で構成する

  hints:
    - "AWS::CloudTrail::Trail の IsMultiRegionTrail を true に設定してください"
    - "AWS::Config::ConfigurationRecorder でリソース記録を有効化できます"
    - "マネージドルール s3-bucket-public-read-prohibited を使用できます"
    - "AWS::Config::RemediationConfiguration で自動修復を設定できます"

  prerequisites:
    - CloudTrail の基本的な知識
    - AWS Config の基本的な知識
    - IAM ロールとポリシーの知識
    - SSM Automation の基本的な知識

  estimatedTime: 45

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cloudtrail-config-rules.yaml
      parameters:
        EnvironmentPrefix: tenka-compliance

    local:
      type: cloudformation
      path: ./templates/aws/cloudtrail-config-rules.yaml
      parameters:
        EnvironmentPrefix: tenka-compliance-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: CloudTrail 証跡
      description: マルチリージョン対応の CloudTrail 証跡が作成され、S3 へログが保存される設定がある
      weight: 30
      maxPoints: 30

    - name: Config レコーダー
      description: AWS Config レコーダーが有効化され、リソース変更が記録される設定がある
      weight: 25
      maxPoints: 25

    - name: Config ルール
      description: S3 パブリックアクセスをチェックする Config ルールが作成されている
      weight: 25
      maxPoints: 25

    - name: 修復アクション
      description: Config ルール違反時の自動修復アクションが構成されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
