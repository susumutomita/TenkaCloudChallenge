# TenkaCloud 統一問題フォーマット
# 問題ID: ssm-automation
# タイプ: GAMEDAY（構築型）

id: ssm-automation
title: Systems Manager による運用自動化の構築
type: gameday
category: operations
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - systems-manager
    - patch-management
    - inventory
    - run-command
    - maintenance-window
    - automation
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、数十台の EC2 インスタンスの
    運用管理を自動化する仕組みを構築する任務を与えられました。

    ## 背景
    手動でのパッチ適用やインベントリ管理はスケールしません。
    Systems Manager を活用して、パッチ管理、インベントリ収集、
    コマンド実行、メンテナンスウィンドウを一元管理する必要があります。

    ## あなたのミッション
    Systems Manager を中心とした運用自動化基盤を構築し、
    以下の要件をすべて満たしてください。

    ### 要件
    1. **パッチベースライン**: カスタムパッチベースラインを作成し、承認ルールを定義する
    2. **メンテナンスウィンドウ**: 定期パッチ適用のメンテナンスウィンドウとタスクを設定する
    3. **インベントリ収集**: SSM インベントリのアソシエーションを作成し、インスタンス情報を自動収集する
    4. **IAM ロール**: EC2 インスタンスが SSM と連携するための IAM ロールとインスタンスプロファイルを作成する
    5. **SNS 通知**: メンテナンスウィンドウ実行結果の通知を設定する

  objectives:
    - カスタムパッチベースラインと承認ルールを作成する
    - メンテナンスウィンドウとパッチ適用タスクを構成する
    - SSM インベントリ収集のアソシエーションを設定する
    - EC2 用の SSM 対応 IAM ロールを作成する
    - 実行結果を SNS トピックへ通知する設定を行う

  hints:
    - "AWS::SSM::PatchBaseline で承認ルールを定義できます"
    - "AWS::SSM::MaintenanceWindow と MaintenanceWindowTask でタスクをスケジュールできます"
    - "AWS::SSM::Association でインベントリ収集のドキュメントを適用できます"
    - "AmazonSSMManagedInstanceCore ポリシーをアタッチしてください"
    - "MaintenanceWindowTask の NotificationConfig で通知を設定できます"

  prerequisites:
    - EC2 インスタンスの管理経験
    - Systems Manager の基本的な知識
    - IAM ロールとポリシーの知識
    - パッチ管理の概念理解

  estimatedTime: 60

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ssm-automation.yaml
      parameters:
        EnvironmentPrefix: tenka-ssm

    local:
      type: cloudformation
      path: ./templates/aws/ssm-automation.yaml
      parameters:
        EnvironmentPrefix: tenka-ssm-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: パッチベースライン
      description: カスタムパッチベースラインが作成され、承認ルールが定義されている
      weight: 20
      maxPoints: 20

    - name: メンテナンスウィンドウ
      description: メンテナンスウィンドウが作成され、パッチ適用タスクが登録されている
      weight: 25
      maxPoints: 25

    - name: インベントリ収集
      description: SSM インベントリアソシエーションが作成され、インスタンス情報が自動収集される
      weight: 20
      maxPoints: 20

    - name: IAM ロール
      description: EC2 用の SSM 対応 IAM ロールとインスタンスプロファイルが作成されている
      weight: 20
      maxPoints: 20

    - name: SNS 通知
      description: メンテナンスウィンドウ実行結果が SNS トピックに通知される設定がある
      weight: 15
      maxPoints: 15

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
