AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: S3 クロスリージョンレプリケーション構築（正解テンプレート）
  バージョニング、CRR ルール、IAM ロール、暗号化を設定した S3 バケットペア。

Parameters:
  BucketNamePrefix:
    Type: String
    Default: tenka-crr
    Description: S3 バケット名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

  ReplicaRegion:
    Type: String
    Default: ap-northeast-3
    Description: レプリカバケットのリージョン

Resources:
  # レプリケーション用 IAM ロール
  ReplicationRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${BucketNamePrefix}-replication-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: s3.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3ReplicationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              # ソースバケットからの読み取り権限
              - Effect: Allow
                Action:
                  - s3:GetReplicationConfiguration
                  - s3:ListBucket
                Resource: !Sub "arn:aws:s3:::${BucketNamePrefix}-source-${AWS::AccountId}"
              - Effect: Allow
                Action:
                  - s3:GetObjectVersionForReplication
                  - s3:GetObjectVersionAcl
                  - s3:GetObjectVersionTagging
                Resource: !Sub "arn:aws:s3:::${BucketNamePrefix}-source-${AWS::AccountId}/*"
              # レプリカバケットへの書き込み権限
              - Effect: Allow
                Action:
                  - s3:ReplicateObject
                  - s3:ReplicateDelete
                  - s3:ReplicateTags
                Resource: !Sub "arn:aws:s3:::${BucketNamePrefix}-replica-${AWS::AccountId}/*"

  # レプリカバケット（別リージョン想定だが、テンプレート内で同リージョンに作成）
  ReplicaBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-replica-${AWS::AccountId}"
      # 要件1: バージョニング有効（レプリカ側）
      VersioningConfiguration:
        Status: Enabled
      # 要件4: 暗号化（レプリカ側）
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # ソースバケット（レプリケーション設定付き）
  SourceBucket:
    Type: AWS::S3::Bucket
    DependsOn: ReplicaBucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-source-${AWS::AccountId}"
      # 要件1: バージョニング有効（ソース側）
      VersioningConfiguration:
        Status: Enabled
      # 要件4: 暗号化（ソース側）
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      # 要件2: レプリケーションルール
      # 要件3: IAM ロール
      ReplicationConfiguration:
        Role: !GetAtt ReplicationRole.Arn
        Rules:
          - Id: CrossRegionReplicationRule
            Status: Enabled
            Destination:
              Bucket: !GetAtt ReplicaBucket.Arn
              StorageClass: STANDARD

Outputs:
  SourceBucketName:
    Description: ソース S3 バケット名
    Value: !Ref SourceBucket

  SourceBucketArn:
    Description: ソース S3 バケット ARN
    Value: !GetAtt SourceBucket.Arn

  ReplicaBucketName:
    Description: レプリカ S3 バケット名
    Value: !Ref ReplicaBucket

  ReplicaBucketArn:
    Description: レプリカ S3 バケット ARN
    Value: !GetAtt ReplicaBucket.Arn

  ReplicationRoleArn:
    Description: レプリケーション IAM ロール ARN
    Value: !GetAtt ReplicationRole.Arn
