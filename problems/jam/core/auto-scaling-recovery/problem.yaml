# TenkaCloud 統一問題フォーマット
# 問題ID: auto-scaling-recovery
# タイプ: GAMEDAY（構築型）

id: auto-scaling-recovery
title: Auto Scaling と障害復旧の構築
type: gameday
category: reliability
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - auto-scaling
    - health-check
    - elb
    - sns
    - disaster-recovery
    - scaling-policy
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、高トラフィックに耐えうるスケーラブルで
    自己回復型のインフラストラクチャを構築する任務を与えられました。

    ## 背景
    本番ワークロードでは、トラフィック急増時の自動スケールアウトと、
    障害発生時の自動復旧が不可欠です。複数のヘルスチェック層を組み合わせ、
    障害検知から復旧、通知までを自動化する堅牢なシステムが求められています。

    ## あなたのミッション
    Auto Scaling グループを中心とした自己回復型インフラを構築し、
    以下の要件をすべて満たしてください。

    ### 要件
    1. **Auto Scaling グループ**: 最小 2 台、最大 6 台の EC2 インスタンスを管理する ASG を作成する
    2. **ヘルスチェック**: ELB ヘルスチェックと EC2 ヘルスチェックの両方を構成する
    3. **スケーリングポリシー**: CPU 使用率に基づくターゲット追跡スケーリングポリシーを設定する
    4. **Application Load Balancer**: ALB を作成し、ASG のインスタンスにトラフィックを分散する
    5. **SNS 通知**: スケーリングイベント発生時に SNS トピックへ通知する

  objectives:
    - マルチ AZ の Auto Scaling グループを構成する
    - ELB ヘルスチェックを有効化した ALB を作成する
    - CPU 使用率ベースのターゲット追跡スケーリングポリシーを設定する
    - スケーリングイベントの SNS 通知を構成する
    - 起動テンプレートでインスタンス設定を定義する

  hints:
    - "AWS::AutoScaling::AutoScalingGroup の HealthCheckType を ELB に設定してください"
    - "TargetTrackingScaling ポリシーで ASGAverageCPUUtilization を使用できます"
    - "NotificationConfigurations でスケーリングイベントの通知先を設定します"
    - "起動テンプレートで UserData を使い、Web サーバーを自動起動できます"

  prerequisites:
    - EC2 と Auto Scaling の知識
    - Elastic Load Balancing の知識
    - VPC ネットワーキングの知識
    - SNS の基本的な知識

  estimatedTime: 60

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/auto-scaling-recovery.yaml
      parameters:
        EnvironmentPrefix: tenka-asg

    local:
      type: cloudformation
      path: ./templates/aws/auto-scaling-recovery.yaml
      parameters:
        EnvironmentPrefix: tenka-asg-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Auto Scaling グループ
      description: 最小 2 台・最大 6 台の ASG がマルチ AZ で構成されている
      weight: 25
      maxPoints: 25

    - name: ヘルスチェック
      description: ELB ヘルスチェックが有効化され、ALB ターゲットグループのヘルスチェックが構成されている
      weight: 20
      maxPoints: 20

    - name: スケーリングポリシー
      description: CPU 使用率ベースのターゲット追跡スケーリングポリシーが設定されている
      weight: 20
      maxPoints: 20

    - name: Application Load Balancer
      description: ALB が作成され、ASG インスタンスにトラフィックが分散される構成になっている
      weight: 20
      maxPoints: 20

    - name: SNS 通知
      description: スケーリングイベント発生時に SNS トピックへ通知が送信される設定がある
      weight: 15
      maxPoints: 15

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
