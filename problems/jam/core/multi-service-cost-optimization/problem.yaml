# TenkaCloud 統一問題フォーマット
# 問題ID: multi-service-cost-optimization
# タイプ: GAMEDAY（構築型）

id: multi-service-cost-optimization
title: マルチサービスコスト最適化
type: gameday
category: cost
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - cloudfront
    - lambda
    - dynamodb
    - cost
    - caching
    - capacity
    - memory-optimization
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはシニアクラウドアーキテクトとして、月額 $50,000 を超えるマルチサービス環境の
    コスト最適化プロジェクトをリードしています。フロントエンド配信、サーバーレスバックエンド、
    データベースの 3 層すべてでコスト削減の余地があります。

    ## 背景
    Cost Explorer と CloudWatch の分析から以下が判明しました。
    - CloudFront のキャッシュヒット率が 20% と極めて低く、オリジンへのリクエストが過剰
    - Lambda 関数のメモリが 3072 MB に設定されているが、実際の使用量は 256 MB 程度
    - DynamoDB テーブルがプロビジョンドモードで常時高キャパシティを確保しているが、
      夜間のトラフィックは日中の 10% 程度

    ## あなたのミッション
    CloudFront、Lambda、DynamoDB の 3 サービスを最適な設定で構築してください。

    ### 要件
    1. **CloudFront キャッシュ最適化**: キャッシュ TTL を設定し（デフォルト 86400 秒、最大 604800 秒）、圧縮を有効化する
    2. **Lambda メモリ最適化**: メモリを 256 MB に最適化し、タイムアウトを 10 秒に設定する
    3. **DynamoDB キャパシティ最適化**: オンデマンドモード（PAY_PER_REQUEST）に変更する
    4. **DynamoDB Auto Scaling 代替**: TTL を有効化してデータライフサイクルを管理する

  objectives:
    - CloudFront ディストリビューションでキャッシュ TTL と圧縮を最適化する
    - Lambda 関数のメモリサイズを適切に設定する
    - DynamoDB テーブルをオンデマンドキャパシティモードで構築する
    - DynamoDB TTL を有効化してストレージコストを管理する

  hints:
    - "CloudFront の CachingOptimized マネージドキャッシュポリシーを活用できます"
    - "Lambda Power Tuning で最適なメモリサイズを特定するのがベストプラクティスです"
    - "DynamoDB のオンデマンドモードはトラフィック変動が大きい場合に有効です"
    - "DynamoDB TTL は追加料金なしでデータの自動削除が可能です"

  prerequisites:
    - CloudFront の設定経験
    - Lambda の構成知識
    - DynamoDB のキャパシティモードの理解
    - CloudFormation の実務経験

  estimatedTime: 60

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/multi-service-cost-optimization.yaml
      parameters:
        ProjectName: tenka-cost-opt

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: CloudFront キャッシュ最適化
      description: キャッシュ TTL（デフォルト 86400 秒、最大 604800 秒）が設定され圧縮が有効
      weight: 30
      maxPoints: 30

    - name: Lambda メモリ最適化
      description: メモリが 256 MB に設定されタイムアウトが 10 秒以内
      weight: 25
      maxPoints: 25

    - name: DynamoDB オンデマンドモード
      description: BillingMode が PAY_PER_REQUEST に設定されている
      weight: 25
      maxPoints: 25

    - name: DynamoDB TTL 有効化
      description: TimeToLiveSpecification が有効でカラム名が設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
