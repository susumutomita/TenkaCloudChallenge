# TenkaCloud 統一問題フォーマット
# 問題ID: rel-chaos-resilience-testing
# タイプ: GAMEDAY（構築型）

id: rel-chaos-resilience-testing
title: カオスエンジニアリング耐障害性テスト基盤
type: gameday
category: reliability
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - fis
    - chaos-engineering
    - auto-scaling
    - alb
    - cloudwatch
    - sns
    - ssm
    - resilience
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、本番環境の耐障害性を検証する
    カオスエンジニアリング基盤を構築する任務を与えられました。

    ## 背景
    「障害は必ず発生する」という前提のもと、意図的に障害を注入して
    システムの回復能力を検証する必要があります。AWS Fault Injection Service（FIS）を使い、
    安全にカオス実験を実行できる環境を構築します。

    ## あなたのミッション
    FIS を中心としたカオスエンジニアリング基盤を構築し、以下の要件をすべて満たしてください。

    ### 要件
    1. **対象インフラ**: ALB + Auto Scaling グループの耐障害性テスト対象を構築する
    2. **FIS 実験テンプレート**: EC2 インスタンス停止の FIS 実験テンプレートを作成する
    3. **停止条件**: CloudWatch アラームに基づく FIS 停止条件を設定する
    4. **IAM ロール**: FIS 実行に必要な IAM ロールを作成する
    5. **監視と通知**: 実験実行前後を監視する CloudWatch ダッシュボードと SNS 通知を設定する
    6. **SSM ドキュメント**: カスタム障害注入用の SSM ドキュメントを作成する

  objectives:
    - ALB + ASG のテスト対象インフラを構築する
    - EC2 停止の FIS 実験テンプレートを作成する
    - CloudWatch アラームベースの停止条件を設定する
    - FIS 実行用 IAM ロールを作成する
    - 監視ダッシュボードと SNS 通知を構成する
    - カスタム SSM ドキュメントを作成する

  hints:
    - "AWS::FIS::ExperimentTemplate で実験テンプレートを作成できます"
    - "Actions で aws:ec2:stop-instances アクションを定義します"
    - "StopConditions で CloudWatch アラームを指定して安全に実験を停止できます"
    - "Targets で対象リソースをタグでフィルタリングできます"

  prerequisites:
    - FIS の基本的な知識
    - Auto Scaling と ALB の知識
    - CloudWatch と SNS の知識
    - SSM の基本的な知識
    - カオスエンジニアリングの概念理解

  estimatedTime: 120

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rel-chaos-resilience-testing.yaml
      parameters:
        EnvironmentPrefix: tenka-chaos

    local:
      type: cloudformation
      path: ./templates/aws/rel-chaos-resilience-testing.yaml
      parameters:
        EnvironmentPrefix: tenka-chaos-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 45

scoring:
  type: api
  criteria:
    - name: 対象インフラ
      description: ALB + Auto Scaling グループのテスト対象インフラが構築されている
      weight: 15
      maxPoints: 15

    - name: FIS 実験テンプレート
      description: EC2 インスタンス停止の FIS 実験テンプレートが作成されている
      weight: 25
      maxPoints: 25

    - name: 停止条件
      description: CloudWatch アラームに基づく停止条件が設定されている
      weight: 15
      maxPoints: 15

    - name: IAM ロール
      description: FIS 実行に必要な IAM ロールが作成されている
      weight: 15
      maxPoints: 15

    - name: 監視と通知
      description: CloudWatch ダッシュボードと SNS 通知が設定されている
      weight: 15
      maxPoints: 15

    - name: SSM ドキュメント
      description: カスタム障害注入用の SSM ドキュメントが作成されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 10
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
