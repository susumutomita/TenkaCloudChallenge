# TenkaCloud 統一問題フォーマット
# 問題ID: rel-lambda-dlq-retry
# タイプ: GAMEDAY（構築型）

id: rel-lambda-dlq-retry
title: Lambda デッドレターキューとリトライ構成
type: gameday
category: reliability
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - lambda
    - dead-letter-queue
    - sqs
    - retry
    - event-source-mapping
    - error-handling
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、Lambda 関数の障害時に
    メッセージが失われない仕組みを構築する任務を与えられました。

    ## 背景
    イベント駆動アーキテクチャでは、Lambda 関数の実行失敗時に
    イベントが消失するリスクがあります。DLQ とリトライ設定を組み合わせて
    処理の信頼性を確保し、失敗イベントを分析可能にする必要があります。

    ## あなたのミッション
    Lambda 関数の DLQ とリトライ構成を構築し、以下の要件をすべて満たしてください。

    ### 要件
    1. **Lambda 関数**: SQS トリガーで起動する Lambda 関数を作成する
    2. **ソースキューと DLQ**: ソースキューとデッドレターキューを作成し、リドライブポリシーを設定する
    3. **イベントソースマッピング**: Lambda と SQS のイベントソースマッピングを作成する
    4. **Lambda 送信先**: Lambda の非同期呼び出し失敗時の送信先を設定する
    5. **IAM ロール**: Lambda 実行に必要な権限を持つ IAM ロールを作成する

  objectives:
    - SQS トリガーの Lambda 関数を作成する
    - ソースキューと DLQ をリドライブポリシーで接続する
    - Lambda イベントソースマッピングを構成する
    - 非同期呼び出し失敗時の送信先を SQS DLQ に設定する
    - Lambda 実行用の IAM ロールを作成する

  hints:
    - "AWS::Lambda::EventSourceMapping で SQS トリガーを設定できます"
    - "AWS::Lambda::EventInvokeConfig で非同期呼び出し設定を構成できます"
    - "MaximumRetryAttempts と MaximumEventAgeInSeconds でリトライ動作を制御します"
    - "Lambda 関数には SQS の受信/削除権限が必要です"

  prerequisites:
    - Lambda の基本的な知識
    - SQS の基本的な知識
    - IAM ロールとポリシーの知識

  estimatedTime: 45

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rel-lambda-dlq-retry.yaml
      parameters:
        EnvironmentPrefix: tenka-lambda-dlq

    local:
      type: cloudformation
      path: ./templates/aws/rel-lambda-dlq-retry.yaml
      parameters:
        EnvironmentPrefix: tenka-lambda-dlq-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Lambda 関数
      description: SQS トリガーで起動する Lambda 関数が作成されている
      weight: 20
      maxPoints: 20

    - name: ソースキューと DLQ
      description: ソースキューと DLQ がリドライブポリシーで接続されている
      weight: 25
      maxPoints: 25

    - name: イベントソースマッピング
      description: Lambda と SQS のイベントソースマッピングが正しく構成されている
      weight: 20
      maxPoints: 20

    - name: Lambda 送信先
      description: 非同期呼び出し失敗時の送信先が設定されている
      weight: 15
      maxPoints: 15

    - name: IAM ロール
      description: Lambda 実行に必要な権限を持つ IAM ロールが作成されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
