AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: フル CI/CD パイプライン（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-fullcicd
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

Resources:
  # ネットワーク
  VPC:
    Type: AWS::EC2::VPC
    Properties: { CidrBlock: 10.0.0.0/16, EnableDnsSupport: true, EnableDnsHostnames: true }
  SubA:
    Type: AWS::EC2::Subnet
    Properties: { VpcId: !Ref VPC, CidrBlock: 10.0.1.0/24, AvailabilityZone: !Select [0, !GetAZs ""], MapPublicIpOnLaunch: true }
  SubC:
    Type: AWS::EC2::Subnet
    Properties: { VpcId: !Ref VPC, CidrBlock: 10.0.2.0/24, AvailabilityZone: !Select [1, !GetAZs ""], MapPublicIpOnLaunch: true }
  IGW:
    Type: AWS::EC2::InternetGateway
  IGWAttach:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties: { VpcId: !Ref VPC, InternetGatewayId: !Ref IGW }
  RT:
    Type: AWS::EC2::RouteTable
    Properties: { VpcId: !Ref VPC }
  PubRoute:
    Type: AWS::EC2::Route
    DependsOn: IGWAttach
    Properties: { RouteTableId: !Ref RT, DestinationCidrBlock: 0.0.0.0/0, GatewayId: !Ref IGW }
  SubAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref SubA, RouteTableId: !Ref RT }
  SubCAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties: { SubnetId: !Ref SubC, RouteTableId: !Ref RT }

  # 要件6: SNS
  PipelineAlerts:
    Type: AWS::SNS::Topic
    Properties: { TopicName: !Sub "${EnvironmentPrefix}-alerts" }
  ApprovalTopic:
    Type: AWS::SNS::Topic
    Properties: { TopicName: !Sub "${EnvironmentPrefix}-approval" }

  # S3 バケット
  ArtifactBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentPrefix}-artifacts-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, BlockPublicPolicy: true, IgnorePublicAcls: true, RestrictPublicBuckets: true }
  SourceBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentPrefix}-source-${AWS::AccountId}"
      VersioningConfiguration: { Status: Enabled }
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, BlockPublicPolicy: true, IgnorePublicAcls: true, RestrictPublicBuckets: true }

  # 要件2: CodeBuild
  CodeBuildRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-cb-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: codebuild.amazonaws.com }, Action: sts:AssumeRole }
      Policies:
        - PolicyName: Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: ["logs:*"], Resource: "*" }
              - { Effect: Allow, Action: ["s3:GetObject", "s3:PutObject"], Resource: [!Sub "${ArtifactBucket.Arn}/*"] }

  BuildProject:
    Type: AWS::CodeBuild::Project
    Properties:
      Name: !Sub "${EnvironmentPrefix}-build"
      ServiceRole: !GetAtt CodeBuildRole.Arn
      Artifacts: { Type: CODEPIPELINE }
      Environment: { Type: LINUX_CONTAINER, ComputeType: BUILD_GENERAL1_SMALL, Image: "aws/codebuild/amazonlinux2-x86_64-standard:5.0" }
      Source:
        Type: CODEPIPELINE
        BuildSpec: |
          version: 0.2
          phases:
            build:
              commands:
                - echo "Build and test..."
          artifacts:
            files: ['**/*']

  # 要件5: ALB + ASG
  ALBSG:
    Type: AWS::EC2::SecurityGroup
    Properties: { GroupDescription: ALB SG, VpcId: !Ref VPC, SecurityGroupIngress: [{ IpProtocol: tcp, FromPort: 80, ToPort: 80, CidrIp: 0.0.0.0/0 }] }
  InstanceSG:
    Type: AWS::EC2::SecurityGroup
    Properties: { GroupDescription: Inst SG, VpcId: !Ref VPC, SecurityGroupIngress: [{ IpProtocol: tcp, FromPort: 80, ToPort: 80, SourceSecurityGroupId: !GetAtt ALBSG.GroupId }] }
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties: { Name: !Sub "${EnvironmentPrefix}-alb", Scheme: internet-facing, Subnets: [!Ref SubA, !Ref SubC], SecurityGroups: [!GetAtt ALBSG.GroupId] }
  ProdTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: { Name: !Sub "${EnvironmentPrefix}-prod", Port: 80, Protocol: HTTP, VpcId: !Ref VPC, HealthCheckPath: /health }
  GreenTG:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties: { Name: !Sub "${EnvironmentPrefix}-green", Port: 80, Protocol: HTTP, VpcId: !Ref VPC, HealthCheckPath: /health }
  ALBListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties: { LoadBalancerArn: !Ref ALB, Port: 80, Protocol: HTTP, DefaultActions: [{ Type: forward, TargetGroupArn: !Ref ProdTG }] }
  LT:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        SecurityGroupIds: [!GetAtt InstanceSG.GroupId]
        UserData: { "Fn::Base64": "#!/bin/bash\nyum install -y httpd ruby wget\necho healthy > /var/www/html/health\nsystemctl start httpd" }
  ProdASG:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentPrefix}-prod-asg"
      LaunchTemplate: { LaunchTemplateId: !Ref LT, Version: !GetAtt LT.LatestVersionNumber }
      MinSize: 2
      MaxSize: 4
      VPCZoneIdentifier: [!Ref SubA, !Ref SubC]
      TargetGroupARNs: [!Ref ProdTG]

  # 要件3: CodeDeploy
  CDRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-cd-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: codedeploy.amazonaws.com }, Action: sts:AssumeRole }
      ManagedPolicyArns: ["arn:aws:iam::aws:policy/AWSCodeDeployRole"]
  CDApp:
    Type: AWS::CodeDeploy::Application
    Properties: { ApplicationName: !Sub "${EnvironmentPrefix}-app", ComputePlatform: Server }
  StagingDG:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CDApp
      DeploymentGroupName: !Sub "${EnvironmentPrefix}-staging"
      ServiceRoleArn: !GetAtt CDRole.Arn
      DeploymentStyle: { DeploymentType: IN_PLACE, DeploymentOption: WITHOUT_TRAFFIC_CONTROL }
  ProdDG:
    Type: AWS::CodeDeploy::DeploymentGroup
    Properties:
      ApplicationName: !Ref CDApp
      DeploymentGroupName: !Sub "${EnvironmentPrefix}-prod"
      ServiceRoleArn: !GetAtt CDRole.Arn
      DeploymentStyle: { DeploymentType: BLUE_GREEN, DeploymentOption: WITH_TRAFFIC_CONTROL }
      BlueGreenDeploymentConfiguration:
        TerminateBlueInstancesOnDeploymentSuccess: { Action: TERMINATE, TerminationWaitTimeInMinutes: 5 }
        DeploymentReadyOption: { ActionOnTimeout: CONTINUE_DEPLOYMENT }
        GreenFleetProvisioningOption: { Action: COPY_AUTO_SCALING_GROUP }
      AutoScalingGroups: [!Ref ProdASG]
      LoadBalancerInfo:
        TargetGroupInfoList:
          - Name: !GetAtt ProdTG.TargetGroupName
      AutoRollbackConfiguration: { Enabled: true, Events: [DEPLOYMENT_FAILURE] }

  # 要件1: Pipeline
  PipelineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-pipe-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: codepipeline.amazonaws.com }, Action: sts:AssumeRole }
      Policies:
        - PolicyName: Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: ["s3:*"], Resource: [!GetAtt ArtifactBucket.Arn, !Sub "${ArtifactBucket.Arn}/*", !GetAtt SourceBucket.Arn, !Sub "${SourceBucket.Arn}/*"] }
              - { Effect: Allow, Action: ["codebuild:*"], Resource: !GetAtt BuildProject.Arn }
              - { Effect: Allow, Action: ["codedeploy:*"], Resource: "*" }
              - { Effect: Allow, Action: ["sns:Publish"], Resource: !Ref ApprovalTopic }

  Pipeline:
    Type: AWS::CodePipeline::Pipeline
    Properties:
      Name: !Sub "${EnvironmentPrefix}-pipeline"
      RoleArn: !GetAtt PipelineRole.Arn
      ArtifactStore: { Type: S3, Location: !Ref ArtifactBucket }
      Stages:
        - Name: Source
          Actions:
            - Name: S3Source
              ActionTypeId: { Category: Source, Owner: AWS, Provider: S3, Version: "1" }
              Configuration: { S3Bucket: !Ref SourceBucket, S3ObjectKey: source.zip, PollForSourceChanges: true }
              OutputArtifacts: [{ Name: SourceOutput }]
        - Name: Build
          Actions:
            - Name: Build
              ActionTypeId: { Category: Build, Owner: AWS, Provider: CodeBuild, Version: "1" }
              Configuration: { ProjectName: !Ref BuildProject }
              InputArtifacts: [{ Name: SourceOutput }]
              OutputArtifacts: [{ Name: BuildOutput }]
        - Name: Staging
          Actions:
            - Name: DeployStaging
              ActionTypeId: { Category: Deploy, Owner: AWS, Provider: CodeDeploy, Version: "1" }
              Configuration: { ApplicationName: !Ref CDApp, DeploymentGroupName: !Sub "${EnvironmentPrefix}-staging" }
              InputArtifacts: [{ Name: BuildOutput }]
        - Name: Production
          Actions:
            - Name: ApproveProduction
              ActionTypeId: { Category: Approval, Owner: AWS, Provider: Manual, Version: "1" }
              Configuration: { NotificationArn: !Ref ApprovalTopic, CustomData: "本番デプロイを承認してください" }
              RunOrder: 1
            - Name: DeployProduction
              ActionTypeId: { Category: Deploy, Owner: AWS, Provider: CodeDeploy, Version: "1" }
              Configuration: { ApplicationName: !Ref CDApp, DeploymentGroupName: !Sub "${EnvironmentPrefix}-prod" }
              InputArtifacts: [{ Name: BuildOutput }]
              RunOrder: 2

Outputs:
  PipelineName:
    Value: !Ref Pipeline
  ALBDnsName:
    Value: !GetAtt ALB.DNSName
