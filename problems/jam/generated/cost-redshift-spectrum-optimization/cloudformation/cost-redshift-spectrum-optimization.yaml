AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Redshift Spectrum と S3 データレイクによるクエリコスト最適化（正解テンプレート）
  Redshift Serverless、Glue Data Catalog、外部テーブルを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-redshift-cost
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} Redshift Serverless SG"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 5439
          ToPort: 5439
          CidrIp: 10.0.0.0/8

  RedshiftNamespace:
    Type: AWS::RedshiftServerless::Namespace
    Properties:
      NamespaceName: !Sub "${ProjectName}-ns"
      AdminUsername: admin
      AdminUserPassword: !Sub "{{resolve:secretsmanager:${ProjectName}-secret:SecretString:password}}"
      DbName: analytics

  # 要件1, 2: Redshift Serverless ワークグループ
  RedshiftWorkgroup:
    Type: AWS::RedshiftServerless::Workgroup
    Properties:
      WorkgroupName: !Sub "${ProjectName}-wg"
      NamespaceName: !GetAtt RedshiftNamespace.Namespace.NamespaceName
      # 要件2: ベース RPU を 8 に設定
      BaseCapacity: 8
      SubnetIds: !Ref SubnetIds
      SecurityGroupIds:
        - !Ref SecurityGroup
      PubliclyAccessible: false

  DataBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-data-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # 要件3: Glue Database
  GlueDatabase:
    Type: AWS::Glue::Database
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseInput:
        Name: !Sub "${ProjectName}_db"
        Description: Data lake database for Spectrum queries

  # 要件4: Glue テーブル（S3 外部テーブル）
  GlueTable:
    Type: AWS::Glue::Table
    Properties:
      CatalogId: !Ref AWS::AccountId
      DatabaseName: !Ref GlueDatabase
      TableInput:
        Name: events
        Description: Historical events data stored in S3
        TableType: EXTERNAL_TABLE
        Parameters:
          classification: parquet
        StorageDescriptor:
          Location: !Sub "s3://${DataBucket}/events/"
          InputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetInputFormat
          OutputFormat: org.apache.hadoop.hive.ql.io.parquet.MapredParquetOutputFormat
          SerdeInfo:
            SerializationLibrary: org.apache.hadoop.hive.ql.io.parquet.serde.ParquetHiveSerDe
          Columns:
            - Name: event_id
              Type: string
            - Name: event_type
              Type: string
            - Name: created_at
              Type: timestamp
            - Name: payload
              Type: string

Outputs:
  WorkgroupName:
    Description: Redshift Serverless ワークグループ名
    Value: !Sub "${ProjectName}-wg"

  GlueDatabaseName:
    Description: Glue データベース名
    Value: !Ref GlueDatabase

  DataBucketName:
    Description: データレイク S3 バケット名
    Value: !Ref DataBucket
