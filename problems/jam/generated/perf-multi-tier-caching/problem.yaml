# TenkaCloud 統一問題フォーマット
# 問題ID: perf-multi-tier-caching
# タイプ: GAMEDAY（構築型）

id: perf-multi-tier-caching
title: マルチ層キャッシュアーキテクチャの構築
type: gameday
category: performance
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - elasticache
    - cloudfront
    - api-gateway
    - performance
    - caching
    - redis
    - multi-tier
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはパフォーマンスエンジニアリングのリードとして、高トラフィック E コマース
    プラットフォームのレスポンスタイムを大幅に改善するプロジェクトを統括しています。
    エッジ、API、アプリケーションの 3 層でキャッシュ戦略を実装する必要があります。

    ## 背景
    パフォーマンステストの結果から以下が判明しました。
    - CloudFront のキャッシュヒット率が 10% と極めて低い
    - API Gateway のキャッシュが未設定でバックエンドへの呼び出しが 100%
    - ElastiCache（Redis）が単一ノードで障害時にキャッシュミスが全体に波及
    - Lambda 関数内でのローカルキャッシュも未実装
    - 各層のキャッシュ TTL が統一されておらず、データ不整合が発生

    ## あなたのミッション
    CloudFront、API Gateway キャッシュ、ElastiCache Redis を組み合わせたマルチ層キャッシュアーキテクチャを構築してください。

    ### 要件
    1. **CloudFront キャッシュ**: カスタムキャッシュポリシーでデフォルト TTL 300 秒、最大 TTL 3600 秒を設定する
    2. **API Gateway キャッシュ**: ステージレベルでキャッシュを有効化し TTL 60 秒を設定する
    3. **ElastiCache Redis**: レプリケーショングループ（1 プライマリ + 2 レプリカ）を暗号化付きで構成する
    4. **Redis パフォーマンス**: maxmemory-policy を allkeys-lfu に設定し、自動フェイルオーバーを有効にする
    5. **Lambda 関数**: Redis に接続するための Lambda 関数を VPC 内に配置する

  objectives:
    - CloudFront のキャッシュポリシーを最適化する
    - API Gateway のレスポンスキャッシュを設定する
    - ElastiCache Redis レプリケーショングループを構成する
    - Redis のキャッシュ戦略を最適化する
    - Lambda 関数を VPC 内に配置する

  hints:
    - "AWS::CloudFront::CachePolicy でカスタムキャッシュポリシーを作成します"
    - "API Gateway の CacheClusterEnabled でステージキャッシュを有効にします"
    - "ElastiCache の NumNodeGroups と ReplicasPerNodeGroup でクラスター構成を制御します"
    - "allkeys-lfu は LFU（Least Frequently Used）ベースの退避ポリシーです"
    - "Lambda を VPC に配置するには SubnetIds と SecurityGroupIds が必要です"

  prerequisites:
    - CloudFront のキャッシュ戦略の深い理解
    - ElastiCache Redis の運用経験
    - API Gateway の設定経験
    - Lambda VPC 接続の知識
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-multi-tier-caching.yaml
      parameters:
        ProjectName: tenka-cache-perf
        VpcId: ""
        SubnetIds: ""

  regions:
    aws:
      - ap-northeast-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: CloudFront キャッシュ
      description: デフォルト TTL 300 秒、最大 TTL 3600 秒のカスタムキャッシュポリシー
      weight: 20
      maxPoints: 20

    - name: API Gateway キャッシュ
      description: ステージキャッシュが有効で TTL 60 秒
      weight: 20
      maxPoints: 20

    - name: ElastiCache Redis
      description: 1+2 構成のレプリケーショングループが暗号化付きで存在
      weight: 25
      maxPoints: 25

    - name: Redis パフォーマンス
      description: allkeys-lfu ポリシーと自動フェイルオーバーが設定
      weight: 20
      maxPoints: 20

    - name: Lambda VPC 配置
      description: Lambda 関数が VPC 内に配置されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 20
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
