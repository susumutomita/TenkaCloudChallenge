AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: 統合オブザーバビリティプラットフォーム（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-observ
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"

Resources:
  # Lambda ロール
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: lambda.amazonaws.com }, Action: sts:AssumeRole }
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

  # 要件4: Lambda 関数
  ServiceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-service"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig: { Mode: Active }
      Code:
        ZipFile: |
          import json
          import logging
          logger = logging.getLogger()
          logger.setLevel(logging.INFO)
          def handler(event, context):
              logger.info(json.dumps({'action': 'process', 'status': 'success', 'latency_ms': 42}))
              return {'statusCode': 200}

  # ログ グループ
  ServiceLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/lambda/${EnvironmentPrefix}-service"
      RetentionInDays: 30

  # 要件5: メトリクスフィルター
  ErrorMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ServiceLogGroup
      FilterPattern: "ERROR"
      MetricTransformations:
        - MetricNamespace: !Sub "${EnvironmentPrefix}/Custom"
          MetricName: ErrorCount
          MetricValue: "1"
          DefaultValue: 0

  LatencyMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref ServiceLogGroup
      FilterPattern: '{ $.latency_ms > 0 }'
      MetricTransformations:
        - MetricNamespace: !Sub "${EnvironmentPrefix}/Custom"
          MetricName: Latency
          MetricValue: $.latency_ms
          DefaultValue: 0

  # 個別アラーム
  ErrorAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentPrefix}-errors"
      Namespace: !Sub "${EnvironmentPrefix}/Custom"
      MetricName: ErrorCount
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 2
      Threshold: 5
      ComparisonOperator: GreaterThanThreshold

  LatencyAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentPrefix}-latency"
      Namespace: !Sub "${EnvironmentPrefix}/Custom"
      MetricName: Latency
      Statistic: Average
      Period: 300
      EvaluationPeriods: 2
      Threshold: 1000
      ComparisonOperator: GreaterThanThreshold

  # 要件6: SNS 通知
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentPrefix}-alerts"

  # 要件2: 複合アラーム
  CompositeAlarm:
    Type: AWS::CloudWatch::CompositeAlarm
    Properties:
      AlarmName: !Sub "${EnvironmentPrefix}-service-degraded"
      AlarmRule: !Sub "ALARM(${ErrorAlarm}) OR ALARM(${LatencyAlarm})"
      AlarmActions:
        - !Ref AlertTopic

  # 要件3: Logs Insights クエリ定義
  ErrorQueryDefinition:
    Type: AWS::Logs::QueryDefinition
    Properties:
      Name: !Sub "${EnvironmentPrefix}/errors-by-function"
      LogGroupNames:
        - !Ref ServiceLogGroup
      QueryString: |
        fields @timestamp, @message
        | filter @message like /ERROR/
        | stats count() as errorCount by bin(5m)
        | sort @timestamp desc

  # 要件1: ダッシュボード
  ObservabilityDashboard:
    Type: AWS::CloudWatch::Dashboard
    Properties:
      DashboardName: !Sub "${EnvironmentPrefix}-dashboard"
      DashboardBody: !Sub |
        {
          "widgets": [
            {
              "type": "metric", "x": 0, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [["${EnvironmentPrefix}/Custom", "ErrorCount", {"stat": "Sum"}]],
                "title": "Error Count", "period": 300
              }
            },
            {
              "type": "metric", "x": 12, "y": 0, "width": 12, "height": 6,
              "properties": {
                "metrics": [["${EnvironmentPrefix}/Custom", "Latency", {"stat": "Average"}]],
                "title": "Latency (ms)", "period": 300
              }
            },
            {
              "type": "log", "x": 0, "y": 6, "width": 24, "height": 6,
              "properties": {
                "query": "SOURCE '${ServiceLogGroup}' | fields @timestamp, @message | filter @message like /ERROR/ | sort @timestamp desc | limit 20",
                "region": "${AWS::Region}", "title": "Recent Errors"
              }
            }
          ]
        }

Outputs:
  DashboardName:
    Value: !Sub "${EnvironmentPrefix}-dashboard"
  CompositeAlarmName:
    Value: !Sub "${EnvironmentPrefix}-service-degraded"
  AlertTopicArn:
    Value: !Ref AlertTopic
