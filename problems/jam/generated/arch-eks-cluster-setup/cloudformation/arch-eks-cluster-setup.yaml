AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: EKS クラスター + マネージドノードグループ構成（正解テンプレート）
  EKS クラスター、マネージドノードグループ、IAM ロール、ログ設定を含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-eks
    Description: 環境名プレフィックス
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 1
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 2

Resources:
  # --- EKS クラスターロール ---
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-cluster-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  # --- ノードロール ---
  NodeRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  # --- クラスターセキュリティグループ ---
  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} EKS Cluster Security Group"
      VpcId: !Ref VpcId
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-cluster-sg"

  # --- EKS クラスター ---
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "${EnvironmentName}-cluster"
      Version: "1.29"
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds:
          - !Ref PrivateSubnet1
          - !Ref PrivateSubnet2
        SecurityGroupIds:
          - !GetAtt ClusterSecurityGroup.GroupId
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: authenticator
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-cluster"

  # --- マネージドノードグループ ---
  NodeGroup:
    Type: AWS::EKS::Nodegroup
    DependsOn: EKSCluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-cluster"
      NodegroupName: !Sub "${EnvironmentName}-nodegroup"
      NodeRole: !GetAtt NodeRole.Arn
      Subnets:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      ScalingConfig:
        MinSize: 2
        MaxSize: 4
        DesiredSize: 2
      InstanceTypes:
        - t3.medium
      AmiType: AL2_x86_64
      DiskSize: 50
      Tags:
        Name: !Sub "${EnvironmentName}-node"

Outputs:
  ClusterName:
    Description: EKS クラスター名
    Value: !Ref EKSCluster

  ClusterArn:
    Description: EKS クラスター ARN
    Value: !GetAtt EKSCluster.Arn

  ClusterEndpoint:
    Description: EKS クラスターエンドポイント
    Value: !GetAtt EKSCluster.Endpoint

  NodeGroupName:
    Description: ノードグループ名
    Value: !Ref NodeGroup

  ClusterRoleArn:
    Description: クラスターロール ARN
    Value: !GetAtt EKSClusterRole.Arn

  NodeRoleArn:
    Description: ノードロール ARN
    Value: !GetAtt NodeRole.Arn
