# TenkaCloud 統一問題フォーマット
# 問題ID: sec-encryption-key-hierarchy
# タイプ: GAMEDAY（構築型）

id: sec-encryption-key-hierarchy
title: KMS キー階層 + マルチリージョンキー設計
type: gameday
category: security
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - kms
    - multi-region-key
    - key-hierarchy
    - grants
    - envelope-encryption
    - key-policy
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティアーキテクトとして、エンタープライズグレードの
    暗号化キー階層を設計する任務を与えられました。

    ## 背景
    組織のデータ分類に基づく暗号化キー階層が必要です。
    機密レベルごとに異なるキーを使い、KMS Grants でサービス間の
    キー利用を制御し、マルチリージョンキーで DR にも対応する必要があります。

    ## あなたのミッション
    以下の要件を満たす暗号化キー階層を構築してください。

    ### 要件
    1. **キー階層**: データ分類（Public/Internal/Confidential/Restricted）ごとに 4 つの CMK を作成する
    2. **マルチリージョンキー**: Restricted レベルのキーをマルチリージョンキーとして作成する
    3. **キーポリシー**: 各キーに異なるアクセス権限を設定し、職責分離を実装する
    4. **KMS Grants**: Lambda 関数から特定のキーを使用するための Grant を作成する
    5. **キーローテーション**: すべてのキーで自動ローテーションを有効にする
    6. **暗号化コンテキスト**: 暗号化コンテキストを強制するポリシー条件を設定する

  objectives:
    - 4 レベルの CMK を作成する
    - マルチリージョンキーを作成する
    - 職責分離のキーポリシーを設計する
    - KMS Grants を作成する
    - キーローテーションを有効にする
    - 暗号化コンテキストを強制する

  hints:
    - "マルチリージョンキーは MultiRegion: true で作成します"
    - "KMS Grant は AWS::KMS::Grant は CFn 未対応なのでカスタムリソースか Lambda で作成します"
    - "暗号化コンテキスト強制は Condition の kms:EncryptionContext で指定します"
    - "キー階層は Alias で体系的に命名します（例: alias/tenka/restricted/data）"

  prerequisites:
    - KMS の高度な知識（Grants、暗号化コンテキスト、マルチリージョンキー）
    - エンベロープ暗号化の理解
    - キー管理のベストプラクティス
    - CloudFormation の上級知識

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-encryption-key-hierarchy.yaml
      parameters:
        EnvironmentName: tenka-key-hierarchy

  regions:
    aws:
      - ap-northeast-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: キー階層（4 レベル）
      description: Public/Internal/Confidential/Restricted の 4 つの CMK が作成されている
      weight: 20
      maxPoints: 20

    - name: マルチリージョンキー
      description: Restricted キーがマルチリージョンキーとして作成されている
      weight: 15
      maxPoints: 15

    - name: キーポリシー + 職責分離
      description: 各キーに異なるアクセス権限が設定され、管理者と利用者が分離されている
      weight: 25
      maxPoints: 25

    - name: KMS Grants
      description: サービス間のキー利用が Grant で制御されている
      weight: 15
      maxPoints: 15

    - name: 自動ローテーション
      description: すべてのキーで自動ローテーションが有効になっている
      weight: 10
      maxPoints: 10

    - name: 暗号化コンテキスト強制
      description: 暗号化コンテキストを必須にするポリシー条件が設定されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 10
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
