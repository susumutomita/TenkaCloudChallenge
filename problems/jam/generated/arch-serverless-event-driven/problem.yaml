# TenkaCloud 統一問題フォーマット
# 問題ID: arch-serverless-event-driven
# タイプ: GAMEDAY（構築型）

id: arch-serverless-event-driven
title: サーバーレス イベント駆動アーキテクチャ
type: gameday
category: architecture
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - lambda
    - sqs
    - sns
    - dynamodb
    - eventbridge
    - event-driven
    - serverless
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはソリューションアーキテクトとして、完全サーバーレスの
    イベント駆動型注文処理システムを設計・構築する任務を与えられました。

    ## 背景
    EC サイトのバックエンドをサーバーレスに移行するプロジェクトです。
    注文イベントを起点に、複数の Lambda 関数が非同期に処理を行い、
    SQS、SNS、EventBridge、DynamoDB を組み合わせたイベント駆動アーキテクチャが
    求められています。

    ## あなたのミッション
    以下の要件を満たすイベント駆動アーキテクチャを構築してください。

    ### 要件
    1. **EventBridge**: カスタムイベントバスを作成し、注文イベントを受信するルールを定義する
    2. **SNS ファンアウト**: 注文イベントを SNS トピックで複数のサブスクライバーにファンアウトする
    3. **SQS + Lambda**: 在庫処理キューと通知キューを作成し、それぞれ Lambda で処理する
    4. **DynamoDB**: 注文テーブルと在庫テーブルを作成し、DynamoDB Streams で変更をキャプチャする
    5. **DLQ + エラーハンドリング**: 各キューに DLQ を設定し、Lambda のエラーを適切に処理する
    6. **Lambda 同時実行制御**: 各 Lambda 関数に ReservedConcurrentExecutions を設定する

  objectives:
    - EventBridge カスタムイベントバスとルールを作成する
    - SNS トピックを作成し SQS キューをサブスクライブする
    - SQS + Lambda のイベント処理パイプラインを構築する
    - DynamoDB テーブルと Streams を設定する
    - DLQ とエラーハンドリングを設定する
    - Lambda の同時実行数を制御する

  hints:
    - "EventBridge のルールは EventPattern でカスタムイベントをフィルタリングします"
    - "SNS から SQS へのサブスクリプションには RawMessageDelivery を true にすると便利です"
    - "SQS を Lambda のイベントソースにするには EventSourceMapping を使います"
    - "DynamoDB Streams は StreamSpecification で NEW_AND_OLD_IMAGES を指定します"
    - "ReservedConcurrentExecutions で Lambda の同時実行数を制御できます"

  prerequisites:
    - Lambda、SQS、SNS、EventBridge の実務知識
    - DynamoDB の基本知識
    - イベント駆動アーキテクチャパターンの理解
    - CloudFormation の上級知識

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-serverless-event-driven.yaml
      parameters:
        EnvironmentName: tenka-event-driven

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: EventBridge 構成
      description: カスタムイベントバスとルールが作成されている
      weight: 15
      maxPoints: 15

    - name: SNS ファンアウト
      description: SNS トピックから複数の SQS キューへファンアウトが設定されている
      weight: 20
      maxPoints: 20

    - name: SQS + Lambda パイプライン
      description: SQS キューと Lambda 関数のイベントソースマッピングが設定されている
      weight: 20
      maxPoints: 20

    - name: DynamoDB + Streams
      description: DynamoDB テーブルが作成され、Streams が有効になっている
      weight: 20
      maxPoints: 20

    - name: DLQ + エラーハンドリング
      description: 各キューに DLQ が設定され、Lambda のエラーが適切に処理される
      weight: 15
      maxPoints: 15

    - name: 同時実行制御
      description: Lambda 関数に ReservedConcurrentExecutions が設定されている
      weight: 10
      maxPoints: 10

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
