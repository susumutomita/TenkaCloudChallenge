AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: サーバーレス イベント駆動アーキテクチャ（正解テンプレート）
  EventBridge、SNS、SQS、Lambda、DynamoDB を組み合わせたイベント駆動構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-event-driven
    Description: 環境名プレフィックス

Resources:
  # ============================================================
  # IAM ロール
  # ============================================================
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:PutItem
                  - dynamodb:UpdateItem
                  - dynamodb:GetItem
                  - dynamodb:Query
                  - dynamodb:DescribeStream
                  - dynamodb:GetRecords
                  - dynamodb:GetShardIterator
                  - dynamodb:ListStreams
                Resource:
                  - !GetAtt OrderTable.Arn
                  - !GetAtt InventoryTable.Arn
                  - !Sub "${OrderTable.Arn}/stream/*"
              - Effect: Allow
                Action:
                  - sqs:ReceiveMessage
                  - sqs:DeleteMessage
                  - sqs:GetQueueAttributes
                Resource:
                  - !GetAtt InventoryQueue.Arn
                  - !GetAtt NotificationQueue.Arn

  # ============================================================
  # DynamoDB テーブル
  # ============================================================
  OrderTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-orders"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: orderId
          AttributeType: S
      KeySchema:
        - AttributeName: orderId
          KeyType: HASH
      StreamSpecification:
        StreamViewType: NEW_AND_OLD_IMAGES
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true
      SSESpecification:
        SSEEnabled: true

  InventoryTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-inventory"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: productId
          AttributeType: S
      KeySchema:
        - AttributeName: productId
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true

  # ============================================================
  # EventBridge
  # ============================================================
  OrderEventBus:
    Type: AWS::Events::EventBus
    Properties:
      Name: !Sub "${EnvironmentName}-order-bus"

  OrderEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentName}-order-created"
      EventBusName: !Ref OrderEventBus
      EventPattern:
        source:
          - "tenkacloud.orders"
        detail-type:
          - "OrderCreated"
      Targets:
        - Arn: !Ref OrderFanoutTopic
          Id: SNSTarget

  EventBridgeToSNSPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref OrderFanoutTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridge
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref OrderFanoutTopic

  # ============================================================
  # SNS ファンアウト
  # ============================================================
  OrderFanoutTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-order-fanout"

  InventorySubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderFanoutTopic
      Protocol: sqs
      Endpoint: !GetAtt InventoryQueue.Arn
      RawMessageDelivery: true

  NotificationSubscription:
    Type: AWS::SNS::Subscription
    Properties:
      TopicArn: !Ref OrderFanoutTopic
      Protocol: sqs
      Endpoint: !GetAtt NotificationQueue.Arn
      RawMessageDelivery: true

  # ============================================================
  # SQS キュー + DLQ
  # ============================================================
  InventoryDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${EnvironmentName}-inventory-dlq"
      SqsManagedSseEnabled: true
      MessageRetentionPeriod: 1209600

  InventoryQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${EnvironmentName}-inventory-queue"
      SqsManagedSseEnabled: true
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt InventoryDLQ.Arn
        maxReceiveCount: 3

  NotificationDLQ:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${EnvironmentName}-notification-dlq"
      SqsManagedSseEnabled: true
      MessageRetentionPeriod: 1209600

  NotificationQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${EnvironmentName}-notification-queue"
      SqsManagedSseEnabled: true
      VisibilityTimeout: 60
      RedrivePolicy:
        deadLetterTargetArn: !GetAtt NotificationDLQ.Arn
        maxReceiveCount: 3

  # SQS ポリシー（SNS からの送信を許可）
  InventoryQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref InventoryQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt InventoryQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref OrderFanoutTopic

  NotificationQueuePolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NotificationQueue
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowSNS
            Effect: Allow
            Principal:
              Service: sns.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NotificationQueue.Arn
            Condition:
              ArnEquals:
                "aws:SourceArn": !Ref OrderFanoutTopic

  # ============================================================
  # Lambda 関数
  # ============================================================
  InventoryProcessor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-inventory-processor"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      ReservedConcurrentExecutions: 10
      Code:
        ZipFile: |
          import json
          import boto3
          def handler(event, context):
              for record in event['Records']:
                  body = json.loads(record['body'])
                  print(f"Processing inventory for order: {body}")
              return {'statusCode': 200}

  NotificationProcessor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-notification-processor"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      ReservedConcurrentExecutions: 5
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              for record in event['Records']:
                  body = json.loads(record['body'])
                  print(f"Sending notification for order: {body}")
              return {'statusCode': 200}

  StreamProcessor:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-stream-processor"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      ReservedConcurrentExecutions: 5
      Code:
        ZipFile: |
          def handler(event, context):
              for record in event['Records']:
                  print(f"DynamoDB Stream event: {record['eventName']}")
              return {'statusCode': 200}

  # ============================================================
  # Event Source Mappings
  # ============================================================
  InventoryEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt InventoryQueue.Arn
      FunctionName: !Ref InventoryProcessor
      BatchSize: 10

  NotificationEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt NotificationQueue.Arn
      FunctionName: !Ref NotificationProcessor
      BatchSize: 10

  StreamEventSource:
    Type: AWS::Lambda::EventSourceMapping
    Properties:
      EventSourceArn: !GetAtt OrderTable.StreamArn
      FunctionName: !Ref StreamProcessor
      StartingPosition: LATEST
      BatchSize: 100

Outputs:
  EventBusName:
    Description: EventBridge バス名
    Value: !Ref OrderEventBus

  SNSTopicArn:
    Description: SNS ファンアウトトピック ARN
    Value: !Ref OrderFanoutTopic

  OrderTableName:
    Description: 注文テーブル名
    Value: !Ref OrderTable

  InventoryTableName:
    Description: 在庫テーブル名
    Value: !Ref InventoryTable
