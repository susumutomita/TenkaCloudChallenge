AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: OpenSearch クラスターのパフォーマンス最適化（正解テンプレート）
  データノード、EBS gp3、Zone Awareness、暗号化を構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-os-perf
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト（2 AZ 分）

Resources:
  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} OpenSearch SG"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: 10.0.0.0/8

  OpenSearchDomain:
    Type: AWS::OpenSearchService::Domain
    Properties:
      DomainName: !Sub "${ProjectName}-domain"
      EngineVersion: OpenSearch_2.11
      # 要件1: データノード設定
      ClusterConfig:
        InstanceType: m6g.large.search
        InstanceCount: 2
        # 要件3: Zone Awareness
        ZoneAwarenessEnabled: true
        ZoneAwarenessConfig:
          AvailabilityZoneCount: 2
      # 要件2: EBS 最適化
      EBSOptions:
        EBSEnabled: true
        VolumeType: gp3
        VolumeSize: 100
        Iops: 3000
        Throughput: 125
      # 要件4: 暗号化
      NodeToNodeEncryptionOptions:
        Enabled: true
      EncryptionAtRestOptions:
        Enabled: true
      DomainEndpointOptions:
        EnforceHTTPS: true
        TLSSecurityPolicy: Policy-Min-TLS-1-2-PFS-2023-10
      VPCOptions:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref SecurityGroup
      AccessPolicies:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "es:*"
            Resource: !Sub "arn:aws:es:${AWS::Region}:${AWS::AccountId}:domain/${ProjectName}-domain/*"

Outputs:
  DomainEndpoint:
    Description: OpenSearch ドメインエンドポイント
    Value: !GetAtt OpenSearchDomain.DomainEndpoint

  DomainArn:
    Description: OpenSearch ドメイン ARN
    Value: !GetAtt OpenSearchDomain.Arn
