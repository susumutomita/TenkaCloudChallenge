AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: ディザスタリカバリ パイロットライト構成（正解テンプレート）
  RDS リードレプリカ、待機 ASG、Lambda 自動復旧、EventBridge、Route 53 フェイルオーバーを構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-dr-pilot
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

  DBMasterUsername:
    Type: String
    Default: admin
    NoEcho: true

  DBMasterPassword:
    Type: String
    Default: ChangeMe123!
    NoEcho: true
    MinLength: 8

  LatestAmiId:
    Type: AWS::SSM::Parameter::Value<AWS::EC2::Image::Id>
    Default: /aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64

  DomainName:
    Type: String
    Default: dr.tenkacloud.com

Resources:
  # --- ネットワーク ---
  VPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: 10.0.0.0/16
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentPrefix}-vpc"

  PrivateSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.1.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]

  PrivateSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.2.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]

  PublicSubnetA:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.3.0/24
      AvailabilityZone: !Select [0, !GetAZs ""]
      MapPublicIpOnLaunch: true

  PublicSubnetC:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref VPC
      CidrBlock: 10.0.4.0/24
      AvailabilityZone: !Select [1, !GetAZs ""]
      MapPublicIpOnLaunch: true

  InternetGateway:
    Type: AWS::EC2::InternetGateway

  VPCGatewayAttachment:
    Type: AWS::EC2::VPCGatewayAttachment
    Properties:
      VpcId: !Ref VPC
      InternetGatewayId: !Ref InternetGateway

  RouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref VPC

  PublicRoute:
    Type: AWS::EC2::Route
    DependsOn: VPCGatewayAttachment
    Properties:
      RouteTableId: !Ref RouteTable
      DestinationCidrBlock: 0.0.0.0/0
      GatewayId: !Ref InternetGateway

  PubSubnetAAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetA
      RouteTableId: !Ref RouteTable

  PubSubnetCAssoc:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref PublicSubnetC
      RouteTableId: !Ref RouteTable

  # --- 要件1: RDS プライマリ + リードレプリカ ---
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupDescription: DB subnet group
      SubnetIds:
        - !Ref PrivateSubnetA
        - !Ref PrivateSubnetC

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: DB security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          CidrIp: 10.0.0.0/16

  PrimaryDB:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentPrefix}-primary"
      DBInstanceClass: db.t3.micro
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: !Ref DBMasterUsername
      MasterUserPassword: !Ref DBMasterPassword
      AllocatedStorage: 20
      MultiAZ: true
      StorageEncrypted: true
      BackupRetentionPeriod: 7
      DBSubnetGroupName: !Ref DBSubnetGroup
      VPCSecurityGroups:
        - !GetAtt DBSecurityGroup.GroupId
      PubliclyAccessible: false

  ReadReplica:
    Type: AWS::RDS::DBInstance
    Properties:
      DBInstanceIdentifier: !Sub "${EnvironmentPrefix}-replica"
      DBInstanceClass: db.t3.micro
      SourceDBInstanceIdentifier: !Ref PrimaryDB
      PubliclyAccessible: false

  # --- 要件2+3: DR 起動テンプレート + 待機 ASG ---
  InstanceSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Instance security group
      VpcId: !Ref VPC
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/16

  DRLaunchTemplate:
    Type: AWS::EC2::LaunchTemplate
    Properties:
      LaunchTemplateName: !Sub "${EnvironmentPrefix}-dr-lt"
      LaunchTemplateData:
        ImageId: !Ref LatestAmiId
        InstanceType: t3.micro
        SecurityGroupIds:
          - !GetAtt InstanceSG.GroupId
        UserData:
          Fn::Base64: |
            #!/bin/bash
            yum install -y httpd
            echo "DR instance active" > /var/www/html/health
            systemctl start httpd
            systemctl enable httpd

  DRAutoScalingGroup:
    Type: AWS::AutoScaling::AutoScalingGroup
    Properties:
      AutoScalingGroupName: !Sub "${EnvironmentPrefix}-dr-asg"
      LaunchTemplate:
        LaunchTemplateId: !Ref DRLaunchTemplate
        Version: !GetAtt DRLaunchTemplate.LatestVersionNumber
      MinSize: 0
      MaxSize: 4
      DesiredCapacity: 0
      VPCZoneIdentifier:
        - !Ref PublicSubnetA
        - !Ref PublicSubnetC

  # --- 要件4: Route 53 フェイルオーバー ---
  HostedZone:
    Type: AWS::Route53::HostedZone
    Properties:
      Name: !Ref DomainName

  PrimaryHealthCheck:
    Type: AWS::Route53::HealthCheck
    Properties:
      HealthCheckConfig:
        IPAddress: 203.0.113.10
        Port: 80
        Type: HTTP
        ResourcePath: /health
        RequestInterval: 10
        FailureThreshold: 3

  PrimaryRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "app.${DomainName}"
      Type: A
      TTL: 60
      SetIdentifier: primary
      Failover: PRIMARY
      HealthCheckId: !Ref PrimaryHealthCheck
      ResourceRecords:
        - 203.0.113.10

  SecondaryRecord:
    Type: AWS::Route53::RecordSet
    Properties:
      HostedZoneId: !Ref HostedZone
      Name: !Sub "app.${DomainName}"
      Type: A
      TTL: 60
      SetIdentifier: secondary
      Failover: SECONDARY
      ResourceRecords:
        - 203.0.113.20

  # --- 要件5: Lambda 自動復旧 ---
  DRLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-dr-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DRActions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - autoscaling:UpdateAutoScalingGroup
                  - autoscaling:DescribeAutoScalingGroups
                Resource: "*"
              - Effect: Allow
                Action:
                  - rds:PromoteReadReplica
                  - rds:DescribeDBInstances
                Resource: "*"

  DRActivationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-dr-activate"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DRLambdaRole.Arn
      Timeout: 300
      Environment:
        Variables:
          ASG_NAME: !Ref DRAutoScalingGroup
          DR_DESIRED_CAPACITY: "2"
          READ_REPLICA_ID: !Ref ReadReplica
      Code:
        ZipFile: |
          import os
          import boto3
          def handler(event, context):
              asg_client = boto3.client('autoscaling')
              rds_client = boto3.client('rds')
              asg_name = os.environ['ASG_NAME']
              desired = int(os.environ['DR_DESIRED_CAPACITY'])
              replica_id = os.environ['READ_REPLICA_ID']
              asg_client.update_auto_scaling_group(
                  AutoScalingGroupName=asg_name,
                  MinSize=desired,
                  DesiredCapacity=desired
              )
              rds_client.promote_read_replica(
                  DBInstanceIdentifier=replica_id,
                  BackupRetentionPeriod=7
              )
              return {'statusCode': 200, 'body': 'DR activation complete'}

  # --- 要件6: EventBridge ルール ---
  DRActivationRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentPrefix}-dr-trigger"
      Description: ヘルスチェック失敗時に DR を起動
      EventPattern:
        source:
          - aws.health
        detail-type:
          - "AWS Health Event"
      State: ENABLED
      Targets:
        - Arn: !GetAtt DRActivationFunction.Arn
          Id: DRActivationTarget

  DRActivationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DRActivationFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DRActivationRule.Arn

Outputs:
  PrimaryDBEndpoint:
    Description: プライマリ DB エンドポイント
    Value: !GetAtt PrimaryDB.Endpoint.Address

  ReadReplicaEndpoint:
    Description: リードレプリカエンドポイント
    Value: !GetAtt ReadReplica.Endpoint.Address

  DRAutoScalingGroupName:
    Description: DR ASG 名
    Value: !Ref DRAutoScalingGroup

  DRActivationFunctionArn:
    Description: DR 起動 Lambda ARN
    Value: !GetAtt DRActivationFunction.Arn
