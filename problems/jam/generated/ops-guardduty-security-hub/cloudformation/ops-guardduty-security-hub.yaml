AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: GuardDuty と Security Hub による脅威検出・統合管理（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-secops
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"

Resources:
  # 要件1: GuardDuty
  GuardDutyDetector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES

  # 要件2: Security Hub
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      EnableDefaultStandards: true

  # 要件5: SNS トピック
  SecurityAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentPrefix}-security-alerts"

  # 要件4: Lambda
  FindingHandlerRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-finding-handler-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SNSPublish
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref SecurityAlertTopic

  FindingHandler:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-finding-handler"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt FindingHandlerRole.Arn
      Timeout: 60
      Environment:
        Variables:
          ALERT_TOPIC_ARN: !Ref SecurityAlertTopic
      Code:
        ZipFile: |
          import json
          import os
          import boto3
          sns = boto3.client('sns')
          def handler(event, context):
              findings = event.get('detail', {}).get('findings', [])
              for finding in findings:
                  severity = finding.get('Severity', {}).get('Label', 'UNKNOWN')
                  title = finding.get('Title', 'Unknown finding')
                  sns.publish(
                      TopicArn=os.environ['ALERT_TOPIC_ARN'],
                      Subject=f'[{severity}] Security Finding',
                      Message=json.dumps({'title': title, 'severity': severity, 'detail': finding}, default=str)
                  )
              return {'statusCode': 200}

  # 要件3: EventBridge ルール
  HighSeverityRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentPrefix}-high-severity-findings"
      Description: HIGH/CRITICAL Security Hub findings
      EventPattern:
        source:
          - aws.securityhub
        detail-type:
          - "Security Hub Findings - Imported"
        detail:
          findings:
            Severity:
              Label:
                - HIGH
                - CRITICAL
      Targets:
        - Arn: !GetAtt FindingHandler.Arn
          Id: FindingHandlerTarget

  FindingHandlerPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref FindingHandler
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HighSeverityRule.Arn

Outputs:
  GuardDutyDetectorId:
    Value: !Ref GuardDutyDetector
  SecurityHubArn:
    Value: !Ref SecurityHub
  AlertTopicArn:
    Value: !Ref SecurityAlertTopic
