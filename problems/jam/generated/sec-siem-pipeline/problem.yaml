# TenkaCloud 統一問題フォーマット
# 問題ID: sec-siem-pipeline
# タイプ: GAMEDAY（構築型）

id: sec-siem-pipeline
title: セキュリティイベント集約パイプライン（SIEM）
type: gameday
category: security
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - security-hub
    - cloudtrail
    - eventbridge
    - kinesis
    - s3
    - siem
    - log-aggregation
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティオペレーションの責任者として、
    全セキュリティイベントを集約・分析するパイプラインを構築する任務を与えられました。

    ## 背景
    CloudTrail、GuardDuty、Config、VPC Flow Logs など複数のセキュリティソースからの
    イベントを一元的に集約し、リアルタイム分析と長期保存を行う SIEM パイプラインが
    必要です。Security Hub で統合ビューを提供します。

    ## あなたのミッション
    以下の要件を満たすセキュリティイベント集約パイプラインを構築してください。

    ### 要件
    1. **Security Hub**: Security Hub を有効化し、AWS 基本セキュリティのベストプラクティスを有効にする
    2. **CloudTrail**: 組織全体のマネジメントイベントとデータイベントを記録する
    3. **EventBridge ルール**: セキュリティイベントを集約する EventBridge ルールを作成する
    4. **Kinesis Data Firehose**: イベントストリームを S3 に配信するパイプラインを作成する
    5. **S3 データレイク**: セキュリティログを暗号化して長期保存し、ライフサイクルポリシーを設定する
    6. **アラート**: Critical なセキュリティイベントで即座に SNS 通知を送信する

  objectives:
    - Security Hub を有効化しベストプラクティスを有効にする
    - CloudTrail で全イベントを記録する
    - EventBridge でセキュリティイベントを集約する
    - Kinesis Firehose で S3 に配信する
    - S3 ライフサイクルと暗号化を設定する
    - Critical イベントの SNS 通知を設定する

  hints:
    - "Security Hub は AWS::SecurityHub::Hub で有効化します"
    - "EventBridge のソースに aws.securityhub, aws.guardduty, aws.config を指定します"
    - "Firehose の BufferingHints で適切なバッチサイズとインターバルを設定します"
    - "S3 ライフサイクルで Standard → IA → Glacier の階層化を設定します"

  prerequisites:
    - Security Hub の概念と設定知識
    - CloudTrail の詳細設定知識
    - EventBridge の高度なパターンマッチング
    - Kinesis Data Firehose の知識
    - CloudFormation の上級知識

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-siem-pipeline.yaml
      parameters:
        EnvironmentName: tenka-siem

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Security Hub
      description: Security Hub が有効化され、ベストプラクティスが有効になっている
      weight: 15
      maxPoints: 15

    - name: CloudTrail
      description: マネジメントイベントとデータイベントが記録されている
      weight: 15
      maxPoints: 15

    - name: EventBridge 集約
      description: 複数ソースのセキュリティイベントを集約する EventBridge ルールが作成されている
      weight: 20
      maxPoints: 20

    - name: Kinesis Firehose パイプライン
      description: イベントストリームが Firehose 経由で S3 に配信されている
      weight: 20
      maxPoints: 20

    - name: S3 データレイク
      description: 暗号化、ライフサイクルポリシー、バージョニングが設定されている
      weight: 15
      maxPoints: 15

    - name: Critical アラート
      description: Critical セキュリティイベントで SNS 通知が送信される
      weight: 15
      maxPoints: 15

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
