AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: セキュリティイベント集約パイプライン（正解テンプレート）
  Security Hub、CloudTrail、EventBridge、Firehose、S3 を含む SIEM 構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-siem
    Description: 環境名プレフィックス

Resources:
  # ============================================================
  # Security Hub
  # ============================================================
  SecurityHub:
    Type: AWS::SecurityHub::Hub
    Properties:
      Tags:
        Name: !Sub "${EnvironmentName}-security-hub"

  # ============================================================
  # CloudTrail
  # ============================================================
  TrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-trail-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  TrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TrailBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AWSCloudTrailAclCheck
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt TrailBucket.Arn
          - Sid: AWSCloudTrailWrite
            Effect: Allow
            Principal:
              Service: cloudtrail.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${TrailBucket.Arn}/*"
            Condition:
              StringEquals:
                "s3:x-amz-acl": bucket-owner-full-control

  SIEMTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: TrailBucketPolicy
    Properties:
      TrailName: !Sub "${EnvironmentName}-trail"
      IsLogging: true
      S3BucketName: !Ref TrailBucket
      EnableLogFileValidation: true
      IsMultiRegionTrail: true
      IncludeGlobalServiceEvents: true
      EventSelectors:
        - ReadWriteType: All
          IncludeManagementEvents: true
          DataResources:
            - Type: AWS::S3::Object
              Values:
                - "arn:aws:s3"

  # ============================================================
  # SIEM S3 データレイク
  # ============================================================
  SIEMBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-logs-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled
      LifecycleConfiguration:
        Rules:
          - Id: TierDownLogs
            Status: Enabled
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER
                TransitionInDays: 90
            ExpirationInDays: 365

  # ============================================================
  # Kinesis Data Firehose
  # ============================================================
  FirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-firehose-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: firehose.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehoseS3
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:AbortMultipartUpload
                  - s3:GetBucketLocation
                  - s3:GetObject
                  - s3:ListBucket
                  - s3:ListBucketMultipartUploads
                  - s3:PutObject
                Resource:
                  - !GetAtt SIEMBucket.Arn
                  - !Sub "${SIEMBucket.Arn}/*"

  SecurityEventsStream:
    Type: AWS::KinesisFirehose::DeliveryStream
    Properties:
      DeliveryStreamName: !Sub "${EnvironmentName}-security-events"
      DeliveryStreamType: DirectPut
      ExtendedS3DestinationConfiguration:
        BucketARN: !GetAtt SIEMBucket.Arn
        RoleARN: !GetAtt FirehoseRole.Arn
        Prefix: "events/year=!{timestamp:yyyy}/month=!{timestamp:MM}/day=!{timestamp:dd}/"
        ErrorOutputPrefix: "errors/"
        BufferingHints:
          SizeInMBs: 64
          IntervalInSeconds: 300
        CompressionFormat: GZIP

  # ============================================================
  # EventBridge ルール
  # ============================================================
  EventBridgeFirehoseRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-eb-firehose-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FirehosePut
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - firehose:PutRecord
                  - firehose:PutRecordBatch
                Resource: !GetAtt SecurityEventsStream.Arn

  SecurityEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentName}-security-events"
      EventPattern:
        source:
          - aws.securityhub
          - aws.guardduty
          - aws.config
      Targets:
        - Arn: !GetAtt SecurityEventsStream.Arn
          Id: FirehoseTarget
          RoleArn: !GetAtt EventBridgeFirehoseRole.Arn

  # ============================================================
  # Critical アラート
  # ============================================================
  CriticalAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-critical-alerts"

  CriticalAlertTopicPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref CriticalAlertTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridge
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref CriticalAlertTopic

  CriticalEventRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentName}-critical-alerts"
      EventPattern:
        source:
          - aws.securityhub
        detail-type:
          - "Security Hub Findings - Imported"
        detail:
          findings:
            Severity:
              Label:
                - CRITICAL
      Targets:
        - Arn: !Ref CriticalAlertTopic
          Id: CriticalSNS

Outputs:
  SecurityHubArn:
    Description: Security Hub ARN
    Value: !Ref SecurityHub

  SIEMBucketName:
    Description: SIEM S3 バケット名
    Value: !Ref SIEMBucket

  FirehoseName:
    Description: Firehose 名
    Value: !Ref SecurityEventsStream

  CriticalAlertTopicArn:
    Description: Critical アラートトピック ARN
    Value: !Ref CriticalAlertTopic
