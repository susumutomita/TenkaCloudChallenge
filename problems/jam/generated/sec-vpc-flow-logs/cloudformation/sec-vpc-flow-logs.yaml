AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: VPC Flow Logs + CloudWatch 分析（正解テンプレート）
  Flow Logs、メトリクスフィルター、アラーム、SNS 通知を含む監視構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-flowlogs
    Description: 環境名プレフィックス
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: 監視対象 VPC ID
  RejectThreshold:
    Type: Number
    Default: 100
    Description: REJECT 数のアラーム閾値（5 分間）

Resources:
  # --- CloudWatch Logs ---
  FlowLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/vpc/flowlogs/${EnvironmentName}"
      RetentionInDays: 90

  # --- Flow Log IAM ロール ---
  FlowLogRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-flowlog-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: vpc-flow-logs.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: FlowLogCloudWatchAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogGroup
                  - logs:CreateLogStream
                  - logs:PutLogEvents
                  - logs:DescribeLogGroups
                  - logs:DescribeLogStreams
                Resource: !GetAtt FlowLogGroup.Arn

  # --- VPC Flow Log ---
  VPCFlowLog:
    Type: AWS::EC2::FlowLog
    Properties:
      ResourceId: !Ref VpcId
      ResourceType: VPC
      TrafficType: ALL
      LogDestinationType: cloud-watch-logs
      LogGroupName: !Ref FlowLogGroup
      DeliverLogsPermissionArn: !GetAtt FlowLogRole.Arn
      MaxAggregationInterval: 60
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-flowlog"

  # --- メトリクスフィルター ---
  RejectMetricFilter:
    Type: AWS::Logs::MetricFilter
    Properties:
      LogGroupName: !Ref FlowLogGroup
      FilterPattern: "[version, account_id, interface_id, srcaddr, dstaddr, srcport, dstport, protocol, packets, bytes, start, end, action=\"REJECT\", log_status]"
      MetricTransformations:
        - MetricNamespace: !Sub "${EnvironmentName}/VPCFlowLogs"
          MetricName: RejectedPackets
          MetricValue: "1"
          DefaultValue: 0

  # --- SNS トピック ---
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-flowlog-alerts"

  # --- CloudWatch Alarm ---
  RejectAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${EnvironmentName}-high-reject-count"
      AlarmDescription: VPC Flow Logs で REJECT トラフィックが閾値を超えた
      Namespace: !Sub "${EnvironmentName}/VPCFlowLogs"
      MetricName: RejectedPackets
      Statistic: Sum
      Period: 300
      EvaluationPeriods: 1
      Threshold: !Ref RejectThreshold
      ComparisonOperator: GreaterThanThreshold
      AlarmActions:
        - !Ref AlertTopic
      TreatMissingData: notBreaching

Outputs:
  FlowLogId:
    Description: VPC Flow Log ID
    Value: !Ref VPCFlowLog

  LogGroupName:
    Description: Flow Log ロググループ名
    Value: !Ref FlowLogGroup

  AlarmName:
    Description: CloudWatch Alarm 名
    Value: !Ref RejectAlarm

  AlertTopicArn:
    Description: SNS トピック ARN
    Value: !Ref AlertTopic
