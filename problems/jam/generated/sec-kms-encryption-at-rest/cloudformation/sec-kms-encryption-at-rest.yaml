AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: KMS カスタマーマネージドキー + 暗号化設計（正解テンプレート）
  CMK、キーポリシー、クロスサービス暗号化を含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-kms
    Description: 環境名プレフィックス
  AdminRoleArn:
    Type: String
    Default: "arn:aws:iam::123456789012:role/admin"
    Description: 管理者ロール ARN
  AppRoleArn:
    Type: String
    Default: "arn:aws:iam::123456789012:role/app"
    Description: アプリケーションロール ARN

Resources:
  # --- カスタマーマネージドキー ---
  DataEncryptionKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} data encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          # ルートアカウントに全権限
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          # 管理者：キー管理のみ
          - Sid: AllowKeyAdministration
            Effect: Allow
            Principal:
              AWS: !Ref AdminRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:Delete*
              - kms:TagResource
              - kms:UntagResource
              - kms:ScheduleKeyDeletion
              - kms:CancelKeyDeletion
            Resource: "*"
          # 利用者：暗号化/復号のみ
          - Sid: AllowKeyUsage
            Effect: Allow
            Principal:
              AWS: !Ref AppRoleArn
            Action:
              - kms:Decrypt
              - kms:DescribeKey
              - kms:Encrypt
              - kms:GenerateDataKey
              - kms:GenerateDataKeyWithoutPlaintext
              - kms:ReEncryptFrom
              - kms:ReEncryptTo
            Resource: "*"
          # AWS サービスからの利用を許可
          - Sid: AllowServiceUsage
            Effect: Allow
            Principal:
              AWS: !Ref AppRoleArn
            Action:
              - kms:CreateGrant
              - kms:ListGrants
              - kms:RevokeGrant
            Resource: "*"
            Condition:
              Bool:
                "kms:GrantIsForAWSResource": "true"

  DataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-data-key"
      TargetKeyId: !Ref DataEncryptionKey

  StorageKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-storage-key"
      TargetKeyId: !Ref DataEncryptionKey

  # --- S3 バケット（CMK 暗号化）---
  EncryptedBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-encrypted-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: "aws:kms"
              KMSMasterKeyID: !GetAtt DataEncryptionKey.Arn
            BucketKeyEnabled: true
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  # --- DynamoDB テーブル（CMK 暗号化）---
  EncryptedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentName}-encrypted-table"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      SSESpecification:
        SSEEnabled: true
        SSEType: KMS
        KMSMasterKeyId: !GetAtt DataEncryptionKey.Arn

Outputs:
  KMSKeyArn:
    Description: CMK ARN
    Value: !GetAtt DataEncryptionKey.Arn

  KMSKeyId:
    Description: CMK ID
    Value: !Ref DataEncryptionKey

  DataKeyAliasName:
    Description: データキーエイリアス
    Value: !Ref DataKeyAlias

  EncryptedBucketName:
    Description: 暗号化 S3 バケット名
    Value: !Ref EncryptedBucket

  EncryptedTableName:
    Description: 暗号化 DynamoDB テーブル名
    Value: !Ref EncryptedTable
