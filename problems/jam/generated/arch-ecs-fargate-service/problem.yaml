# TenkaCloud 統一問題フォーマット
# 問題ID: arch-ecs-fargate-service
# タイプ: GAMEDAY（構築型）

id: arch-ecs-fargate-service
title: ECS Fargate サービス + ALB 統合
type: gameday
category: architecture
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - ecs
    - fargate
    - alb
    - task-definition
    - service-discovery
    - container
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、コンテナベースの Web アプリケーションを
    ECS Fargate で構築する任務を与えられました。

    ## 背景
    開発チームが Docker 化した Web アプリケーションを本番環境にデプロイする
    必要があります。サーバー管理の負担を減らすため Fargate を採用し、
    ALB 経由でトラフィックを分散させる構成が求められています。

    ## あなたのミッション
    以下の要件を満たす ECS Fargate サービスを構築してください。

    ### 要件
    1. **ECS クラスター**: Fargate 用の ECS クラスターを作成する
    2. **タスク定義**: Fargate 互換のタスク定義を作成し、コンテナのリソース制限とログ設定を行う
    3. **ALB 統合**: ALB のターゲットグループに ECS サービスを登録する
    4. **サービス設定**: 希望タスク数 2、最小ヘルシー率 100%、最大率 200% で設定する

  objectives:
    - ECS クラスターを作成する
    - Fargate タスク定義を作成し、CloudWatch Logs へのログ出力を設定する
    - ALB + ターゲットグループを作成する
    - ECS サービスを作成し、ALB と統合する

  hints:
    - "タスク定義の RequiresCompatibilities に FARGATE を指定します"
    - "Fargate は NetworkMode: awsvpc が必須です"
    - "CloudWatch Logs へのログ出力は LogConfiguration で awslogs ドライバーを指定します"
    - "ECS サービスの LoadBalancers で ALB ターゲットグループを指定します"

  prerequisites:
    - ECS と Fargate の基本概念
    - Docker の基本知識
    - ALB の基本知識
    - CloudFormation の基本的な知識

  estimatedTime: 45

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-ecs-fargate-service.yaml
      parameters:
        EnvironmentName: tenka-ecs-fargate

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: ECS クラスター
      description: ECS クラスターが作成されている
      weight: 15
      maxPoints: 15

    - name: タスク定義 + ログ設定
      description: Fargate タスク定義が作成され、CloudWatch Logs へのログ出力が設定されている
      weight: 30
      maxPoints: 30

    - name: ALB + ターゲットグループ
      description: ALB とターゲットグループが作成され、ヘルスチェックが設定されている
      weight: 25
      maxPoints: 25

    - name: ECS サービス設定
      description: ECS サービスが ALB と統合され、希望タスク数とデプロイ設定が正しい
      weight: 30
      maxPoints: 30

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
