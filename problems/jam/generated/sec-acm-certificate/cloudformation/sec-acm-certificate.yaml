AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: ACM 証明書 + HTTPS 強制設定（正解テンプレート）
  ACM 証明書、HTTPS リスナー、HTTP リダイレクト、TLS ポリシーを含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-acm
    Description: 環境名プレフィックス
  DomainName:
    Type: String
    Default: app.tenkacloud.com
    Description: ドメイン名
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: パブリックサブネット 1
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: パブリックサブネット 2

Resources:
  # --- ACM 証明書 ---
  Certificate:
    Type: AWS::CertificateManager::Certificate
    Properties:
      DomainName: !Ref DomainName
      SubjectAlternativeNames:
        - !Sub "*.${DomainName}"
      ValidationMethod: DNS
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-cert"

  # --- ALB セキュリティグループ ---
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG for HTTPS
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTP for redirect
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTPS

  # --- ALB ---
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !GetAtt ALBSecurityGroup.GroupId

  # --- ターゲットグループ ---
  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-tg"
      Port: 80
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health

  # --- HTTPS リスナー ---
  HTTPSListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 443
      Protocol: HTTPS
      SslPolicy: ELBSecurityPolicy-TLS13-1-2-2021-06
      Certificates:
        - CertificateArn: !Ref Certificate
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # --- HTTP → HTTPS リダイレクトリスナー ---
  HTTPRedirectListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: redirect
          RedirectConfig:
            Protocol: HTTPS
            Port: "443"
            StatusCode: HTTP_301

Outputs:
  CertificateArn:
    Description: ACM 証明書 ARN
    Value: !Ref Certificate

  ALBDnsName:
    Description: ALB DNS 名
    Value: !GetAtt ALB.DNSName

  ALBArn:
    Description: ALB ARN
    Value: !Ref ALB
