AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: インシデントレスポンス自動化（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-incident
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"

Resources:
  # 要件6: DynamoDB
  IncidentLogTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${EnvironmentPrefix}-log"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - { AttributeName: incidentId, AttributeType: S }
        - { AttributeName: timestamp, AttributeType: S }
      KeySchema:
        - { AttributeName: incidentId, KeyType: HASH }
        - { AttributeName: timestamp, KeyType: RANGE }
      PointInTimeRecoverySpecification: { PointInTimeRecoveryEnabled: true }

  # 要件5: SNS
  IncidentTopic:
    Type: AWS::SNS::Topic
    Properties: { TopicName: !Sub "${EnvironmentPrefix}-alerts" }

  # 要件3: Lambda ロール
  IncidentLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: lambda.amazonaws.com }, Action: sts:AssumeRole }
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: IncidentActions
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: [ec2:CreateSnapshot, ec2:DescribeInstances, ec2:DescribeVolumes], Resource: "*" }
              - { Effect: Allow, Action: [ec2:ModifyInstanceAttribute, ec2:StopInstances], Resource: "*" }
              - { Effect: Allow, Action: [dynamodb:PutItem], Resource: !GetAtt IncidentLogTable.Arn }
              - { Effect: Allow, Action: [sns:Publish], Resource: !Ref IncidentTopic }

  # 要件3: 証拠保全 Lambda
  EvidenceFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-evidence"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IncidentLambdaRole.Arn
      Timeout: 120
      Code:
        ZipFile: |
          import boto3
          def handler(event, context):
              ec2 = boto3.client('ec2')
              instance_id = event.get('instanceId')
              volumes = ec2.describe_instances(InstanceIds=[instance_id])['Reservations'][0]['Instances'][0].get('BlockDeviceMappings', [])
              snapshots = []
              for vol in volumes:
                  vol_id = vol['Ebs']['VolumeId']
                  snap = ec2.create_snapshot(VolumeId=vol_id, Description=f'Incident evidence: {instance_id}')
                  snapshots.append(snap['SnapshotId'])
              return {'instanceId': instance_id, 'snapshots': snapshots}

  # 要件3: 隔離 Lambda
  IsolateFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-isolate"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IncidentLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import boto3
          def handler(event, context):
              ec2 = boto3.client('ec2')
              instance_id = event.get('instanceId')
              ec2.stop_instances(InstanceIds=[instance_id])
              return {'instanceId': instance_id, 'action': 'isolated'}

  # 要件3: ログ記録 Lambda
  LogIncidentFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-log"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt IncidentLambdaRole.Arn
      Timeout: 30
      Environment:
        Variables:
          TABLE_NAME: !Ref IncidentLogTable
          TOPIC_ARN: !Ref IncidentTopic
      Code:
        ZipFile: |
          import json, os, boto3
          from datetime import datetime
          dynamodb = boto3.resource('dynamodb')
          sns = boto3.client('sns')
          def handler(event, context):
              table = dynamodb.Table(os.environ['TABLE_NAME'])
              table.put_item(Item={'incidentId': event.get('incidentId', 'unknown'), 'timestamp': datetime.utcnow().isoformat(), 'detail': json.dumps(event, default=str)})
              sns.publish(TopicArn=os.environ['TOPIC_ARN'], Subject='Incident Response Complete', Message=json.dumps(event, default=str))
              return {'status': 'logged'}

  # 要件2: Step Functions
  SFNRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-sfn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: states.amazonaws.com }, Action: sts:AssumeRole }
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: lambda:InvokeFunction, Resource: [!GetAtt EvidenceFunction.Arn, !GetAtt IsolateFunction.Arn, !GetAtt LogIncidentFunction.Arn] }

  IncidentWorkflow:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${EnvironmentPrefix}-workflow"
      RoleArn: !GetAtt SFNRole.Arn
      DefinitionString: !Sub |
        {
          "StartAt": "ParallelResponse",
          "States": {
            "ParallelResponse": {
              "Type": "Parallel",
              "Branches": [
                {
                  "StartAt": "CollectEvidence",
                  "States": {
                    "CollectEvidence": { "Type": "Task", "Resource": "${EvidenceFunction.Arn}", "End": true }
                  }
                },
                {
                  "StartAt": "IsolateInstance",
                  "States": {
                    "IsolateInstance": { "Type": "Task", "Resource": "${IsolateFunction.Arn}", "End": true }
                  }
                }
              ],
              "Next": "LogIncident"
            },
            "LogIncident": { "Type": "Task", "Resource": "${LogIncidentFunction.Arn}", "End": true }
          }
        }

  # 要件4: SSM Runbook
  IncidentRunbook:
    Type: AWS::SSM::Document
    Properties:
      Name: !Sub "${EnvironmentPrefix}-runbook"
      DocumentType: Automation
      Content:
        schemaVersion: "0.3"
        description: インシデント対応自動化 Runbook
        parameters:
          InstanceId:
            type: String
            description: 対象インスタンス ID
        mainSteps:
          - name: StopInstance
            action: aws:changeInstanceState
            inputs:
              InstanceIds: ["{{ InstanceId }}"]
              DesiredState: stopped

  # 要件1: EventBridge
  GuardDutyRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentPrefix}-guardduty-trigger"
      EventPattern:
        source: [aws.guardduty]
        detail-type: ["GuardDuty Finding"]
        detail:
          severity: [{ numeric: [">=", 7] }]
      Targets:
        - Arn: !Ref IncidentWorkflow
          Id: IncidentWorkflowTarget
          RoleArn: !GetAtt EventBridgeSFNRole.Arn

  EventBridgeSFNRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-eb-sfn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: events.amazonaws.com }, Action: sts:AssumeRole }
      Policies:
        - PolicyName: StartSFN
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - { Effect: Allow, Action: states:StartExecution, Resource: !Ref IncidentWorkflow }

Outputs:
  WorkflowArn:
    Value: !Ref IncidentWorkflow
  RunbookName:
    Value: !Ref IncidentRunbook
  IncidentLogTableName:
    Value: !Ref IncidentLogTable
