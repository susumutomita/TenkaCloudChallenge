# TenkaCloud 統一問題フォーマット
# 問題ID: perf-api-gateway-throttling
# タイプ: GAMEDAY（構築型）

id: perf-api-gateway-throttling
title: API Gateway スロットリングとレスポンスキャッシュ
type: gameday
category: performance
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - api-gateway
    - performance
    - throttling
    - caching
    - usage-plan
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたは API プラットフォームエンジニアとして、公開 API のパフォーマンスと
    安定性を改善する必要があります。API のレスポンスタイムが不安定で、
    バーストトラフィック時にバックエンドが過負荷になっています。

    ## 背景
    API モニタリングの結果から以下が判明しました。
    - バーストトラフィック時に 429 Too Many Requests が多発
    - 同一 API キーからの大量リクエストでバックエンドが飽和
    - 使用量プランが未設定でレート制限がない
    - レスポンスキャッシュが未設定でバックエンド負荷が高い

    ## あなたのミッション
    API Gateway に使用量プラン、API キー、キャッシュを設定してパフォーマンスを安定化してください。

    ### 要件
    1. **使用量プラン**: スロットルレート 50 req/sec、バースト 100、日次クォータ 10000 を設定する
    2. **API キー**: API キーを作成し使用量プランに関連付ける
    3. **キャッシュ**: ステージでキャッシュを有効化し TTL 60 秒を設定する
    4. **WAF 統合**: API Gateway にリクエストバリデーションを有効にする

  objectives:
    - 使用量プランでスロットリングとクォータを設定する
    - API キーを作成して使用量プランに関連付ける
    - レスポンスキャッシュを有効化する
    - リクエストバリデーションを設定する

  hints:
    - "AWS::ApiGateway::UsagePlan でスロットルとクォータを設定します"
    - "AWS::ApiGateway::ApiKey と UsagePlanKey で API キーを使用量プランに関連付けます"
    - "CacheClusterEnabled と CacheTtlInSeconds でキャッシュを設定します"
    - "AWS::ApiGateway::RequestValidator でリクエストバリデーションを有効にします"

  prerequisites:
    - API Gateway の設定知識
    - 使用量プランの理解
    - CloudFormation の知識

  estimatedTime: 40

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-api-gateway-throttling.yaml
      parameters:
        ProjectName: tenka-apigw-perf

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: 使用量プラン
      description: レート 50、バースト 100、日次クォータ 10000 が設定されている
      weight: 30
      maxPoints: 30

    - name: API キー
      description: API キーが作成され使用量プランに関連付けられている
      weight: 25
      maxPoints: 25

    - name: キャッシュ
      description: キャッシュが有効で TTL 60 秒が設定されている
      weight: 25
      maxPoints: 25

    - name: リクエストバリデーション
      description: リクエストバリデーションが有効になっている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
