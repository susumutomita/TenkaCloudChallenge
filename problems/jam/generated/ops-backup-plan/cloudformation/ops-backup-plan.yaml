AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: AWS Backup による統合バックアップ計画（正解テンプレート）
  バックアップボールト、計画、ルール、リソース割り当てを構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-backup
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # 要件1: バックアップボールト
  BackupVault:
    Type: AWS::Backup::BackupVault
    Properties:
      BackupVaultName: !Sub "${EnvironmentPrefix}-vault"

  # バックアップ用 IAM ロール
  BackupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-backup-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: backup.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForBackup
        - arn:aws:iam::aws:policy/service-role/AWSBackupServiceRolePolicyForRestores

  # 要件2+3: バックアップ計画
  BackupPlan:
    Type: AWS::Backup::BackupPlan
    Properties:
      BackupPlan:
        BackupPlanName: !Sub "${EnvironmentPrefix}-daily-plan"
        BackupPlanRule:
          - RuleName: DailyBackup
            TargetBackupVault: !Ref BackupVault
            ScheduleExpression: "cron(0 15 * * ? *)"
            StartWindowMinutes: 60
            CompletionWindowMinutes: 180
            Lifecycle:
              MoveToColdStorageAfterDays: 7
              DeleteAfterDays: 30

  # 要件4: リソース割り当て
  BackupSelection:
    Type: AWS::Backup::BackupSelection
    Properties:
      BackupPlanId: !Ref BackupPlan
      BackupSelection:
        SelectionName: !Sub "${EnvironmentPrefix}-tag-selection"
        IamRoleArn: !GetAtt BackupRole.Arn
        ListOfTags:
          - ConditionType: STRINGEQUALS
            ConditionKey: Backup
            ConditionValue: "true"

Outputs:
  BackupVaultName:
    Description: バックアップボールト名
    Value: !Ref BackupVault

  BackupPlanId:
    Description: バックアップ計画 ID
    Value: !Ref BackupPlan

  BackupSelectionId:
    Description: バックアップ選択 ID
    Value: !Ref BackupSelection
