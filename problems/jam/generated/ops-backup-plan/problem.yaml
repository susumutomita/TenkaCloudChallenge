# TenkaCloud 統一問題フォーマット
# 問題ID: ops-backup-plan
# タイプ: GAMEDAY（構築型）

id: ops-backup-plan
title: AWS Backup による統合バックアップ計画
type: gameday
category: operations
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - backup
    - vault
    - backup-plan
    - lifecycle
    - encryption
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、複数の AWS リソースに対する
    統合バックアップ計画を構築する任務を与えられました。

    ## 背景
    EC2、RDS、EFS など複数のサービスのバックアップを個別に管理するのは
    運用負荷が高いです。AWS Backup で一元管理し、ライフサイクルポリシーで
    コストを最適化する必要があります。

    ## あなたのミッション
    AWS Backup による統合バックアップ計画を構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **バックアップボールト**: 暗号化されたバックアップボールトを作成する
    2. **バックアップ計画**: 日次バックアップのバックアップ計画を作成する
    3. **バックアップルール**: 保持期間 30 日、コールドストレージ移行 7 日のルールを設定する
    4. **リソース割り当て**: タグベースのリソース選択を設定する

  objectives:
    - 暗号化バックアップボールトを作成する
    - 日次バックアップ計画を作成する
    - ライフサイクルポリシーを設定する
    - タグベースのリソース割り当てを構成する

  hints:
    - "AWS::Backup::BackupVault でボールトを作成できます"
    - "AWS::Backup::BackupPlan でバックアップ計画を定義します"
    - "ScheduleExpression で cron 式を使ってスケジュールを設定します"
    - "AWS::Backup::BackupSelection でタグベースのリソース選択を定義します"

  prerequisites:
    - AWS Backup の基本的な知識
    - バックアップ戦略の理解

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-backup-plan.yaml
      parameters:
        EnvironmentPrefix: tenka-backup

    local:
      type: cloudformation
      path: ./templates/aws/ops-backup-plan.yaml
      parameters:
        EnvironmentPrefix: tenka-backup-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: バックアップボールト
      description: 暗号化されたバックアップボールトが作成されている
      weight: 25
      maxPoints: 25

    - name: バックアップ計画
      description: 日次バックアップのバックアップ計画が作成されている
      weight: 30
      maxPoints: 30

    - name: バックアップルール
      description: 保持期間 30 日、コールドストレージ移行 7 日のルールが設定されている
      weight: 25
      maxPoints: 25

    - name: リソース割り当て
      description: タグベースのリソース選択が設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
