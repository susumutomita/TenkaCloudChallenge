AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Secrets Manager シークレット管理 + 自動ローテーション（正解テンプレート）
  KMS 暗号化、自動ローテーション、リソースポリシー、VPC エンドポイントを含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-secrets
    Description: 環境名プレフィックス
  VpcId:
    Type: String
    Default: vpc-dummy
    Description: VPC ID
  PrivateSubnet1:
    Type: String
    Default: subnet-dummy1
    Description: プライベートサブネット 1
  PrivateSubnet2:
    Type: String
    Default: subnet-dummy2
    Description: プライベートサブネット 2
  DBUsername:
    Type: String
    Default: appuser
    NoEcho: true
  DBPassword:
    Type: String
    Default: ChangeMe123!
    NoEcho: true
    MinLength: 8

Resources:
  # --- KMS キー ---
  SecretsKMSKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} Secrets Manager encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccountAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowSecretsManagerUse
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action:
              - kms:Decrypt
              - kms:GenerateDataKey
            Resource: "*"
            Condition:
              StringEquals:
                "kms:ViaService": !Sub "secretsmanager.${AWS::Region}.amazonaws.com"

  SecretsKMSKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}-secrets-key"
      TargetKeyId: !Ref SecretsKMSKey

  # --- Secrets Manager シークレット ---
  DBSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "${EnvironmentName}/db-credentials"
      Description: Database credentials for the application
      KmsKeyId: !Ref SecretsKMSKey
      SecretString: !Sub '{"username":"${DBUsername}","password":"${DBPassword}","engine":"mysql","host":"db.example.com","port":3306}'

  # --- ローテーション Lambda ロール ---
  RotationLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-rotation-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SecretsManagerAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - secretsmanager:GetSecretValue
                  - secretsmanager:DescribeSecret
                  - secretsmanager:PutSecretValue
                  - secretsmanager:UpdateSecretVersionStage
                Resource: !Ref DBSecret
              - Effect: Allow
                Action:
                  - kms:Decrypt
                  - kms:GenerateDataKey
                Resource: !GetAtt SecretsKMSKey.Arn

  # --- ローテーション Lambda ---
  RotationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-rotation"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt RotationLambdaRole.Arn
      Timeout: 60
      Code:
        ZipFile: |
          import json
          import boto3
          import string
          import secrets
          def handler(event, context):
              step = event['Step']
              client = boto3.client('secretsmanager')
              if step == 'createSecret':
                  current = client.get_secret_value(SecretId=event['SecretId'], VersionStage='AWSCURRENT')
                  secret_dict = json.loads(current['SecretString'])
                  alphabet = string.ascii_letters + string.digits + '!@#$%^&*()'
                  secret_dict['password'] = ''.join(secrets.choice(alphabet) for _ in range(20))
                  client.put_secret_value(SecretId=event['SecretId'], ClientRequestToken=event['ClientRequestToken'], SecretString=json.dumps(secret_dict), VersionStages=['AWSPENDING'])
              elif step == 'setSecret':
                  pass
              elif step == 'testSecret':
                  pass
              elif step == 'finishSecret':
                  client.update_secret_version_stage(SecretId=event['SecretId'], VersionStage='AWSCURRENT', MoveToVersionId=event['ClientRequestToken'], RemoveFromVersionId=client.get_secret_value(SecretId=event['SecretId'], VersionStage='AWSCURRENT')['VersionId'])

  RotationPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref RotationFunction
      Action: lambda:InvokeFunction
      Principal: secretsmanager.amazonaws.com

  # --- ローテーションスケジュール ---
  RotationSchedule:
    Type: AWS::SecretsManager::RotationSchedule
    DependsOn: RotationPermission
    Properties:
      SecretId: !Ref DBSecret
      RotationLambdaARN: !GetAtt RotationFunction.Arn
      RotationRules:
        AutomaticallyAfterDays: 30

  # --- リソースポリシー ---
  SecretResourcePolicy:
    Type: AWS::SecretsManager::ResourcePolicy
    Properties:
      SecretId: !Ref DBSecret
      ResourcePolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowAppRoleAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:role/${EnvironmentName}-app-role"
            Action:
              - secretsmanager:GetSecretValue
            Resource: "*"

  # --- VPC エンドポイント ---
  VPCEndpointSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Secrets Manager VPC Endpoint SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "10.0.0.0/16"
          Description: Allow HTTPS from VPC

  SecretsManagerVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.secretsmanager"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !GetAtt VPCEndpointSecurityGroup.GroupId

Outputs:
  SecretArn:
    Description: シークレット ARN
    Value: !Ref DBSecret

  KMSKeyArn:
    Description: KMS キー ARN
    Value: !GetAtt SecretsKMSKey.Arn

  VPCEndpointId:
    Description: VPC エンドポイント ID
    Value: !Ref SecretsManagerVPCEndpoint
