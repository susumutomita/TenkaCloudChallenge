# TenkaCloud 統一問題フォーマット
# 問題ID: sec-secrets-manager-rotation
# タイプ: GAMEDAY（構築型）

id: sec-secrets-manager-rotation
title: Secrets Manager シークレット管理 + 自動ローテーション
type: gameday
category: security
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - secrets-manager
    - rotation
    - lambda
    - rds
    - credential-management
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティエンジニアとして、アプリケーションの
    データベース認証情報を Secrets Manager で管理する仕組みを構築する
    任務を与えられました。

    ## 背景
    現在、DB パスワードがアプリケーションの設定ファイルにハードコードされています。
    セキュリティ改善のため、Secrets Manager でシークレットを管理し、
    定期的な自動ローテーションを導入する必要があります。

    ## あなたのミッション
    以下の要件を満たす Secrets Manager の構成を構築してください。

    ### 要件
    1. **シークレット作成**: DB 認証情報のシークレットを作成し、KMS で暗号化する
    2. **ローテーション設定**: 30 日間隔の自動ローテーションを設定する
    3. **リソースポリシー**: 特定の IAM ロールからのみアクセスを許可するリソースポリシーを設定する
    4. **VPC エンドポイント**: Secrets Manager の VPC エンドポイントを作成してプライベート接続を可能にする

  objectives:
    - Secrets Manager シークレットを KMS 暗号化で作成する
    - 自動ローテーション（30 日）を設定する
    - リソースポリシーでアクセスを制限する
    - VPC エンドポイントを作成する

  hints:
    - "SecretString に JSON 形式で DB 接続情報を格納します"
    - "RotationSchedule で AutomaticallyAfterDays を指定します"
    - "ResourcePolicy で Principal を特定の IAM ロールに制限します"
    - "VPC エンドポイントは AWS::EC2::VPCEndpoint で InterfaceEndpoint タイプを使用します"

  prerequisites:
    - Secrets Manager の基本概念
    - KMS の基本知識
    - IAM ポリシーの基本知識
    - CloudFormation の基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-secrets-manager-rotation.yaml
      parameters:
        EnvironmentName: tenka-secrets

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: シークレット作成 + KMS 暗号化
      description: Secrets Manager シークレットが作成され、KMS カスタマーマネージドキーで暗号化されている
      weight: 25
      maxPoints: 25

    - name: ローテーション設定
      description: 30 日間隔の自動ローテーションが設定されている
      weight: 25
      maxPoints: 25

    - name: リソースポリシー
      description: 特定の IAM ロールからのみアクセスが許可されている
      weight: 25
      maxPoints: 25

    - name: VPC エンドポイント
      description: Secrets Manager の Interface VPC エンドポイントが作成されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
