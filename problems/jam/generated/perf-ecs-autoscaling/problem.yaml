# TenkaCloud 統一問題フォーマット
# 問題ID: perf-ecs-autoscaling
# タイプ: GAMEDAY（構築型）

id: perf-ecs-autoscaling
title: ECS サービスオートスケーリングとヘルスチェック最適化
type: gameday
category: performance
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - ecs
    - performance
    - auto-scaling
    - health-check
    - alb
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはコンテナプラットフォームエンジニアとして、ECS サービスの
    スケーリングとヘルスチェックの最適化を担当しています。トラフィック急増時に
    レスポンスタイムが悪化し、不健全なタスクが放置されています。

    ## 背景
    パフォーマンス監視の結果から以下が判明しました。
    - ECS サービスに Auto Scaling が未設定で、ピーク時にタスクが不足
    - ALB のヘルスチェックがデフォルト設定で、不健全タスクの検出が遅い
    - ターゲットグループの設定が最適化されていない
    - デプロイ時にダウンタイムが発生している

    ## あなたのミッション
    ECS サービスに Auto Scaling とヘルスチェックを最適化し、高パフォーマンスな構成を構築してください。

    ### 要件
    1. **ターゲット追跡スケーリング**: ALBRequestCountPerTarget メトリクスで 100 リクエスト/ターゲットをターゲットにする
    2. **スケーリング範囲**: 最小 2 台、最大 10 台に設定する
    3. **ヘルスチェック最適化**: ALB ヘルスチェックの間隔 10 秒、しきい値 2 回で設定する
    4. **デプロイ設定**: 最小ヘルシー率 100%、最大率 200% で設定する

  objectives:
    - ターゲット追跡スケーリングを設定する
    - 適切なスケーリング範囲を構成する
    - ALB ヘルスチェックを最適化する
    - ローリングデプロイの設定を最適化する

  hints:
    - "ALBRequestCountPerTarget メトリクスで負荷分散ベースのスケーリングが可能です"
    - "HealthCheckIntervalSeconds と HealthyThresholdCount でヘルスチェックを調整します"
    - "DeploymentConfiguration で MinimumHealthyPercent と MaximumPercent を設定します"
    - "ECS サービスの HealthCheckGracePeriodSeconds でタスク起動時の猶予を設定します"

  prerequisites:
    - ECS の運用知識
    - ALB の設定経験
    - Auto Scaling の理解
    - CloudFormation の知識

  estimatedTime: 40

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-ecs-autoscaling.yaml
      parameters:
        ProjectName: tenka-ecs-perf
        VpcId: ""
        SubnetIds: ""

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: ターゲット追跡スケーリング
      description: ALBRequestCountPerTarget で 100 リクエスト/ターゲットが設定されている
      weight: 30
      maxPoints: 30

    - name: スケーリング範囲
      description: 最小 2 台、最大 10 台が設定されている
      weight: 20
      maxPoints: 20

    - name: ヘルスチェック最適化
      description: 間隔 10 秒、しきい値 2 回が設定されている
      weight: 25
      maxPoints: 25

    - name: デプロイ設定
      description: 最小ヘルシー率 100%、最大率 200% が設定されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
