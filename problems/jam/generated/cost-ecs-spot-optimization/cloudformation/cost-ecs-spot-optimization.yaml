AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: ECS クラスターの Spot + オンデマンド混合戦略（正解テンプレート）
  FARGATE/FARGATE_SPOT 混合、サーキットブレーカーを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-ecs-spot
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト

Resources:
  # 要件1: FARGATE + FARGATE_SPOT のキャパシティプロバイダー
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      CapacityProviders:
        - FARGATE
        - FARGATE_SPOT

  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  ApiTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-api"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "256"
      Memory: "512"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: api
          Image: public.ecr.aws/nginx/nginx:stable-alpine
          PortMappings:
            - ContainerPort: 80

  BatchTaskDefinition:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${ProjectName}-batch"
      RequiresCompatibilities:
        - FARGATE
      NetworkMode: awsvpc
      Cpu: "512"
      Memory: "1024"
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: batch
          Image: public.ecr.aws/nginx/nginx:stable-alpine

  SecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} ECS SG"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: 10.0.0.0/8

  # 要件2: API サービス（オンデマンドのみ）
  ApiService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectName}-api-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ApiTaskDefinition
      DesiredCount: 2
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE
          Weight: 1
          Base: 2
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref SecurityGroup
      # 要件4: サーキットブレーカー
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true

  # 要件3: バッチサービス（Spot 優先混合）
  BatchService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: !Sub "${ProjectName}-batch-service"
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref BatchTaskDefinition
      DesiredCount: 4
      CapacityProviderStrategy:
        - CapacityProvider: FARGATE_SPOT
          Weight: 3
        - CapacityProvider: FARGATE
          Weight: 1
      NetworkConfiguration:
        AwsvpcConfiguration:
          Subnets: !Ref SubnetIds
          SecurityGroups:
            - !Ref SecurityGroup
      # 要件4: サーキットブレーカー
      DeploymentConfiguration:
        DeploymentCircuitBreaker:
          Enable: true
          Rollback: true

Outputs:
  ClusterName:
    Description: ECS クラスター名
    Value: !Ref ECSCluster

  ApiServiceName:
    Description: API サービス名
    Value: !GetAtt ApiService.Name

  BatchServiceName:
    Description: バッチサービス名
    Value: !GetAtt BatchService.Name
