# TenkaCloud 統一問題フォーマット
id: ops-cfn-stacksets
title: CloudFormation StackSets マルチアカウントデプロイ
type: gameday
category: operations
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags: [cloudformation, stacksets, multi-account, organizations, iam]
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、CloudFormation StackSets を使った
    マルチアカウントへの一括デプロイ基盤を構築する任務を与えられました。

    ## 背景
    組織内の複数アカウントに同一のセキュリティベースライン（Config ルール、
    CloudTrail、GuardDuty 有効化）を一括でデプロイする必要があります。

    ## あなたのミッション
    ### 要件
    1. **StackSet**: セキュリティベースラインの StackSet を作成する
    2. **管理者ロール**: StackSets 管理者用 IAM ロールを作成する
    3. **実行ロール**: ターゲットアカウントの実行用 IAM ロールを作成する
    4. **テンプレート**: CloudTrail + Config を有効化するテンプレートを定義する
    5. **デプロイ設定**: 同時実行数と失敗許容数を設定する

  objectives:
    - セキュリティベースライン StackSet を作成する
    - 管理者用 IAM ロールを作成する
    - 実行用 IAM ロールを作成する
    - CloudTrail + Config テンプレートを定義する
    - デプロイの同時実行数と失敗許容数を設定する

  hints:
    - "AWS::CloudFormation::StackSet でスタックセットを作成できます"
    - "AdministrationRoleARN と ExecutionRoleName を指定します"
    - "OperationPreferences で MaxConcurrentCount と FailureToleranceCount を設定します"
  prerequisites: [CloudFormation StackSets の知識, マルチアカウント管理の理解, IAM ロールの知識]
  estimatedTime: 60

deployment:
  providers: [aws, local]
  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-cfn-stacksets.yaml
      parameters: { EnvironmentPrefix: tenka-stacksets }
    local:
      type: cloudformation
      path: ./templates/aws/ops-cfn-stacksets.yaml
      parameters: { EnvironmentPrefix: tenka-stacksets-local }
  regions:
    aws: [ap-northeast-1, us-east-1]
  timeout: 30

scoring:
  type: api
  criteria:
    - { name: StackSet, description: セキュリティベースライン StackSet が作成されている, weight: 25, maxPoints: 25 }
    - { name: 管理者ロール, description: StackSets 管理者用 IAM ロールが作成されている, weight: 20, maxPoints: 20 }
    - { name: 実行ロール, description: ターゲットアカウント実行用 IAM ロールが作成されている, weight: 20, maxPoints: 20 }
    - { name: テンプレート, description: CloudTrail + Config テンプレートが定義されている, weight: 20, maxPoints: 20 }
    - { name: デプロイ設定, description: 同時実行数と失敗許容数が設定されている, weight: 15, maxPoints: 15 }
  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
