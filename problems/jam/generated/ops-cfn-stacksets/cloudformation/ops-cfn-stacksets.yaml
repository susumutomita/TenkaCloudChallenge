AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: CloudFormation StackSets マルチアカウントデプロイ（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-stacksets
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"

Resources:
  # 要件2: 管理者ロール
  StackSetAdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: AWSCloudFormationStackSetAdministrationRole
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudformation.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: AssumeExecutionRole
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: sts:AssumeRole
                Resource: !Sub "arn:aws:iam::*:role/${EnvironmentPrefix}-execution-role"

  # 要件3: 実行ロール
  StackSetExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-execution-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

  # 要件1+4+5: StackSet
  SecurityBaselineStackSet:
    Type: AWS::CloudFormation::StackSet
    DependsOn: StackSetAdminRole
    Properties:
      StackSetName: !Sub "${EnvironmentPrefix}-security-baseline"
      Description: セキュリティベースライン（CloudTrail + Config）
      PermissionModel: SELF_MANAGED
      AdministrationRoleARN: !GetAtt StackSetAdminRole.Arn
      ExecutionRoleName: !Sub "${EnvironmentPrefix}-execution-role"
      OperationPreferences:
        MaxConcurrentCount: 3
        FailureToleranceCount: 1
      TemplateBody: |
        AWSTemplateFormatVersion: "2010-09-09"
        Description: Security baseline - CloudTrail + Config
        Resources:
          TrailBucket:
            Type: AWS::S3::Bucket
            Properties:
              BucketEncryption:
                ServerSideEncryptionConfiguration:
                  - ServerSideEncryptionByDefault:
                      SSEAlgorithm: AES256
              PublicAccessBlockConfiguration:
                BlockPublicAcls: true
                BlockPublicPolicy: true
                IgnorePublicAcls: true
                RestrictPublicBuckets: true
          TrailBucketPolicy:
            Type: AWS::S3::BucketPolicy
            Properties:
              Bucket: !Ref TrailBucket
              PolicyDocument:
                Version: "2012-10-17"
                Statement:
                  - Effect: Allow
                    Principal:
                      Service: cloudtrail.amazonaws.com
                    Action: s3:GetBucketAcl
                    Resource: !GetAtt TrailBucket.Arn
                  - Effect: Allow
                    Principal:
                      Service: cloudtrail.amazonaws.com
                    Action: s3:PutObject
                    Resource: !Sub "${TrailBucket.Arn}/*"
          Trail:
            Type: AWS::CloudTrail::Trail
            DependsOn: TrailBucketPolicy
            Properties:
              IsLogging: true
              IsMultiRegionTrail: true
              S3BucketName: !Ref TrailBucket
              EnableLogFileValidation: true

Outputs:
  StackSetName:
    Description: StackSet 名
    Value: !Ref SecurityBaselineStackSet
  AdminRoleArn:
    Description: 管理者ロール ARN
    Value: !GetAtt StackSetAdminRole.Arn
