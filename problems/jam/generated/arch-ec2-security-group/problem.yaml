# TenkaCloud 統一問題フォーマット
# 問題ID: arch-ec2-security-group
# タイプ: GAMEDAY（構築型）

id: arch-ec2-security-group
title: EC2 インスタンス + セキュリティグループ設計
type: gameday
category: architecture
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - ec2
    - security-group
    - ssh
    - http
    - ebs
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、開発チーム用の Web サーバーを
    EC2 インスタンスで構築する任務を与えられました。

    ## 背景
    セキュリティチームの方針により、必要最小限のポートのみを開放し、
    SSH アクセスは特定の IP レンジからのみ許可する必要があります。
    また、EBS ボリュームは暗号化必須です。

    ## あなたのミッション
    以下の要件を満たす EC2 インスタンスとセキュリティグループを構築してください。

    ### 要件
    1. **セキュリティグループ**: HTTP（80）を全体に公開し、SSH（22）は特定 CIDR からのみ許可する
    2. **EC2 インスタンス**: t3.micro で Launch Template を使用して作成する
    3. **EBS 暗号化**: ルートボリュームを暗号化し、gp3 タイプを使用する
    4. **タグ付け**: すべてのリソースに Name タグと Environment タグを設定する

  objectives:
    - セキュリティグループを作成し、HTTP と SSH のインバウンドルールを設定する
    - Launch Template で EC2 インスタンスを作成する
    - EBS ボリュームを暗号化し gp3 タイプに設定する
    - 全リソースに適切なタグを付与する

  hints:
    - "SecurityGroupIngress で複数のルールを定義できます"
    - "Launch Template の BlockDeviceMappings で EBS 設定を行います"
    - "gp3 は Iops と Throughput をカスタマイズ可能です"
    - "SSH の CidrIp は /32 や /24 で制限してください"

  prerequisites:
    - AWS の基本的な知識
    - EC2 とセキュリティグループの基本概念
    - CloudFormation の基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-ec2-security-group.yaml
      parameters:
        EnvironmentName: tenka-ec2-sg

    local:
      type: cloudformation
      path: ./templates/aws/arch-ec2-security-group.yaml
      parameters:
        EnvironmentName: tenka-ec2-sg-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: セキュリティグループ設定
      description: HTTP（80）が 0.0.0.0/0 に公開され、SSH（22）が特定 CIDR に制限されている
      weight: 30
      maxPoints: 30

    - name: EC2 インスタンス作成
      description: Launch Template を使用した t3.micro インスタンスが作成されている
      weight: 25
      maxPoints: 25

    - name: EBS 暗号化 + gp3
      description: ルートボリュームが暗号化され、gp3 タイプで作成されている
      weight: 25
      maxPoints: 25

    - name: タグ設定
      description: すべてのリソースに Name と Environment タグが設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
