AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: X-Ray 分散トレーシング構成（正解テンプレート）
  API Gateway + Lambda トレーシング、サンプリングルール、X-Ray グループを構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-xray
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # 要件5: IAM ロール
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/AWSXRayDaemonWriteAccess

  # 要件2: Lambda 関数（X-Ray アクティブトレーシング）
  TracedFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-handler"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      TracingConfig:
        Mode: Active
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'body': json.dumps({'message': 'traced response'})
              }

  # 要件1: API Gateway（X-Ray トレーシング有効）
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${EnvironmentPrefix}-api"

  ApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: trace

  ApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${TracedFunction.Arn}/invocations"

  LambdaApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref TracedFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ApiMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      StageName: prod
      TracingEnabled: true

  # 要件3: カスタムサンプリングルール
  CustomSamplingRule:
    Type: AWS::XRay::SamplingRule
    Properties:
      SamplingRule:
        RuleName: !Sub "${EnvironmentPrefix}-high-priority"
        Priority: 100
        FixedRate: 1.0
        ReservoirSize: 10
        ServiceName: !Sub "${EnvironmentPrefix}-api"
        ServiceType: "*"
        Host: "*"
        HTTPMethod: "*"
        URLPath: "/trace*"
        ResourceARN: "*"
        Version: 1

  # 要件4: X-Ray グループ
  ErrorGroup:
    Type: AWS::XRay::Group
    Properties:
      GroupName: !Sub "${EnvironmentPrefix}-errors"
      FilterExpression: "responsetime > 2 OR fault = true"

Outputs:
  ApiEndpoint:
    Description: API Gateway エンドポイント
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod/trace"

  FunctionName:
    Description: Lambda 関数名
    Value: !Ref TracedFunction

  SamplingRuleName:
    Description: サンプリングルール名
    Value: !Sub "${EnvironmentPrefix}-high-priority"

  GroupName:
    Description: X-Ray グループ名
    Value: !Sub "${EnvironmentPrefix}-errors"
