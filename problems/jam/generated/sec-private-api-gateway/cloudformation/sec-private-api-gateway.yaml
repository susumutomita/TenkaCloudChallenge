AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Private API Gateway + VPC エンドポイント（正解テンプレート）
  Private API、VPC エンドポイント、リソースポリシー、API キーを含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-private-api
    Description: 環境名プレフィックス
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 1
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 2

Resources:
  # --- VPC エンドポイント SG ---
  VPCEndpointSG:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: API Gateway VPC Endpoint SG
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "10.0.0.0/16"
          Description: Allow HTTPS from VPC

  # --- API Gateway VPC エンドポイント ---
  ApiGatewayVPCEndpoint:
    Type: AWS::EC2::VPCEndpoint
    Properties:
      VpcId: !Ref VpcId
      ServiceName: !Sub "com.amazonaws.${AWS::Region}.execute-api"
      VpcEndpointType: Interface
      PrivateDnsEnabled: true
      SubnetIds:
        - !Ref PrivateSubnet1
        - !Ref PrivateSubnet2
      SecurityGroupIds:
        - !GetAtt VPCEndpointSG.GroupId

  # --- Lambda ロール ---
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  # --- Lambda 関数 ---
  ApiFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-handler"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 30
      Code:
        ZipFile: |
          import json
          def handler(event, context):
              return {
                  'statusCode': 200,
                  'headers': {'Content-Type': 'application/json'},
                  'body': json.dumps({'message': 'Private API response', 'source': event.get('requestContext', {}).get('identity', {}).get('sourceIp', 'unknown')})
              }

  # --- Private REST API ---
  PrivateApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${EnvironmentName}-private-api"
      EndpointConfiguration:
        Types:
          - PRIVATE
        VpcEndpointIds:
          - !Ref ApiGatewayVPCEndpoint
      Policy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "execute-api:/*"
            Condition:
              StringEquals:
                "aws:sourceVpce": !Ref ApiGatewayVPCEndpoint
          - Effect: Deny
            Principal: "*"
            Action: execute-api:Invoke
            Resource: "execute-api:/*"
            Condition:
              StringNotEquals:
                "aws:sourceVpce": !Ref ApiGatewayVPCEndpoint

  # --- API リソース ---
  DataResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref PrivateApi
      ParentId: !GetAtt PrivateApi.RootResourceId
      PathPart: data

  # --- GET メソッド（API キー必須）---
  GetDataMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref PrivateApi
      ResourceId: !Ref DataResource
      HttpMethod: GET
      AuthorizationType: NONE
      ApiKeyRequired: true
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${ApiFunction.Arn}/invocations"

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ApiFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${PrivateApi}/*"

  # --- デプロイ + ステージ ---
  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: GetDataMethod
    Properties:
      RestApiId: !Ref PrivateApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref PrivateApi
      DeploymentId: !Ref ApiDeployment

  # --- API キー ---
  ApiKey:
    Type: AWS::ApiGateway::ApiKey
    DependsOn: ApiStage
    Properties:
      Name: !Sub "${EnvironmentName}-api-key"
      Enabled: true
      StageKeys:
        - RestApiId: !Ref PrivateApi
          StageName: prod

  # --- 使用量プラン ---
  UsagePlan:
    Type: AWS::ApiGateway::UsagePlan
    DependsOn: ApiStage
    Properties:
      UsagePlanName: !Sub "${EnvironmentName}-usage-plan"
      ApiStages:
        - ApiId: !Ref PrivateApi
          Stage: prod
      Throttle:
        BurstLimit: 20
        RateLimit: 50
      Quota:
        Limit: 10000
        Period: DAY

  UsagePlanKey:
    Type: AWS::ApiGateway::UsagePlanKey
    Properties:
      KeyId: !Ref ApiKey
      KeyType: API_KEY
      UsagePlanId: !Ref UsagePlan

Outputs:
  PrivateApiId:
    Description: Private API ID
    Value: !Ref PrivateApi

  VPCEndpointId:
    Description: VPC エンドポイント ID
    Value: !Ref ApiGatewayVPCEndpoint

  ApiKeyId:
    Description: API キー ID
    Value: !Ref ApiKey
