# TenkaCloud 統一問題フォーマット
# 問題ID: perf-global-api-accelerator
# タイプ: GAMEDAY（構築型）

id: perf-global-api-accelerator
title: Global Accelerator によるマルチリージョン API 高速化
type: gameday
category: performance
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - global-accelerator
    - performance
    - multi-region
    - alb
    - anycast
    - health-check
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはグローバルプラットフォームのアーキテクトとして、世界中のユーザーに
    低レイテンシで API を提供する基盤を構築しています。DNS ベースのルーティングでは
    レイテンシの改善が限定的で、AWS Global Accelerator の導入が必要です。

    ## 背景
    グローバルパフォーマンス分析から以下が判明しました。
    - DNS ベースのルーティングでは TTL の問題で切り替えに最大 60 秒かかる
    - アジアからの API レスポンスが P99 で 800ms（インターネットホップが多い）
    - Global Accelerator のエニーキャスト IP で AWS バックボーンネットワークを経由すれば改善可能
    - マルチリージョンの ALB にトラフィックを分散する必要がある

    ## あなたのミッション
    Global Accelerator を構成し、マルチリージョンの ALB にトラフィックを分散する高パフォーマンス基盤を構築してください。

    ### 要件
    1. **Global Accelerator**: アクセラレーターを作成し、ポート 443 のリスナーを設定する
    2. **エンドポイントグループ**: 2 リージョン（ap-northeast-1, us-east-1）のエンドポイントグループを作成する
    3. **ヘルスチェック**: エンドポイントグループのヘルスチェック間隔を 10 秒に設定する
    4. **トラフィックダイヤル**: 各リージョンのトラフィックダイヤルを 100 に設定する
    5. **ALB エンドポイント**: ALB をエンドポイントとして登録し、クライアント IP 保持を有効にする

  objectives:
    - Global Accelerator を作成する
    - マルチリージョンのエンドポイントグループを構成する
    - ヘルスチェックを最適化する
    - ALB エンドポイントを登録する

  hints:
    - "AWS::GlobalAccelerator::Accelerator でアクセラレーターを作成します"
    - "AWS::GlobalAccelerator::Listener でポートとプロトコルを設定します"
    - "AWS::GlobalAccelerator::EndpointGroup でリージョンごとのエンドポイントを構成します"
    - "HealthCheckIntervalSeconds でヘルスチェック間隔を設定します"
    - "ClientIPPreservationEnabled でクライアント IP の保持を有効にします"

  prerequisites:
    - Global Accelerator の概念理解
    - ALB の設定経験
    - マルチリージョンアーキテクチャの知識
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-global-api-accelerator.yaml
      parameters:
        ProjectName: tenka-ga-perf
        ALBArn: ""

  regions:
    aws:
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Global Accelerator
      description: アクセラレーターとポート 443 のリスナーが作成されている
      weight: 20
      maxPoints: 20

    - name: エンドポイントグループ
      description: 2 リージョンのエンドポイントグループが作成されている
      weight: 25
      maxPoints: 25

    - name: ヘルスチェック
      description: ヘルスチェック間隔が 10 秒に設定されている
      weight: 20
      maxPoints: 20

    - name: トラフィックダイヤル
      description: 各リージョンのトラフィックダイヤルが 100 に設定されている
      weight: 15
      maxPoints: 15

    - name: ALB エンドポイント
      description: ALB がエンドポイントとして登録されクライアント IP 保持が有効
      weight: 20
      maxPoints: 20

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
