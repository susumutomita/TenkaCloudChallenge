AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Lambda 関数のメモリとタイムアウト最適化（正解テンプレート）
  メモリ、アーキテクチャ、タイムアウトを最適化した Lambda 関数。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-lambda-cost
    Description: プロジェクト名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  OptimizedFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-optimized"
      Runtime: python3.12
      Handler: index.handler
      # 要件1: メモリサイズを 128 MB に最適化
      MemorySize: 128
      # 要件2: Graviton2 (arm64) アーキテクチャ
      Architectures:
        - arm64
      # 要件3: タイムアウトを 30 秒に設定
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      # 要件4: コスト追跡用の環境変数
      Environment:
        Variables:
          COST_CENTER: shared-services
      Code:
        ZipFile: |
          def handler(event, context):
              return {"statusCode": 200, "body": "optimized"}

Outputs:
  FunctionName:
    Description: 最適化された Lambda 関数名
    Value: !Ref OptimizedFunction

  FunctionArn:
    Description: 最適化された Lambda 関数 ARN
    Value: !GetAtt OptimizedFunction.Arn
