AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: DynamoDB DAX クラスターによるマイクロ秒レイテンシ（正解テンプレート）
  DAX クラスター、暗号化、パラメータグループ、DynamoDB テーブルを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-dax-perf
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト

Resources:
  # 要件4: DynamoDB テーブル
  GameStateTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-game-state"
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: playerId
          AttributeType: S
        - AttributeName: sessionId
          AttributeType: S
      KeySchema:
        - AttributeName: playerId
          KeyType: HASH
        - AttributeName: sessionId
          KeyType: RANGE
      SSESpecification:
        SSEEnabled: true

  DAXSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} DAX SG"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8111
          ToPort: 8111
          CidrIp: 10.0.0.0/8

  DAXSubnetGroup:
    Type: AWS::DAX::SubnetGroup
    Properties:
      SubnetGroupName: !Sub "${ProjectName}-dax-subnet"
      Description: DAX subnet group
      SubnetIds: !Ref SubnetIds

  DAXRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-dax-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: dax.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: DynamoDBAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - dynamodb:GetItem
                  - dynamodb:PutItem
                  - dynamodb:Query
                  - dynamodb:Scan
                  - dynamodb:BatchGetItem
                  - dynamodb:BatchWriteItem
                  - dynamodb:DescribeTable
                Resource: !GetAtt GameStateTable.Arn

  # 要件3: パラメータグループ
  DAXParameterGroup:
    Type: AWS::DAX::ParameterGroup
    Properties:
      ParameterGroupName: !Sub "${ProjectName}-params"
      Description: DAX parameter group with optimized TTL
      ParameterNameValues:
        record-ttl-millis: "300000"
        query-ttl-millis: "300000"

  # 要件1, 2: DAX クラスター
  DAXCluster:
    Type: AWS::DAX::Cluster
    Properties:
      ClusterName: !Sub "${ProjectName}-cluster"
      # 要件1: dax.r5.large 2 ノード
      NodeType: dax.r5.large
      ReplicationFactor: 2
      IAMRoleARN: !GetAtt DAXRole.Arn
      SubnetGroupName: !Ref DAXSubnetGroup
      SecurityGroupIds:
        - !Ref DAXSecurityGroup
      ParameterGroupName: !Ref DAXParameterGroup
      # 要件2: 暗号化
      SSESpecification:
        SSEEnabled: true

Outputs:
  DAXClusterEndpoint:
    Description: DAX クラスターエンドポイント
    Value: !GetAtt DAXCluster.ClusterDiscoveryEndpoint

  DAXClusterArn:
    Description: DAX クラスター ARN
    Value: !GetAtt DAXCluster.Arn

  TableName:
    Description: DynamoDB テーブル名
    Value: !Ref GameStateTable
