# TenkaCloud 統一問題フォーマット
# 問題ID: perf-streaming-data-pipeline
# タイプ: GAMEDAY（構築型）

id: perf-streaming-data-pipeline
title: リアルタイムストリーミングデータパイプラインの最適化
type: gameday
category: performance
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - kinesis
    - lambda
    - dynamodb
    - performance
    - streaming
    - event-source-mapping
    - batch-window
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはリアルタイムデータパイプラインのアーキテクトとして、IoT デバイスからの
    高スループットデータを低レイテンシで処理するパイプラインを構築しています。
    Kinesis、Lambda、DynamoDB を組み合わせた最適なパイプラインが必要です。

    ## 背景
    パフォーマンスベンチマークから以下が判明しました。
    - 毎秒 10,000 イベントの IoT データが Kinesis に流入
    - Lambda のバッチサイズとウィンドウが未最適化でスループットが低い
    - DynamoDB への書き込みがボトルネックでバックプレッシャーが発生
    - Lambda の並列化係数が未設定で処理が直列化

    ## あなたのミッション
    Kinesis -> Lambda -> DynamoDB のストリーミングパイプラインを最適化してください。

    ### 要件
    1. **Kinesis Stream**: 8 シャード、オンデマンドモードのストリームを作成する
    2. **Lambda イベントソース最適化**: BatchSize 100、MaximumBatchingWindowInSeconds 5、ParallelizationFactor 10 を設定する
    3. **Lambda 関数**: arm64、512 MB メモリ、タイムアウト 60 秒で構成する
    4. **DynamoDB テーブル**: オンデマンドモードで作成し、TTL を有効にする
    5. **エラーハンドリング**: BisectBatchOnFunctionError を有効にし、MaximumRetryAttempts を 3 に設定する

  objectives:
    - 高スループットの Kinesis Stream を作成する
    - Lambda イベントソースマッピングを最適化する
    - Lambda 関数をパフォーマンス最適化する
    - DynamoDB テーブルを構成する
    - エラーハンドリングを実装する

  hints:
    - "ParallelizationFactor で各シャードの同時 Lambda 呼び出し数を最大 10 に設定できます"
    - "MaximumBatchingWindowInSeconds でバッチ収集時間を設定しスループットを改善します"
    - "BisectBatchOnFunctionError でエラー時にバッチを分割して再処理します"
    - "8 シャード x ParallelizationFactor 10 = 最大 80 同時 Lambda 実行が可能です"

  prerequisites:
    - Kinesis Data Streams の深い理解
    - Lambda イベントソースマッピングの知識
    - DynamoDB の運用経験
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-streaming-data-pipeline.yaml
      parameters:
        ProjectName: tenka-stream-perf

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Kinesis Stream
      description: オンデマンドモードのストリームが作成されている
      weight: 15
      maxPoints: 15

    - name: Lambda イベントソース最適化
      description: BatchSize 100、Window 5 秒、ParallelizationFactor 10
      weight: 30
      maxPoints: 30

    - name: Lambda 関数
      description: arm64、512 MB、60 秒タイムアウト
      weight: 15
      maxPoints: 15

    - name: DynamoDB テーブル
      description: オンデマンドモードで TTL が有効
      weight: 15
      maxPoints: 15

    - name: エラーハンドリング
      description: BisectBatchOnFunctionError 有効、MaximumRetryAttempts 3
      weight: 25
      maxPoints: 25

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
