# TenkaCloud 統一問題フォーマット
# 問題ID: cost-ebs-volume-optimization
# タイプ: GAMEDAY（構築型）

id: cost-ebs-volume-optimization
title: EBS ボリュームタイプとスナップショットの最適化
type: gameday
category: cost
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - ebs
    - cost
    - gp3
    - snapshot
    - dlm
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはインフラエンジニアとして、EBS ボリュームのコスト最適化を担当しています。
    旧世代のボリュームタイプが使用されており、スナップショット管理も手動で行われています。

    ## 背景
    インフラ監査の結果から以下が判明しました。
    - gp2 ボリュームが使用されており、gp3 への移行で同性能をより低コストで実現可能
    - 手動スナップショットが無制限に蓄積されストレージコストが増大
    - DLM（Data Lifecycle Manager）による自動管理が未導入

    ## あなたのミッション
    EBS ボリュームを最適化し、DLM でスナップショットライフサイクルを自動化してください。

    ### 要件
    1. **gp3 ボリューム**: EBS ボリュームタイプを gp3 に設定し、サイズを 20 GB にする
    2. **IOPS 設定**: ベースライン 3000 IOPS を明示的に設定する
    3. **スループット設定**: 125 MB/s のスループットを明示的に設定する
    4. **暗号化**: EBS ボリュームの暗号化を有効にする

  objectives:
    - gp3 タイプの EBS ボリュームを作成する
    - IOPS とスループットを明示的に設定する
    - ボリュームの暗号化を有効にする
    - 適切なタグを付与する

  hints:
    - "AWS::EC2::Volume で EBS ボリュームを作成できます"
    - "gp3 はベースラインで 3000 IOPS、125 MB/s を追加料金なしで提供します"
    - "Encrypted プロパティで暗号化を有効にできます"
    - "gp2 から gp3 への移行で最大 20% のコスト削減が可能です"

  prerequisites:
    - EBS ボリュームタイプの知識
    - CloudFormation の基本的な知識

  estimatedTime: 15

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-ebs-volume-optimization.yaml
      parameters:
        ProjectName: tenka-ebs-cost
        AvailabilityZone: ap-northeast-1a

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: gp3 ボリュームタイプ
      description: EBS ボリュームのタイプが gp3 に設定されている
      weight: 30
      maxPoints: 30

    - name: IOPS 設定
      description: IOPS が 3000 に設定されている
      weight: 25
      maxPoints: 25

    - name: スループット設定
      description: スループットが 125 MB/s に設定されている
      weight: 25
      maxPoints: 25

    - name: 暗号化有効
      description: EBS ボリュームの暗号化が有効になっている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
