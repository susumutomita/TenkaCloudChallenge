AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Organizations SCP によるアカウントガバナンス（正解テンプレート）
  Organization、OU、SCP、タグポリシーを構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-org
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # 要件1: Organization
  Organization:
    Type: AWS::Organizations::Organization
    Properties:
      FeatureSet: ALL

  # 要件2: 開発用 OU
  DevelopmentOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties:
      Name: Development
      ParentId: !GetAtt Organization.RootId

  # 要件2: 本番用 OU
  ProductionOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties:
      Name: Production
      ParentId: !GetAtt Organization.RootId

  # 要件3: リージョン制限 SCP
  RegionRestrictionPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-region-restriction"
      Description: 許可リージョン以外での操作を拒否
      Type: SERVICE_CONTROL_POLICY
      Content: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "DenyNonApprovedRegions",
              "Effect": "Deny",
              "NotAction": [
                "iam:*",
                "organizations:*",
                "sts:*",
                "support:*",
                "budgets:*"
              ],
              "Resource": "*",
              "Condition": {
                "StringNotEquals": {
                  "aws:RequestedRegion": [
                    "ap-northeast-1",
                    "us-east-1"
                  ]
                }
              }
            }
          ]
        }
      TargetIds:
        - !Ref DevelopmentOU

  # 要件4: サービス制限 SCP
  ServiceRestrictionPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-service-restriction"
      Description: 高額サービスの使用を制限
      Type: SERVICE_CONTROL_POLICY
      Content: |
        {
          "Version": "2012-10-17",
          "Statement": [
            {
              "Sid": "DenyExpensiveServices",
              "Effect": "Deny",
              "Action": [
                "redshift:*",
                "emr:*",
                "sagemaker:CreateEndpoint",
                "sagemaker:CreateNotebookInstance",
                "ec2:RunInstances"
              ],
              "Resource": "*",
              "Condition": {
                "ForAnyValue:StringLike": {
                  "ec2:InstanceType": [
                    "*.metal",
                    "*.24xlarge",
                    "*.16xlarge",
                    "p*.*",
                    "g*.*"
                  ]
                }
              }
            }
          ]
        }
      TargetIds:
        - !Ref DevelopmentOU

  # 要件5: タグポリシー
  TagPolicy:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-tag-policy"
      Description: 必須タグの強制
      Type: TAG_POLICY
      Content: |
        {
          "tags": {
            "Environment": {
              "tag_key": {
                "@@assign": "Environment"
              },
              "tag_value": {
                "@@assign": [
                  "development",
                  "staging",
                  "production"
                ]
              },
              "enforced_for": {
                "@@assign": [
                  "ec2:instance",
                  "s3:bucket",
                  "rds:db"
                ]
              }
            },
            "Owner": {
              "tag_key": {
                "@@assign": "Owner"
              }
            }
          }
        }
      TargetIds:
        - !GetAtt Organization.RootId

Outputs:
  OrganizationId:
    Description: Organization ID
    Value: !Ref Organization

  DevelopmentOUId:
    Description: 開発用 OU ID
    Value: !Ref DevelopmentOU

  ProductionOUId:
    Description: 本番用 OU ID
    Value: !Ref ProductionOU
