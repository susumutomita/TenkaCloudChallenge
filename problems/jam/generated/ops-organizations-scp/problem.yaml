# TenkaCloud 統一問題フォーマット
# 問題ID: ops-organizations-scp
# タイプ: GAMEDAY（構築型）

id: ops-organizations-scp
title: Organizations SCP によるアカウントガバナンス
type: gameday
category: operations
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - organizations
    - scp
    - governance
    - ou
    - policy
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、マルチアカウント環境の
    ガバナンスポリシーを構築する任務を与えられました。

    ## 背景
    開発チームが自由にリソースを作成できる環境では、コスト超過や
    セキュリティリスクが発生します。SCP でガードレールを設定し、
    禁止アクションを組織レベルで制御する必要があります。

    ## あなたのミッション
    Organizations と SCP を構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **Organization**: AWS Organization を作成する（模擬）
    2. **OU**: 開発用と本番用の OU を作成する
    3. **SCP（リージョン制限）**: 許可リージョンを制限する SCP を作成する
    4. **SCP（サービス制限）**: 高額サービスの使用を制限する SCP を作成する
    5. **タグポリシー**: 必須タグを強制するタグポリシーを作成する

  objectives:
    - AWS Organization を作成する
    - 開発用と本番用の OU を構成する
    - リージョン制限 SCP を作成する
    - サービス制限 SCP を作成する
    - 必須タグを強制するタグポリシーを作成する

  hints:
    - "AWS::Organizations::Organization でオーガニゼーションを作成できます"
    - "AWS::Organizations::OrganizationalUnit で OU を作成します"
    - "AWS::Organizations::Policy で SCP を定義します"
    - "Condition の aws:RequestedRegion でリージョンを制限できます"

  prerequisites:
    - AWS Organizations の基本的な知識
    - SCP の概念理解
    - IAM ポリシーの書き方

  estimatedTime: 45

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-organizations-scp.yaml
      parameters:
        EnvironmentPrefix: tenka-org

    local:
      type: cloudformation
      path: ./templates/aws/ops-organizations-scp.yaml
      parameters:
        EnvironmentPrefix: tenka-org-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Organization
      description: AWS Organization が作成されている
      weight: 15
      maxPoints: 15

    - name: OU
      description: 開発用と本番用の OU が作成されている
      weight: 20
      maxPoints: 20

    - name: SCP リージョン制限
      description: 許可リージョンを制限する SCP が作成されている
      weight: 25
      maxPoints: 25

    - name: SCP サービス制限
      description: 高額サービスの使用を制限する SCP が作成されている
      weight: 25
      maxPoints: 25

    - name: タグポリシー
      description: 必須タグを強制するタグポリシーが作成されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
