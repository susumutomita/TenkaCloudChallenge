AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: GuardDuty 脅威検知 + 自動対応（正解テンプレート）
  GuardDuty、EventBridge、Lambda 自動対応、SNS 通知、S3 アーカイブを含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-guardduty
    Description: 環境名プレフィックス

Resources:
  # --- GuardDuty ディテクター ---
  Detector:
    Type: AWS::GuardDuty::Detector
    Properties:
      Enable: true
      FindingPublishingFrequency: FIFTEEN_MINUTES
      DataSources:
        S3Logs:
          Enable: true
        Kubernetes:
          AuditLogs:
            Enable: true

  # --- 隔離用セキュリティグループ ---
  IsolationSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Isolation SG - no inbound/outbound
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-isolation-sg"

  # --- Lambda ロール ---
  ResponseLambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-response-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: EC2IsolationPolicy
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - ec2:DescribeInstances
                  - ec2:DescribeSecurityGroups
                  - ec2:ModifyInstanceAttribute
                  - ec2:CreateTags
                Resource: "*"
              - Effect: Allow
                Action: sns:Publish
                Resource: !Ref AlertTopic

  # --- 自動対応 Lambda ---
  ResponseFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentName}-auto-response"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt ResponseLambdaRole.Arn
      Timeout: 60
      Environment:
        Variables:
          ISOLATION_SG_ID: !GetAtt IsolationSecurityGroup.GroupId
          ALERT_TOPIC_ARN: !Ref AlertTopic
      Code:
        ZipFile: |
          import json
          import boto3
          import os
          def handler(event, context):
              detail = event.get('detail', {})
              resource = detail.get('resource', {})
              instance_details = resource.get('instanceDetails', {})
              instance_id = instance_details.get('instanceId')
              if not instance_id:
                  print('No instance ID found in finding')
                  return
              ec2 = boto3.client('ec2')
              isolation_sg = os.environ['ISOLATION_SG_ID']
              ec2.modify_instance_attribute(
                  InstanceId=instance_id,
                  Groups=[isolation_sg]
              )
              ec2.create_tags(
                  Resources=[instance_id],
                  Tags=[{'Key': 'SecurityStatus', 'Value': 'Isolated'}]
              )
              sns = boto3.client('sns')
              sns.publish(
                  TopicArn=os.environ['ALERT_TOPIC_ARN'],
                  Subject=f'EC2 Instance Isolated: {instance_id}',
                  Message=json.dumps(detail, default=str, indent=2)
              )
              return {'statusCode': 200, 'instanceId': instance_id}

  # --- SNS 通知 ---
  AlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentName}-security-alerts"

  # --- EventBridge ルール（High/Critical）---
  HighSeverityRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentName}-high-severity"
      EventPattern:
        source:
          - aws.guardduty
        detail-type:
          - "GuardDuty Finding"
        detail:
          severity:
            - numeric:
                - ">="
                - 7
      Targets:
        - Arn: !GetAtt ResponseFunction.Arn
          Id: AutoResponse
        - Arn: !Ref AlertTopic
          Id: SNSNotification

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref ResponseFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt HighSeverityRule.Arn

  EventBridgeToSNSPolicy:
    Type: AWS::SNS::TopicPolicy
    Properties:
      Topics:
        - !Ref AlertTopic
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowEventBridge
            Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sns:Publish
            Resource: !Ref AlertTopic

  # --- S3 アーカイブバケット ---
  FindingsBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-findings-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: ArchiveOldFindings
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90

Outputs:
  DetectorId:
    Description: GuardDuty ディテクター ID
    Value: !Ref Detector

  AlertTopicArn:
    Description: アラートトピック ARN
    Value: !Ref AlertTopic

  ResponseFunctionArn:
    Description: 自動対応 Lambda ARN
    Value: !GetAtt ResponseFunction.Arn

  IsolationSGId:
    Description: 隔離用 SG ID
    Value: !GetAtt IsolationSecurityGroup.GroupId

  FindingsBucketName:
    Description: 検出結果アーカイブバケット名
    Value: !Ref FindingsBucket
