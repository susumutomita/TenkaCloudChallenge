# TenkaCloud 統一問題フォーマット
# 問題ID: arch-sqs-queue-config
# タイプ: GAMEDAY（構築型）

id: arch-sqs-queue-config
title: SQS キュー設計（Standard + DLQ）
type: gameday
category: architecture
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - sqs
    - dead-letter-queue
    - message-queue
    - decoupling
    - encryption
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、マイクロサービス間の
    非同期メッセージングを設計する任務を与えられました。

    ## 背景
    注文処理システムで、注文受付サービスから在庫管理サービスへの
    非同期通信が必要です。処理失敗時のメッセージ損失を防ぐため、
    デッドレターキュー（DLQ）の設定が必須とされています。

    ## あなたのミッション
    以下の要件を満たす SQS キュー構成を構築してください。

    ### 要件
    1. **メインキュー**: Standard キューを作成し、暗号化を有効にする
    2. **デッドレターキュー**: DLQ を作成し、メインキューに関連付ける
    3. **リドライブポリシー**: 最大受信回数 3 回で DLQ に移動する設定を行う
    4. **アクセスポリシー**: 特定の IAM ロールからのみ送受信を許可するキューポリシーを設定する

  objectives:
    - SSE-SQS 暗号化付きの Standard キューを作成する
    - DLQ を作成し、RedrivePolicy で関連付ける
    - maxReceiveCount を 3 に設定する
    - キューポリシーで特定ロールのみアクセスを許可する

  hints:
    - "SQS の暗号化は SqsManagedSseEnabled で有効にできます"
    - "RedrivePolicy は JSON 文字列で deadLetterTargetArn と maxReceiveCount を指定します"
    - "QueuePolicy でアクセス制御を行います"
    - "DLQ にも暗号化を設定することを忘れないでください"

  prerequisites:
    - AWS の基本的な知識
    - SQS の基本概念
    - CloudFormation の基本的な知識

  estimatedTime: 25

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-sqs-queue-config.yaml
      parameters:
        EnvironmentName: tenka-sqs

    local:
      type: cloudformation
      path: ./templates/aws/arch-sqs-queue-config.yaml
      parameters:
        EnvironmentName: tenka-sqs-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: メインキュー作成 + 暗号化
      description: Standard キューが作成され、SSE-SQS 暗号化が有効になっている
      weight: 30
      maxPoints: 30

    - name: デッドレターキュー
      description: DLQ が作成され、暗号化が有効になっている
      weight: 20
      maxPoints: 20

    - name: リドライブポリシー
      description: メインキューに RedrivePolicy が設定され、maxReceiveCount が 3 になっている
      weight: 25
      maxPoints: 25

    - name: アクセスポリシー
      description: キューポリシーで特定 IAM ロールからのみアクセスが許可されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
