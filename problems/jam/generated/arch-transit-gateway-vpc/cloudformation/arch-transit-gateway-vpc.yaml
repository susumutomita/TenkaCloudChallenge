AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Transit Gateway マルチ VPC 接続（正解テンプレート）
  3 VPC のハブ&スポーク接続、ネットワーク分離を含む Transit Gateway 構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-tgw
    Description: 環境名プレフィックス

Resources:
  # ============================================================
  # VPC 定義（3 VPC）
  # ============================================================
  ProdVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.1.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-prod-vpc"

  DevVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.2.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dev-vpc"

  SharedVPC:
    Type: AWS::EC2::VPC
    Properties:
      CidrBlock: "10.0.0.0/16"
      EnableDnsSupport: true
      EnableDnsHostnames: true
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-shared-vpc"

  # --- サブネット（各 VPC に 1 つずつ簡略化）---
  ProdSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref ProdVPC
      CidrBlock: "10.1.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-prod-subnet"

  DevSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref DevVPC
      CidrBlock: "10.2.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dev-subnet"

  SharedSubnet:
    Type: AWS::EC2::Subnet
    Properties:
      VpcId: !Ref SharedVPC
      CidrBlock: "10.0.1.0/24"
      AvailabilityZone: !Select [0, !GetAZs ""]
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-shared-subnet"

  # ============================================================
  # Transit Gateway
  # ============================================================
  TransitGateway:
    Type: AWS::EC2::TransitGateway
    Properties:
      Description: !Sub "${EnvironmentName} Hub Transit Gateway"
      DnsSupport: enable
      VpnEcmpSupport: enable
      DefaultRouteTableAssociation: disable
      DefaultRouteTablePropagation: disable
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-tgw"

  # --- VPC アタッチメント ---
  ProdAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref ProdVPC
      SubnetIds:
        - !Ref ProdSubnet
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-prod-attachment"

  DevAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref DevVPC
      SubnetIds:
        - !Ref DevSubnet
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dev-attachment"

  SharedAttachment:
    Type: AWS::EC2::TransitGatewayAttachment
    Properties:
      TransitGatewayId: !Ref TransitGateway
      VpcId: !Ref SharedVPC
      SubnetIds:
        - !Ref SharedSubnet
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-shared-attachment"

  # ============================================================
  # Transit Gateway ルートテーブル（ネットワーク分離）
  # ============================================================
  # 本番用ルートテーブル：共有 VPC のみ到達可能
  ProdRouteTable:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-prod-rt"

  ProdRTAssociation:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref ProdAttachment
      TransitGatewayRouteTableId: !Ref ProdRouteTable

  ProdToSharedPropagation:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref SharedAttachment
      TransitGatewayRouteTableId: !Ref ProdRouteTable

  # 開発用ルートテーブル：共有 VPC のみ到達可能
  DevRouteTable:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dev-rt"

  DevRTAssociation:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref DevAttachment
      TransitGatewayRouteTableId: !Ref DevRouteTable

  DevToSharedPropagation:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref SharedAttachment
      TransitGatewayRouteTableId: !Ref DevRouteTable

  # 共有用ルートテーブル：全 VPC に到達可能
  SharedRouteTable:
    Type: AWS::EC2::TransitGatewayRouteTable
    Properties:
      TransitGatewayId: !Ref TransitGateway
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-shared-rt"

  SharedRTAssociation:
    Type: AWS::EC2::TransitGatewayRouteTableAssociation
    Properties:
      TransitGatewayAttachmentId: !Ref SharedAttachment
      TransitGatewayRouteTableId: !Ref SharedRouteTable

  SharedToProdPropagation:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref ProdAttachment
      TransitGatewayRouteTableId: !Ref SharedRouteTable

  SharedToDevPropagation:
    Type: AWS::EC2::TransitGatewayRouteTablePropagation
    Properties:
      TransitGatewayAttachmentId: !Ref DevAttachment
      TransitGatewayRouteTableId: !Ref SharedRouteTable

  # ============================================================
  # VPC ルートテーブル更新
  # ============================================================
  ProdVPCRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref ProdVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-prod-vpc-rt"

  ProdToTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: ProdAttachment
    Properties:
      RouteTableId: !Ref ProdVPCRouteTable
      DestinationCidrBlock: "10.0.0.0/8"
      TransitGatewayId: !Ref TransitGateway

  ProdSubnetRTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref ProdSubnet
      RouteTableId: !Ref ProdVPCRouteTable

  DevVPCRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref DevVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-dev-vpc-rt"

  DevToTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: DevAttachment
    Properties:
      RouteTableId: !Ref DevVPCRouteTable
      DestinationCidrBlock: "10.0.0.0/8"
      TransitGatewayId: !Ref TransitGateway

  DevSubnetRTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref DevSubnet
      RouteTableId: !Ref DevVPCRouteTable

  SharedVPCRouteTable:
    Type: AWS::EC2::RouteTable
    Properties:
      VpcId: !Ref SharedVPC
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-shared-vpc-rt"

  SharedToTGWRoute:
    Type: AWS::EC2::Route
    DependsOn: SharedAttachment
    Properties:
      RouteTableId: !Ref SharedVPCRouteTable
      DestinationCidrBlock: "10.0.0.0/8"
      TransitGatewayId: !Ref TransitGateway

  SharedSubnetRTAssociation:
    Type: AWS::EC2::SubnetRouteTableAssociation
    Properties:
      SubnetId: !Ref SharedSubnet
      RouteTableId: !Ref SharedVPCRouteTable

Outputs:
  TransitGatewayId:
    Description: Transit Gateway ID
    Value: !Ref TransitGateway

  ProdVPCId:
    Description: 本番 VPC ID
    Value: !Ref ProdVPC

  DevVPCId:
    Description: 開発 VPC ID
    Value: !Ref DevVPC

  SharedVPCId:
    Description: 共有 VPC ID
    Value: !Ref SharedVPC
