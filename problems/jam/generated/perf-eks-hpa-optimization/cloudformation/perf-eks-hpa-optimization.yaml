AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: EKS HPA/VPA とクラスターオートスケーリング（正解テンプレート）
  EKS クラスター、マネージドノードグループ、ログ、暗号化を構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-eks-perf
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト

Resources:
  EKSClusterRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-eks-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: eks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSClusterPolicy

  NodeGroupRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-node-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonEKSWorkerNodePolicy
        - arn:aws:iam::aws:policy/AmazonEKS_CNI_Policy
        - arn:aws:iam::aws:policy/AmazonEC2ContainerRegistryReadOnly

  ClusterSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} EKS Cluster SG"
      VpcId: !Ref VpcId

  SecretsKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${ProjectName} EKS Secrets encryption key"
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"

  # 要件1, 4, 5: EKS クラスター
  EKSCluster:
    Type: AWS::EKS::Cluster
    Properties:
      Name: !Sub "${ProjectName}-cluster"
      # 要件1: Kubernetes 1.29
      Version: "1.29"
      RoleArn: !GetAtt EKSClusterRole.Arn
      ResourcesVpcConfig:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref ClusterSecurityGroup
        EndpointPublicAccess: true
        EndpointPrivateAccess: true
      # 要件4: クラスターログ
      Logging:
        ClusterLogging:
          EnabledTypes:
            - Type: api
            - Type: audit
      # 要件5: Secrets 暗号化
      EncryptionConfig:
        - Provider:
            KeyArn: !GetAtt SecretsKey.Arn
          Resources:
            - secrets

  # 要件2, 3: マネージドノードグループ
  ManagedNodeGroup:
    Type: AWS::EKS::Nodegroup
    Properties:
      NodegroupName: !Sub "${ProjectName}-nodes"
      ClusterName: !Ref EKSCluster
      NodeRole: !GetAtt NodeGroupRole.Arn
      Subnets: !Ref SubnetIds
      InstanceTypes:
        - t3.large
      # 要件2: スケーリング設定
      ScalingConfig:
        MinSize: 2
        MaxSize: 10
        DesiredSize: 3
      # 要件3: 更新設定
      UpdateConfig:
        MaxUnavailable: 1
      AmiType: AL2_x86_64
      DiskSize: 50

Outputs:
  ClusterName:
    Description: EKS クラスター名
    Value: !Ref EKSCluster

  ClusterEndpoint:
    Description: EKS クラスターエンドポイント
    Value: !GetAtt EKSCluster.Endpoint

  NodeGroupName:
    Description: ノードグループ名
    Value: !Sub "${ProjectName}-nodes"
