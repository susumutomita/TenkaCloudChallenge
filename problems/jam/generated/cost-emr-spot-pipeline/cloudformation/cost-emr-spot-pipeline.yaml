AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: EMR Serverless によるバッチ処理コスト最適化（正解テンプレート）
  EMR Serverless、リソース制限、自動停止、S3 ライフサイクルを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-emr-cost
    Description: プロジェクト名のプレフィックス

Resources:
  # 要件1, 2, 3: EMR Serverless アプリケーション
  SparkApplication:
    Type: AWS::EMRServerless::Application
    Properties:
      Name: !Sub "${ProjectName}-spark-app"
      # 要件1: Spark タイプ
      Type: Spark
      ReleaseLabel: emr-7.0.0
      # 要件2: リソース制限
      MaximumCapacity:
        Cpu: 4 vCPU
        Memory: 16 GB
      # 要件3: 自動停止設定
      AutoStopConfiguration:
        Enabled: true
        IdleTimeoutMinutes: 15
      AutoStartConfiguration:
        Enabled: true

  # 要件4: 入力バケット（ライフサイクル付き）
  InputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-input-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      LifecycleConfiguration:
        Rules:
          - Id: GlacierMigration
            Status: Enabled
            Transitions:
              - StorageClass: GLACIER
                TransitionInDays: 90

  # 要件5: 出力バケット（Intelligent-Tiering）
  OutputBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-output-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      IntelligentTieringConfigurations:
        - Id: DefaultTiering
          Status: Enabled
          Tierings:
            - AccessTier: ARCHIVE_ACCESS
              Days: 90
            - AccessTier: DEEP_ARCHIVE_ACCESS
              Days: 180

  EMRExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-emr-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: emr-serverless.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: S3Access
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt InputBucket.Arn
                  - !Sub "${InputBucket.Arn}/*"
              - Effect: Allow
                Action:
                  - s3:PutObject
                  - s3:GetObject
                  - s3:ListBucket
                Resource:
                  - !GetAtt OutputBucket.Arn
                  - !Sub "${OutputBucket.Arn}/*"

Outputs:
  ApplicationId:
    Description: EMR Serverless アプリケーション ID
    Value: !Ref SparkApplication

  InputBucketName:
    Description: 入力 S3 バケット名
    Value: !Ref InputBucket

  OutputBucketName:
    Description: 出力 S3 バケット名
    Value: !Ref OutputBucket

  EMRExecutionRoleArn:
    Description: EMR 実行ロール ARN
    Value: !GetAtt EMRExecutionRole.Arn
