# TenkaCloud 統一問題フォーマット
# 問題ID: cost-dynamodb-capacity-optimization
# タイプ: GAMEDAY（構築型）

id: cost-dynamodb-capacity-optimization
title: DynamoDB キャパシティモードとインデックス最適化
type: gameday
category: cost
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - dynamodb
    - cost
    - capacity
    - on-demand
    - ttl
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはバックエンドエンジニアとして、DynamoDB テーブルのコスト最適化を担当しています。
    プロビジョンドモードで過剰なキャパシティが確保されたテーブルが放置されています。

    ## 背景
    AWS Cost Explorer の分析から以下が判明しました。
    - DynamoDB テーブルがプロビジョンドモード（RCU: 1000, WCU: 500）で運用中
    - 実際のトラフィックは平均 RCU: 50, WCU: 20 程度
    - 古いデータが大量に蓄積されているが TTL が未設定
    - 不要なグローバルセカンダリインデックス（GSI）が存在し追加コストが発生

    ## あなたのミッション
    DynamoDB テーブルを最適なキャパシティ設定で再構築してください。

    ### 要件
    1. **オンデマンドモード**: BillingMode を PAY_PER_REQUEST に設定する
    2. **TTL 有効化**: TimeToLiveSpecification を有効にし、属性名を expiresAt にする
    3. **テーブル暗号化**: SSESpecification を有効にする
    4. **ポイントインタイムリカバリ**: PointInTimeRecoverySpecification を有効にする

  objectives:
    - DynamoDB テーブルをオンデマンドモードで作成する
    - TTL を設定してデータライフサイクルを管理する
    - サーバーサイド暗号化を有効にする
    - ポイントインタイムリカバリを有効にする

  hints:
    - "BillingMode: PAY_PER_REQUEST でオンデマンドモードになります"
    - "TimeToLiveSpecification の AttributeName で TTL 属性を指定します"
    - "オンデマンドモードではスケーリング設定が不要で管理コストも削減できます"
    - "PointInTimeRecoverySpecification で PITR を有効化します"

  prerequisites:
    - DynamoDB の基本的な知識
    - CloudFormation の基本的な知識

  estimatedTime: 15

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-dynamodb-capacity-optimization.yaml
      parameters:
        ProjectName: tenka-ddb-cost

    local:
      type: cloudformation
      path: ./templates/aws/cost-dynamodb-capacity-optimization.yaml
      parameters:
        ProjectName: tenka-ddb-cost-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: オンデマンドモード
      description: BillingMode が PAY_PER_REQUEST に設定されている
      weight: 30
      maxPoints: 30

    - name: TTL 有効化
      description: TimeToLiveSpecification が有効で属性名が expiresAt
      weight: 30
      maxPoints: 30

    - name: テーブル暗号化
      description: SSESpecification が有効になっている
      weight: 20
      maxPoints: 20

    - name: ポイントインタイムリカバリ
      description: PointInTimeRecoverySpecification が有効になっている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
