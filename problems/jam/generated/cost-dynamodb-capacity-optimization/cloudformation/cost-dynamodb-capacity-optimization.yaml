AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: DynamoDB キャパシティモードとインデックス最適化（正解テンプレート）
  オンデマンドモード、TTL、暗号化、PITR を設定した DynamoDB テーブル。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-ddb-cost
    Description: プロジェクト名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  OptimizedTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-table"
      # 要件1: オンデマンドモード
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: pk
          AttributeType: S
        - AttributeName: sk
          AttributeType: S
      KeySchema:
        - AttributeName: pk
          KeyType: HASH
        - AttributeName: sk
          KeyType: RANGE
      # 要件2: TTL 有効化
      TimeToLiveSpecification:
        Enabled: true
        AttributeName: expiresAt
      # 要件3: サーバーサイド暗号化
      SSESpecification:
        SSEEnabled: true
      # 要件4: ポイントインタイムリカバリ
      PointInTimeRecoverySpecification:
        PointInTimeRecoveryEnabled: true

Outputs:
  TableName:
    Description: 最適化された DynamoDB テーブル名
    Value: !Ref OptimizedTable

  TableArn:
    Description: 最適化された DynamoDB テーブル ARN
    Value: !GetAtt OptimizedTable.Arn
