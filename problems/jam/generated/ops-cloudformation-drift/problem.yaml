# TenkaCloud 統一問題フォーマット
# 問題ID: ops-cloudformation-drift
# タイプ: GAMEDAY（構築型）

id: ops-cloudformation-drift
title: CloudFormation ドリフト検出と自動修復
type: gameday
category: operations
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - cloudformation
    - drift-detection
    - config-rules
    - lambda
    - eventbridge
    - remediation
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、IaC（Infrastructure as Code）の
    ドリフト検出と自動修復の仕組みを構築する任務を与えられました。

    ## 背景
    手動変更によるドリフトが発生すると、CloudFormation テンプレートと
    実際のリソース状態に差異が生じます。定期的にドリフトを検出し、
    自動的に修復する仕組みが必要です。

    ## あなたのミッション
    CloudFormation ドリフト検出と自動修復の仕組みを構築し、以下の要件をすべて満たしてください。

    ### 要件
    1. **Config ルール**: CloudFormation スタックのドリフト検出 Config ルールを作成する
    2. **EventBridge ルール**: 定期的にドリフト検出を実行するスケジュールルールを作成する
    3. **Lambda 関数**: ドリフト検出を開始する Lambda 関数を作成する
    4. **SNS 通知**: ドリフト検出時の通知を設定する
    5. **IAM ロール**: Lambda と Config に必要な IAM ロールを作成する

  objectives:
    - CloudFormation ドリフト検出の Config ルールを作成する
    - 定期実行の EventBridge スケジュールルールを構成する
    - ドリフト検出開始用 Lambda 関数を作成する
    - ドリフト検出時の SNS 通知を設定する
    - 必要な IAM ロールを作成する

  hints:
    - "マネージドルール cloudformation-stack-drift-detection-check を使用できます"
    - "Lambda で detect_stack_drift API を呼び出してドリフト検出を開始します"
    - "EventBridge で定期的に Lambda をトリガーできます"
    - "Config ルールの ComplianceChangeNotification で通知できます"

  prerequisites:
    - CloudFormation の知識
    - AWS Config の基本的な知識
    - Lambda と EventBridge の知識

  estimatedTime: 45

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-cloudformation-drift.yaml
      parameters:
        EnvironmentPrefix: tenka-drift

    local:
      type: cloudformation
      path: ./templates/aws/ops-cloudformation-drift.yaml
      parameters:
        EnvironmentPrefix: tenka-drift-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Config ルール
      description: CloudFormation ドリフト検出の Config ルールが作成されている
      weight: 25
      maxPoints: 25

    - name: EventBridge ルール
      description: 定期実行のスケジュールルールが作成されている
      weight: 20
      maxPoints: 20

    - name: Lambda 関数
      description: ドリフト検出開始用 Lambda 関数が作成されている
      weight: 25
      maxPoints: 25

    - name: SNS 通知
      description: ドリフト検出時の SNS 通知が設定されている
      weight: 15
      maxPoints: 15

    - name: IAM ロール
      description: 必要な IAM ロールが作成されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
