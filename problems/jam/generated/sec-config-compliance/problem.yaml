# TenkaCloud 統一問題フォーマット
# 問題ID: sec-config-compliance
# タイプ: GAMEDAY（構築型）

id: sec-config-compliance
title: AWS Config コンプライアンス監視
type: gameday
category: security
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - config
    - compliance
    - remediation
    - managed-rules
    - ssm-automation
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティエンジニアとして、AWS Config を使った
    コンプライアンス監視基盤を構築する任務を与えられました。

    ## 背景
    監査チームから、セキュリティ基準の準拠状況をリアルタイムで
    監視し、非準拠リソースを自動修復する仕組みの導入が求められています。

    ## あなたのミッション
    以下の要件を満たす AWS Config コンプライアンス構成を構築してください。

    ### 要件
    1. **Config レコーダー**: AWS Config の Configuration Recorder と配信チャネルを設定する
    2. **マネージドルール**: S3 暗号化、EBS 暗号化、RDS 暗号化のマネージドルールを作成する
    3. **自動修復**: 非準拠の S3 バケットに暗号化を自動適用する修復アクションを設定する
    4. **通知**: 非準拠検出時に SNS 通知を送信する EventBridge ルールを作成する

  objectives:
    - Config レコーダーと配信チャネルを設定する
    - 3 つのマネージドルールを作成する
    - S3 暗号化の自動修復アクションを設定する
    - EventBridge + SNS で非準拠通知を送信する

  hints:
    - "Config レコーダーには IAM ロールが必要で、S3 バケットへの配信を設定します"
    - "s3-bucket-server-side-encryption-enabled はマネージドルール ID です"
    - "RemediationConfiguration で SSM Automation ドキュメントを指定します"
    - "EventBridge のソースは aws.config、detail-type は Config Rules Compliance Change です"

  prerequisites:
    - AWS Config の基本概念
    - マネージドルールの知識
    - SSM Automation の基本知識
    - CloudFormation の基本的な知識

  estimatedTime: 45

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-config-compliance.yaml
      parameters:
        EnvironmentName: tenka-config

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Config レコーダー + 配信チャネル
      description: Configuration Recorder と配信チャネルが設定されている
      weight: 25
      maxPoints: 25

    - name: マネージドルール（3 つ）
      description: S3/EBS/RDS 暗号化のマネージドルールが作成されている
      weight: 25
      maxPoints: 25

    - name: 自動修復
      description: 非準拠 S3 バケットの暗号化自動修復が設定されている
      weight: 25
      maxPoints: 25

    - name: 非準拠通知
      description: EventBridge + SNS で非準拠検出時に通知が送信される
      weight: 25
      maxPoints: 25

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
