# TenkaCloud 統一問題フォーマット
# 問題ID: arch-route53-dns-records
# タイプ: GAMEDAY（構築型）

id: arch-route53-dns-records
title: Route 53 ホストゾーン + DNS レコード管理
type: gameday
category: architecture
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - route53
    - dns
    - hosted-zone
    - alias-record
    - health-check
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、社内プロジェクトの DNS 管理を
    Route 53 で構築する任務を与えられました。

    ## 背景
    新しいドメインを取得し、Web アプリケーションと API サーバーの
    DNS レコードを設定する必要があります。ヘルスチェックによる
    可用性監視も求められています。

    ## あなたのミッション
    以下の要件を満たす Route 53 の DNS 構成を構築してください。

    ### 要件
    1. **ホストゾーン**: パブリックホストゾーンを作成する
    2. **A レコード**: ALB の Alias レコードを設定する
    3. **CNAME レコード**: API サブドメインの CNAME レコードを設定する
    4. **ヘルスチェック**: HTTP ヘルスチェックを作成し、レコードに関連付ける

  objectives:
    - Route 53 パブリックホストゾーンを作成する
    - ALB を指す Alias A レコードを設定する
    - API サブドメインの CNAME レコードを設定する
    - HTTP ヘルスチェックを作成してレコードに関連付ける

  hints:
    - "HostedZone の Name はドメイン名の末尾にドットを付けます"
    - "Alias レコードは AliasTarget で HostedZoneId と DNSName を指定します"
    - "ALB の HostedZoneId はリージョンごとに決まっています"
    - "HealthCheck の Type は HTTP にし、ResourcePath を指定します"

  prerequisites:
    - DNS の基本概念（A レコード、CNAME、TTL）
    - Route 53 の基本知識
    - CloudFormation の基本的な知識

  estimatedTime: 25

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-route53-dns-records.yaml
      parameters:
        DomainName: example.tenkacloud.com

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: ホストゾーン作成
      description: パブリックホストゾーンが正しいドメイン名で作成されている
      weight: 25
      maxPoints: 25

    - name: Alias A レコード
      description: ALB を指す Alias A レコードが正しく設定されている
      weight: 25
      maxPoints: 25

    - name: CNAME レコード
      description: API サブドメインの CNAME レコードが正しく設定されている
      weight: 25
      maxPoints: 25

    - name: ヘルスチェック
      description: HTTP ヘルスチェックが作成され、レコードに関連付けられている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
