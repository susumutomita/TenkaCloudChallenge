AWSTemplateFormatVersion: "2010-09-09"
Description: >
  Security Battle Royale — per-team environment.
  Deploys: S3 static website, EC2 Flask API (intentionally vulnerable),
  RDS MySQL, SSM Parameter, Secrets Manager, IAM role.
  Stack name convention: UnicornRentals-{TeamName}

# ============================================================
# Parameters
# ============================================================
Parameters:
  TeamName:
    Type: String
    Description: "Team identifier (e.g. team01). Used as suffix for all resource names."
    AllowedPattern: "^[a-z0-9-]+$"
    ConstraintDescription: "Lowercase alphanumeric and hyphens only."

  SourceCodeBucket:
    Type: String
    Description: "S3 bucket name containing flask_api.zip (the applicationsourcecode bucket)."

  DBPassword:
    Type: String
    Default: "adminadmin"
    NoEcho: true
    Description: "Initial RDS MySQL password for the admin user."
    MinLength: 8

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: "VPC to deploy resources into."

  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: "First public subnet (used for EC2 and RDS)."

  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: "Second public subnet (used for RDS subnet group)."

  EC2InstanceType:
    Type: String
    Default: "t3.small"
    AllowedValues: ["t3.micro", "t3.small", "t3.medium", "t2.micro", "t2.small"]
    Description: "EC2 instance type for the Flask API server."

  DBInstanceClass:
    Type: String
    Default: "db.t3.micro"
    AllowedValues: ["db.t3.micro", "db.t3.small", "db.t3.medium"]
    Description: "RDS instance class."

# ============================================================
# Resources
# ============================================================
Resources:

  # ----------------------------------------------------------
  # S3 — Static Website
  # ----------------------------------------------------------
  WebsiteBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "unicornrentals-website-${TeamName}"
      WebsiteConfiguration:
        IndexDocument: index.html
        ErrorDocument: error.html
      PublicAccessBlockConfiguration:
        BlockPublicAcls: false
        BlockPublicPolicy: false
        IgnorePublicAcls: false
        RestrictPublicBuckets: false
      Tags:
        - Key: TeamName
          Value: !Ref TeamName
        - Key: Component
          Value: website

  WebsiteBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref WebsiteBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: PublicReadGetObject
            Effect: Allow
            Principal: "*"
            Action: "s3:GetObject"
            Resource: !Sub "arn:aws:s3:::unicornrentals-website-${TeamName}/*"

  # ----------------------------------------------------------
  # Security Groups
  # ----------------------------------------------------------
  APISecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "unicornrentals-api-sg-${TeamName}"
      GroupDescription: !Sub "Security group for Flask API EC2 (${TeamName})"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: "HTTP for Flask API"
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: "HTTPS"
      SecurityGroupEgress:
        - IpProtocol: "-1"
          CidrIp: "0.0.0.0/0"
          Description: "All outbound"
      Tags:
        - Key: TeamName
          Value: !Ref TeamName
        - Key: Name
          Value: !Sub "unicornrentals-api-sg-${TeamName}"

  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupName: !Sub "unicornrentals-db-sg-${TeamName}"
      GroupDescription: !Sub "Security group for RDS MySQL (${TeamName})"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          SourceSecurityGroupId: !Ref APISecurityGroup
          Description: "MySQL from EC2 only"
      Tags:
        - Key: TeamName
          Value: !Ref TeamName
        - Key: Name
          Value: !Sub "unicornrentals-db-sg-${TeamName}"

  # ----------------------------------------------------------
  # RDS MySQL
  # ----------------------------------------------------------
  DBSubnetGroup:
    Type: AWS::RDS::DBSubnetGroup
    Properties:
      DBSubnetGroupName: !Sub "unicornrentals-db-subnet-${TeamName}"
      DBSubnetGroupDescription: !Sub "Subnet group for RDS (${TeamName})"
      SubnetIds:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      Tags:
        - Key: TeamName
          Value: !Ref TeamName

  DBInstance:
    Type: AWS::RDS::DBInstance
    DeletionPolicy: Delete
    Properties:
      DBInstanceIdentifier: !Sub "cavs-db-${TeamName}"
      DBName: cavsdb
      DBInstanceClass: !Ref DBInstanceClass
      Engine: mysql
      EngineVersion: "8.0"
      MasterUsername: admin
      MasterUserPassword: !Ref DBPassword
      AllocatedStorage: "20"
      StorageType: gp2
      StorageEncrypted: false
      VPCSecurityGroups:
        - !Ref DBSecurityGroup
      DBSubnetGroupName: !Ref DBSubnetGroup
      PubliclyAccessible: false
      MultiAZ: false
      AutoMinorVersionUpgrade: false
      BackupRetentionPeriod: 0
      DeletionProtection: false
      Tags:
        - Key: TeamName
          Value: !Ref TeamName
        - Key: Name
          Value: !Sub "cavs-db-${TeamName}"

  # ----------------------------------------------------------
  # SSM Parameter — DB endpoint (team-namespaced)
  # ----------------------------------------------------------
  DBEndpointParameter:
    Type: AWS::SSM::Parameter
    Properties:
      Name: !Sub "/gameday/${TeamName}/CAVS_DB_ENDPOINT"
      Type: String
      Value: !GetAtt DBInstance.Endpoint.Address
      Description: !Sub "RDS endpoint for team ${TeamName}"
      Tags:
        TeamName: !Ref TeamName

  # ----------------------------------------------------------
  # Secrets Manager — DB password
  # ----------------------------------------------------------
  DBPasswordSecret:
    Type: AWS::SecretsManager::Secret
    Properties:
      Name: !Sub "DatabasePasswordSecret-${TeamName}"
      Description: !Sub "RDS admin password for team ${TeamName}"
      SecretString: !Ref DBPassword
      Tags:
        - Key: TeamName
          Value: !Ref TeamName

  # ----------------------------------------------------------
  # IAM — EC2 Role & Instance Profile
  # ----------------------------------------------------------
  EC2Role:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "api-ec2-role-${TeamName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AmazonSSMReadOnlyAccess
        - arn:aws:iam::aws:policy/SecretsManagerReadWrite
      Policies:
        - PolicyName: SourceCodeBucketAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: "s3:GetObject"
                Resource: !Sub "arn:aws:s3:::${SourceCodeBucket}/flask_api.zip"
      Tags:
        - Key: TeamName
          Value: !Ref TeamName

  EC2InstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "api-ec2-instance-profile-${TeamName}"
      Roles:
        - !Ref EC2Role

  # ----------------------------------------------------------
  # EC2 — Flask API Server
  # ----------------------------------------------------------
  EC2Instance:
    Type: AWS::EC2::Instance
    DependsOn:
      - DBInstance
      - DBEndpointParameter
    Properties:
      ImageId: !Sub "{{resolve:ssm:/aws/service/ami-amazon-linux-latest/al2023-ami-kernel-default-x86_64}}"
      InstanceType: !Ref EC2InstanceType
      SubnetId: !Ref PublicSubnet1
      SecurityGroupIds:
        - !Ref APISecurityGroup
      IamInstanceProfile: !Ref EC2InstanceProfile
      AssociatePublicIpAddress: true
      Tags:
        - Key: Name
          Value: "API Flask App"
        - Key: TeamName
          Value: !Ref TeamName
      UserData:
        Fn::Base64:
          !Sub |
            #!/bin/bash -xe
            exec > >(tee /var/log/userdata.log | logger -t user-data) 2>&1

            # Install dependencies
            dnf update -y
            dnf install -y python3-pip mariadb105 unzip

            python3 -m pip install flask boto3 PyMySQL requests

            # Download Flask API source
            mkdir -p /api
            aws s3 cp s3://${SourceCodeBucket}/flask_api.zip /api/flask_api.zip
            cd /api && unzip -o flask_api.zip
            chmod +700 /api/api.py

            # Wait for RDS to accept connections (up to 5 minutes)
            DB_ENDPOINT=$(aws ssm get-parameter \
              --name "/gameday/${TeamName}/CAVS_DB_ENDPOINT" \
              --with-decryption \
              --region ${AWS::Region} \
              --query 'Parameter.Value' \
              --output text)

            for i in $(seq 1 30); do
              if mysql -h "$DB_ENDPOINT" -u admin -p${DBPassword} -e "SELECT 1" cavsdb 2>/dev/null; then
                echo "DB is ready"
                break
              fi
              echo "Waiting for DB... attempt $i/30"
              sleep 10
            done

            # Initialize schema and seed unicorn data
            mysql -h "$DB_ENDPOINT" -u admin -p${DBPassword} <<'SQLEOF'
            CREATE DATABASE IF NOT EXISTS cavsdb;
            USE cavsdb;
            CREATE TABLE IF NOT EXISTS username (
              user_id  INT          NOT NULL,
              username VARCHAR(100) NOT NULL,
              password VARCHAR(100) NOT NULL,
              sex      VARCHAR(10),
              order_id INT          NOT NULL AUTO_INCREMENT,
              PRIMARY KEY (user_id),
              UNIQUE KEY uq_order (order_id)
            );
            INSERT IGNORE INTO username (user_id, username, password, sex) VALUES
              (1, 'Sparklewing', 'Sparklewing@123', 'Female'),
              (2, 'Thunderhoof', 'Thunderhoof@123', 'Male'),
              (3, 'Starlight',   'Starlight@123',   'Female'),
              (4, 'Blazemane',   'Blazemane@123',   'Male'),
              (5, 'Crystalhorn', 'Crystalhorn@123', 'Female');
            SQLEOF

            # Install Flask API as systemd service
            cat > /etc/systemd/system/flask-api.service <<'SVCEOF'
            [Unit]
            Description=Unicorn.Rentals Flask API
            After=network.target

            [Service]
            Type=simple
            WorkingDirectory=/api
            Environment=CAVS_SSM_PARAM_NAME=/gameday/${TeamName}/CAVS_DB_ENDPOINT
            ExecStart=/usr/bin/python3 /api/api.py
            Restart=always
            RestartSec=10
            StandardOutput=append:/api/output.log
            StandardError=append:/api/output.log

            [Install]
            WantedBy=multi-user.target
            SVCEOF

            systemctl daemon-reload
            systemctl enable flask-api
            systemctl start flask-api

            echo "Bootstrap complete."

# ============================================================
# Outputs
# ============================================================
Outputs:
  WebsiteURL:
    Description: "S3 static website URL"
    Value: !GetAtt WebsiteBucket.WebsiteURL

  WebsiteBucketName:
    Description: "S3 website bucket name (for uploading index.html)"
    Value: !Ref WebsiteBucket

  APIPublicIP:
    Description: "EC2 public IP of the Flask API"
    Value: !GetAtt EC2Instance.PublicIp

  APIURL:
    Description: "Flask API base URL"
    Value: !Sub "http://${EC2Instance.PublicIp}"

  APIStatusEndpoint:
    Description: "Auditor health check endpoint"
    Value: !Sub "http://${EC2Instance.PublicIp}/api/v1/apistatus"

  DBEndpoint:
    Description: "RDS MySQL endpoint"
    Value: !GetAtt DBInstance.Endpoint.Address

  StackName:
    Description: "CloudFormation stack name"
    Value: !Ref AWS::StackName
