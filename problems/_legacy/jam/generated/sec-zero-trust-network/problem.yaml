# TenkaCloud 統一問題フォーマット
# 問題ID: sec-zero-trust-network
# タイプ: GAMEDAY（構築型）

id: sec-zero-trust-network
title: ゼロトラストネットワーク設計
type: gameday
category: security
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - zero-trust
    - privatelink
    - vpc-endpoint
    - security-group
    - network-firewall
    - least-privilege
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはプリンシパルセキュリティアーキテクトとして、
    ゼロトラストアーキテクチャに基づくネットワーク設計を行う任務を与えられました。

    ## 背景
    すべてのサービス間通信を PrivateLink 経由にし、VPC エンドポイントで
    AWS サービスへのアクセスを制御する必要があります。
    Network Firewall でアウトバウンドトラフィックを検査し、
    不正な通信をブロックする仕組みも求められています。

    ## あなたのミッション
    以下の要件を満たすゼロトラストネットワークを構築してください。

    ### 要件
    1. **VPC エンドポイント**: S3、DynamoDB、SQS、SecretsManager の VPC エンドポイントを作成する
    2. **エンドポイントポリシー**: 各エンドポイントにリソース制限ポリシーを設定する
    3. **Network Firewall**: アウトバウンド DNS と HTTPS のドメインフィルタリングを設定する
    4. **セキュリティグループ**: 全通信をエンドポイント経由に制限する SG 設計
    5. **PrivateLink**: サービス間通信用の PrivateLink エンドポイントサービスを作成する
    6. **フローログ**: 全ネットワークフローを記録する

  objectives:
    - 4 つの VPC エンドポイントを作成する
    - エンドポイントポリシーでリソースを制限する
    - Network Firewall でドメインフィルタリングする
    - SG でエンドポイント通信のみ許可する
    - PrivateLink を作成する
    - フローログを有効にする

  hints:
    - "Gateway エンドポイント（S3, DynamoDB）と Interface エンドポイント（SQS, SecretsManager）を使い分けます"
    - "エンドポイントポリシーの Resource で特定リソースのみにアクセスを制限します"
    - "Network Firewall の RuleGroup で AllowDomainList にドメインを指定します"
    - "PrivateLink は AWS::EC2::VPCEndpointService で NLB を指定して作成します"

  prerequisites:
    - ゼロトラストアーキテクチャの深い理解
    - VPC エンドポイントの全種類の知識
    - Network Firewall の設定経験
    - PrivateLink の実装経験
    - CloudFormation の上級知識

  estimatedTime: 150

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-zero-trust-network.yaml
      parameters:
        EnvironmentName: tenka-zero-trust

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 45

scoring:
  type: api
  criteria:
    - name: VPC エンドポイント（4 サービス）
      description: S3、DynamoDB、SQS、SecretsManager の VPC エンドポイントが作成されている
      weight: 20
      maxPoints: 20

    - name: エンドポイントポリシー
      description: 各エンドポイントにリソース制限ポリシーが設定されている
      weight: 20
      maxPoints: 20

    - name: Network Firewall
      description: ドメインフィルタリングが設定され、不正な通信がブロックされている
      weight: 25
      maxPoints: 25

    - name: セキュリティグループ設計
      description: 全通信がエンドポイント経由に制限されている
      weight: 15
      maxPoints: 15

    - name: PrivateLink
      description: サービス間通信用の PrivateLink が作成されている
      weight: 10
      maxPoints: 10

    - name: フローログ
      description: 全ネットワークフローが記録されている
      weight: 10
      maxPoints: 10

  timeoutMinutes: 20
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
