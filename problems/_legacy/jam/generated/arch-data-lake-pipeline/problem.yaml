# TenkaCloud 統一問題フォーマット
# 問題ID: arch-data-lake-pipeline
# タイプ: GAMEDAY（構築型）

id: arch-data-lake-pipeline
title: データレイク + ETL パイプライン構成
type: gameday
category: architecture
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - s3
    - glue
    - athena
    - lake-formation
    - kinesis
    - data-lake
    - etl
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはデータアーキテクトとして、分析基盤のデータレイクを
    S3 + Glue + Athena で設計・構築する任務を与えられました。

    ## 背景
    アプリケーションから生成されるログデータとトランザクションデータを
    データレイクに集約し、Athena でアドホック分析を可能にする必要があります。
    データの取り込みには Kinesis Data Firehose を使い、
    Glue でスキーマ管理と ETL を行います。

    ## あなたのミッション
    以下の要件を満たすデータレイク基盤を構築してください。

    ### 要件
    1. **S3 データレイク**: Raw/Processed/Curated の 3 層バケット構成を作成する
    2. **Kinesis Data Firehose**: リアルタイムデータ取り込みパイプラインを作成し、Raw バケットに配信する
    3. **Glue データカタログ**: データベースとテーブルを定義し、スキーマを管理する
    4. **Glue ETL ジョブ**: Raw → Processed の変換ジョブを作成する
    5. **Athena ワークグループ**: クエリ結果の暗号化とスキャン量制限を設定する
    6. **Lake Formation**: データアクセス権限を Lake Formation で管理する

  objectives:
    - 3 層の S3 バケットを作成する
    - Kinesis Data Firehose を作成し Raw バケットに配信する
    - Glue データカタログにデータベースとテーブルを定義する
    - Glue ETL ジョブを作成する
    - Athena ワークグループを作成する
    - Lake Formation でアクセス権限を設定する

  hints:
    - "Firehose の Destination は ExtendedS3 を使い、プレフィックスで日付パーティションを設定します"
    - "Glue テーブルの StorageDescriptor で S3 ロケーションとカラムを定義します"
    - "Athena ワークグループの WorkGroupConfiguration で ResultConfiguration を設定します"
    - "Lake Formation の DataLakeSettings で管理者を設定します"

  prerequisites:
    - データレイクアーキテクチャの概念
    - S3、Glue、Athena の実務知識
    - Kinesis Data Firehose の基本知識
    - ETL の基本概念
    - CloudFormation の上級知識

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-data-lake-pipeline.yaml
      parameters:
        EnvironmentName: tenka-datalake

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: S3 3 層バケット構成
      description: Raw/Processed/Curated の 3 バケットが暗号化とバージョニング付きで作成されている
      weight: 15
      maxPoints: 15

    - name: Kinesis Data Firehose
      description: Firehose が作成され、Raw バケットに日付パーティション付きで配信設定されている
      weight: 20
      maxPoints: 20

    - name: Glue データカタログ
      description: データベースとテーブルが Glue データカタログに定義されている
      weight: 20
      maxPoints: 20

    - name: Glue ETL ジョブ
      description: Raw → Processed の ETL ジョブが作成されている
      weight: 20
      maxPoints: 20

    - name: Athena ワークグループ
      description: 暗号化とスキャン量制限が設定されたワークグループが作成されている
      weight: 15
      maxPoints: 15

    - name: Lake Formation 権限
      description: Lake Formation でデータアクセス権限が管理されている
      weight: 10
      maxPoints: 10

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
