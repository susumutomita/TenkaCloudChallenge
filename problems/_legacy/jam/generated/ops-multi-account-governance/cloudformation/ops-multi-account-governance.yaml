AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: マルチアカウントガバナンス（正解テンプレート）

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-governance
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
  NotificationEmail:
    Type: String
    Default: admin@example.com

Resources:
  # 要件1: Organization + OU
  Org:
    Type: AWS::Organizations::Organization
    Properties: { FeatureSet: ALL }
  SecurityOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties: { Name: Security, ParentId: !GetAtt Org.RootId }
  WorkloadsOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties: { Name: Workloads, ParentId: !GetAtt Org.RootId }
  SandboxOU:
    Type: AWS::Organizations::OrganizationalUnit
    Properties: { Name: Sandbox, ParentId: !GetAtt Org.RootId }

  # 要件2: SCP - リージョン制限
  RegionSCP:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-region-restrict"
      Type: SERVICE_CONTROL_POLICY
      Content: |
        {"Version":"2012-10-17","Statement":[{"Effect":"Deny","NotAction":["iam:*","organizations:*","sts:*","support:*"],"Resource":"*","Condition":{"StringNotEquals":{"aws:RequestedRegion":["ap-northeast-1","us-east-1"]}}}]}
      TargetIds: [!Ref WorkloadsOU, !Ref SandboxOU]

  # 要件2: SCP - ルートユーザー制限
  RootSCP:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-deny-root"
      Type: SERVICE_CONTROL_POLICY
      Content: |
        {"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":"*","Resource":"*","Condition":{"StringLike":{"aws:PrincipalArn":"arn:aws:iam::*:root"}}}]}
      TargetIds: [!Ref WorkloadsOU]

  # 要件2: SCP - サービス制限
  ServiceSCP:
    Type: AWS::Organizations::Policy
    Properties:
      Name: !Sub "${EnvironmentPrefix}-service-restrict"
      Type: SERVICE_CONTROL_POLICY
      Content: |
        {"Version":"2012-10-17","Statement":[{"Effect":"Deny","Action":["redshift:*","emr:*","sagemaker:CreateEndpoint"],"Resource":"*"}]}
      TargetIds: [!Ref SandboxOU]

  # 要件3: CloudTrail
  TrailBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentPrefix}-trail-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault: { SSEAlgorithm: AES256 }
      PublicAccessBlockConfiguration: { BlockPublicAcls: true, BlockPublicPolicy: true, IgnorePublicAcls: true, RestrictPublicBuckets: true }
  TrailBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref TrailBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - { Effect: Allow, Principal: { Service: cloudtrail.amazonaws.com }, Action: s3:GetBucketAcl, Resource: !GetAtt TrailBucket.Arn }
          - { Effect: Allow, Principal: { Service: cloudtrail.amazonaws.com }, Action: s3:PutObject, Resource: !Sub "${TrailBucket.Arn}/*" }
  OrgTrail:
    Type: AWS::CloudTrail::Trail
    DependsOn: TrailBucketPolicy
    Properties:
      TrailName: !Sub "${EnvironmentPrefix}-org-trail"
      IsLogging: true
      IsMultiRegionTrail: true
      IsOrganizationTrail: true
      S3BucketName: !Ref TrailBucket
      EnableLogFileValidation: true

  # 要件4: GuardDuty
  GuardDuty:
    Type: AWS::GuardDuty::Detector
    Properties: { Enable: true }

  # 要件6: バジェット
  MonthlyBudget:
    Type: AWS::Budgets::Budget
    Properties:
      Budget:
        BudgetName: !Sub "${EnvironmentPrefix}-monthly"
        BudgetLimit: { Amount: 10000, Unit: USD }
        TimeUnit: MONTHLY
        BudgetType: COST
      NotificationsWithSubscribers:
        - Notification: { NotificationType: ACTUAL, ComparisonOperator: GREATER_THAN, Threshold: 80 }
          Subscribers:
            - { SubscriptionType: EMAIL, Address: !Ref NotificationEmail }
        - Notification: { NotificationType: FORECASTED, ComparisonOperator: GREATER_THAN, Threshold: 100 }
          Subscribers:
            - { SubscriptionType: EMAIL, Address: !Ref NotificationEmail }

Outputs:
  OrganizationId:
    Value: !Ref Org
  TrailName:
    Value: !Sub "${EnvironmentPrefix}-org-trail"
