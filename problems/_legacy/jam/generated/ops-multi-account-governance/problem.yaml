# TenkaCloud 統一問題フォーマット
id: ops-multi-account-governance
title: マルチアカウントガバナンス（Organizations + Control Tower + SCP）
type: gameday
category: operations
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags: [organizations, control-tower, scp, guardduty, config, cloudtrail, governance]
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、エンタープライズ規模の
    マルチアカウントガバナンス基盤を構築する任務を与えられました。

    ## 背景
    50 以上のアカウントを持つ組織で、セキュリティベースライン、
    コスト管理、コンプライアンスを一元的に管理する必要があります。

    ## あなたのミッション
    ### 要件
    1. **Organizations**: Organization と OU 階層を作成する
    2. **SCP**: リージョン制限、サービス制限、ルートユーザー制限の SCP を作成する
    3. **CloudTrail**: 組織全体の証跡を作成する
    4. **GuardDuty**: 組織全体の脅威検出を有効化する
    5. **Config**: 組織全体の Config ルールをデプロイする
    6. **バジェット**: 組織レベルのコストアラートを設定する

  objectives:
    - Organization と OU 階層を作成する
    - 3 種類の SCP を作成しアタッチする
    - 組織 CloudTrail 証跡を作成する
    - 組織 GuardDuty を有効化する
    - 組織 Config ルールをデプロイする
    - Budgets コストアラートを設定する
  hints:
    - "Organizations の OU 階層: Root → Security, Workloads(Dev, Prod), Sandbox"
    - "GuardDuty の委任管理者でセキュリティアカウントに管理を委任できます"
    - "AWS::Budgets::Budget で組織レベルのバジェットを設定できます"
  prerequisites: [Organizations の深い知識, セキュリティベースライン設計, コスト管理の知識]
  estimatedTime: 120

deployment:
  providers: [aws, local]
  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-multi-account-governance.yaml
      parameters: { EnvironmentPrefix: tenka-governance }
    local:
      type: cloudformation
      path: ./templates/aws/ops-multi-account-governance.yaml
      parameters: { EnvironmentPrefix: tenka-governance-local }
  regions:
    aws: [ap-northeast-1, us-east-1]
  timeout: 45

scoring:
  type: api
  criteria:
    - { name: Organizations, description: Organization と OU 階層が作成されている, weight: 15, maxPoints: 15 }
    - { name: SCP, description: 3 種類の SCP が作成されアタッチされている, weight: 25, maxPoints: 25 }
    - { name: CloudTrail, description: 組織全体の CloudTrail 証跡が作成されている, weight: 15, maxPoints: 15 }
    - { name: GuardDuty, description: 組織全体の GuardDuty が有効化されている, weight: 15, maxPoints: 15 }
    - { name: Config, description: 組織 Config ルールがデプロイされている, weight: 15, maxPoints: 15 }
    - { name: バジェット, description: 組織レベルのコストアラートが設定されている, weight: 15, maxPoints: 15 }
  timeoutMinutes: 10
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
