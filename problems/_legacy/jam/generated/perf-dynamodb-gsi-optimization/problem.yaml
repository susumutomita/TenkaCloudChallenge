# TenkaCloud 統一問題フォーマット
# 問題ID: perf-dynamodb-gsi-optimization
# タイプ: GAMEDAY（構築型）

id: perf-dynamodb-gsi-optimization
title: DynamoDB グローバルセカンダリインデックスの最適設計
type: gameday
category: performance
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - dynamodb
    - performance
    - gsi
    - index
    - query-optimization
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはバックエンドエンジニアとして、E コマースアプリケーションの
    DynamoDB テーブル設計を最適化する必要があります。フルスキャンによる
    クエリパフォーマンスの劣化が問題になっています。

    ## 背景
    パフォーマンス監視から以下が判明しました。
    - 「ユーザー ID で注文を検索」するクエリは高速（パーティションキーで検索）
    - 「ステータスで注文を検索」するクエリがフルスキャンで P99 が 5 秒超過
    - 「作成日で注文をソート」するクエリもフルスキャンになっている
    - GSI（グローバルセカンダリインデックス）が未設定

    ## あなたのミッション
    DynamoDB テーブルに適切な GSI を設計し、クエリパフォーマンスを改善してください。

    ### 要件
    1. **メインテーブル**: パーティションキー userId、ソートキー orderId のテーブルを作成する
    2. **ステータス GSI**: パーティションキー status、ソートキー createdAt の GSI を作成する
    3. **投影設定**: GSI の ProjectionType を INCLUDE にし、amount と itemCount を含める
    4. **オンデマンドモード**: BillingMode を PAY_PER_REQUEST に設定する

  objectives:
    - DynamoDB テーブルを適切なキー設計で作成する
    - ステータス検索用の GSI を作成する
    - GSI の投影を必要な属性のみに限定する
    - オンデマンドモードで構成する

  hints:
    - "GlobalSecondaryIndexes で GSI を定義します"
    - "Projection の ProjectionType で投影タイプを指定します"
    - "INCLUDE 投影で必要な属性のみを GSI にコピーしストレージとスループットを節約します"
    - "NonKeyAttributes で投影する追加属性を指定します"

  prerequisites:
    - DynamoDB の基本的な知識
    - インデックス設計の理解
    - CloudFormation の基本的な知識

  estimatedTime: 20

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-dynamodb-gsi-optimization.yaml
      parameters:
        ProjectName: tenka-ddb-perf

    local:
      type: cloudformation
      path: ./templates/aws/perf-dynamodb-gsi-optimization.yaml
      parameters:
        ProjectName: tenka-ddb-perf-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: メインテーブル
      description: userId (HASH) + orderId (RANGE) のキー設計になっている
      weight: 25
      maxPoints: 25

    - name: ステータス GSI
      description: status (HASH) + createdAt (RANGE) の GSI が存在する
      weight: 30
      maxPoints: 30

    - name: 投影設定
      description: ProjectionType が INCLUDE で amount と itemCount が含まれている
      weight: 25
      maxPoints: 25

    - name: オンデマンドモード
      description: BillingMode が PAY_PER_REQUEST に設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
