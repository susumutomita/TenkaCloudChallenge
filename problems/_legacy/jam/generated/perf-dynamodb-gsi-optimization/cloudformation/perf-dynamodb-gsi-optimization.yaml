AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: DynamoDB グローバルセカンダリインデックスの最適設計（正解テンプレート）
  GSI、投影設定、オンデマンドモードを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-ddb-perf
    Description: プロジェクト名のプレフィックス

Resources:
  # 要件1, 2, 3, 4: DynamoDB テーブル + GSI
  OrdersTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${ProjectName}-orders"
      # 要件4: オンデマンドモード
      BillingMode: PAY_PER_REQUEST
      # 要件1: メインテーブルのキー設計
      AttributeDefinitions:
        - AttributeName: userId
          AttributeType: S
        - AttributeName: orderId
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: createdAt
          AttributeType: S
      KeySchema:
        - AttributeName: userId
          KeyType: HASH
        - AttributeName: orderId
          KeyType: RANGE
      # 要件2, 3: ステータス GSI
      GlobalSecondaryIndexes:
        - IndexName: status-createdAt-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: createdAt
              KeyType: RANGE
          Projection:
            ProjectionType: INCLUDE
            NonKeyAttributes:
              - amount
              - itemCount

Outputs:
  TableName:
    Description: DynamoDB テーブル名
    Value: !Ref OrdersTable

  TableArn:
    Description: DynamoDB テーブル ARN
    Value: !GetAtt OrdersTable.Arn

  GSIName:
    Description: GSI 名
    Value: status-createdAt-index
