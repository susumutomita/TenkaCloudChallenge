# TenkaCloud 統一問題フォーマット
# 問題ID: rel-sqs-dlq
# タイプ: GAMEDAY（構築型）

id: rel-sqs-dlq
title: SQS デッドレターキューによるメッセージ信頼性確保
type: gameday
category: reliability
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - sqs
    - dead-letter-queue
    - message-reliability
    - retry
    - encryption
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、非同期メッセージ処理の
    信頼性を確保する仕組みを構築する任務を与えられました。

    ## 背景
    注文処理システムでは、処理失敗したメッセージが消失すると
    注文の欠落につながります。デッドレターキューを使い、
    失敗メッセージを安全に隔離して後から再処理できる仕組みが必要です。

    ## あなたのミッション
    SQS キューとデッドレターキューを構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **メインキュー**: SQS 標準キューを作成し、メッセージ保持期間を設定する
    2. **デッドレターキュー**: 失敗メッセージを格納する DLQ を作成する
    3. **リドライブポリシー**: メインキューに DLQ へのリドライブポリシーを設定する（最大受信回数 3 回）
    4. **暗号化**: 両方のキューで SSE-SQS 暗号化を有効化する

  objectives:
    - SQS 標準キューを作成する
    - デッドレターキューを作成する
    - リドライブポリシーを最大受信回数 3 回で設定する
    - 両キューで暗号化を有効化する

  hints:
    - "AWS::SQS::Queue でキューを作成できます"
    - "RedrivePolicy プロパティで DLQ を指定します"
    - "maxReceiveCount でリトライ回数を制御します"
    - "SqsManagedSseEnabled で SSE-SQS 暗号化を有効化できます"

  prerequisites:
    - SQS の基本的な知識
    - メッセージキューの概念理解

  estimatedTime: 25

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rel-sqs-dlq.yaml
      parameters:
        EnvironmentPrefix: tenka-sqs

    local:
      type: cloudformation
      path: ./templates/aws/rel-sqs-dlq.yaml
      parameters:
        EnvironmentPrefix: tenka-sqs-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: メインキュー
      description: SQS 標準キューが作成されメッセージ保持期間が設定されている
      weight: 25
      maxPoints: 25

    - name: デッドレターキュー
      description: デッドレターキューが作成されている
      weight: 25
      maxPoints: 25

    - name: リドライブポリシー
      description: 最大受信回数 3 回のリドライブポリシーが設定されている
      weight: 30
      maxPoints: 30

    - name: 暗号化
      description: 両キューで SSE-SQS 暗号化が有効化されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
