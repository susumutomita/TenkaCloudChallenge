# TenkaCloud 統一問題フォーマット
# 問題ID: cost-serverless-api-optimization
# タイプ: GAMEDAY（構築型）

id: cost-serverless-api-optimization
title: サーバーレス API 全体のコスト最適化
type: gameday
category: cost
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - api-gateway
    - lambda
    - dynamodb
    - sqs
    - cost
    - serverless
    - http-api
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはサーバーレスアーキテクトとして、マイクロサービス群のコスト最適化を統括しています。
    REST API、Lambda、DynamoDB、SQS で構成されたサーバーレスアプリケーションの
    各レイヤーで個別にコスト最適化が必要です。

    ## 背景
    3 か月間のコスト分析から以下のボトルネックが特定されました。
    - API Gateway REST API を使用しているが、HTTP API への移行で最大 71% のコスト削減可能
    - Lambda 関数が x86_64 + 高メモリで動作し、arm64 + 適正メモリで削減可能
    - DynamoDB がプロビジョンドモードで過剰キャパシティ
    - SQS Standard キューのポーリングが非効率（空ポーリングが多発）
    - CloudWatch Logs の保持期間が無制限で蓄積が増大

    ## あなたのミッション
    HTTP API、Lambda（arm64）、DynamoDB（オンデマンド）、SQS（ロングポーリング）を
    組み合わせたコスト最適化サーバーレスアーキテクチャを構築してください。

    ### 要件
    1. **HTTP API**: API Gateway HTTP API（V2）を使用する
    2. **Lambda 最適化**: arm64、メモリ 128 MB、タイムアウト 10 秒で構成する
    3. **DynamoDB オンデマンド**: PAY_PER_REQUEST モードで TTL を有効にする
    4. **SQS ロングポーリング**: ReceiveMessageWaitTimeSeconds を 20 秒に設定する
    5. **ログ保持期間**: CloudWatch Logs の RetentionInDays を 14 日に設定する

  objectives:
    - API Gateway HTTP API を作成する
    - Lambda 関数を arm64 でコスト最適化する
    - DynamoDB をオンデマンドモードで構築する
    - SQS のロングポーリングでコスト効率を改善する
    - ログ保持期間を制限してストレージコストを削減する

  hints:
    - "AWS::ApiGatewayV2::Api で HTTP API を作成します"
    - "Lambda の Architectures で arm64 を指定します"
    - "SQS の ReceiveMessageWaitTimeSeconds で最大 20 秒のロングポーリングが可能です"
    - "CloudWatch Logs の RetentionInDays でログ保持期間を制限します"
    - "HTTP API は REST API より最大 71% 安価です"

  prerequisites:
    - API Gateway HTTP API の知識
    - Lambda の構成経験
    - DynamoDB と SQS の運用経験
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-serverless-api-optimization.yaml
      parameters:
        ProjectName: tenka-serverless-cost

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: HTTP API
      description: API Gateway HTTP API（V2）が作成されている
      weight: 20
      maxPoints: 20

    - name: Lambda 最適化
      description: arm64、128 MB、タイムアウト 10 秒で構成されている
      weight: 25
      maxPoints: 25

    - name: DynamoDB オンデマンド
      description: PAY_PER_REQUEST モードで TTL が有効
      weight: 20
      maxPoints: 20

    - name: SQS ロングポーリング
      description: ReceiveMessageWaitTimeSeconds が 20 秒に設定されている
      weight: 20
      maxPoints: 20

    - name: ログ保持期間
      description: RetentionInDays が 14 日に設定されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
