# TenkaCloud 統一問題フォーマット
# 問題ID: perf-kinesis-enhanced-fanout
# タイプ: GAMEDAY（構築型）

id: perf-kinesis-enhanced-fanout
title: Kinesis Enhanced Fan-Out による低レイテンシストリーム処理
type: gameday
category: performance
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - kinesis
    - performance
    - enhanced-fan-out
    - consumer
    - streaming
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはリアルタイムデータ処理基盤のアーキテクトとして、Kinesis Data Streams の
    コンシューマーレイテンシ改善を担当しています。複数のコンシューマーが
    同一ストリームを読み取っており、共有スループットの制限でレイテンシが悪化しています。

    ## 背景
    パフォーマンス分析の結果から以下が判明しました。
    - 3 つのコンシューマーが同一シャードから読み取り、各コンシューマーの実効スループットが 600 KB/sec に低下
    - 通常の GetRecords ポーリングでは最大 200ms のレイテンシが発生
    - Enhanced Fan-Out（EFO）を使えば各コンシューマーが専用 2 MB/sec を獲得可能
    - EFO はプッシュ型で 70ms 以下のレイテンシを実現可能

    ## あなたのミッション
    Kinesis Data Streams に Enhanced Fan-Out コンシューマーを設定し、低レイテンシの処理を実現してください。

    ### 要件
    1. **Kinesis Stream**: 4 シャードのプロビジョンドモードストリームを作成する
    2. **EFO コンシューマー**: 2 つの Enhanced Fan-Out コンシューマーを登録する
    3. **ストリーム暗号化**: KMS 暗号化を有効にする
    4. **保持期間**: データ保持期間を 168 時間（7 日）に設定する

  objectives:
    - Kinesis Data Streams を作成する
    - Enhanced Fan-Out コンシューマーを登録する
    - ストリーム暗号化を設定する
    - データ保持期間を延長する

  hints:
    - "AWS::Kinesis::StreamConsumer で EFO コンシューマーを登録します"
    - "EFO コンシューマーは各シャードから専用 2 MB/sec のスループットを獲得します"
    - "StreamEncryption で KMS 暗号化を有効にします"
    - "RetentionPeriodHours でデータ保持期間を設定します"

  prerequisites:
    - Kinesis Data Streams の運用経験
    - Enhanced Fan-Out の理解
    - CloudFormation の実務経験

  estimatedTime: 50

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-kinesis-enhanced-fanout.yaml
      parameters:
        ProjectName: tenka-kinesis-perf

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Kinesis Stream
      description: 4 シャードのストリームが作成されている
      weight: 25
      maxPoints: 25

    - name: EFO コンシューマー
      description: 2 つの Enhanced Fan-Out コンシューマーが登録されている
      weight: 30
      maxPoints: 30

    - name: ストリーム暗号化
      description: KMS 暗号化が有効になっている
      weight: 20
      maxPoints: 20

    - name: 保持期間
      description: データ保持期間が 168 時間（7 日）に設定されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
