# TenkaCloud 統一問題フォーマット
id: ops-incident-response-automation
title: インシデントレスポンス自動化
type: gameday
category: operations
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags: [incident-manager, step-functions, lambda, eventbridge, sns, ssm, runbook]
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、セキュリティインシデントの
    検出から対応までを自動化する仕組みを構築する任務を与えられました。

    ## 背景
    GuardDuty の脅威検出をトリガーに、自動的にインシデント対応を開始し、
    証拠保全、影響範囲の封じ込め、チームへの通知を自動化します。

    ## あなたのミッション
    ### 要件
    1. **EventBridge ルール**: GuardDuty の HIGH/CRITICAL 検出をトリガーとするルールを作成する
    2. **Step Functions**: インシデント対応ワークフロー（検出→封じ込め→通知→記録）を作成する
    3. **Lambda 関数群**: 証拠保全、セキュリティグループ隔離、インスタンス停止の Lambda を作成する
    4. **SSM Runbook**: インシデント対応手順の SSM Automation ドキュメントを作成する
    5. **SNS 通知**: インシデント検出とワークフロー結果の通知を設定する
    6. **DynamoDB**: インシデントログを記録するテーブルを作成する

  objectives:
    - GuardDuty トリガーの EventBridge ルールを作成する
    - インシデント対応 Step Functions ワークフローを作成する
    - 証拠保全/隔離/停止の Lambda 関数を作成する
    - SSM Automation Runbook を作成する
    - インシデント通知を設定する
    - インシデントログテーブルを作成する
  hints:
    - "Step Functions で並列実行（Parallel）を使い証拠保全と封じ込めを同時に行えます"
    - "EC2 のスナップショット作成で証拠保全を実装できます"
    - "セキュリティグループを隔離用に切り替えて封じ込めます"
  prerequisites: [Step Functions の知識, Lambda の知識, GuardDuty の知識, SSM Automation の知識, インシデント対応プロセスの理解]
  estimatedTime: 120

deployment:
  providers: [aws, local]
  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-incident-response-automation.yaml
      parameters: { EnvironmentPrefix: tenka-incident }
    local:
      type: cloudformation
      path: ./templates/aws/ops-incident-response-automation.yaml
      parameters: { EnvironmentPrefix: tenka-incident-local }
  regions:
    aws: [ap-northeast-1, us-east-1]
  timeout: 45

scoring:
  type: api
  criteria:
    - { name: EventBridge ルール, description: GuardDuty HIGH/CRITICAL トリガーが作成されている, weight: 15, maxPoints: 15 }
    - { name: Step Functions, description: インシデント対応ワークフローが作成されている, weight: 25, maxPoints: 25 }
    - { name: Lambda 関数群, description: 証拠保全/隔離/停止 Lambda が作成されている, weight: 20, maxPoints: 20 }
    - { name: SSM Runbook, description: インシデント対応 Runbook が作成されている, weight: 15, maxPoints: 15 }
    - { name: SNS 通知, description: インシデント通知が設定されている, weight: 10, maxPoints: 10 }
    - { name: DynamoDB, description: インシデントログテーブルが作成されている, weight: 15, maxPoints: 15 }
  timeoutMinutes: 10
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
