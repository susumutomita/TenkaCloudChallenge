AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Step Functions Express Workflows でコスト削減（正解テンプレート）
  Express Workflow、Lambda 統合、ログ、X-Ray トレースを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-sfn-cost
    Description: プロジェクト名のプレフィックス

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  ValidationFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-validate"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 5
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"valid": True, "orderId": event.get("orderId", "unknown")}

  ProcessFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-process"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 5
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"processed": True, "orderId": event.get("orderId", "unknown")}

  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sfn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - lambda:InvokeFunction
                Resource:
                  - !GetAtt ValidationFunction.Arn
                  - !GetAtt ProcessFunction.Arn
        - PolicyName: CloudWatchLogs
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - logs:CreateLogDelivery
                  - logs:GetLogDelivery
                  - logs:UpdateLogDelivery
                  - logs:DeleteLogDelivery
                  - logs:ListLogDeliveries
                  - logs:PutResourcePolicy
                  - logs:DescribeResourcePolicies
                  - logs:DescribeLogGroups
                Resource: "*"
        - PolicyName: XRayTrace
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - xray:PutTraceSegments
                  - xray:PutTelemetryRecords
                  - xray:GetSamplingRules
                  - xray:GetSamplingTargets
                Resource: "*"

  StateMachineLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/aws/stepfunctions/${ProjectName}"
      RetentionInDays: 7

  OrderProcessingStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${ProjectName}-order-processing"
      # 要件1: Express Workflow
      StateMachineType: EXPRESS
      RoleArn: !GetAtt StateMachineRole.Arn
      # 要件2: Lambda 統合
      DefinitionString: !Sub |
        {
          "Comment": "Order Processing Express Workflow",
          "StartAt": "Validate",
          "States": {
            "Validate": {
              "Type": "Task",
              "Resource": "${ValidationFunction.Arn}",
              "Next": "Process"
            },
            "Process": {
              "Type": "Task",
              "Resource": "${ProcessFunction.Arn}",
              "End": true
            }
          }
        }
      # 要件3: ログ設定
      LoggingConfiguration:
        Level: ALL
        IncludeExecutionData: true
        Destinations:
          - CloudWatchLogsLogGroup:
              LogGroupArn: !GetAtt StateMachineLogGroup.Arn
      # 要件4: X-Ray トレース
      TracingConfiguration:
        Enabled: true

Outputs:
  StateMachineArn:
    Description: Step Functions ステートマシン ARN
    Value: !Ref OrderProcessingStateMachine

  StateMachineName:
    Description: Step Functions ステートマシン名
    Value: !GetAtt OrderProcessingStateMachine.Name
