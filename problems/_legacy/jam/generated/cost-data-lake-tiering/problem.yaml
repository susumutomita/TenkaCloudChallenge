# TenkaCloud 統一問題フォーマット
# 問題ID: cost-data-lake-tiering
# タイプ: GAMEDAY（構築型）

id: cost-data-lake-tiering
title: データレイク多層ストレージとクエリコスト最適化
type: gameday
category: cost
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - s3
    - athena
    - glue
    - cost
    - data-lake
    - intelligent-tiering
    - partitioning
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはデータプラットフォームのリードアーキテクトとして、ペタバイト規模の
    データレイクのストレージとクエリコスト最適化プロジェクトを統括しています。
    S3 ストレージコストと Athena クエリコストの両方を最適化する必要があります。

    ## 背景
    半年間のコスト分析から以下のボトルネックが特定されました。
    - S3 に 500 TB のログデータが Standard クラスに格納され月額 $11,500
    - Athena クエリがフルスキャンで実行され、1 クエリあたり 10 GB のスキャン
    - Glue Data Catalog のパーティション分割が未実装
    - S3 Intelligent-Tiering が未活用
    - Athena ワークグループのクエリ制限が未設定

    ## あなたのミッション
    S3 Intelligent-Tiering、Glue パーティション、Athena ワークグループを組み合わせた
    コスト最適化アーキテクチャを構築してください。

    ### 要件
    1. **S3 Intelligent-Tiering**: IntelligentTieringConfiguration でアーカイブアクセス層（90 日）とディープアーカイブアクセス層（180 日）を設定する
    2. **Glue パーティションテーブル**: year/month/day でパーティション分割された Glue テーブルを作成する
    3. **Athena ワークグループ**: クエリデータスキャン上限を 1 GB に設定したワークグループを作成する
    4. **Athena 結果暗号化**: クエリ結果の S3 出力先を暗号化する
    5. **ライフサイクルルール**: 365 日後にオブジェクトを Glacier Deep Archive に移行する

  objectives:
    - S3 バケットに Intelligent-Tiering を設定する
    - Glue Data Catalog にパーティション分割テーブルを作成する
    - Athena ワークグループをクエリ制限付きで構成する
    - コスト効率の高いデータレイクアーキテクチャを構築する

  hints:
    - "IntelligentTieringConfiguration で Archive Access と Deep Archive Access 層を設定します"
    - "Glue Table の PartitionKeys で year/month/day パーティションを定義します"
    - "Athena WorkGroup の BytesScannedCutoffPerQuery でスキャン上限を設定します"
    - "ResultConfiguration の EncryptionConfiguration で結果の暗号化を設定します"
    - "ライフサイクルルールで長期保管データを Glacier Deep Archive に移行できます"

  prerequisites:
    - S3 ストレージクラスの深い理解
    - Athena と Glue Data Catalog の運用経験
    - データレイクアーキテクチャの知識
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-data-lake-tiering.yaml
      parameters:
        ProjectName: tenka-datalake-cost

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: S3 Intelligent-Tiering
      description: アーカイブアクセス層（90 日）とディープアーカイブアクセス層（180 日）が設定されている
      weight: 25
      maxPoints: 25

    - name: Glue パーティションテーブル
      description: year/month/day パーティションが設定された Glue テーブルが存在する
      weight: 25
      maxPoints: 25

    - name: Athena ワークグループ
      description: BytesScannedCutoffPerQuery が 1 GB に設定されている
      weight: 20
      maxPoints: 20

    - name: Athena 結果暗号化
      description: クエリ結果の暗号化が設定されている
      weight: 15
      maxPoints: 15

    - name: ライフサイクルルール
      description: 365 日後に Glacier Deep Archive への移行ルールが設定されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
