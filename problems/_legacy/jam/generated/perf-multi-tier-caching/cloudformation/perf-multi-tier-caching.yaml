AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: マルチ層キャッシュアーキテクチャの構築（正解テンプレート）
  CloudFront、API Gateway キャッシュ、ElastiCache Redis、Lambda VPC を構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-cache-perf
    Description: プロジェクト名のプレフィックス

  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID

  SubnetIds:
    Type: List<AWS::EC2::Subnet::Id>
    Description: サブネット ID リスト

Resources:
  # 要件3: Redis セキュリティグループ
  RedisSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} Redis SG"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 6379
          ToPort: 6379
          CidrIp: 10.0.0.0/8

  LambdaSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${ProjectName} Lambda SG"
      VpcId: !Ref VpcId

  RedisSubnetGroup:
    Type: AWS::ElastiCache::SubnetGroup
    Properties:
      CacheSubnetGroupName: !Sub "${ProjectName}-redis-subnet"
      Description: Redis subnet group
      SubnetIds: !Ref SubnetIds

  # 要件4: Redis パラメータグループ
  RedisParameterGroup:
    Type: AWS::ElastiCache::ParameterGroup
    Properties:
      CacheParameterGroupFamily: redis7
      Description: !Sub "${ProjectName} Redis parameters"
      Properties:
        maxmemory-policy: allkeys-lfu

  # 要件3, 4: ElastiCache Redis レプリケーショングループ
  RedisReplicationGroup:
    Type: AWS::ElastiCache::ReplicationGroup
    Properties:
      ReplicationGroupDescription: !Sub "${ProjectName} Redis cluster"
      ReplicationGroupId: !Sub "${ProjectName}-redis"
      Engine: redis
      EngineVersion: "7.1"
      CacheNodeType: cache.r6g.large
      NumCacheClusters: 3
      CacheParameterGroupName: !Ref RedisParameterGroup
      CacheSubnetGroupName: !Ref RedisSubnetGroup
      SecurityGroupIds:
        - !Ref RedisSecurityGroup
      # 要件4: 自動フェイルオーバー
      AutomaticFailoverEnabled: true
      MultiAZEnabled: true
      # 要件3: 暗号化
      TransitEncryptionEnabled: true
      AtRestEncryptionEnabled: true

  # 要件5: Lambda 関数（VPC 内）
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
        - arn:aws:iam::aws:policy/service-role/AWSLambdaVPCAccessExecutionRole

  CacheFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-cache-handler"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 256
      Timeout: 10
      Architectures:
        - arm64
      Role: !GetAtt LambdaExecutionRole.Arn
      # 要件5: VPC 配置
      VpcConfig:
        SubnetIds: !Ref SubnetIds
        SecurityGroupIds:
          - !Ref LambdaSecurityGroup
      Environment:
        Variables:
          REDIS_ENDPOINT: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address
          REDIS_PORT: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Port
      Code:
        ZipFile: |
          import json
          import os
          def handler(event, context):
              return {
                  "statusCode": 200,
                  "headers": {"Content-Type": "application/json"},
                  "body": json.dumps({"source": "cache"})
              }

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CacheFunction
      Action: lambda:InvokeFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub "arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${RestApi}/*"

  # 要件2: API Gateway + キャッシュ
  RestApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${ProjectName}-api"

  ProductsResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref RestApi
      ParentId: !GetAtt RestApi.RootResourceId
      PathPart: products

  ProductsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref RestApi
      ResourceId: !Ref ProductsResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub "arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${CacheFunction.Arn}/invocations"

  ApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn: ProductsMethod
    Properties:
      RestApiId: !Ref RestApi

  ApiStage:
    Type: AWS::ApiGateway::Stage
    Properties:
      StageName: prod
      RestApiId: !Ref RestApi
      DeploymentId: !Ref ApiDeployment
      CacheClusterEnabled: true
      CacheClusterSize: "0.5"
      MethodSettings:
        - ResourcePath: "/*"
          HttpMethod: "*"
          CachingEnabled: true
          CacheTtlInSeconds: 60

  # 要件1: CloudFront + カスタムキャッシュポリシー
  OriginBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${ProjectName}-origin-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true

  OAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${ProjectName}-oac"
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CustomCachePolicy:
    Type: AWS::CloudFront::CachePolicy
    Properties:
      CachePolicyConfig:
        Name: !Sub "${ProjectName}-cache-policy"
        DefaultTTL: 300
        MaxTTL: 3600
        MinTTL: 0
        ParametersInCacheKeyAndForwardedToOrigin:
          CookiesConfig:
            CookieBehavior: none
          HeadersConfig:
            HeaderBehavior: none
          QueryStringsConfig:
            QueryStringBehavior: none
          EnableAcceptEncodingGzip: true
          EnableAcceptEncodingBrotli: true

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        HttpVersion: http2and3
        DefaultCacheBehavior:
          TargetOriginId: S3Origin
          CachePolicyId: !Ref CustomCachePolicy
          ViewerProtocolPolicy: redirect-to-https
          Compress: true
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt OriginBucket.RegionalDomainName
            OriginAccessControlId: !Ref OAC
            S3OriginConfig:
              OriginAccessIdentity: ""

Outputs:
  CloudFrontDomainName:
    Description: CloudFront ディストリビューションドメイン名
    Value: !GetAtt CloudFrontDistribution.DomainName

  ApiEndpoint:
    Description: API Gateway エンドポイント URL
    Value: !Sub "https://${RestApi}.execute-api.${AWS::Region}.amazonaws.com/prod"

  RedisEndpoint:
    Description: Redis プライマリエンドポイント
    Value: !GetAtt RedisReplicationGroup.PrimaryEndPoint.Address

  CacheFunctionName:
    Description: Lambda 関数名
    Value: !Ref CacheFunction
