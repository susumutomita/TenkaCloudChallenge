# TenkaCloud 統一問題フォーマット
# 問題ID: arch-transit-gateway-vpc
# タイプ: GAMEDAY（構築型）

id: arch-transit-gateway-vpc
title: Transit Gateway マルチ VPC 接続
type: gameday
category: architecture
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - transit-gateway
    - vpc
    - multi-vpc
    - routing
    - network-segmentation
    - hub-spoke
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはネットワークアーキテクトとして、複数の VPC を Transit Gateway で
    接続するハブ&スポーク型のネットワーク設計を行う任務を与えられました。

    ## 背景
    組織では本番環境、開発環境、共有サービス環境を別々の VPC で運用しています。
    VPC Peering では管理が複雑になるため、Transit Gateway による
    一元的なネットワーク接続が求められています。

    ## あなたのミッション
    以下の要件を満たす Transit Gateway ネットワーク構成を構築してください。

    ### 要件
    1. **Transit Gateway**: Transit Gateway を作成し、DNS サポートと自動アタッチメントを設定する
    2. **VPC アタッチメント**: 3 つの VPC（本番・開発・共有）を Transit Gateway にアタッチする
    3. **ルートテーブル**: Transit Gateway ルートテーブルで VPC 間のルーティングを制御する
    4. **ネットワーク分離**: 本番 VPC と開発 VPC は直接通信不可、共有 VPC は全 VPC と通信可能にする
    5. **VPC ルーティング**: 各 VPC のプライベートサブネットルートテーブルに Transit Gateway へのルートを追加する

  objectives:
    - Transit Gateway を作成し DNS サポートを有効にする
    - 3 つの VPC をアタッチする
    - ルートテーブルでネットワーク分離を実装する
    - 各 VPC のルートテーブルを更新する

  hints:
    - "Transit Gateway の DefaultRouteTableAssociation を disable にして個別にルートテーブルを制御します"
    - "TransitGatewayRouteTable と TransitGatewayRouteTableAssociation でルーティングを制御します"
    - "本番と開発の分離は、ルートテーブルの伝播（Propagation）を制御して実現します"
    - "各 VPC のルートテーブルに 0.0.0.0/0 または特定 CIDR への Transit Gateway ルートを追加します"

  prerequisites:
    - VPC ネットワーク設計の実務知識
    - Transit Gateway の基本概念
    - ルーティングの深い理解
    - CloudFormation の中級以上の知識

  estimatedTime: 75

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-transit-gateway-vpc.yaml
      parameters:
        EnvironmentName: tenka-tgw

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 45

scoring:
  type: api
  criteria:
    - name: Transit Gateway 作成
      description: Transit Gateway が作成され、DNS サポートが有効になっている
      weight: 15
      maxPoints: 15

    - name: VPC アタッチメント
      description: 3 つの VPC が Transit Gateway にアタッチされている
      weight: 25
      maxPoints: 25

    - name: ルートテーブル + ネットワーク分離
      description: 本番と開発が直接通信不可、共有は全 VPC と通信可能になっている
      weight: 30
      maxPoints: 30

    - name: VPC ルーティング
      description: 各 VPC のルートテーブルに Transit Gateway へのルートが追加されている
      weight: 30
      maxPoints: 30

  timeoutMinutes: 15
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
