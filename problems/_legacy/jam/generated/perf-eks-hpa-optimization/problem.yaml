# TenkaCloud 統一問題フォーマット
# 問題ID: perf-eks-hpa-optimization
# タイプ: GAMEDAY（構築型）

id: perf-eks-hpa-optimization
title: EKS HPA/VPA とクラスターオートスケーリング
type: gameday
category: performance
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - eks
    - performance
    - hpa
    - cluster-autoscaler
    - karpenter
    - node-group
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたは Kubernetes プラットフォームのリードエンジニアとして、EKS クラスターの
    パフォーマンスとスケーラビリティの最適化を担当しています。ポッドとノードの
    両レベルでのスケーリングが必要です。

    ## 背景
    パフォーマンス監視の結果から以下が判明しました。
    - HPA（Horizontal Pod Autoscaler）が未設定でトラフィック急増時にポッドが不足
    - マネージドノードグループが固定サイズで、ノードリソースが逼迫
    - ポッドのリソースリクエストが最適化されておらず、ノードの利用効率が低い
    - クラスターオートスケーラーが未設定で、ノード追加が手動

    ## あなたのミッション
    EKS クラスターにマネージドノードグループとスケーリング設定を構成してください。

    ### 要件
    1. **EKS クラスター**: Kubernetes 1.29 の EKS クラスターを作成する
    2. **マネージドノードグループ**: t3.large インスタンスで最小 2、最大 10、希望 3 ノードを構成する
    3. **ノードグループスケーリング**: UpdateConfig で maxUnavailable を 1 に設定する
    4. **クラスターログ**: API サーバーと監査ログを有効にする
    5. **暗号化**: Secrets の暗号化を有効にする

  objectives:
    - EKS クラスターを作成する
    - マネージドノードグループを構成する
    - ノードグループの更新設定を最適化する
    - クラスターログを有効にする
    - Secrets 暗号化を設定する

  hints:
    - "AWS::EKS::Cluster で EKS クラスターを作成します"
    - "AWS::EKS::Nodegroup でマネージドノードグループを構成します"
    - "ScalingConfig で minSize, maxSize, desiredSize を設定します"
    - "UpdateConfig で maxUnavailable を指定してローリング更新を制御します"
    - "EncryptionConfig で Secrets の暗号化を設定します"

  prerequisites:
    - EKS の運用経験
    - Kubernetes の知識
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-eks-hpa-optimization.yaml
      parameters:
        ProjectName: tenka-eks-perf
        VpcId: ""
        SubnetIds: ""

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: EKS クラスター
      description: Kubernetes 1.29 の EKS クラスターが作成されている
      weight: 20
      maxPoints: 20

    - name: マネージドノードグループ
      description: t3.large で最小 2、最大 10、希望 3 ノードが構成されている
      weight: 30
      maxPoints: 30

    - name: ノードグループ更新設定
      description: maxUnavailable が 1 に設定されている
      weight: 15
      maxPoints: 15

    - name: クラスターログ
      description: API サーバーと監査ログが有効
      weight: 15
      maxPoints: 15

    - name: Secrets 暗号化
      description: Secrets の暗号化が有効になっている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 20
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
