# TenkaCloud 統一問題フォーマット
# 問題ID: perf-lambda-provisioned-concurrency
# タイプ: GAMEDAY（構築型）

id: perf-lambda-provisioned-concurrency
title: Lambda Provisioned Concurrency によるコールドスタート排除
type: gameday
category: performance
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - lambda
    - performance
    - provisioned-concurrency
    - cold-start
    - alias
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはサーバーレスアプリケーションのパフォーマンス改善を担当するエンジニアです。
    Lambda 関数のコールドスタートにより、ユーザー向け API のレスポンスタイムが
    断続的に悪化しています。

    ## 背景
    CloudWatch メトリクスの分析から以下が判明しました。
    - Lambda のコールドスタート時に P99 レイテンシが 3 秒を超過
    - 通常時のレイテンシは 200ms 程度だが、コールドスタート時は 3000ms 以上
    - Provisioned Concurrency が未設定で、トラフィック急増時にコールドスタートが多発
    - Lambda エイリアスとバージョン管理が未実装

    ## あなたのミッション
    Lambda 関数に Provisioned Concurrency を設定し、コールドスタートを排除してください。

    ### 要件
    1. **Lambda バージョン**: Lambda 関数のバージョンを発行する
    2. **Lambda エイリアス**: prod エイリアスを作成し、バージョンに紐付ける
    3. **Provisioned Concurrency**: エイリアスに Provisioned Concurrency を 5 に設定する
    4. **関数 URL**: Lambda 関数 URL を IAM 認証付きで作成する

  objectives:
    - Lambda 関数のバージョンを発行する
    - prod エイリアスを作成する
    - Provisioned Concurrency を設定してコールドスタートを排除する
    - 関数 URL を作成する

  hints:
    - "AWS::Lambda::Version でバージョンを発行します"
    - "AWS::Lambda::Alias でエイリアスを作成しバージョンに紐付けます"
    - "ProvisionedConcurrencyConfig で同時実行数を予約します"
    - "AWS::Lambda::Url で関数 URL を作成できます"

  prerequisites:
    - Lambda の基本的な知識
    - CloudFormation の基本的な知識

  estimatedTime: 20

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/perf-lambda-provisioned-concurrency.yaml
      parameters:
        ProjectName: tenka-lambda-perf

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Lambda バージョン
      description: Lambda 関数のバージョンが発行されている
      weight: 20
      maxPoints: 20

    - name: Lambda エイリアス
      description: prod エイリアスが作成されバージョンに紐付いている
      weight: 25
      maxPoints: 25

    - name: Provisioned Concurrency
      description: Provisioned Concurrency が 5 に設定されている
      weight: 35
      maxPoints: 35

    - name: 関数 URL
      description: Lambda 関数 URL が IAM 認証付きで作成されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
