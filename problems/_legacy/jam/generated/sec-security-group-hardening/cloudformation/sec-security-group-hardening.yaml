AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: セキュリティグループ強化設計（正解テンプレート）
  最小権限の Web/App/DB 3 層セキュリティグループ設計。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-sg-hardening
    Description: 環境名プレフィックス
  VpcId:
    Type: String
    Default: vpc-dummy
    Description: VPC ID

Resources:
  # --- Web 層セキュリティグループ ---
  WebSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} Web Tier - HTTP/HTTPS from Internet"
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTP from Internet
        - IpProtocol: tcp
          FromPort: 443
          ToPort: 443
          CidrIp: "0.0.0.0/0"
          Description: Allow HTTPS from Internet
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          DestinationSecurityGroupId: !GetAtt AppSecurityGroup.GroupId
          Description: Allow outbound to App tier on port 8080
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-web-sg"

  # --- App 層セキュリティグループ ---
  AppSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} App Tier - from Web tier only"
      VpcId: !Ref VpcId
      SecurityGroupEgress:
        - IpProtocol: tcp
          FromPort: 3306
          ToPort: 3306
          DestinationSecurityGroupId: !GetAtt DBSecurityGroup.GroupId
          Description: Allow outbound to DB tier on port 3306
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-app-sg"

  AppIngressFromWeb:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt AppSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 8080
      ToPort: 8080
      SourceSecurityGroupId: !GetAtt WebSecurityGroup.GroupId
      Description: Allow inbound from Web tier on port 8080

  # --- DB 層セキュリティグループ ---
  DBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: !Sub "${EnvironmentName} DB Tier - from App tier only, no outbound"
      VpcId: !Ref VpcId
      SecurityGroupEgress: []
      Tags:
        - Key: Name
          Value: !Sub "${EnvironmentName}-db-sg"

  DBIngressFromApp:
    Type: AWS::EC2::SecurityGroupIngress
    Properties:
      GroupId: !GetAtt DBSecurityGroup.GroupId
      IpProtocol: tcp
      FromPort: 3306
      ToPort: 3306
      SourceSecurityGroupId: !GetAtt AppSecurityGroup.GroupId
      Description: Allow inbound from App tier on port 3306

Outputs:
  WebSecurityGroupId:
    Description: Web 層 SG ID
    Value: !GetAtt WebSecurityGroup.GroupId

  AppSecurityGroupId:
    Description: App 層 SG ID
    Value: !GetAtt AppSecurityGroup.GroupId

  DBSecurityGroupId:
    Description: DB 層 SG ID
    Value: !GetAtt DBSecurityGroup.GroupId
