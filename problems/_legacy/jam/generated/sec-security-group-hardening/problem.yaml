# TenkaCloud 統一問題フォーマット
# 問題ID: sec-security-group-hardening
# タイプ: GAMEDAY（構築型）

id: sec-security-group-hardening
title: セキュリティグループ強化設計
type: gameday
category: security
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - security-group
    - vpc
    - network-security
    - ingress
    - egress
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティエンジニアとして、既存の EC2 インスタンス群の
    セキュリティグループを見直す任務を与えられました。

    ## 背景
    監査で「セキュリティグループのルールが過度に緩い」と指摘されました。
    Web 層、App 層、DB 層のセキュリティグループを最小権限の原則に基づいて
    再設計する必要があります。

    ## あなたのミッション
    以下の要件を満たすセキュリティグループを構築してください。

    ### 要件
    1. **Web 層 SG**: HTTP/HTTPS のみインターネットから受付、アウトバウンドは App 層のみ
    2. **App 層 SG**: Web 層からのポート 8080 のみ受付、アウトバウンドは DB 層のみ
    3. **DB 層 SG**: App 層からのポート 3306 のみ受付、アウトバウンドなし
    4. **全 SG 共通**: Description をすべてのルールに設定し、デフォルトのアウトバウンド全許可を削除する

  objectives:
    - Web 層セキュリティグループを作成する
    - App 層セキュリティグループを作成する
    - DB 層セキュリティグループを作成する
    - すべてのルールに Description を設定する

  hints:
    - "SecurityGroupEgress で明示的にアウトバウンドルールを定義するとデフォルトの全許可が無効になります"
    - "SourceSecurityGroupId で前段の SG を参照します"
    - "DB 層は SecurityGroupEgress を空配列にしてアウトバウンドを完全にブロックします"
    - "Description プロパティで各ルールの目的を記述します"

  prerequisites:
    - セキュリティグループの基本概念
    - ネットワーク ACL との違いの理解
    - CloudFormation の基本的な知識

  estimatedTime: 25

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-security-group-hardening.yaml
      parameters:
        EnvironmentName: tenka-sg-hardening

    local:
      type: cloudformation
      path: ./templates/aws/sec-security-group-hardening.yaml
      parameters:
        EnvironmentName: tenka-sg-hardening-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Web 層 SG
      description: HTTP/HTTPS のインバウンドと App 層のみのアウトバウンドが設定されている
      weight: 25
      maxPoints: 25

    - name: App 層 SG
      description: Web 層からの 8080 のみインバウンド、DB 層のみのアウトバウンドが設定されている
      weight: 25
      maxPoints: 25

    - name: DB 層 SG
      description: App 層からの 3306 のみインバウンド、アウトバウンドなしが設定されている
      weight: 25
      maxPoints: 25

    - name: ルール Description
      description: すべてのルールに Description が設定されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
