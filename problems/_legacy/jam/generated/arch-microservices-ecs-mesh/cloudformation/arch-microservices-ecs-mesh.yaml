AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: ECS マイクロサービス + Service Connect 構成（正解テンプレート）
  3 サービス、Service Connect、ALB 外部公開、セキュリティグループ連鎖を含む構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-microservices
    Description: 環境名プレフィックス
  VpcId:
    Type: AWS::EC2::VPC::Id
    Description: VPC ID
  PublicSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: パブリックサブネット 1
  PublicSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: パブリックサブネット 2
  PrivateSubnet1:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 1
  PrivateSubnet2:
    Type: AWS::EC2::Subnet::Id
    Description: プライベートサブネット 2

Resources:
  # ============================================================
  # ECS クラスター + Cloud Map
  # ============================================================
  ECSCluster:
    Type: AWS::ECS::Cluster
    Properties:
      ClusterName: !Sub "${EnvironmentName}-cluster"
      ClusterSettings:
        - Name: containerInsights
          Value: enabled
      ServiceConnectDefaults:
        Namespace: !GetAtt ServiceNamespace.Arn

  ServiceNamespace:
    Type: AWS::ServiceDiscovery::HttpNamespace
    Properties:
      Name: !Sub "${EnvironmentName}.local"
      Description: Microservices namespace

  # ============================================================
  # IAM ロール
  # ============================================================
  TaskExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-exec-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ecs-tasks.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AmazonECSTaskExecutionRolePolicy

  # ============================================================
  # CloudWatch Logs
  # ============================================================
  ApiGwLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/api-gateway"
      RetentionInDays: 30

  UserLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/user-service"
      RetentionInDays: 30

  OrderLogGroup:
    Type: AWS::Logs::LogGroup
    Properties:
      LogGroupName: !Sub "/ecs/${EnvironmentName}/order-service"
      RetentionInDays: 30

  # ============================================================
  # セキュリティグループ連鎖
  # ============================================================
  ALBSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: ALB SG - allows HTTP from internet
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 80
          ToPort: 80
          CidrIp: "0.0.0.0/0"

  ApiGwSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: API Gateway SG - allows from ALB only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !GetAtt ALBSecurityGroup.GroupId

  InternalServiceSecurityGroup:
    Type: AWS::EC2::SecurityGroup
    Properties:
      GroupDescription: Internal Services SG - allows from API GW only
      VpcId: !Ref VpcId
      SecurityGroupIngress:
        - IpProtocol: tcp
          FromPort: 8080
          ToPort: 8080
          SourceSecurityGroupId: !GetAtt ApiGwSecurityGroup.GroupId

  # ============================================================
  # ALB（API Gateway のみ公開）
  # ============================================================
  ALB:
    Type: AWS::ElasticLoadBalancingV2::LoadBalancer
    Properties:
      Name: !Sub "${EnvironmentName}-alb"
      Scheme: internet-facing
      Type: application
      Subnets:
        - !Ref PublicSubnet1
        - !Ref PublicSubnet2
      SecurityGroups:
        - !GetAtt ALBSecurityGroup.GroupId

  TargetGroup:
    Type: AWS::ElasticLoadBalancingV2::TargetGroup
    Properties:
      Name: !Sub "${EnvironmentName}-api-tg"
      Port: 8080
      Protocol: HTTP
      VpcId: !Ref VpcId
      TargetType: ip
      HealthCheckPath: /health

  HTTPListener:
    Type: AWS::ElasticLoadBalancingV2::Listener
    Properties:
      LoadBalancerArn: !Ref ALB
      Port: 80
      Protocol: HTTP
      DefaultActions:
        - Type: forward
          TargetGroupArn: !Ref TargetGroup

  # ============================================================
  # タスク定義
  # ============================================================
  ApiGwTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-api-gateway"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: api-gateway
          Image: nginx:latest
          PortMappings:
            - ContainerPort: 8080
              Name: api-gateway
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref ApiGwLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: api-gw
          Essential: true

  UserTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-user-service"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: user-service
          Image: nginx:latest
          PortMappings:
            - ContainerPort: 8080
              Name: user-service
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref UserLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: user
          Essential: true

  OrderTaskDef:
    Type: AWS::ECS::TaskDefinition
    Properties:
      Family: !Sub "${EnvironmentName}-order-service"
      Cpu: "256"
      Memory: "512"
      NetworkMode: awsvpc
      RequiresCompatibilities:
        - FARGATE
      ExecutionRoleArn: !GetAtt TaskExecutionRole.Arn
      ContainerDefinitions:
        - Name: order-service
          Image: nginx:latest
          PortMappings:
            - ContainerPort: 8080
              Name: order-service
              Protocol: tcp
          LogConfiguration:
            LogDriver: awslogs
            Options:
              awslogs-group: !Ref OrderLogGroup
              awslogs-region: !Ref "AWS::Region"
              awslogs-stream-prefix: order
          Essential: true

  # ============================================================
  # ECS サービス + Service Connect
  # ============================================================
  ApiGwService:
    Type: AWS::ECS::Service
    DependsOn: HTTPListener
    Properties:
      ServiceName: api-gateway
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref ApiGwTaskDef
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !GetAtt ApiGwSecurityGroup.GroupId
      LoadBalancers:
        - ContainerName: api-gateway
          ContainerPort: 8080
          TargetGroupArn: !Ref TargetGroup
      ServiceConnectConfiguration:
        Enabled: true
        Services:
          - PortName: api-gateway
            ClientAliases:
              - Port: 8080
                DnsName: api-gateway

  UserService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: user-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref UserTaskDef
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !GetAtt InternalServiceSecurityGroup.GroupId
      ServiceConnectConfiguration:
        Enabled: true
        Services:
          - PortName: user-service
            ClientAliases:
              - Port: 8080
                DnsName: user-service

  OrderService:
    Type: AWS::ECS::Service
    Properties:
      ServiceName: order-service
      Cluster: !Ref ECSCluster
      TaskDefinition: !Ref OrderTaskDef
      DesiredCount: 2
      LaunchType: FARGATE
      NetworkConfiguration:
        AwsvpcConfiguration:
          AssignPublicIp: DISABLED
          Subnets:
            - !Ref PrivateSubnet1
            - !Ref PrivateSubnet2
          SecurityGroups:
            - !GetAtt InternalServiceSecurityGroup.GroupId
      ServiceConnectConfiguration:
        Enabled: true
        Services:
          - PortName: order-service
            ClientAliases:
              - Port: 8080
                DnsName: order-service

Outputs:
  ClusterName:
    Description: ECS クラスター名
    Value: !Ref ECSCluster

  ALBDnsName:
    Description: ALB DNS 名
    Value: !GetAtt ALB.DNSName

  NamespaceArn:
    Description: Cloud Map 名前空間 ARN
    Value: !GetAtt ServiceNamespace.Arn
