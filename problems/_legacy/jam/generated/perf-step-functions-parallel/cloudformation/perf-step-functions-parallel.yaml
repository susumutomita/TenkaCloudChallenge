AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: Step Functions 並列実行と Map ステートによる高速処理（正解テンプレート）
  Parallel、Map、MaxConcurrency、エラーハンドリングを構成。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-sfn-perf
    Description: プロジェクト名のプレフィックス

Resources:
  LambdaExecutionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  FetchUsersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fetch-users"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"users": [{"id": "1"}, {"id": "2"}]}

  FetchOrdersFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fetch-orders"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"orders": [{"id": "o1"}, {"id": "o2"}]}

  FetchInventoryFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-fetch-inventory"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"inventory": [{"sku": "s1", "qty": 100}]}

  ProcessItemFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-process-item"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 30
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"processed": True, "item": event}

  ErrorHandlerFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${ProjectName}-error-handler"
      Runtime: python3.12
      Handler: index.handler
      MemorySize: 128
      Timeout: 10
      Role: !GetAtt LambdaExecutionRole.Arn
      Code:
        ZipFile: |
          def handler(event, context):
              return {"error": True, "cause": event.get("Cause", "Unknown")}

  StateMachineRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${ProjectName}-sfn-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: states.amazonaws.com
            Action: sts:AssumeRole
      Policies:
        - PolicyName: InvokeLambda
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action: lambda:InvokeFunction
                Resource:
                  - !GetAtt FetchUsersFunction.Arn
                  - !GetAtt FetchOrdersFunction.Arn
                  - !GetAtt FetchInventoryFunction.Arn
                  - !GetAtt ProcessItemFunction.Arn
                  - !GetAtt ErrorHandlerFunction.Arn

  PerformanceStateMachine:
    Type: AWS::StepFunctions::StateMachine
    Properties:
      StateMachineName: !Sub "${ProjectName}-pipeline"
      RoleArn: !GetAtt StateMachineRole.Arn
      DefinitionString: !Sub |
        {
          "Comment": "High-performance parallel workflow",
          "StartAt": "FetchAllData",
          "States": {
            "FetchAllData": {
              "Type": "Parallel",
              "Branches": [
                {
                  "StartAt": "FetchUsers",
                  "States": {
                    "FetchUsers": {
                      "Type": "Task",
                      "Resource": "${FetchUsersFunction.Arn}",
                      "Retry": [
                        {
                          "ErrorEquals": ["States.TaskFailed"],
                          "IntervalSeconds": 2,
                          "MaxAttempts": 3,
                          "BackoffRate": 2
                        }
                      ],
                      "End": true
                    }
                  }
                },
                {
                  "StartAt": "FetchOrders",
                  "States": {
                    "FetchOrders": {
                      "Type": "Task",
                      "Resource": "${FetchOrdersFunction.Arn}",
                      "Retry": [
                        {
                          "ErrorEquals": ["States.TaskFailed"],
                          "IntervalSeconds": 2,
                          "MaxAttempts": 3,
                          "BackoffRate": 2
                        }
                      ],
                      "End": true
                    }
                  }
                },
                {
                  "StartAt": "FetchInventory",
                  "States": {
                    "FetchInventory": {
                      "Type": "Task",
                      "Resource": "${FetchInventoryFunction.Arn}",
                      "Retry": [
                        {
                          "ErrorEquals": ["States.TaskFailed"],
                          "IntervalSeconds": 2,
                          "MaxAttempts": 3,
                          "BackoffRate": 2
                        }
                      ],
                      "End": true
                    }
                  }
                }
              ],
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "Next": "HandleError"
                }
              ],
              "Next": "ProcessItems"
            },
            "ProcessItems": {
              "Type": "Map",
              "ItemsPath": "$[0].users",
              "MaxConcurrency": 10,
              "ItemProcessor": {
                "ProcessorConfig": {
                  "Mode": "INLINE"
                },
                "StartAt": "ProcessItem",
                "States": {
                  "ProcessItem": {
                    "Type": "Task",
                    "Resource": "${ProcessItemFunction.Arn}",
                    "Retry": [
                      {
                        "ErrorEquals": ["States.TaskFailed"],
                        "IntervalSeconds": 1,
                        "MaxAttempts": 2,
                        "BackoffRate": 2
                      }
                    ],
                    "End": true
                  }
                }
              },
              "Catch": [
                {
                  "ErrorEquals": ["States.ALL"],
                  "Next": "HandleError"
                }
              ],
              "End": true
            },
            "HandleError": {
              "Type": "Task",
              "Resource": "${ErrorHandlerFunction.Arn}",
              "End": true
            }
          }
        }

Outputs:
  StateMachineArn:
    Description: Step Functions ステートマシン ARN
    Value: !Ref PerformanceStateMachine

  StateMachineName:
    Description: Step Functions ステートマシン名
    Value: !GetAtt PerformanceStateMachine.Name
