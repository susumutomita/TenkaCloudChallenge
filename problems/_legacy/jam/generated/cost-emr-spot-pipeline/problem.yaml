# TenkaCloud 統一問題フォーマット
# 問題ID: cost-emr-spot-pipeline
# タイプ: GAMEDAY（構築型）

id: cost-emr-spot-pipeline
title: EMR Serverless によるバッチ処理コスト最適化
type: gameday
category: cost
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - emr
    - serverless
    - cost
    - spark
    - s3
    - glue
    - batch-processing
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはデータエンジニアリングのリードとして、大規模バッチ処理パイプラインの
    コスト最適化を担当しています。現在 EMR on EC2 クラスターが常時稼働しており、
    ジョブが実行されていない時間帯もクラスターコストが発生しています。

    ## 背景
    6 か月間のコスト分析から以下のボトルネックが特定されました。
    - EMR on EC2 が常時 10 ノードで稼働しているが、バッチジョブは日に 3 回のみ
    - 各ジョブは 30 分程度で完了するが、残りの 22.5 時間はアイドル状態
    - EMR Serverless に移行すればジョブ実行時間のみの課金で大幅にコスト削減
    - 入出力データの S3 管理も最適化が必要

    ## あなたのミッション
    EMR Serverless アプリケーションを構成し、S3 データレイクとの統合パイプラインを構築してください。

    ### 要件
    1. **EMR Serverless アプリケーション**: Spark タイプの EMR Serverless アプリケーションを作成する
    2. **リソース制限**: 最大 CPU 4 vCPU、最大メモリ 16 GB に制限する
    3. **自動停止**: AutoStopConfiguration を有効にし、15 分のアイドルタイムアウトを設定する
    4. **入力バケット**: ライフサイクルルール（90 日で Glacier）付きの S3 バケットを作成する
    5. **出力バケット**: Intelligent-Tiering が有効な S3 バケットを作成する

  objectives:
    - EMR Serverless アプリケーションを Spark タイプで作成する
    - リソース制限でコストを制御する
    - 自動停止設定でアイドルコストを排除する
    - S3 バケットにライフサイクル管理を設定する

  hints:
    - "AWS::EMRServerless::Application で EMR Serverless を構成します"
    - "MaximumCapacity で CPU とメモリの上限を設定します"
    - "AutoStopConfiguration で IdleTimeoutMinutes を指定します"
    - "EMR Serverless はジョブ実行時間のみの課金でアイドルコストがゼロです"
    - "LifecycleConfiguration で古いデータを Glacier に移行できます"

  prerequisites:
    - EMR の運用経験
    - Spark の基本的な知識
    - S3 データレイクの理解
    - CloudFormation の実務経験

  estimatedTime: 120

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-emr-spot-pipeline.yaml
      parameters:
        ProjectName: tenka-emr-cost

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: EMR Serverless アプリケーション
      description: Spark タイプの EMR Serverless アプリケーションが作成されている
      weight: 25
      maxPoints: 25

    - name: リソース制限
      description: 最大 CPU 4 vCPU、最大メモリ 16 GB に制限されている
      weight: 20
      maxPoints: 20

    - name: 自動停止設定
      description: AutoStopConfiguration が有効で 15 分のアイドルタイムアウト
      weight: 20
      maxPoints: 20

    - name: 入力バケット
      description: 90 日で Glacier 移行のライフサイクルルールが設定されている
      weight: 20
      maxPoints: 20

    - name: 出力バケット
      description: Intelligent-Tiering が有効な出力バケットが存在する
      weight: 15
      maxPoints: 15

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
