# TenkaCloud 統一問題フォーマット
id: ops-guardduty-security-hub
title: GuardDuty と Security Hub による脅威検出・統合管理
type: gameday
category: operations
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags: [guardduty, security-hub, eventbridge, lambda, sns, threat-detection]
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、AWS 環境の脅威検出と
    セキュリティ検出結果の統合管理基盤を構築する任務を与えられました。

    ## 背景
    GuardDuty で脅威を検出し、Security Hub で検出結果を一元管理、
    重要度の高い検出結果は自動的にチームへ通知する必要があります。

    ## あなたのミッション
    ### 要件
    1. **GuardDuty**: GuardDuty 検出器を有効化する
    2. **Security Hub**: Security Hub を有効化し、CIS ベンチマークを有効化する
    3. **EventBridge ルール**: HIGH/CRITICAL の検出結果をキャプチャするルールを作成する
    4. **Lambda 関数**: 検出結果を処理し通知する Lambda を作成する
    5. **SNS 通知**: セキュリティアラート用の SNS トピックを構成する

  objectives:
    - GuardDuty 検出器を有効化する
    - Security Hub と CIS ベンチマークを有効化する
    - HIGH/CRITICAL 検出結果の EventBridge ルールを作成する
    - 検出結果処理 Lambda を作成する
    - セキュリティアラート SNS トピックを構成する
  hints:
    - "AWS::GuardDuty::Detector で検出器を有効化できます"
    - "AWS::SecurityHub::Hub で Security Hub を有効化できます"
    - "EventBridge で source: aws.securityhub、detail.findings.Severity.Label でフィルタリングします"
  prerequisites: [GuardDuty の知識, Security Hub の知識, EventBridge と Lambda の知識]
  estimatedTime: 60

deployment:
  providers: [aws, local]
  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/ops-guardduty-security-hub.yaml
      parameters: { EnvironmentPrefix: tenka-secops }
    local:
      type: cloudformation
      path: ./templates/aws/ops-guardduty-security-hub.yaml
      parameters: { EnvironmentPrefix: tenka-secops-local }
  regions:
    aws: [ap-northeast-1, us-east-1]
  timeout: 30

scoring:
  type: api
  criteria:
    - { name: GuardDuty, description: GuardDuty 検出器が有効化されている, weight: 25, maxPoints: 25 }
    - { name: Security Hub, description: Security Hub と CIS ベンチマークが有効化されている, weight: 25, maxPoints: 25 }
    - { name: EventBridge ルール, description: HIGH/CRITICAL 検出結果のルールが作成されている, weight: 20, maxPoints: 20 }
    - { name: Lambda 関数, description: 検出結果処理 Lambda が作成されている, weight: 15, maxPoints: 15 }
    - { name: SNS 通知, description: セキュリティアラート SNS トピックが構成されている, weight: 15, maxPoints: 15 }
  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
