# TenkaCloud 統一問題フォーマット
# 問題ID: cost-redshift-spectrum-optimization
# タイプ: GAMEDAY（構築型）

id: cost-redshift-spectrum-optimization
title: Redshift Spectrum と S3 データレイクによるクエリコスト最適化
type: gameday
category: cost
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - redshift
    - spectrum
    - cost
    - s3
    - glue
    - data-lake
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはデータエンジニアとして、Redshift クラスターのコスト最適化を担当しています。
    すべてのデータが Redshift 内部テーブルに格納されており、大量のコールドデータが
    高コストなマネージドストレージを消費しています。

    ## 背景
    データ分析チームの調査から以下が判明しました。
    - Redshift に 10 TB のデータが格納されているが、頻繁にクエリされるのは直近 3 か月分のみ
    - 過去データへのクエリは月に数回程度だが、すべて Redshift 内部テーブルに保持
    - Glue Data Catalog が未活用で、Spectrum によるクエリオフロードが未実施
    - Redshift クラスターが常時 4 ノードで稼働しているがコールドデータ分のリソースが過剰

    ## あなたのミッション
    Redshift Serverless と Glue Data Catalog を使用し、Spectrum 経由で S3 データをクエリできる構成を構築してください。

    ### 要件
    1. **Redshift Serverless**: Redshift Serverless ワークグループとネームスペースを構成する
    2. **ベース RPU 設定**: ベース RPU を 8 に設定しコストを制御する
    3. **Glue Database**: Glue Data Catalog にデータベースを作成する
    4. **Glue テーブル**: S3 外部テーブルを Glue Data Catalog に定義する

  objectives:
    - Redshift Serverless をコスト効率良く構成する
    - Glue Data Catalog でデータベースとテーブルを作成する
    - S3 外部テーブルを定義して Spectrum クエリを可能にする
    - 適切な RPU 設定でコストを制御する

  hints:
    - "AWS::RedshiftServerless::Workgroup と Namespace で Redshift Serverless を構成します"
    - "BaseCapacity で RPU を設定してコストを制御します"
    - "AWS::Glue::Database と AWS::Glue::Table で外部テーブルを定義します"
    - "Glue Table の StorageDescriptor で S3 ロケーションを指定します"

  prerequisites:
    - Redshift の基本的な知識
    - Glue Data Catalog の理解
    - S3 データレイクの知識
    - CloudFormation の実務経験

  estimatedTime: 50

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-redshift-spectrum-optimization.yaml
      parameters:
        ProjectName: tenka-redshift-cost
        VpcId: ""
        SubnetIds: ""

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Redshift Serverless
      description: ワークグループとネームスペースが構成されている
      weight: 30
      maxPoints: 30

    - name: ベース RPU 設定
      description: BaseCapacity が 8 RPU に設定されている
      weight: 20
      maxPoints: 20

    - name: Glue Database
      description: Glue Data Catalog にデータベースが作成されている
      weight: 25
      maxPoints: 25

    - name: Glue テーブル
      description: S3 外部テーブルが Glue Data Catalog に定義されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
