# TenkaCloud 統一問題フォーマット
# 問題ID: sec-incident-response-automation
# タイプ: GAMEDAY（構築型）

id: sec-incident-response-automation
title: インシデント自動対応基盤
type: gameday
category: security
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - incident-response
    - lambda
    - step-functions
    - eventbridge
    - systems-manager
    - forensics
    - automation
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティオペレーションチームのリードとして、
    インシデント自動対応基盤を構築する任務を与えられました。

    ## 背景
    セキュリティインシデントの対応時間を短縮するため、
    検知から初動対応までを自動化するワークフローが求められています。
    EC2 の隔離、EBS スナップショット取得（フォレンジック用）、
    IAM アクセスキーの無効化、通知を自動で実行する仕組みが必要です。

    ## あなたのミッション
    以下の要件を満たすインシデント自動対応基盤を構築してください。

    ### 要件
    1. **EventBridge**: GuardDuty、Security Hub の検出結果をトリガーにする EventBridge ルールを作成する
    2. **Step Functions ワークフロー**: インシデント種別に応じて分岐する対応ワークフローを作成する
    3. **EC2 隔離 Lambda**: 侵害された EC2 のセキュリティグループを変更して隔離する
    4. **フォレンジック Lambda**: 隔離した EC2 の EBS スナップショットを取得し、タグ付けする
    5. **IAM 対応 Lambda**: 侵害された IAM アクセスキーを無効化する
    6. **通知 + チケット**: SNS 通知と SSM OpsItem（チケット）を自動作成する

  objectives:
    - EventBridge ルールでセキュリティイベントを検知する
    - Step Functions で対応ワークフローを構築する
    - EC2 隔離、EBS スナップショット、IAM キー無効化の Lambda を作成する
    - SNS 通知と SSM OpsItem を自動作成する

  hints:
    - "Step Functions の Choice ステートで検出結果の種別を判定し分岐します"
    - "EC2 隔離は modify_instance_attribute で SG を変更します"
    - "EBS スナップショットは create_snapshot で取得し、タグでフォレンジック用とマークします"
    - "IAM アクセスキーは update_access_key で Status を Inactive にします"
    - "SSM OpsItem は ssm:CreateOpsItem で作成します"

  prerequisites:
    - インシデント対応プロセスの理解
    - Step Functions の高度な設計知識
    - Lambda による AWS リソース操作の経験
    - GuardDuty / Security Hub の検出結果の構造の理解
    - CloudFormation の上級知識

  estimatedTime: 150

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-incident-response-automation.yaml
      parameters:
        EnvironmentName: tenka-incident-response

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: EventBridge ルール
      description: GuardDuty/Security Hub の検出結果をトリガーにする EventBridge ルールが作成されている
      weight: 15
      maxPoints: 15

    - name: Step Functions ワークフロー
      description: インシデント種別に応じて分岐する対応ワークフローが作成されている
      weight: 25
      maxPoints: 25

    - name: EC2 隔離 + フォレンジック
      description: EC2 隔離と EBS スナップショット取得の Lambda が作成されている
      weight: 25
      maxPoints: 25

    - name: IAM 対応
      description: IAM アクセスキー無効化の Lambda が作成されている
      weight: 15
      maxPoints: 15

    - name: 通知 + チケット
      description: SNS 通知と SSM OpsItem が自動作成される
      weight: 20
      maxPoints: 20

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
