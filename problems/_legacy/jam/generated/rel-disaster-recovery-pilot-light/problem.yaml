# TenkaCloud 統一問題フォーマット
# 問題ID: rel-disaster-recovery-pilot-light
# タイプ: GAMEDAY（構築型）

id: rel-disaster-recovery-pilot-light
title: ディザスタリカバリ パイロットライト構成
type: gameday
category: reliability
difficulty: expert

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - disaster-recovery
    - pilot-light
    - rds-read-replica
    - ami
    - auto-scaling
    - route53
    - lambda
    - eventbridge
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、コスト効率の良い
    ディザスタリカバリ（パイロットライト）構成を構築する任務を与えられました。

    ## 背景
    常時アクティブ-アクティブ構成はコストが高いため、
    パイロットライト戦略を採用します。DR リージョンではデータレプリケーションのみを
    維持し、障害時に自動的にインフラを起動してトラフィックを切り替えます。

    ## あなたのミッション
    パイロットライト DR 構成を構築し、以下の要件をすべて満たしてください。

    ### 要件
    1. **RDS リードレプリカ**: DR リージョン（概念上）にクロスリージョンリードレプリカを配置する
    2. **AMI コピー**: 最新の AMI を DR リージョン用に準備する起動テンプレートを作成する
    3. **Auto Scaling**: DR リージョン用の ASG を最小容量 0 で待機させる
    4. **Route 53 フェイルオーバー**: DNS フェイルオーバーレコードを構成する
    5. **Lambda 自動復旧**: 障害検知時に DR インフラを起動する Lambda 関数を作成する
    6. **EventBridge ルール**: ヘルスチェック失敗をトリガーとする EventBridge ルールを作成する

  objectives:
    - RDS クロスリージョンリードレプリカを配置する
    - DR 用の起動テンプレートを作成する
    - 最小容量 0 の待機 ASG を構成する
    - Route 53 フェイルオーバーレコードを設定する
    - DR インフラ起動用の Lambda 関数を作成する
    - EventBridge でヘルスチェック失敗トリガーを構成する

  hints:
    - "RDS リードレプリカの SourceDBInstanceIdentifier でプライマリを指定します"
    - "ASG の MinSize を 0、DesiredCapacity を 0 にして待機状態にします"
    - "Lambda で update_auto_scaling_group を呼び DesiredCapacity を増やします"
    - "EventBridge で aws.health イベントをキャプチャできます"

  prerequisites:
    - DR 戦略（パイロットライト）の理解
    - RDS リードレプリカの知識
    - Auto Scaling の知識
    - Lambda と EventBridge の知識
    - Route 53 フェイルオーバーの知識

  estimatedTime: 120

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rel-disaster-recovery-pilot-light.yaml
      parameters:
        EnvironmentPrefix: tenka-dr-pilot

    local:
      type: cloudformation
      path: ./templates/aws/rel-disaster-recovery-pilot-light.yaml
      parameters:
        EnvironmentPrefix: tenka-dr-pilot-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 45

scoring:
  type: api
  criteria:
    - name: RDS リードレプリカ
      description: DR 用のクロスリージョンリードレプリカが配置されている
      weight: 20
      maxPoints: 20

    - name: 起動テンプレート
      description: DR リージョン用の起動テンプレートが作成されている
      weight: 10
      maxPoints: 10

    - name: 待機 Auto Scaling
      description: 最小容量 0 の ASG が待機状態で構成されている
      weight: 15
      maxPoints: 15

    - name: Route 53 フェイルオーバー
      description: DNS フェイルオーバーレコードが構成されている
      weight: 20
      maxPoints: 20

    - name: Lambda 自動復旧
      description: DR インフラ起動用の Lambda 関数が作成されている
      weight: 20
      maxPoints: 20

    - name: EventBridge ルール
      description: ヘルスチェック失敗トリガーの EventBridge ルールが作成されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 10
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
