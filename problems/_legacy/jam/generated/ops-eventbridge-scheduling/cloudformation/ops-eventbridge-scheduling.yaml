AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: EventBridge スケジュールによる運用タスク自動化（正解テンプレート）
  スケジュールルール、Lambda 関数、IAM ロール、DLQ を構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-schedule
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # 要件3: IAM ロール
  LambdaRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-lambda-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: SQSAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - sqs:SendMessage
                Resource: !GetAtt DeadLetterQueue.Arn

  # 要件4: DLQ
  DeadLetterQueue:
    Type: AWS::SQS::Queue
    Properties:
      QueueName: !Sub "${EnvironmentPrefix}-dlq"
      MessageRetentionPeriod: 1209600
      SqsManagedSseEnabled: true

  # 要件2: Lambda 関数
  CleanupFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-cleanup"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt LambdaRole.Arn
      Timeout: 300
      DeadLetterConfig:
        TargetArn: !GetAtt DeadLetterQueue.Arn
      Code:
        ZipFile: |
          import json
          from datetime import datetime
          def handler(event, context):
              print(f"Scheduled cleanup started at {datetime.utcnow().isoformat()}")
              print("Cleaning up temporary resources...")
              return {'statusCode': 200, 'body': 'Cleanup completed'}

  # 要件1: EventBridge スケジュールルール
  ScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentPrefix}-daily-cleanup"
      Description: 毎日 UTC 15:00（JST 0:00）に実行
      ScheduleExpression: "cron(0 15 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt CleanupFunction.Arn
          Id: CleanupTarget

  LambdaPermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref CleanupFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt ScheduleRule.Arn

Outputs:
  ScheduleRuleName:
    Description: スケジュールルール名
    Value: !Ref ScheduleRule

  FunctionName:
    Description: Lambda 関数名
    Value: !Ref CleanupFunction

  DLQUrl:
    Description: DLQ URL
    Value: !Ref DeadLetterQueue
