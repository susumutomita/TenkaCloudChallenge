AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: EBS ボリュームタイプとスナップショットの最適化（正解テンプレート）
  gp3 ボリューム、IOPS、スループット、暗号化を最適化。

Parameters:
  ProjectName:
    Type: String
    Default: tenka-ebs-cost
    Description: プロジェクト名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

  AvailabilityZone:
    Type: AWS::EC2::AvailabilityZone::Name
    Default: ap-northeast-1a
    Description: EBS ボリュームの AZ

Resources:
  OptimizedVolume:
    Type: AWS::EC2::Volume
    Properties:
      # 要件1: gp3 ボリュームタイプ、20 GB
      VolumeType: gp3
      Size: 20
      # 要件2: ベースライン 3000 IOPS
      Iops: 3000
      # 要件3: 125 MB/s スループット
      Throughput: 125
      # 要件4: 暗号化有効
      Encrypted: true
      AvailabilityZone: !Ref AvailabilityZone
      Tags:
        - Key: Name
          Value: !Sub "${ProjectName}-optimized-volume"
        - Key: CostOptimized
          Value: "true"

Outputs:
  VolumeId:
    Description: 最適化された EBS ボリューム ID
    Value: !Ref OptimizedVolume
