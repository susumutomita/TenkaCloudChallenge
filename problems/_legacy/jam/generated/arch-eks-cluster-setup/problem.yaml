# TenkaCloud 統一問題フォーマット
# 問題ID: arch-eks-cluster-setup
# タイプ: GAMEDAY（構築型）

id: arch-eks-cluster-setup
title: EKS クラスター + マネージドノードグループ構成
type: gameday
category: architecture
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - eks
    - kubernetes
    - managed-node-group
    - iam
    - oidc
    - networking
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドアーキテクトとして、Kubernetes ベースのコンテナプラットフォームを
    EKS で構築する任務を与えられました。

    ## 背景
    開発チームが Kubernetes を採用することを決定しました。
    マネージドノードグループを使い、クラスターの IAM ロール設計と
    ネットワーク設定を適切に行う必要があります。

    ## あなたのミッション
    以下の要件を満たす EKS クラスターを構築してください。

    ### 要件
    1. **EKS クラスター**: Kubernetes クラスターを作成し、クラスターロールを設定する
    2. **マネージドノードグループ**: ワーカーノード用のマネージドノードグループを作成する（最小 2、最大 4）
    3. **IAM ロール**: クラスターロールとノードロールに適切なポリシーをアタッチする
    4. **ネットワーク**: プライベートサブネットにノードを配置し、クラスターエンドポイントのアクセスを制御する
    5. **クラスターログ**: API サーバーと認証のログを CloudWatch に出力する

  objectives:
    - EKS クラスターを作成しクラスターロールを設定する
    - マネージドノードグループを作成しスケーリング設定を行う
    - クラスターロールとノードロールに必要なポリシーをアタッチする
    - プライベートサブネットにノードを配置する
    - コントロールプレーンのログを有効にする

  hints:
    - "EKS クラスターロールには AmazonEKSClusterPolicy が必要です"
    - "ノードロールには AmazonEKSWorkerNodePolicy, AmazonEKS_CNI_Policy, AmazonEC2ContainerRegistryReadOnly が必要です"
    - "ResourcesVpcConfig でサブネットとセキュリティグループを指定します"
    - "Logging の ClusterLogging で有効にするログタイプを指定します"

  prerequisites:
    - Kubernetes の基本概念
    - EKS の基本知識
    - IAM ロールとポリシーの設計知識
    - VPC ネットワークの基本知識
    - CloudFormation の中級知識

  estimatedTime: 60

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/arch-eks-cluster-setup.yaml
      parameters:
        EnvironmentName: tenka-eks

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 45

scoring:
  type: api
  criteria:
    - name: EKS クラスター + クラスターロール
      description: EKS クラスターが作成され、適切なクラスターロールが設定されている
      weight: 25
      maxPoints: 25

    - name: マネージドノードグループ
      description: マネージドノードグループが最小 2・最大 4 で作成されている
      weight: 25
      maxPoints: 25

    - name: IAM ロール設計
      description: クラスターロールとノードロールに適切なポリシーがアタッチされている
      weight: 20
      maxPoints: 20

    - name: ネットワーク + エンドポイント
      description: プライベートサブネットにノードが配置され、エンドポイントアクセスが適切に設定されている
      weight: 15
      maxPoints: 15

    - name: クラスターログ
      description: API サーバーと認証のログが CloudWatch に出力されている
      weight: 15
      maxPoints: 15

  timeoutMinutes: 20
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
