AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: KMS キー階層 + マルチリージョンキー設計（正解テンプレート）
  4 レベルキー階層、マルチリージョンキー、Grants、暗号化コンテキスト強制。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-key-hierarchy
    Description: 環境名プレフィックス
  KeyAdminRoleArn:
    Type: String
    Default: "arn:aws:iam::123456789012:role/key-admin"
  DataOwnerRoleArn:
    Type: String
    Default: "arn:aws:iam::123456789012:role/data-owner"
  AppRoleArn:
    Type: String
    Default: "arn:aws:iam::123456789012:role/app"

Resources:
  # ============================================================
  # Level 1: Public Data Key (最小制限)
  # ============================================================
  PublicDataKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} - Public data encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowKeyAdmin
            Effect: Allow
            Principal:
              AWS: !Ref KeyAdminRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:TagResource
              - kms:UntagResource
            Resource: "*"
          - Sid: AllowKeyUsage
            Effect: Allow
            Principal:
              AWS:
                - !Ref AppRoleArn
                - !Ref DataOwnerRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"

  PublicDataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}/public/data"
      TargetKeyId: !Ref PublicDataKey

  # ============================================================
  # Level 2: Internal Data Key
  # ============================================================
  InternalDataKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} - Internal data encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowKeyAdmin
            Effect: Allow
            Principal:
              AWS: !Ref KeyAdminRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:TagResource
              - kms:UntagResource
            Resource: "*"
          - Sid: AllowKeyUsageWithContext
            Effect: Allow
            Principal:
              AWS: !Ref AppRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringEquals:
                "kms:EncryptionContext:classification": "internal"

  InternalDataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}/internal/data"
      TargetKeyId: !Ref InternalDataKey

  # ============================================================
  # Level 3: Confidential Data Key
  # ============================================================
  ConfidentialDataKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} - Confidential data encryption key"
      EnableKeyRotation: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowKeyAdmin
            Effect: Allow
            Principal:
              AWS: !Ref KeyAdminRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:TagResource
              - kms:UntagResource
            Resource: "*"
          - Sid: AllowKeyUsageWithContext
            Effect: Allow
            Principal:
              AWS: !Ref DataOwnerRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringEquals:
                "kms:EncryptionContext:classification": "confidential"
          - Sid: AllowGrantCreation
            Effect: Allow
            Principal:
              AWS: !Ref DataOwnerRoleArn
            Action:
              - kms:CreateGrant
              - kms:ListGrants
              - kms:RevokeGrant
            Resource: "*"
            Condition:
              Bool:
                "kms:GrantIsForAWSResource": "true"

  ConfidentialDataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}/confidential/data"
      TargetKeyId: !Ref ConfidentialDataKey

  # ============================================================
  # Level 4: Restricted Data Key (マルチリージョン)
  # ============================================================
  RestrictedDataKey:
    Type: AWS::KMS::Key
    Properties:
      Description: !Sub "${EnvironmentName} - Restricted data encryption key (multi-region)"
      EnableKeyRotation: true
      MultiRegion: true
      KeyPolicy:
        Version: "2012-10-17"
        Statement:
          - Sid: EnableRootAccess
            Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: "kms:*"
            Resource: "*"
          - Sid: AllowKeyAdmin
            Effect: Allow
            Principal:
              AWS: !Ref KeyAdminRoleArn
            Action:
              - kms:Create*
              - kms:Describe*
              - kms:Enable*
              - kms:List*
              - kms:Put*
              - kms:Update*
              - kms:Revoke*
              - kms:Disable*
              - kms:Get*
              - kms:TagResource
              - kms:UntagResource
              - kms:ReplicateKey
            Resource: "*"
          - Sid: AllowRestrictedUsage
            Effect: Allow
            Principal:
              AWS: !Ref DataOwnerRoleArn
            Action:
              - kms:Encrypt
              - kms:Decrypt
              - kms:GenerateDataKey
              - kms:DescribeKey
            Resource: "*"
            Condition:
              StringEquals:
                "kms:EncryptionContext:classification": "restricted"
              Bool:
                "aws:MultiFactorAuthPresent": "true"

  RestrictedDataKeyAlias:
    Type: AWS::KMS::Alias
    Properties:
      AliasName: !Sub "alias/${EnvironmentName}/restricted/data"
      TargetKeyId: !Ref RestrictedDataKey

Outputs:
  PublicKeyArn:
    Description: Public Data Key ARN
    Value: !GetAtt PublicDataKey.Arn

  InternalKeyArn:
    Description: Internal Data Key ARN
    Value: !GetAtt InternalDataKey.Arn

  ConfidentialKeyArn:
    Description: Confidential Data Key ARN
    Value: !GetAtt ConfidentialDataKey.Arn

  RestrictedKeyArn:
    Description: Restricted Data Key ARN (Multi-Region)
    Value: !GetAtt RestrictedDataKey.Arn
