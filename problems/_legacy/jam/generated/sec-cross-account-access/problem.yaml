# TenkaCloud 統一問題フォーマット
# 問題ID: sec-cross-account-access
# タイプ: GAMEDAY（構築型）

id: sec-cross-account-access
title: クロスアカウント IAM ロール設計
type: gameday
category: security
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - iam
    - cross-account
    - external-id
    - sts
    - assume-role
    - confused-deputy
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティアーキテクトとして、マルチアカウント環境での
    クロスアカウントアクセスを安全に設計する任務を与えられました。

    ## 背景
    組織のマルチアカウント戦略により、監査アカウントから本番アカウントの
    リソースを読み取り専用でアクセスする仕組みが必要です。
    Confused Deputy 問題を防ぐため、ExternalId の設定も必須です。

    ## あなたのミッション
    以下の要件を満たすクロスアカウント IAM 設計を構築してください。

    ### 要件
    1. **クロスアカウントロール**: 外部アカウントが AssumeRole できるロールを作成し、ExternalId 条件を設定する
    2. **読み取り専用ポリシー**: S3 と CloudWatch Logs の読み取り専用アクセスのみを許可するポリシーを設計する
    3. **セッション制限**: 最大セッション時間を 1 時間に制限する
    4. **監査ログ**: AssumeRole イベントを CloudTrail で記録し、CloudWatch Alarm で異常を検知する
    5. **IP 制限**: 特定の IP レンジからのみ AssumeRole を許可する条件を追加する

  objectives:
    - ExternalId 付きクロスアカウントロールを作成する
    - 読み取り専用ポリシーを設計する
    - セッション時間を制限する
    - CloudTrail + CloudWatch で監査する
    - IP 制限条件を設定する

  hints:
    - "AssumeRolePolicyDocument の Condition で sts:ExternalId を指定します"
    - "MaxSessionDuration で最大セッション時間を秒単位で指定します"
    - "aws:SourceIp 条件で IP 制限を追加できます"
    - "CloudTrail の AssumeRole イベントは eventName: AssumeRole でフィルタリングします"

  prerequisites:
    - IAM のクロスアカウントアクセスの概念
    - STS AssumeRole の仕組み
    - Confused Deputy 問題の理解
    - CloudTrail の基本知識
    - CloudFormation の中級以上の知識

  estimatedTime: 60

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/sec-cross-account-access.yaml
      parameters:
        EnvironmentName: tenka-cross-account

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: クロスアカウントロール + ExternalId
      description: 外部アカウント用ロールが作成され、ExternalId 条件が設定されている
      weight: 25
      maxPoints: 25

    - name: 読み取り専用ポリシー
      description: S3 と CloudWatch Logs の読み取り専用アクセスのみが許可されている
      weight: 20
      maxPoints: 20

    - name: セッション制限 + IP 制限
      description: 最大セッション 1 時間、特定 IP のみ AssumeRole 可能
      weight: 20
      maxPoints: 20

    - name: CloudTrail 監査
      description: AssumeRole イベントが CloudTrail で記録されている
      weight: 15
      maxPoints: 15

    - name: CloudWatch Alarm
      description: 異常な AssumeRole パターンを検知するアラームが設定されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
