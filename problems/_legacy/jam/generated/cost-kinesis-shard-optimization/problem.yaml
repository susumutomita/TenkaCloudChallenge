# TenkaCloud 統一問題フォーマット
# 問題ID: cost-kinesis-shard-optimization
# タイプ: GAMEDAY（構築型）

id: cost-kinesis-shard-optimization
title: Kinesis Data Streams のシャードとモード最適化
type: gameday
category: cost
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - kinesis
    - cost
    - shard
    - on-demand
    - data-streams
    - firehose
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはストリーミングデータ基盤のアーキテクトとして、Kinesis Data Streams の
    コスト最適化を担当しています。過剰なシャード数とプロビジョンドモードにより、
    実際のスループットに対して不釣り合いなコストが発生しています。

    ## 背景
    コスト分析の結果から以下が判明しました。
    - Kinesis Data Streams が 20 シャードのプロビジョンドモードで運用中
    - 実際のデータ流入量は平均 2 MB/sec（2 シャード相当）
    - ピーク時でも 10 MB/sec 程度で、20 シャードは過剰
    - オンデマンドモードならピーク時のみスケールしコスト削減可能
    - Kinesis Data Firehose への配信も未最適化

    ## あなたのミッション
    Kinesis Data Streams をオンデマンドモードで構成し、Firehose で S3 に配信するパイプラインを構築してください。

    ### 要件
    1. **オンデマンドモード**: StreamModeDetails を ON_DEMAND に設定する
    2. **暗号化**: StreamEncryption で KMS 暗号化を有効にする
    3. **Firehose 配信**: Kinesis Data Firehose で S3 にデータを配信する構成を作成する
    4. **S3 バッファリング**: Firehose のバッファサイズ 5 MB、バッファ間隔 300 秒を設定する

  objectives:
    - Kinesis Data Streams をオンデマンドモードで作成する
    - ストリーム暗号化を有効にする
    - Kinesis Data Firehose 配信ストリームを構成する
    - S3 へのバッファリング設定を最適化する

  hints:
    - "StreamModeDetails の StreamMode で ON_DEMAND を指定します"
    - "StreamEncryption で EncryptionType: KMS を設定します"
    - "AWS::KinesisFirehose::DeliveryStream で Firehose を構成します"
    - "BufferingHints で SizeInMBs と IntervalInSeconds を設定します"

  prerequisites:
    - Kinesis Data Streams の知識
    - Kinesis Data Firehose の理解
    - CloudFormation の実務経験

  estimatedTime: 50

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cost-kinesis-shard-optimization.yaml
      parameters:
        ProjectName: tenka-kinesis-cost

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: オンデマンドモード
      description: StreamMode が ON_DEMAND に設定されている
      weight: 30
      maxPoints: 30

    - name: 暗号化
      description: KMS ストリーム暗号化が有効になっている
      weight: 20
      maxPoints: 20

    - name: Firehose 配信
      description: Kinesis Data Firehose が S3 に配信する構成がある
      weight: 25
      maxPoints: 25

    - name: S3 バッファリング
      description: バッファサイズ 5 MB、バッファ間隔 300 秒が設定されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
