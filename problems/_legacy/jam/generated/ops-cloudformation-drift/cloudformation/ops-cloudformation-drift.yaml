AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: CloudFormation ドリフト検出と自動修復（正解テンプレート）
  Config ルール、EventBridge スケジュール、Lambda、SNS 通知を構成。

Parameters:
  EnvironmentPrefix:
    Type: String
    Default: tenka-drift
    Description: リソース名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  # 要件5: Lambda IAM ロール
  DriftDetectorRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-detector-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole
      Policies:
        - PolicyName: DriftDetection
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - cloudformation:DetectStackDrift
                  - cloudformation:DescribeStackDriftDetectionStatus
                  - cloudformation:ListStacks
                Resource: "*"
              - Effect: Allow
                Action:
                  - sns:Publish
                Resource: !Ref DriftAlertTopic

  # 要件3: Lambda 関数
  DriftDetectorFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${EnvironmentPrefix}-detector"
      Runtime: python3.12
      Handler: index.handler
      Role: !GetAtt DriftDetectorRole.Arn
      Timeout: 300
      Environment:
        Variables:
          ALERT_TOPIC_ARN: !Ref DriftAlertTopic
      Code:
        ZipFile: |
          import boto3
          import os
          cfn = boto3.client('cloudformation')
          sns = boto3.client('sns')
          def handler(event, context):
              stacks = cfn.list_stacks(StackStatusFilter=['CREATE_COMPLETE', 'UPDATE_COMPLETE'])
              for stack in stacks['StackSummaries']:
                  stack_name = stack['StackName']
                  result = cfn.detect_stack_drift(StackName=stack_name)
                  print(f"Drift detection started for {stack_name}: {result['StackDriftDetectionId']}")
              return {'statusCode': 200}

  # 要件2: EventBridge スケジュールルール
  DriftScheduleRule:
    Type: AWS::Events::Rule
    Properties:
      Name: !Sub "${EnvironmentPrefix}-schedule"
      Description: 毎日ドリフト検出を実行
      ScheduleExpression: "cron(0 16 * * ? *)"
      State: ENABLED
      Targets:
        - Arn: !GetAtt DriftDetectorFunction.Arn
          Id: DriftDetectorTarget

  LambdaSchedulePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !Ref DriftDetectorFunction
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt DriftScheduleRule.Arn

  # Config IAM ロール
  ConfigRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentPrefix}-config-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWS_ConfigRole

  # Config デリバリー用バケット
  ConfigBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentPrefix}-config-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        BlockPublicPolicy: true
        IgnorePublicAcls: true
        RestrictPublicBuckets: true

  ConfigBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ConfigBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:GetBucketAcl
            Resource: !GetAtt ConfigBucket.Arn
          - Effect: Allow
            Principal:
              Service: config.amazonaws.com
            Action: s3:PutObject
            Resource: !Sub "${ConfigBucket.Arn}/*"

  ConfigRecorder:
    Type: AWS::Config::ConfigurationRecorder
    Properties:
      Name: !Sub "${EnvironmentPrefix}-recorder"
      RoleARN: !GetAtt ConfigRole.Arn

  DeliveryChannel:
    Type: AWS::Config::DeliveryChannel
    DependsOn: ConfigBucketPolicy
    Properties:
      S3BucketName: !Ref ConfigBucket

  # 要件1: Config ルール
  DriftDetectionRule:
    Type: AWS::Config::ConfigRule
    DependsOn: ConfigRecorder
    Properties:
      ConfigRuleName: !Sub "${EnvironmentPrefix}-drift-check"
      Description: CloudFormation スタックのドリフトをチェック
      Source:
        Owner: AWS
        SourceIdentifier: CLOUDFORMATION_STACK_DRIFT_DETECTION_CHECK
      InputParameters:
        cloudformationRoleArn: !GetAtt ConfigRole.Arn

  # 要件4: SNS 通知
  DriftAlertTopic:
    Type: AWS::SNS::Topic
    Properties:
      TopicName: !Sub "${EnvironmentPrefix}-drift-alerts"

Outputs:
  DriftDetectorFunctionArn:
    Description: ドリフト検出 Lambda ARN
    Value: !GetAtt DriftDetectorFunction.Arn

  ConfigRuleName:
    Description: Config ルール名
    Value: !Ref DriftDetectionRule

  SNSTopicArn:
    Description: ドリフトアラート SNS トピック ARN
    Value: !Ref DriftAlertTopic
