# TenkaCloud 統一問題フォーマット
# 問題ID: s3-cross-region-replication
# タイプ: GAMEDAY（構築型）

id: s3-cross-region-replication
title: S3 クロスリージョンレプリケーション構築
type: gameday
category: reliability
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - s3
    - cross-region-replication
    - versioning
    - disaster-recovery
    - iam
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、重要データの災害復旧（DR）戦略として
    S3 クロスリージョンレプリケーションを構築する任務を与えられました。

    ## 背景
    事業継続計画（BCP）の一環として、東京リージョンのデータを
    大阪リージョンへリアルタイムに複製する必要があります。
    データの整合性を保ちつつ、誤削除からの復旧も可能にする構成が求められています。

    ## あなたのミッション
    S3 クロスリージョンレプリケーションを構成し、以下の要件をすべて満たしてください。

    ### 要件
    1. **バージョニング**: ソースバケットとレプリカバケットの両方でバージョニングを有効化する
    2. **レプリケーションルール**: ソースバケットからレプリカバケットへのレプリケーションルールを作成する
    3. **IAM ロール**: レプリケーションに必要な権限を持つ IAM ロールを作成する
    4. **暗号化**: ソースバケットとレプリカバケットの両方で SSE-S3 暗号化を有効化する

  objectives:
    - ソースバケットとレプリカバケットの両方でバージョニングを有効化する
    - クロスリージョンレプリケーションルールを設定する
    - レプリケーション用の IAM ロールとポリシーを作成する
    - 両バケットで SSE-S3 暗号化を設定する

  hints:
    - "ReplicationConfiguration プロパティでレプリケーションルールを設定できます"
    - "レプリケーションにはソースとレプリカの両方でバージョニングが必須です"
    - "IAM ロールには s3:GetReplicationConfiguration と s3:ReplicateObject の権限が必要です"
    - "レプリカバケットは別リージョンに作成してください"

  prerequisites:
    - S3 の基本的な知識
    - IAM ロールとポリシーの基本的な知識
    - クロスリージョンの概念理解

  estimatedTime: 45

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/s3-cross-region-replication.yaml
      parameters:
        BucketNamePrefix: tenka-crr

    local:
      type: cloudformation
      path: ./templates/aws/s3-cross-region-replication.yaml
      parameters:
        BucketNamePrefix: tenka-crr-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: バージョニング
      description: ソースバケットとレプリカバケットの両方でバージョニングが有効化されている
      weight: 25
      maxPoints: 25

    - name: レプリケーションルール
      description: ソースからレプリカへのクロスリージョンレプリケーションルールが正しく構成されている
      weight: 30
      maxPoints: 30

    - name: IAM ロール
      description: レプリケーションに必要な権限を持つ IAM ロールが作成されている
      weight: 25
      maxPoints: 25

    - name: 暗号化
      description: ソースとレプリカの両バケットで SSE-S3 暗号化が有効化されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
