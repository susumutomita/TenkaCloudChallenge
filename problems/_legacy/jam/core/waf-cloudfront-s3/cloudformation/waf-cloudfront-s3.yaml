AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: WAF + CloudFront + S3 セキュア配信（正解テンプレート）
  OAC、IP 制限、レート制限、AWS マネージドルールを含むセキュア配信構成。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-waf-cdn
    Description: 環境名プレフィックス
  AllowedIPRange:
    Type: String
    Default: "203.0.113.0/24"
    Description: 許可する IP アドレスレンジ（CIDR）
  RateLimit:
    Type: Number
    Default: 1000
    Description: 5 分間あたりの同一 IP からのリクエスト上限

Resources:
  # ============================================================
  # 要件1: S3 バケット（セキュア設定）
  # ============================================================
  ContentBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${EnvironmentName}-content-${AWS::AccountId}"
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      VersioningConfiguration:
        Status: Enabled

  # S3 バケットポリシー: CloudFront OAC のみ許可
  ContentBucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref ContentBucket
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Sid: AllowCloudFrontOACOnly
            Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "${ContentBucket.Arn}/*"
            Condition:
              StringEquals:
                "AWS:SourceArn": !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${CloudFrontDistribution}"

  # ============================================================
  # 要件2: CloudFront + OAC
  # ============================================================
  OriginAccessControl:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${EnvironmentName}-oac"
        Description: OAC for S3 origin
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4

  CloudFrontDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Enabled: true
        DefaultRootObject: index.html
        Comment: !Sub "${EnvironmentName} secure content distribution"
        WebACLId: !GetAtt WAFWebACL.Arn
        Origins:
          - Id: S3Origin
            DomainName: !GetAtt ContentBucket.RegionalDomainName
            OriginAccessControlId: !Ref OriginAccessControl
            S3OriginConfig:
              OriginAccessIdentity: ""
        DefaultCacheBehavior:
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          TargetOriginId: S3Origin
          ViewerProtocolPolicy: redirect-to-https
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
          Compress: true
        ViewerCertificate:
          CloudFrontDefaultCertificate: true
        HttpVersion: http2

  # ============================================================
  # 要件3: WAF WebACL（デフォルト Block）
  # ============================================================
  WAFWebACL:
    Type: AWS::WAFv2::WebACL
    Properties:
      Name: !Sub "${EnvironmentName}-web-acl"
      Scope: CLOUDFRONT
      DefaultAction:
        Block: {}
      VisibilityConfig:
        SampledRequestsEnabled: true
        CloudWatchMetricsEnabled: true
        MetricName: !Sub "${EnvironmentName}-web-acl"
      Rules:
        # 要件4: IP 制限ルール（許可リスト）
        - Name: AllowedIPRule
          Priority: 1
          Action:
            Allow: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AllowedIPRule
          Statement:
            IPSetReferenceStatement:
              Arn: !GetAtt AllowedIPSet.Arn
        # 要件5: レート制限ルール
        - Name: RateLimitRule
          Priority: 2
          Action:
            Block: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: RateLimitRule
          Statement:
            RateBasedStatement:
              Limit: !Ref RateLimit
              AggregateKeyType: IP
        # AWS マネージドルール（共通脅威防御）
        - Name: AWSManagedRulesCommonRuleSet
          Priority: 3
          OverrideAction:
            None: {}
          VisibilityConfig:
            SampledRequestsEnabled: true
            CloudWatchMetricsEnabled: true
            MetricName: AWSManagedRulesCommonRuleSet
          Statement:
            ManagedRuleGroupStatement:
              VendorName: AWS
              Name: AWSManagedRulesCommonRuleSet

  # ============================================================
  # IP Set（許可 IP リスト）
  # ============================================================
  AllowedIPSet:
    Type: AWS::WAFv2::IPSet
    Properties:
      Name: !Sub "${EnvironmentName}-allowed-ips"
      Scope: CLOUDFRONT
      IPAddressVersion: IPV4
      Addresses:
        - !Ref AllowedIPRange

Outputs:
  CloudFrontDomainName:
    Description: CloudFront ディストリビューションのドメイン名
    Value: !GetAtt CloudFrontDistribution.DomainName

  CloudFrontDistributionId:
    Description: CloudFront ディストリビューション ID
    Value: !Ref CloudFrontDistribution

  ContentBucketName:
    Description: コンテンツ S3 バケット名
    Value: !Ref ContentBucket

  WAFWebACLArn:
    Description: WAF WebACL ARN
    Value: !GetAtt WAFWebACL.Arn

  AllowedIPSetArn:
    Description: 許可 IP セット ARN
    Value: !GetAtt AllowedIPSet.Arn
