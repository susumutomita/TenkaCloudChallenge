# TenkaCloud 統一問題フォーマット
# 問題ID: waf-cloudfront-s3
# タイプ: GAMEDAY（構築型）

id: waf-cloudfront-s3
title: WAF + CloudFront + S3 セキュア配信
type: gameday
category: security
difficulty: hard

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - waf
    - cloudfront
    - s3
    - oac
    - ip-restriction
    - rate-limiting
    - cdn
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはセキュリティアーキテクトとして、社外向け静的コンテンツ配信基盤の
    セキュリティ強化プロジェクトをリードしています。

    ## 背景
    現在の S3 + CloudFront 構成に対して、以下のセキュリティ要件が追加されました。
    - DDoS 対策としてレート制限を導入する
    - 特定の IP レンジからのみアクセスを許可する
    - S3 バケットへの直接アクセスを完全にブロックする

    ## あなたのミッション
    以下の要件を満たすセキュアなコンテンツ配信基盤を構築してください。

    ### 要件
    1. **S3 バケット**: パブリックアクセスを完全にブロックし、暗号化とバージョニングを有効にする
    2. **CloudFront + OAC**: Origin Access Control を使用して CloudFront 経由のみ S3 にアクセスできるようにする
    3. **WAF WebACL**: CloudFront に WAF を関連付け、デフォルトで全トラフィックをブロックする
    4. **IP 制限**: 許可された IP レンジからのアクセスのみを Allow する
    5. **レート制限**: 同一 IP からの過剰なリクエストをブロックするレートベースルールを設定する

  objectives:
    - S3 バケットをセキュアに設定する（暗号化、パブリックアクセスブロック、バージョニング）
    - CloudFront ディストリビューションを OAC 付きで作成する
    - S3 バケットポリシーで CloudFront OAC のみを許可する
    - WAF WebACL を作成し、IP 制限とレート制限のルールを設定する
    - AWS マネージドルールを追加して共通脅威を防御する

  hints:
    - "WAF の Scope は CLOUDFRONT にし、us-east-1 リージョンに作成する必要があります"
    - "OAC は AWS::CloudFront::OriginAccessControl で作成します"
    - "S3 バケットポリシーの Condition で CloudFront ディストリビューション ARN を指定します"
    - "RateBasedStatement で IP ベースのレート制限が設定できます"
    - "DefaultAction を Block にし、許可ルールで Allow するホワイトリスト方式が推奨です"

  prerequisites:
    - CloudFront の基本知識
    - WAF の基本概念（WebACL、ルール、IP セット）
    - S3 のセキュリティ設定の知識
    - CloudFormation の中級以上の知識

  estimatedTime: 60

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/waf-cloudfront-s3.yaml
      parameters:
        EnvironmentName: tenka-waf-cdn

  regions:
    aws:
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: S3 バケット設定
      description: パブリックアクセスブロック、暗号化、バージョニングが有効で、CloudFront OAC 以外からのアクセスが拒否されている
      weight: 20
      maxPoints: 20

    - name: CloudFront + OAC
      description: OAC を使用した CloudFront ディストリビューションが作成され、HTTPS リダイレクトが設定されている
      weight: 20
      maxPoints: 20

    - name: WAF WebACL 構成
      description: WebACL がデフォルト Block で CloudFront に関連付けられ、AWS マネージドルールが適用されている
      weight: 25
      maxPoints: 25

    - name: IP 制限ルール
      description: IPSet と IP 制限ルールが設定され、許可された IP レンジからのアクセスのみが Allow されている
      weight: 20
      maxPoints: 20

    - name: レート制限ルール
      description: IP ベースのレートベースルールが設定され、過剰リクエストがブロックされる
      weight: 15
      maxPoints: 15

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
