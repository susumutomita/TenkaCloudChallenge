# TenkaCloud 統一問題フォーマット
# 問題ID: rds-multi-az
# タイプ: GAMEDAY（構築型）

id: rds-multi-az
title: マルチ AZ RDS の高可用性構築
type: gameday
category: reliability
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - rds
    - multi-az
    - high-availability
    - backup
    - encryption
    - failover
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、本番環境用のデータベースを
    高可用性要件に準拠した形で構築する任務を与えられました。

    ## 背景
    社内の SRE チームが定めたデータベースの可用性基準があります。
    すべての本番データベースは単一障害点を排除し、
    自動フェイルオーバーとバックアップを備える必要があります。

    ## あなたのミッション
    RDS MySQL インスタンスを新規作成し、以下の高可用性要件をすべて満たしてください。

    ### 要件
    1. **マルチ AZ 配置**: マルチ AZ デプロイメントを有効化し、自動フェイルオーバーを構成する
    2. **自動バックアップ**: 自動バックアップを有効化し、保持期間を 7 日以上に設定する
    3. **暗号化**: ストレージ暗号化を有効化する
    4. **サブネットグループ**: 複数の AZ にまたがる DB サブネットグループを作成する

  objectives:
    - RDS MySQL インスタンスをマルチ AZ 構成で作成する
    - 自動バックアップの保持期間を 7 日以上に設定する
    - ストレージ暗号化を有効化する
    - 2 つ以上の AZ にまたがる DB サブネットグループを構成する

  hints:
    - "CloudFormation の AWS::RDS::DBInstance リソースを確認してください"
    - "MultiAZ プロパティで自動フェイルオーバーを有効化できます"
    - "BackupRetentionPeriod プロパティでバックアップ保持期間を設定します"
    - "StorageEncrypted プロパティで暗号化を有効化します"

  prerequisites:
    - AWS の基本的な知識
    - RDS の基本的な知識
    - VPC とサブネットの基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rds-multi-az.yaml
      parameters:
        DBInstanceIdentifierPrefix: tenka-rds

    local:
      type: cloudformation
      path: ./templates/aws/rds-multi-az.yaml
      parameters:
        DBInstanceIdentifierPrefix: tenka-rds-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: マルチ AZ 配置
      description: マルチ AZ デプロイメントが有効化されており、自動フェイルオーバーが構成されている
      weight: 30
      maxPoints: 30

    - name: 自動バックアップ
      description: 自動バックアップが有効で保持期間が 7 日以上に設定されている
      weight: 25
      maxPoints: 25

    - name: ストレージ暗号化
      description: RDS インスタンスのストレージ暗号化が有効化されている
      weight: 20
      maxPoints: 20

    - name: サブネットグループ
      description: 2 つ以上の AZ にまたがる DB サブネットグループが構成されている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
