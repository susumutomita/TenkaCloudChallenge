AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: IAM 最小権限設計（正解テンプレート）
  リソースレベル権限、ポリシー条件、MFA 強制を含む IAM 設計。

Parameters:
  EnvironmentName:
    Type: String
    Default: tenka-iam
    Description: 環境名プレフィックス
  TargetBucketArn:
    Type: String
    Default: "arn:aws:s3:::example-app-data"
    Description: 管理対象の S3 バケット ARN

Resources:
  # ============================================================
  # 要件1: アプリケーションロール（リソースレベル権限）
  # ============================================================
  AppRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-app-role"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: ec2.amazonaws.com
            Action: sts:AssumeRole

  AppS3Policy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-s3-access"
      Roles:
        - !Ref AppRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # 特定バケットへの読み書きのみ許可
          - Sid: AllowS3ReadWrite
            Effect: Allow
            Action:
              - s3:GetObject
              - s3:PutObject
            Resource: !Sub "${TargetBucketArn}/*"
          - Sid: AllowS3ListBucket
            Effect: Allow
            Action:
              - s3:ListBucket
            Resource: !Ref TargetBucketArn
          # 要件2: 暗号化されていないアップロードを拒否
          - Sid: DenyUnencryptedUploads
            Effect: Deny
            Action: s3:PutObject
            Resource: !Sub "${TargetBucketArn}/*"
            Condition:
              StringNotEquals:
                "s3:x-amz-server-side-encryption": "AES256"

  AppInstanceProfile:
    Type: AWS::IAM::InstanceProfile
    Properties:
      InstanceProfileName: !Sub "${EnvironmentName}-app-profile"
      Roles:
        - !Ref AppRole

  # ============================================================
  # 要件3: 管理者ロール（MFA 必須）
  # ============================================================
  AdminRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${EnvironmentName}-admin-role"
      MaxSessionDuration: 3600
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Sub "arn:aws:iam::${AWS::AccountId}:root"
            Action: sts:AssumeRole
            Condition:
              Bool:
                "aws:MultiFactorAuthPresent": "true"
              NumericLessThan:
                "aws:MultiFactorAuthAge": "3600"

  AdminPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-admin-policy"
      Roles:
        - !Ref AdminRole
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # タグベースの EC2 管理のみ許可
          - Sid: AllowEC2Management
            Effect: Allow
            Action:
              - ec2:DescribeInstances
              - ec2:StartInstances
              - ec2:StopInstances
            Resource: "*"
            Condition:
              StringEquals:
                "ec2:ResourceTag/Environment": !Ref EnvironmentName
          # 破壊的操作は明示的に拒否
          - Sid: DenyDestructiveActions
            Effect: Deny
            Action:
              - ec2:TerminateInstances
              - rds:DeleteDBInstance
              - s3:DeleteBucket
            Resource: "*"

  # ============================================================
  # 要件4: MFA 強制ポリシー
  # ============================================================
  DevelopersGroup:
    Type: AWS::IAM::Group
    Properties:
      GroupName: !Sub "${EnvironmentName}-developers"

  MFAEnforcementPolicy:
    Type: AWS::IAM::Policy
    Properties:
      PolicyName: !Sub "${EnvironmentName}-mfa-enforcement"
      Groups:
        - !Ref DevelopersGroup
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          # アカウント情報の閲覧は許可
          - Sid: AllowViewAccountInfo
            Effect: Allow
            Action:
              - iam:GetAccountPasswordPolicy
              - iam:ListVirtualMFADevices
            Resource: "*"
          # 自分の MFA デバイス管理を許可
          - Sid: AllowManageOwnMFA
            Effect: Allow
            Action:
              - iam:CreateVirtualMFADevice
              - iam:EnableMFADevice
              - iam:ResyncMFADevice
              - iam:ListMFADevices
            Resource:
              - !Sub "arn:aws:iam::${AWS::AccountId}:mfa/${!aws:username}"
              - !Sub "arn:aws:iam::${AWS::AccountId}:user/${!aws:username}"
          # MFA 未設定の場合、MFA セットアップ以外を拒否
          - Sid: DenyAllExceptMFAWhenNoMFA
            Effect: Deny
            NotAction:
              - iam:CreateVirtualMFADevice
              - iam:EnableMFADevice
              - iam:ListMFADevices
              - iam:GetUser
              - iam:ListVirtualMFADevices
              - iam:ResyncMFADevice
              - sts:GetSessionToken
            Resource: "*"
            Condition:
              BoolIfExists:
                "aws:MultiFactorAuthPresent": "false"

Outputs:
  AppRoleArn:
    Description: アプリケーションロール ARN
    Value: !GetAtt AppRole.Arn

  AdminRoleArn:
    Description: 管理者ロール ARN
    Value: !GetAtt AdminRole.Arn

  DevelopersGroupArn:
    Description: 開発者グループ ARN
    Value: !GetAtt DevelopersGroup.Arn

  AppInstanceProfileArn:
    Description: アプリケーションインスタンスプロファイル ARN
    Value: !GetAtt AppInstanceProfile.Arn
