AWSTemplateFormatVersion: "2010-09-09"
Description: >
  TenkaCloud Problem: S3 ライフサイクルポリシーによるコスト最適化（正解テンプレート）
  ストレージクラス移行、有効期限、不完全マルチパートアップロード削除を設定した S3 バケット。

Parameters:
  BucketNamePrefix:
    Type: String
    Default: tenka-lifecycle
    Description: S3 バケット名のプレフィックス
    AllowedPattern: "^[a-z0-9][a-z0-9-]*$"
    ConstraintDescription: 小文字英数字とハイフンのみ使用可能

Resources:
  LifecycleBucket:
    Type: AWS::S3::Bucket
    Properties:
      BucketName: !Sub "${BucketNamePrefix}-${AWS::AccountId}"
      # セキュリティベースライン
      BucketEncryption:
        ServerSideEncryptionConfiguration:
          - ServerSideEncryptionByDefault:
              SSEAlgorithm: AES256
      PublicAccessBlockConfiguration:
        BlockPublicAcls: true
        IgnorePublicAcls: true
        BlockPublicPolicy: true
        RestrictPublicBuckets: true
      # ライフサイクルポリシー
      LifecycleConfiguration:
        Rules:
          - Id: CostOptimizationRule
            Status: Enabled
            # 要件1: 30 日後に Standard-IA へ移行
            # 要件2: 90 日後に Glacier Instant Retrieval へ移行
            Transitions:
              - StorageClass: STANDARD_IA
                TransitionInDays: 30
              - StorageClass: GLACIER_IR
                TransitionInDays: 90
            # 要件3: 365 日後にオブジェクトを自動削除
            ExpirationInDays: 365
            # 要件4: 7 日以上経過した不完全マルチパートアップロードを削除
            AbortIncompleteMultipartUpload:
              DaysAfterInitiation: 7

Outputs:
  LifecycleBucketName:
    Description: ライフサイクルポリシー設定済み S3 バケット名
    Value: !Ref LifecycleBucket

  LifecycleBucketArn:
    Description: ライフサイクルポリシー設定済み S3 バケット ARN
    Value: !GetAtt LifecycleBucket.Arn
