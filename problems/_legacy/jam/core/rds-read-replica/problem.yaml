# TenkaCloud 統一問題フォーマット
# 問題ID: rds-read-replica
# タイプ: GAMEDAY（構築型）

id: rds-read-replica
title: RDS リードレプリカとコネクションプーリング
type: gameday
category: performance
difficulty: medium

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - rds
    - aurora
    - performance
    - read-replica
    - connection-pooling
    - rds-proxy
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはデータベースエンジニアとして、読み取りヘビーなアプリケーションの
    パフォーマンス改善を担当しています。現在は単一の RDS インスタンスに
    すべてのリクエストが集中しており、レスポンスタイムが劣化しています。

    ## 背景
    パフォーマンス監視ツールの分析結果から以下が判明しました。
    - 読み取り:書き込み比率が 9:1 で、大量のリードクエリがライターに集中
    - Lambda からの同時接続数が DB の max_connections を超えてエラー発生
    - クエリレスポンスタイムが P99 で 3 秒を超過

    ## あなたのミッション
    Aurora MySQL クラスターを構築し、リードレプリカと RDS Proxy を設定してください。

    ### 要件
    1. **Aurora クラスター**: Aurora MySQL 互換クラスターを作成し、暗号化を有効にする
    2. **リードレプリカ**: ライターインスタンスに加えてリーダーインスタンスを 1 台追加する
    3. **RDS Proxy**: コネクションプーリング用の RDS Proxy を構成する
    4. **パフォーマンス設定**: Performance Insights を有効化する

  objectives:
    - Aurora MySQL クラスターをストレージ暗号化付きで作成する
    - ライターインスタンスとリーダーインスタンスを構成する
    - RDS Proxy を作成してコネクションプーリングを有効化する
    - Performance Insights を有効にしてモニタリングを可能にする

  hints:
    - "AWS::RDS::DBCluster で Aurora クラスターを作成できます"
    - "DBClusterIdentifier を共有する複数の DBInstance でリーダーを追加できます"
    - "AWS::RDS::DBProxy でコネクションプーリングを構成できます"
    - "EnablePerformanceInsights プロパティで Performance Insights を有効にできます"

  prerequisites:
    - RDS / Aurora の基本的な知識
    - データベース接続管理の理解
    - VPC ネットワーキングの知識
    - CloudFormation の知識

  estimatedTime: 45

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/rds-read-replica.yaml
      parameters:
        VpcId: ""
        SubnetIds: ""
        DBMasterUsername: tenkaadmin

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: Aurora クラスター
      description: Aurora MySQL クラスターが作成されストレージ暗号化が有効
      weight: 25
      maxPoints: 25

    - name: リードレプリカ
      description: ライターとリーダーの 2 インスタンスが存在する
      weight: 30
      maxPoints: 30

    - name: RDS Proxy
      description: RDS Proxy が構成されコネクションプーリングが有効
      weight: 25
      maxPoints: 25

    - name: Performance Insights
      description: Performance Insights が有効化されている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 15
  intervalMinutes: 2

resources:
  documentation:
    - path: ./docs/README.md
