# TenkaCloud 統一問題フォーマット
# 問題ID: cloudfront-cdn-config
# タイプ: GAMEDAY（構築型）

id: cloudfront-cdn-config
title: CloudFront CDN の最適構成
type: gameday
category: performance
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - cloudfront
    - performance
    - cdn
    - caching
    - compression
    - ttl
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはフロントエンドインフラを担当するクラウドエンジニアです。
    新しい Web アプリケーションのグローバル配信基盤として CloudFront を構築する必要があります。

    ## 背景
    開発チームから「S3 に静的サイトをホスティングしているが、海外からのアクセスが遅い」
    という報告がありました。CloudFront を導入してレイテンシを改善し、
    適切なキャッシュ戦略で S3 オリジンの負荷を軽減する必要があります。

    ## あなたのミッション
    CloudFront ディストリビューションを構築し、パフォーマンスを最適化してください。

    ### 要件
    1. **キャッシュポリシー**: デフォルト TTL を 86400 秒（24 時間）、最大 TTL を 604800 秒（7 日）に設定する
    2. **圧縮有効化**: Gzip と Brotli の両方の圧縮を有効にする
    3. **HTTPS 強制**: HTTP リクエストを HTTPS にリダイレクトする
    4. **HTTP/2 有効化**: HTTP/2 プロトコルを有効にする

  objectives:
    - S3 オリジンの CloudFront ディストリビューションを作成する
    - カスタムキャッシュポリシーで TTL を設定する
    - Gzip と Brotli 圧縮を有効にする
    - HTTPS リダイレクトと HTTP/2 を有効にする

  hints:
    - "AWS::CloudFront::CachePolicy でカスタムキャッシュポリシーを作成できます"
    - "EnableAcceptEncodingGzip と EnableAcceptEncodingBrotli で圧縮を制御します"
    - "ViewerProtocolPolicy で HTTPS リダイレクトを設定できます"
    - "HttpVersion プロパティで HTTP/2 を有効にできます"

  prerequisites:
    - CloudFront の基本的な知識
    - S3 の基本的な知識
    - CloudFormation の基本的な知識

  estimatedTime: 25

deployment:
  providers:
    - aws

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/cloudfront-cdn-config.yaml
      parameters:
        ProjectName: tenka-cdn

  regions:
    aws:
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: キャッシュポリシー
      description: デフォルト TTL が 86400 秒、最大 TTL が 604800 秒に設定されている
      weight: 30
      maxPoints: 30

    - name: 圧縮有効化
      description: Gzip と Brotli の両方の圧縮が有効になっている
      weight: 25
      maxPoints: 25

    - name: HTTPS 強制
      description: ViewerProtocolPolicy が redirect-to-https に設定されている
      weight: 25
      maxPoints: 25

    - name: HTTP/2 有効化
      description: HTTP/2 プロトコルが有効になっている
      weight: 20
      maxPoints: 20

  timeoutMinutes: 10
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
