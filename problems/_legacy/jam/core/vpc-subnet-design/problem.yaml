# TenkaCloud 統一問題フォーマット
# 問題ID: vpc-subnet-design
# タイプ: GAMEDAY（構築型）

id: vpc-subnet-design
title: VPC + サブネット設計
type: gameday
category: architecture
difficulty: easy

metadata:
  author: TenkaCloud Team
  version: 1.0.0
  createdAt: "2026-02-10"
  updatedAt: "2026-02-10"
  tags:
    - vpc
    - subnet
    - nat-gateway
    - internet-gateway
    - routing
  license: MIT

description:
  overview: |
    ## シナリオ
    あなたはクラウドエンジニアとして、新規プロジェクトのネットワーク基盤を
    構築する任務を与えられました。

    ## 背景
    社内の設計標準では、Web サーバーはパブリックサブネットに、
    アプリケーションサーバーやデータベースはプライベートサブネットに
    配置することが求められています。可用性のため 2 AZ 構成が必須です。

    ## あなたのミッション
    以下の要件を満たす VPC とサブネットを構築してください。

    ### 要件
    1. **VPC**: 適切な CIDR ブロック（/16）で VPC を作成する
    2. **パブリックサブネット**: 2 つの AZ にパブリックサブネットを作成し、Internet Gateway 経由でインターネットアクセスを可能にする
    3. **プライベートサブネット**: 2 つの AZ にプライベートサブネットを作成し、NAT Gateway 経由でアウトバウンド通信を可能にする
    4. **ルーティング**: パブリック/プライベートそれぞれに適切なルートテーブルを設定する

  objectives:
    - VPC を作成し、DNS サポートと DNS ホスト名を有効にする
    - 2 AZ にパブリックサブネットを作成し、Internet Gateway を設定する
    - 2 AZ にプライベートサブネットを作成し、NAT Gateway を設定する
    - ルートテーブルを作成し、各サブネットに関連付ける

  hints:
    - "VPC には EnableDnsSupport と EnableDnsHostnames を設定してください"
    - "パブリックサブネットには MapPublicIpOnLaunch を true にします"
    - "NAT Gateway はパブリックサブネットに配置し、Elastic IP を割り当てます"
    - "プライベートサブネットのデフォルトルートは NAT Gateway を指定します"

  prerequisites:
    - AWS の基本的な知識
    - VPC とサブネットの基本概念
    - CloudFormation の基本的な知識

  estimatedTime: 30

deployment:
  providers:
    - aws
    - local

  templates:
    aws:
      type: cloudformation
      path: ./templates/aws/vpc-subnet-design.yaml
      parameters:
        EnvironmentName: tenka-vpc

    local:
      type: cloudformation
      path: ./templates/aws/vpc-subnet-design.yaml
      parameters:
        EnvironmentName: tenka-vpc-local

  regions:
    aws:
      - ap-northeast-1
      - us-east-1

  timeout: 30

scoring:
  type: api
  criteria:
    - name: VPC 設計
      description: VPC が適切な CIDR で作成され、DNS サポート・DNS ホスト名が有効になっている
      weight: 25
      maxPoints: 25

    - name: パブリックサブネット + Internet Gateway
      description: 2 AZ にパブリックサブネットが作成され、Internet Gateway 経由のルートが設定されている
      weight: 25
      maxPoints: 25

    - name: プライベートサブネット + NAT Gateway
      description: 2 AZ にプライベートサブネットが作成され、NAT Gateway 経由のルートが設定されている
      weight: 25
      maxPoints: 25

    - name: ルートテーブル設定
      description: パブリック・プライベートそれぞれに適切なルートテーブルが作成・関連付けされている
      weight: 25
      maxPoints: 25

  timeoutMinutes: 5
  intervalMinutes: 1

resources:
  documentation:
    - path: ./docs/README.md
