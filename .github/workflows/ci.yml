name: ci

# Phase 0 (catalog skeleton) placeholder.
#
# The original ci.yml ran TenkaCloud's `make install_ci` + `make before-commit`
# pipeline, which assumes a Bun workspace + Makefile from the platform repo.
# This repo (TenkaCloudChallenge) is a problem catalog with no source code or
# build step, so the platform CI does not apply.
#
# A proper catalog-side CI lands in Phase 1 (= problem migration) and will:
#   - validate every problems/<category>/<id>/metadata.json against SCHEMA.json
#   - check template.yaml syntax + presence of ParticipantViewerRole
#   - run the same cross-ref checks as the platform's tenkacloud-problem CLI
#
# Until Phase 1 ships, this workflow stays as a no-op so PR status checks
# don't block on a non-applicable Makefile target.

permissions:
  contents: read

on:
  push:
  workflow_dispatch:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Phase 0 placeholder
        run: |
          echo "Phase 0 (catalog skeleton). Real catalog CI lands in Phase 1."
          echo "See README.md for the rollout map."
