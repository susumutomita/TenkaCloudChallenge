name: ci

# Catalog-side CI for TenkaCloudChallenge.
#
# Validates every problems/{battles,challenges}/<id>/metadata.json against
# problems/SCHEMA.json + cross-refs the template.yaml Outputs / portal slot
# files referenced from metadata. The validator is a verbatim copy of the
# platform's scripts/validate-problems.ts (= same source of truth).
#
# Phase 2 will additionally check that publish.yml-produced S3 keys exist
# for the new commit, once the AWS IAM Role is bound.

permissions:
  contents: read

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      CI: "true"
      npm_config_ignore_scripts: "true"
    steps:
      - name: Checkout
        # actions/checkout v4.3.1 (= pin matches TenkaCloud main repo)
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        # oven-sh/setup-bun v2.0.2 (= pin matches TenkaCloud main repo)
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: "1.3.11"

      - name: Install deps
        run: bun install --ignore-scripts

      - name: Validate problem catalog
        run: bun run validate

      # index.json is the platform-read catalog, regenerated from every
      # metadata.json by scripts/build-index.ts. --check fails if it is stale
      # (= a problem was added/edited without rerunning the generator), so a
      # new problem can never merge while invisible to the catalog.
      - name: Check index.json is up to date
        run: bun run scripts/build-index.ts --check

      # cost-report.json is the static AWS cost / leftover-billing estimate for
      # every problem (#87 Phase A), regenerated from template.yaml + rate table
      # by scripts/estimate-cost.ts. --check fails if it is stale (= a template
      # changed cost-relevant resources without rerunning `bun run cost --write`),
      # so always-on / billing-risk drift is caught before merge.
      - name: Check cost-report.json is up to date
        run: bun run cost:check
