name: publish-simulator-workload

on:
  push:
    branches: [main]
    paths:
      - "battles/microservice-migration-battle/services/**"
      - ".github/workflows/publish-simulator-workload.yml"
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/susumutomita/tenkacloud-challenge-microservice-migration

jobs:
  publish:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout catalog
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      - name: Setup Bun
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: "1.3.11"

      - name: Validate the shared workload applications
        working-directory: battles/microservice-migration-battle/services
        run: |
          bun install --frozen-lockfile --ignore-scripts
          bun run test
          bun run typecheck

      - name: Setup QEMU
        uses: docker/setup-qemu-action@96fe6ef7f33517b61c61be40b68a1882f3264fb8

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c

      - name: Login to GHCR
        uses: docker/login-action@af1e73f918a031802d376d3c8bbc3fe56130a9b0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and publish immutable workload
        id: publish
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: battles/microservice-migration-battle/services
          file: battles/microservice-migration-battle/services/simulator/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          provenance: mode=max
          sbom: true
          tags: |
            ${{ env.IMAGE }}:sha-${{ github.sha }}

      - name: Record manifest digest
        env:
          DIGEST: ${{ steps.publish.outputs.digest }}
        run: |
          test "$DIGEST" != ""
          echo "### Simulator workload manifest" >> "$GITHUB_STEP_SUMMARY"
          echo "\`${IMAGE}@${DIGEST}\`" >> "$GITHUB_STEP_SUMMARY"
