# ADR-003 Phase 2.x / Catalog metadata sync workflow。
#
# main branch への push で `problems/{battles,challenges}/**/metadata.json` が
# 変わったら、 TenkaCloud platform 本体 repo に PR を切って `problems/index.json` を
# 同期する。 これは ADR-003 で DDB-backed catalog API が完成するまでの
# transition pattern (= filesystem-based catalog index も並行で更新)。
#
# 前提:
#   - GitHub repo Secrets: `TENKACLOUD_CATALOG_BOT_TOKEN`
#       = PAT (scope=repo, expires=90d) or GitHub App token (推奨)
#   - secret 未 bind の間は workflow が失敗する。 skeleton 段階では disabled 扱い。

name: catalog-pr

on:
  push:
    branches: [main]
    paths:
      - "problems/battles/**/metadata.json"
      - "problems/challenges/**/metadata.json"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  catalog-pr:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      TENKACLOUD_REPO: susumutomita/TenkaCloud
      INDEX_PATH: problems/index.json
    steps:
      - name: Checkout self (TenkaCloudChallenge)
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          path: challenge-repo
          fetch-depth: 1

      - name: Checkout TenkaCloud (platform repo)
        # actions/checkout v4.3.1
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          repository: ${{ env.TENKACLOUD_REPO }}
          token: ${{ secrets.TENKACLOUD_CATALOG_BOT_TOKEN }}
          path: tenkacloud
          fetch-depth: 1

      - name: Setup Bun
        # oven-sh/setup-bun v2.0.2 (= TenkaCloud 本体 CI と pin 揃え)
        uses: oven-sh/setup-bun@735343b667d3e6f658f44d0eca948eb6282f2b76
        with:
          bun-version: "1.3.11"

      - name: Sync metadata from challenge-repo into TenkaCloud working tree
        run: |
          set -euo pipefail
          # challenge-repo の battles / challenges 配下の metadata.json だけを
          # 本体 repo の同一 path に rsync。 _legacy は対象外。
          for cat in battles challenges; do
            rsync -a --include='*/' --include='metadata.json' --exclude='*' \
              "challenge-repo/problems/${cat}/" "tenkacloud/problems/${cat}/"
          done

      - name: Rebuild problems/index.json
        working-directory: tenkacloud
        env:
          npm_config_ignore_scripts: "true"
        run: |
          make install_ci
          bun run build:problems-index

      - name: Detect drift
        id: drift
        working-directory: tenkacloud
        run: |
          if git diff --quiet -- "$INDEX_PATH" "problems/"; then
            echo "no metadata drift; skipping PR"
            echo "has_drift=false" >> "$GITHUB_OUTPUT"
          else
            echo "metadata drift detected; will open PR"
            echo "has_drift=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open / update PR in TenkaCloud
        if: steps.drift.outputs.has_drift == 'true'
        working-directory: tenkacloud
        env:
          GH_TOKEN: ${{ secrets.TENKACLOUD_CATALOG_BOT_TOKEN }}
        run: |
          set -euo pipefail
          BRANCH="bot/catalog-sync-$(date -u +%Y%m%d)"
          git config user.name "tenkacloud-catalog-bot"
          git config user.email "tenkacloud-catalog-bot@users.noreply.github.com"
          git checkout -b "$BRANCH"
          git add problems/
          git commit -m "chore(catalog): sync metadata from TenkaCloudChallenge@${GITHUB_SHA::12}"
          git push --force --set-upstream origin "$BRANCH"
          if ! gh pr view "$BRANCH" --json number 2>/dev/null; then
            gh pr create \
              --title "chore(catalog): sync from TenkaCloudChallenge@${GITHUB_SHA::12}" \
              --body "Auto-generated PR from TenkaCloudChallenge/.github/workflows/catalog-pr.yml.

## Source

- TenkaCloudChallenge commit: \`${GITHUB_SHA}\`
- Trigger: \`${GITHUB_EVENT_NAME}\`

## Regression analysis

- Sync target: \`problems/{battles,challenges}/**/metadata.json\` + \`problems/index.json\`
- No platform deploy path change (= metadata visibility update only)

## Physical impact

- NO-OP on deployed resources." \
              --base main \
              --head "$BRANCH"
          fi
